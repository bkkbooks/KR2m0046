body:
  text: 錢通卷三十明胡我琨撰十三之閏錢牘終可無閏也其不終乎不在歸餘之算也以璅課扐全筞猶之置其氣以逆其朔盈弗益也虛弗損也何也無齵財也命曰錢閏閏者徵積以待通也故閏曰十三張懷民與張昌言圍棋賭僕書字一紙勝者得此負者出錢五百足作飯㑹以飯僕社鬼聽之若不賽者俾墜其師無克復國東坡志林隆興間德壽宮與六宮並於中瓦相對今修内司染坊設著位觀孝宗冬月正月孟享回且就看燈買市簾前堆垜見錢數萬貫宣押市食歌呌直一貫者犒之二貫時尚有京師流寓經紀人如李婆婆魚羔南瓦張家圓子之類癸卯雜識今人造墓必用買地劵以梓木為之朱書云用錢九萬九千九百九十九文買到某地云云此村並風俗如此殊為可笑觀元遺山續夷堅志載曲陽燕川青陽壩有人起墓得鐵劵刻金字云敕葬忠臣王處存賜錢九萬九千九百九十九貫九百九十九文此唐哀宗之時然則此事繇來久矣雜識釋氏智論云天帝釋以大寶鏡照四大神洲察人善惡正五九月照南贍部洲二六十月則照東三七十一月則照西四八十二月則照北唐太宗崇其教故正五九月禁食葷百官不支羊錢迄今不改雲麓漫抄八月濃湖軍乏食鄧琬大送資糧畏興世不敢進胡欲復攻淺溪既而曰吾少習歩戰未閑水鬬乃託疾不進遣百舸擊興世興世擊破走之顗怒胡不戰乃遣兵步趣南陵載米三十萬斛錢布數十舫竪榜為城規欲突過至貴口不敢進興世遣兵擊而虜之進逼胡營胡不能制遂遁去顗亦走㑹編保甲法行帝聞鄉民憂無錢買弓矢加以傳惑徙之戍邊父子聚泣語王安石曰保甲宜緩而宻安石對曰日力可惜淮西既平上浸驕侈判度支皇甫鎛鹽鐵使程异曉其意數進羨餘由是有寵又以厚賂結吐突承璀上遂以為宰相制下朝野駭愕至於市道負販者亦嗤之裴度崔羣極諫其不可上不聽時内出積年繒帛付度支令賣鎛悉以高價買之以給邊軍其繒帛朽敗隨手破裂邊軍聚而焚之度因奏事言之鎛於上前引其足曰此靴亦内庫所出臣以錢二千買之堅完可久服度言不可信上以為然俱同上帝有疾詔草野有能治療者白身除節度使有官及願就文資者並與比附推恩仍賜錢十萬田五百頃卒無應者遂崩宋史正月三日買箕四枚懸堂上四壁令人治生大得治田蠶萬倍錢財自入博聞餖飣八月辰日捨錢一文倍還富貴同上漢永平中㑹稽鍾離意字子阿為魯相到官出私錢萬三千文付戸曹孔訢修夫子車身入廟拭几席劒履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主簿安置几前孔子教授堂下牀首有懸甕意召孔訢問此何甕也對曰夫子甕也背有丹書人莫敢發也意曰夫子聖人所以遺甕欲以懸示後賢因發之中得素書文曰後世修吾書董仲舒獲吾車拭吾履發吾笥㑹稽鍾離意璧有七張伯藏其一意即召問璧有七何藏其一耶伯叩頭出之搜神記開元錢燒之有水銀可治小兒驚風博聞餖飣以賣馬錢娶婦令多惡病夫妻别離同上漢以來葬者皆有瘞錢後世里俗稍以紙寓錢為鬼事暌車志内庭嬪妃每至春時於禁中結伴擲金錢為戲開元遺事真宗皇帝嘗曲宴羣臣於太清樓君臣歡咲無間忽問鄽沽尤佳者何處中貴人以實價對之上遽問近臣曰唐酒價幾何無能對者惟丁晉公奏曰唐酒每斗三百上曰安知丁曰臣嘗讀杜甫詩曰速來相就飲一斗恰有三百青銅錢是知一斗三百上大喜曰甫詩可為一時之史玉壺清話江西鍾氏既滅子匡範歸武肅獻雲鶴通天離水犀帶一云𤣥宗御玩遺在西門門客獻鍾鍾常寶之武肅回帶賜錢二萬緡範因登碧波亭命與許彦方擊楫而行水開七尺許至瑞石山岸大為驚賞僧賛傳載有客相從各言所志或願為揚州刺史或願多貲財或願騎鶴上昇其一人曰腰纒十萬貫騎鶴上揚州欲兼三者小説桓公陰懷犯順追蜀人知星者問以國家運祚修短星人曰太㣲紫微文昌三宫氣候如此决無憂慮五十年不論耳繇是大忤温㫖異日送絹一疋錢五千文與之星人乃馳詣習鑿齒曰家在益州被命遠下今受㫖自裁無繇致其骸骨緣君仁厚乞為標碣習問其故星人曰賜絹一疋令僕自裁錢五千以買棺耳習曰君幾誤死君嘗聞星宿有不覆之義乎此以絹戲君以錢供道中資聽君去耳星人大喜明便詣温别温問去意以習鑿齒之言對温笑曰鑿齒憂君誤死君定是誤活然徒三十年讀書不如一詣習主簿天中記陸扆援學士承㫖同平章事故事三署除拜有光署錢以宴舊僚内署即無斯例扆拜輔相之月送學士光院錢五百貫特舉新例内署榮之同上自大厯以來節度使多出禁軍大將皆以倍稱之息貸錢以賂中尉動踰億萬然後得之未嘗由執政至鎮則重歛以償所負至是裴度韋處厚始奏用瑀中外相賀曰自今債帥鮮矣㑹編晉王以李存進為天雄都廵按使有訛言搖衆及强取人一錢以上者皆梟首於市城中肅然同上秦二十一年鑄金狄十二釋氏之源本霍去病討休屠王獲其祭天金人武帝以為神列於甘泉宫魏黄初元年徙長安銅狄重不可致或言金狄泣因留覇城南人有見薊子訓與父老共摩銅狄曰正見鑄此時計爾日已近五百年矣董卓毁其九為錢符堅毁其二為錢其一百姓推置陜北河中或云翁仲頭髻常出晉軍至髻不復出述異記秦檜惡趙鼎居越偪已徙知泉州又諷司諫謝祖信等論鼎嘗受張邦昌偽命遂奪節提舉洞霄宮鼎自泉還復上書言時政檜忌其復用又諷中丞王次翁論其乾没都督府錢十七萬緡詔降官為秘書少監宋史契丹主遣使如北漢告以周使田敏來約歲輸錢十萬緡北漢主使鄭珙以厚賂謝契丹致書稱侄請行册禮㑹編時夏竦判永興軍陳執中知永興軍事議多異同故分命竦屯鄜州執中屯涇州竦雅意在朝廷及任以西事頗依違顧避又數請解兵柄不見從及出廵邊嘗置侍婢中軍帳下幾至兵變元昊命募得竦首者與錢三千其見輕侮如此同上貞元初邢君牙為隴右臨洮節度使進士劉師老許堯佐往謁焉二客方坐一人儀形甚異頭大足短衣麻衣而入都不待賔司引報直入見君牙拱手于額曰進士張汾不敢拜君牙從戎多年殊不為怪乃揖汾坐俄而有吏過按宴設司失錢物君牙閲歴簿書有五十餘千散落為所繇隱漏君牙大怒方令分折去處汾乃拂衣而起曰且奉辭牙謝曰某適有公事畧須次遣來有所失於君子不知遽告辭何也汾對曰汾在京之日每聞京西有邢君上柱天下柱地今日于汾與吏論三五十千錢此漢爭中君牙甚恠便放吏與汾相貎狂奴𫝊楊可告緡徧天下告民匿緡錢不筭者乃分遣御史廷尉正監分曹郎國緡錢得民財物以億計奴婢以千萬數其没入奴婢分諸苑養狗馬禽獸及與諸官官益雜置多徙奴婢衆而下河漕度四百萬石及官自糴乃足王建次子元膺能射錢中孔嘗自抱畵毬擲馬上馳而射之無不中莾為大司馬時欲令名譽過前人遂克已不倦聘諸賢良以為掾吏賞賜邑錢悉以享士愈為儉約田緒承嗣之子也凶險多過失悦令拘之悦以歸國撤警備緒遂與左右殺悦及其將佐扈㠋許士則蔡濟等登城大呼謂衆曰緒先相公之子諸君受先相公恩若能立緒兵馬使賞緡錢二千大將半之士卒百緡竭公私之貨五日取辦於是將士皆歸緒軍府乃定㑹編宼彦卿入朝有民不避道投諸欄外而死彦卿自首梁主以彦卿有功命以私財過死者家以贖罪御史司憲崔沂劾奏請論如法彦卿揚言有得崔沂首者賞萬緡梁主使人謂彦卿曰崔沂有毫髮傷我當罪汝時功臣驕横繇是稍肅同上先是吳有丁口錢又計畆輸錢錢重物輕民甚苦之齊丘以為錢非耕桑所得今使民輸錢是教民棄本逐末也請蠲丁口錢餘税悉輸榖帛紬絹匹直千錢者當税三千或曰如此縣官歲失錢億萬計齊丘曰安有民富而國家貧者耶知誥從之繇是江淮間曠土益闢桑柘滿野國以富强通鑑吳越王鏐遣錢傅瓘將兵三萬攻吳常州徐温帥諸將拒之戰於無錫㑹温病熱不能治軍吳越攻中軍陳彦謙遷中軍旗鼓于左取貎類温日擐甲胄號令軍士吳越兵敗殺其將何逢斬首萬級傅瓘遁去温募生獲叛將陳紹者賞錢百萬獲之紹勇而多謀温復使之典兵初吳時賈筠亦奔吳越温厚遇其妻子遣門使告之曰使汝不得志而去吾之過也㑹編唐罷告身綾軸錢舊制吏部給告身先責其人輸朱膠綾軸錢喪亂以來貧者但受敕牒多不取告身侍郎劉岳言告身有褒貶訓戒之辭豈可使其人初不之覩後執政議以為朱膠綾軸錢厥費無多乃奏罷之是後試御帖號所除浸多乃至卒伍胥使皆得銀青階及憲官歲賜告身以萬數通鑑太常少卿徐僑嘗侍講開陳友愛大義帝悟乃命復王竑官爵有司簡視墓域以時致祭時竑妻吳氏自請為尼特賜號慧淨法空大師紹興府月給衣資緡錢錢思公生長富貴而性儉約閨門用度為法甚謹子弟輩非時不敢輙取一錢公有一珊瑚筆格平生尤所珍惜嘗置之几案子弟有欲錢者輙竊而藏之公即悵然自失乃榜于家庭以錢十千贖之居一二日子弟佯為求得以獻公欣然以十千賜之他日有欲錢者又竊去一歲中率五七如此公終不悟也歸田録單父人呂公善沛令避讐從之沛中豪傑吏皆往賀蕭何為主進令諸大夫曰不滿千錢坐堂下註進與賮同彚苑詳註張文定公齊賢為江西轉運使一日家宴一奴竊銀器數事於懷公在簾下熟視不問後為宰相門下厮役皆得班行此奴竟不沾禄奴乘間請曰相公獨遺某何也公憫然語曰爾憶江西盜銀器數事乎我懷之三十年不以告人今備位宰相安敢以盜賊薦耶與爾錢三百千可自擇所安既已發汝平昔當有愧於吾不足復留也奴震駭泣拜而去賢奕編昔波斯人來閩相古墓有寶氣乃謁墓隣以錢數萬市之墓隣不肯波斯曰汝無庸爾也此墓已無主五百年矣墓隣始受錢波斯發之見棺衾肌肉潰盡惟心堅如石鋸開觀之有佳山水青碧如畵傍有一女靚籹凭欄疑睇葢此女有愛山水癖朝夕玩望吐呑清氣故能融結如此潜溪文集李珏年十五隨父販糴父年老珏繼其業人與之糴珏但授之升斗使其自量每升只取兩文利息以養父母不論時貴時賤皆然歲月既久衣物甚豐父恠而問之珏以實對父嘆曰吾之所業同流者衆無不各用出入升斗以恣多取雖官司春秋較𣙜不能禁也吾早悟之只一升斗自謂不偏矣汝今聽其自量吾不及也衣食豐給非神明之相耶因果録紹興間淮陰有小民喪女經寒食恨無以為薦其母截髮賣錢六百文欲請僧作佛事忽有五僧過門迎僧以入五僧互相推托良久獨一僧入因訪諸隣得金光明經一部諷誦竟回向就齋而去向四僧見而邀之到一酒家未及座聞窻外有聲呼之曰轉經僧莫吃酒僧問何人泣對曰我看經家亡女也淪滯冥途日久今䝉師課經功德方得脱罪超生師若飲酒破齋令我依前沉墜言已不見僧慙而罷其後五僧謹持齋戒念佛看經皆證極樂所謂一鬼度五僧此之謂也同上後蜀李特為𤣥休巴西宕渠人其先廪君之苖裔也昔武落鍾離山崩有石穴二所其一赤如丹一黒如漆有人出於赤穴者名曰務相姓巴氏有出於黑穴者凡四姓曰䁺氏樊氏栢氏鄭氏五姓俱出皆爭為神於是相與以劒刺穴屋能著者以為廪君四姓莫著而務相之劒懸焉又以土為船彫畵之而浮水中曰若其船浮存者以為廪君務相船又獨浮於是遂稱廪君乗其土船將其徒卒當夷水而下至於鹽陽鹽陽水神女子止廪君曰此魚鹽所有地又廣大與君俱生可止無行廪君曰我當為君求廪地不能止也鹽神夜從廪君宿旦輙去為飛蟲諸神皆從其飛蔽日晝昏廪君欲殺之不可别又不知天地東西如此者十日廪君乃以青縷遺鹽神曰嬰此即宜之與汝俱生弗宜將去汝鹽神受而嬰之廪君立碭石之上望膺有青縷者跪而射之中鹽神鹽神死羣神與俱飛者皆去天乃開朗廪君復乗土船下及夷城夷城石岸曲泉小亦曲廪君望如穴狀嘆曰我新從穴中出今又如此柰何岸即為崩廣三丈餘而階階相乗廪君登之岸上有平石方一丈長五尺廪君休其上投䇿計筭皆著石焉因立城其旁而居之其後種類遂繁秦并天下以為黔中郡簿賦歛之口歲出錢四十巴人呼錢為賨因謂之賨人焉數傳至特歴勢凡六世僣偽位而滅史異編淳熈七年十二月二十八日南内遣御藥幷後苑官管押進奉兩宫守歲合食則醵金銀錢消夜歲軸果兒錦厯鍾馗爆伏羔兒法酒春牛花朶等正月初二日早進膳訖遣太子到宮恭迎兩殿幷只用轎兒禁衛簇擁入内官家親王殿門恭迎親扶太上降輦至損齋進茶訖至清燕殿看書畵翫器約午初刻後苑供進酥酒十色熬煑午正三刻就凌虚閣排當三盞後至蕚緑華堂看梅上進銀三萬兩㑹子十萬貫太上云宮中無用錢處不須得再三奏請止受三分之一辟寒録黄巖戚存心者貧而有膽豪士也有富人子戲之曰厲壇第七格中有錢三百君夜取之乎曰可其地僻寂攅棺甚衆常白晝魘人富人子因令人置錢第七棺仍令潜聽之頃之羣鬼曰戚侍郎來盍避之戚來取錢去明日富人子賀曰君是貴人也言其故而厚贈之後登進士累官工部侍郎粹語婦顧氏騎聶二驢適市二隨之行兩相語婦因知二無室僅有一母曰妾無夫家在通州亦僅一母倘得為君婦合力以養二慈糟糠固其分也二大喜即與偕歸見母為婦矣明日婦為書顧驢屬姑往迎其母而解錢五百餘屬二往何關門家買青布一端為二作長衣既得矣婦故陰截其一叚令二往更長者何以布名家稱關門者言閉戸而人求之也奚有以殘布給人之理因擊二頰數下二歸言狀婦即酖二死而騎驢往詰於何何大懼出七十金求釋已婦持金騎驢去不知所往適通州姑歸言何常有母惟榻有死子並驢失焉同上今人意錢賭博皆以四數之謂之攤案廣韻攤之下云攤蒲四數也瑯琊代醉編余㓜時嘗見胡石塘先生𤣥寶傳今不能記其全篇有人出永嘉高則誠明烏寶傳相示雖曰以文為戲要以有關于世教傳曰烏寶者其先出於㑹稽褚氏世尚儒務詞藻然皆不甚顯至寶厭祖父業變姓名從墨氏遊盡得其通神之術繇是知名初寶之先有錢氏者亦以通神之術顯迨寶出而錢氏遂廢然其術亦頗相類故不知者猶以為錢云寶輕薄柔黙外若方正内實垢汚善隨時舒卷常自得聖人一貫之道故無入而不自得流俗多惑之凡有謀於寶小大輕重多寡精粗無不曲隨人所求自公卿以下莫不敬愛其子姓蕃衍散處郡國者皆官給廬舍而加守䕶焉其有老死者則官為聚其屍而焚之葢知墨之末俗也寶之所在人爭迎取邀致茍得至其家則老稚婢𨽻無不忻悦且重扄䆳宇敬事保愛惟恐其他適也然素趨勢利其富室勢人每屈輙往雖終身服役弗厭其窶人貧氓有傾心願見終不肯一往尤不喜儒雖有暫相與往來者亦終不能久留也葢儒墨之素不相合若此寶好逸惡勞愛儉素疾華侈常客於𢎞農田氏田氏朴且嗇寶竭誠與交田氏没其子好奢靡日以聲色宴遊為事寶甚厭之隣有商氏者亦若田氏父之為也遂挈其族往依焉葢墨之道貴清淨故也然其為人也多詐反覆不常凡逹官勢人無不願交而率皆不利敗事故其廉介自持者率不與寶交自寶之術行挾詐者往往偽為寶術以售於時後皆敗亡故寶之術益尊是時崑崙抱璞公南海𤣥珠子永昌從革生皆能濟人與世俯仰曲隨人意而三人者亦願與寶交茍得寶一往則三人亦無不可致故時譽咸歸於寶焉寶族雖夥然其狀貎技術亦頗相似知與不知咸謂之烏寶云論曰烏氏見於春秋世本姓苑若存餘技烏獲皆為顯仕至唐承恩重𦙍始盛迨寶而益著寶裔本褚氏而自謂烏氏則變詐亦可知矣寶之學雖出於墨而其害道傷化尢甚雖孟軻氏復生不能闢也然使寶生於唐虞三代時其術未必若是顯然則寶之得行其志者亦其時有以使之嗚呼豈獨寶之罪哉同上東方朔云侏儒長尺餘奉一囊粟錢二百三十臣朔長九尺餘亦一囊粟錢二百四十侏儒飽欲死方朔飢欲死上大笑賜之風俗通德宗正元初駱谷散關禁行人以一錢出者憲宗時商賈至京師委錢諸道進奏院及諸軍諸使富家以輕裝趣四方合劵乃取之號飛錢食貨志太祖嘗與趙普議事不合上曰安得宰相如桑維翰者與之謀乎普曰使桑維翰在陛下亦不用葢維翰愛錢上曰茍用其長當䕶其短措大眼孔小賜與十萬貫則塞破屋子矣王嗣宗為節度使性剛正當卧病家人私爇紙幣以祈福嗣宗大呼而止之曰神茍有知豈枉法而受賄邪宋掇遺邵康節春秋祭祀約古今禮行之亦燔楮錢程伊川怪問之則曰明器之類也茍有一非豈孝子慈孫之心乎嗚呼士知修内不欺諸已外不欺諸人可謂修己已嗚呼士誠有立耶上不怨於天下不怍於地中不負於神可謂士君子已凡唯知修至於可立而不愧者其備如此雖天地神明我斯天地神明已豈又䘏於諸餘哉世衰道隱士心險惑稔慝自危則區於禍福以壯其毒聞古之用幣以禮神祗後之罪士為多則假之以楮禱禳祈假之不已則翻楮代焉而弗支是故罪者滿世而莫救其非肅肅鄧州唯道之繇識獨超於衆謬行不狥於時流孰巫祝之足因而禧祥之茍求葢精修之不媿則萬福之來酬是何楮錢之不然而名位之優優嗚呼豈弟君子求福不回誰其嗣之宋有人猗季布傳數招權顧金錢注以金錢事權貴而求得其勢以炫燿也灌夫傳夫罵臨汝侯曰生平毁程不識不值一錢今日乃效女兒曹呫囁耳語支子曉起憑欄濯纓清沼俄見遺錢周郭肉好文曰開通字曰元寶水蝕沙饕色澤皛皛先生曰太空無滓我心則夷曾是阿堵而乃來斯少選錢形漸隱化而為人伸臆鼓唇長揖而呻曰我上清元君也先生弗察迫而辱之敢以意宣我族綦貴我𦙍實蕃軒貨惟百虞品有三夏陻洪水鑄彼歴山湯罹赤地莊山是劖姬闢泉府宋易綖環文德一甲淮南青蟬夢之者侈青衣之號聚之者擅王老之譚我為世用與天地參先生弗察而謾爾譫譫支先生曰汝侈其貴我嗟其穢汝炫其族我畏其黷瓦擲寧歆囊空少陵和嶠昵汝而成痼癖蕭宏耽汝而獲愚名曾是阿堵而溷先生上清元君曰先生之言亦已太甚綦母等我於乾坤魯褒讃我為通神在昔上古代為世珍中古多營我遂役人司馬弗綱兄兮我親逮兹叔季為父為君三槐九棘儼若神明繄我寓情於酺醢倐然目炫而心傾高牙大纛氣燄熏天我托苞苴以將事立使其頥指而周旋試闈扄鐍崇深嶻嶭鳥飛不下䑕嚙無穴我為關節高科晨揭銓司體裁錚錚烈烈政典昭回孤稜截鐵暮夜一投美膴如掇爰書顯附三尺象懸我能刓真鋼而繞指何方枘之不員白簡皂囊筆底風霜揚眉吐氣如虎如狼匪我制之孰挫其鋩兩富齊聲割衿世講升沉倐移盟言反掌繩樞下品暴致千斤仰㧞名閥姻連晉秦刎頸締交椎牛㰱血情隔富貧覿面胡越累世忿爭貿首之讐稍沾濡沫義洽分投襫襏暑雨胼胝祈寒晨興夜寐僅給饔餐堅鋭劵奮勇無前匪固輕生俘馘是先倚門之艶强笑追歡盡墮帷薄以冀錦纒青襟啞啞口吟自披飢吻嗷嗷覬潤膏脂揮麈清談坐折名理杖頭一陌衷言呴呴持鉢通衢籲父呼天殘胔餘瀋謂生可捐腰懸銀艾手握銅符焦喉灼舌敲朴追呼鐵面冷顔峩軒朱轂袖出携囊笑容可掬王侯貴士放諸四裔惟我低昻惟我軒輊先生執獨行之小亷輕擅國之大權泥豎儒之陳言昧涉世之真詮何見之偏何量之懁支先生曰汝謂通神我謂戎首舉世混濁誰執其咎風靡景從莫可誨諭吾將手箋衆醜告諸上帝俾麗水不波黄汞永閟委赤仄於刼塵殫飛屑於翡翠大返飢食飽棄之淳風永無藉于若輩行見貪夫袖手守虜消魂逹人曠視介士還真目分蒼素鼻别蕕薰汝亦安能干帝者之命而泯泯棼棼以禍斯民上清元君乃拍掌掀髯而笑曰有是哉先生之迂也上帝有命畀以國柄六宗效靈山川助順先生建議及我即有舌如蘇張戅如汲鄭且重趼而不前膠口而莫騁也先生且休矣我視先生良用為恧踽踽凉凉其何能淑蠧魚是侶鳥跡是復手之所握三寸枯竹口之所咀千古糟粕以若所為而企我之轂殆沉淵而索鹿也去我方遠奚我之讟先生辴然曰人有真宰士敦雅誼汝聚耶匪予之欣汝散耶奚繇而懥如汝所陳皇皇而求利者奚啻夸父之逐日剖腹而藏珍俄遘大盜發篋擔囊或襢惡子飲博淫荒或水溺而火熛或骫法而飛殃紛五家以共耗亶多藏而厚亡葢貪取者有掠剰之使踰分者遇剪幅之吏此尼父所為歎息乎執鞭而烱戒于欹器我性甚拙我術甚劣不滿而撲左挹右泄分定故也我心自愜在昔少年尚不汝須今雖盪鏐鈑銑麟趾褭蹄北斗齊高郿塢均糈先生老矣無所用之上清元君乃促膝附耳吐底裏曰毋謂既老百營都息方有時政需我甚急今日都邑右文鳩工纂述得我者白璧賁于黄壤失我者夷魂化為跖魄厥有狡夫生前恣泆頼我居閒名揚簡帙亦有愿士好修自飭我不彼與沈淪下隰南媛秉貞苦蘗清冰匪我為介飲恨九京惟彼河間垢聞傾城屬有𤓰葛族望雲仍要以死後貞烈擅聲十郎妬癡糟糠扊扅一朝身貴棄之若遺新聯佳儷鼓瑟齊眉險側如兹邑里所嗤彼素契我義夫首垂陵凹谷凸真淆贗易錯沓紛拏孰知紀律昔詭生人今塗死椑昔鬻冠裳今貿枯骨昔亂朝常今迷草澤力竟徹於重泉勢直傾於冥極我神一至於斯而先生敢於擯斥支先生曰詩云我躬不閲遑恤我後今吾之生也尚以形骸為委寓芬麗為桎梏甘貧賤以如飴撫烟霞而嗢噱矧伊身後又焉知天地之盈虗陰陽之消息誰毁誰譽何伸何屈上清元君締聞太息逡廵辟易俛而沉思爽然自失曰有是哉先生之迂也而終不我易支子文集貴賤相和換影仙賤物互乗貴價錢貴物互乗賤價比相减餘為長法然先使總錢乘賤物後用總物乗賤錢二數相减餘為實長法除之短法言貴物貴價各乗短物價分明皆得全總内减貴餘為賤不遇知音不與傳仙人換影歌今有錢四千九百九十五文共買桃梨五千個只云錢十一文買桃九個又錢四文買梨七個問桃梨各若干答曰桃三千二百八十五個該錢四千零一十五文梨一千七百一十五個該錢九百八十文大學衍義補法列置九個文十一七個四文五千個十四千九百九五文先以上十一互乗中七個得七十七個又以四文乗九個得三十六個以少减多餘四十一為長法若求桃數價者以中下互乗置總錢以七個乗得三萬四千九百六十五個另置總果以四文乗之得二萬以减三萬四千九百六十五個餘一萬四千九百六十五個為實以長法四十一除之得三百六十五個為短法列二位一位以九個乗得桃三千二百八十五個一位以十一文乗得桃價四千一十五文於總内减桃數餘者即梨總價也若求梨數價者却置總錢以九個乗之又置總果以十一文乗之二數相减餘一萬四十五為實仍以長法四十一除之得二百四十五為短法列二位一位以七個乗得梨數一位以四文乗得梨價求桃者以梨價求之求梨者以桃價求之同上班孟堅作史叙魯朱家者流振人不贍先從貧賤始趨人之急甚于己私厚施而薄望既以振人之命不矜其功可謂賢矣而類之游俠卜式上書願輸家財半助邊繼復持錢二十萬助給徙民式田畜為事當時聲名曾不足儗俠士及在位亦無竒節然廼獨入列傳焉豈非朱家者流止能擅名鄉邑而義在朝廷者惟式故耶箴談窶人有寢而夢得錢者輙屈指而籌之若干緡買宅若干緡劵田若干緡納小妻終夜展轉而不寐其妻詰之而得其故泣曰窶甚矣方得錢也不以生息而遽買小妻獨不念相與共糟糠耶喧閙不已隣人聞而讓之曰子寧人乎吾憫汝之困朝夕以相濟也得錢而不以酬宿負已又聞之閭胥閭胥曰是則逋公税而不償者也幸而得錢尚不即輸官乎乃縶而詣縣請法之邑大夫審其為夢也曰汝敝民矣夫夢錢也而遽議逞其所欲如誠得錢也則將何以娯其心志哉乃杖而遣之𤣥冥子曰今之不為窶人者葢寡矣方其伏艸莾而困於百需也朶頥於富羨者久矣一旦脱跡編氓而階尺寸之柄遽擬王侯之尊貴而欲淫縱耳目之娛曾不計名位之久近與禄奉之多寡矣亦何異於夢錢而妄籌者哉同上梁武帝怠棄萬機邊將使使奏事謁者求賄三月而不通遼左之戍請餉曰所須幾何曰三十萬緡曰若是其多乎卒不許諸浮屠欲易貨也而紿帝以祝釐曰非大齋供不可問其費曰須七百萬緡曰何少也敕右藏亟與之諸浮屠宮闕服食侈于帝居衣綺縠文繡而乗軒結駟者道相屬也侯景作難州郡告急帝不與兵曰佛在何能為乎景兵日逼流舟積白始遣使徵發遠近莫應曰佛可使也以三十萬緡餉戍而不許以七百萬緡祝釐而為之柰何舍其所養而用其所不養乎檄如羽馳兵卒不集景遂入據宮闕逼帝遷於臺城餓而死同上昔宋蔡絛著古器圖説極言當時好古風盛至元符間憲章古始𦕈然追唐虞之典及大觀初乃倣李公麟考古作宣和殿博古圖所藏禮器則已五百有幾故有一器值金錢數十萬後動至百萬天下塜墓破伐盡矣談子嘗聞劉文靖誚丘瓊山有散錢而少貫索瓊山還誚曰公有貫索而却欠散錢雖然世博綜者恃此休休心為貫索更玅也韓魏公為相時或謂公之德業無愧古人但公文章不逮歐陽永叔耳公曰吾為相永叔為翰林學士天下文章孰大於是即此一語永叔之文章便為魏公一齊穿紐矣箴談錢通卷三十
