body:
  text: 錢通卷五明胡我琨撰鑄辨鄭衆曰錢始一品景王鑄大錢而有二品後數變易不失本制唐固所謂大泉乃王莽時錢非景王所鑄明矣又景王至赧王十三世而周亡後有戰國秦漢幣物改轉不相因先師所不能紀或云大錢文曰寶貨皆非事實舊志桓公令左司馬伯公將白徒鑄錢於莊山令中大夫王邑載錢二千萬求生鹿於楚管子馬殷始鑄鉛錢行於城中城外即用銅錢賈人多銷鉛錢持過江北髙郁請鑄鐵錢圍六寸文曰乾封泉寶以一當十錢既重厚市肆以劵契指契交易楚史今世有一樣古錢其文曰半兩無輪郭醫方中用以為藥考之史記乃漢文帝時錢也當時吳濞鄧通皆得自鑄錢獨多流傳至今不絶其輕重適中與今錢略相似視五銖貨泉又先一二百年矣五銖貨泉比今錢却稍輕鶴林玉露景帝中六年定鑄錢偽黃金棄市律人有告鄧通盜出徼外鑄錢下吏驗問頗有遂竟案盡沒之漢史漢孝武自造白金五銖錢後吏民坐盜鑄金錢死者數十萬人犯者益衆吏不能盡誅詔遣博士六人分巡郡國舉兼並之徒及守相為吏有罪者通鑑廢帝景和二年鑄二銖錢文曰景和形式轉細官錢每出入人間即模效之而大小厚薄皆不及也無輪郭不磨剪鑿者謂之耒子猶薄輕者謂之荇葉市井通用之永光元年沈慶之啓通私鑄由是錢貨亂改一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢入水不沈隨手破碎市井不復料數十萬錢不盈一掬斗米一萬商賈不行南史西魏大統七年正月東魏有雀銜永安錢置渤海王髙歡前歡世子澄乃令百爐别鑄此錢鄴中號令公百爐錢丘恱三國典略泰始中建德校尉王和掘得一鼎容四斗中有大錢三十文曰百當千千當萬因此令公私行錢晉書載記石勒傳魏行太和五銖錢通鑑曰先是魏人未嘗用錢魏主始命鑄之是嵗鼓鑄初備詔公卿私用之劉氏曰魏始用錢也終魏之世再鑄皆五銖錢可謂得輕重之中矣會編元帝過江用孫氏舊錢輕重雜行大者謂之比輪中者謂之四文吳興沈充又鑄小錢謂之沈錢文宣受東魏禪除永安之錢改鑄常平五銖重如其文其錢甚貴而製造甚精其錢未行而私鑄已興一二年間即有濫惡雖殺戮不能止乃令市增長銅價繇此利薄私鑄少止至乾明皇建之間往往私鑄鄴中用錢有赤郭青熟細眉赤生之異河南所用有青薄鉛錫之别青齊徐兖梁荆河等州輩類各殊武平以後私鑄轉甚或以生鐵和銅至於齊亡卒不能禁隋志梁武帝乃鑄錢肉好周郭文曰五銖重四銖三絫一黍其文則重一斤三兩又别鑄除其肉郭謂之公式女錢徑一寸文曰五銖重如新鑄五銖二品並行百姓或私以古錢交易者其五銖徑一寸一分重八銖文曰五銖三吳屬縣行之女錢徑一寸重五銖無輪郭郡縣皆通用太平百錢二種並徑一寸重四銖源流本一但文字古今之殊耳文並曰太平百錢定平一百五銖徑六分重一銖半文曰定平一稚錢五銖徑一分半重四銖文曰五銖源出於五銖但狹小東境謂之稚錢五銖錢徑七分半重三銖半文曰五朱源出稚錢但稍遷異以銖為朱耳三吳行之差少於餘錢又有對文錢其源未聞豐貨錢徑一寸重四銖半代俗謂之男錢云婦人佩之即生男也此等輕重不一天子頻下詔書非新鑄二種之錢並不許用而趨利之徒私用轉甚至普通中乃議盡罷銅錢更鑄鐵錢人以鐵錢易得並皆私鑄及大同以後所在鐵錢遂如丘山物價騰貴交易者以車載錢不復計數而惟論貫商旅姦詐因之以求利自破嶺以東八十為陌名曰東錢江郢以上七十為陌名曰西錢京師以九十為陌名曰長錢大同元年天子乃詔通用足陌詔下而人不從錢陌益多至於末年遂以三十五為陌六朝史復行開通元寶錢天下皆鑄之然私錢犯法日蕃有以舟筏鑄江中者詔所在納惡錢而姦亦不息儀鳳中瀕江民多私鑄錢為業詔巡江官督捕載銅錫蠟過百斤者沒官乃詔少府鑄尋復舊永淳元年私鑄者抵死鄰保從坐景龍中中宗出降睿宗女荆山公主特鑄撒帳錢用以撒帳敇近臣及修文館學士拾錢其銀錢則散貯絹中金錢每十文即繫一綵絛學士皆作却扇詩其最近御坐者所獲居多有學士考功員外武平一既出逢韋巨源蘇味道各執平一將在燭下云員外外僕射省主欲有何取以手探平一懷盡而後已舊譜初有虛錢京師人人私鑄並小錢壞鐘像犯禁者愈衆鄭叔清為京兆尹數月榜死者八百餘人上元元年減重輪錢以一當三十開元舊錢與乾元十當錢皆以一當十碾磑鬻受得為實錢虛錢交易皆用十當錢繇是錢有虛實之名蘄春鐵錢監五月至七月號為鐵凍例閣爐鞴本錢四可鑄十鐵炭稍貴六可鑄十工雇費皆在焉其用工之序有三曰沙模作次曰磨錢作末曰排整作以一監約之日役三百人十日可鑄一萬緡一歲用工九月可得二十七萬緡遊宦紀聞僕嘗怪開元錢流傳至今四五百年而於諸錢之中最佳且多因而考之唐之錢見於今者有二開元通寶與夫乾元重寶按食貨志開元通寶髙祖時鑄徑八分得輕重大小之中其文以八分篆𨽻三體洛并幽益桂等州皆置監賜秦王齊王三罏右僕射裴寂一罏髙宗復行開元通寶錢天下皆鑄之玄宗亦鑄此錢庫藏滿行遍天下而乾元重寶錢肅宗命第五琦鑄錢徑一寸每緡重十斤與開元通寶參用以一當十琦為相後命絳州鑄此錢徑一寸二分每緡重二十斤與開元通寶並行以一當十乾元錢惟肅宗朝鑄而開元錢鑄於纍朝所以至今尚多野客叢書今唐國通寶大唐通寶乃南唐錢或者不知求之三百年之唐謬也按南唐書元帝即位鑄唐國通寶大唐通寶通用數年漸弊百姓盜鑄極為輕小元宗即璟同上武后長安中令懸樣於市令百姓依樣用錢俄而揀擇艱難交易留滯乃令錢非穿穴及鐵錫銅液皆得用之熟銅排斗沙澀之錢皆售自是盜鑄蜂起江淮尤甚莫能捕光天之際兩京錢益濫郴衡錢才有輪郭鐵錫五銖之屬皆可用之或鎔錫模錢須臾千百會編時兩京用錢稍善米粟價益下其後錢又漸惡詔出銅所在置監鑄開元通寶錢京師庫藏皆滿天下盜鑄益起廣陵丹陽宜城猶甚京師權豪嵗嵗取之舟車相屬江淮偏爐錢數十種雜以鐵錫輕漫無復錢形以一當偏爐錢七八富商往往藏之以易江淮私鑄者兩京錢有鵝眼古文線環之别每貫重三四斤至剪鐵而緡之宰相李林甫請出絹布三百萬匹平估收錢物價踴貴訴者百萬人兵部侍郎楊國忠欲招權以市恩揚鞭市門曰行當復之明日詔復行舊錢天寶十一載又出錢三十萬緡易兩京惡錢出左藏排斗錢許民易之國忠又言非鐵錫銅沙穿穴古文皆得用之是時增調農人鑄錢既非所習皆不聊生內作判官韋倫請厚價募工繇是役用減而鼓鑄多天下爐九十九絳州三十揚潤宣鄂蔚皆十益郴皆五洋州三定州一每爐歲鑄錢三千三百緡役丁匠三十費銅二萬一千二百斤鑞三千七百斤錫五百斤每千錢則費錢七百五十天下嵗鑄三十二萬七千緡太和三年詔佛像以鉛錫土木為之飾帶以金銀鍮石烏油藍鐵唯鑑磬釘鐶鈕得用銅餘皆禁之盜鑄者死是時峻鉛錫錢之禁告千錢者賞以五千四年詔積錢以七千緡為率十萬緡者期以一年出之二十萬以二年凡交易百緡以上者匹帛米粟居半河南府揚州江陵府以都會之劇約束如京師未幾皆罷八年河東錫錢復起鹽鐵使王涯置飛狐鑄錢院於蔚州天下嵗鑄錢不及十萬緡唐主李璟既失江北困於用兵鍾謨請鑄大錢以一當十文曰永通泉貨謨得罪而大錢廢韓熙載又鑄鐵錢以一當二錢有銅鐵二等五代相承用唐錢諸國割據者江南曰唐國通寶又别鑄如唐制而篆文其後鑄鐵錢每十錢以鐵錢六權銅錢四而行乾德後只以鐵錢貿易凡十當銅錢一兩浙河東自鑄銅錢亦如唐制西川湖南福建皆用鐵錢與銅錢兼行湖南文曰乾封泉寶徑寸以一當十福建如唐制二十八年上命御府銅器千五百事付泉司大索民間銅器告者有賞其後得銅二百餘萬斤寺觀鐘磬鐃鈸既籍定投務外不得添鑄寶厯初河南尹王起請銷錢為佛像者以盜鑄錢論唐史禁私賣銅鉛錫敇以人間多盜鑄錢始禁私賣銅鉛錫及以銅為器皿其采銅鉛錫者官為市取同上唐李德為蔚州刺史州有銅冶自天寶後廢不治民盜鑄不禁德乃開五爐官鑄錢日五萬人無犯者初陜西運興移用不足知商州皮仲容始獻議采洛南縣紅崖山號州青水冶青銅置阜民朱陽二監以鑄錢既而陜西都運使張奎知永興軍范雍請鑄大錢與小錢兼行大錢一當小錢十及奎徙河東又鑄大鐵錢亦以一當十以助關中軍費未幾三月奏罷河東鑄鐵錢此陜西復采儀州竹尖黃銅置傳濟監鑄大錢朝廷因令江南鑄大銅錢而江池號饒州入鑄小鐵錢悉輦致關中數州錢雜行大約小銅錢三十鑄當十大銅錢一以民間盜鑄者衆錢文大亂物價翔踊公私患之於是奎復奏晉澤石三州及威軍日鑄小鐵錢獨留用河東而河東鐵錢既行盜鑄錢者獲利十之六錢輕貨重其患如陜西言者皆以為不便知並州鄭戩請河東鐵錢且以一當銅錢一行一年又以三當一或以五當一自晉以東厥錢用青金自河以北厥錢用黑金是殊異之禁不行矣牛僧孺策石琚字子美世宗嘗與宰臣議鑄錢或以工費數倍欲采金銀坑冶上曰山澤之利可以與民惟錢幣不當私鑄若財貨流布四方與在官何異琚進曰臣聞天子之富藏於天下正如泉源欲其流通耳上問琚曰古亦有百姓鑄錢者乎對曰使百姓自鑄則小人圖厚利錢愈薄惡古所以禁也五代史寰宇記云廣陵監丹陽監每歲鹽鐵使鐵錢萬一千餘貫二監並置在建安軍永鎮縣郭內揚州府志勝時長安鑄錢多姦巧乃署第五倫為督鑄錢掾領長安市倫平銓衡正斗斛士無阿枉百姓悅服第五倫傳武宗廢浮圖法永平監官李郁彥請以銅像鐘磬爐鐸皆歸巡院州縣銅亦多矣鹽鐵使以工有常力不足以加鑄許諸道觀察使皆得置錢坊淮南節度使李紳請天下以州名鑄錢京師為京錢大小徑寸如開元通寶交易禁用舊錢會宣宗即位盡黜會昌之政新錢以字可辨復鑄為像昭宗末京師用錢八百五十為貫每百才八十五河南府以八十為百云唐史凡鑄銅錢有四監饒州曰永平池州曰永豐江州曰廣寧建州曰豐國每千文用銅三斤十兩鉛一斤八兩錫八兩成重五斤惟建州增銅五兩減鉛如其數至道中歲鑄八十萬貫景德中至一百八十三萬貫大中祥符後銅坑多不發天禧末鑄一百五萬貫鐵錢有三監卭州有惠民嘉州有豐逺興州有濟衆大錢貫重十二斤兩以準銅錢舊皆用小鐵錢十當銅錢之一景德二年令知益州張詠西川轉運使黃觀同裁度嘉卭二州所鑄大鐵錢每貫用二十五斤八兩成直銅錢一小鐵錢十相兼行用後以鐵重多盜豁為器每二十五斤鬻之直二千大中祥符七年知益州凌策言錢輕則行者易齎鐵小則鎔者鮮利請減景德二年之制其見使舊行亦令仍舊行用從之嵗總鑄二十一萬餘貫凡鑄銅錢用劑八十八兩得錢千重八十兩十分其劑銅居六分鉛錫俱三分皆有竒贏鑄大鐵錢用鐵二百四十兩得錢千重百九十二兩此其大法也有許申者為三司度支判官建議以藥化鐵與銅雜鑄輕重如銅錢法而銅居三分鐵居六分皆有竒贏亦得錢十費省而利厚詔鑄於京師然鑄錢雜鉛錫則其液流速而易成中雜以鐵鐵澀而多不就工人苦之後卒無成諸路鑄錢總二十六監每年鑄銅鐵錢五百四十九萬九千二百三十四貫內銅錢十七監鑄錢五百六萬貫鐵錢九監鑄錢八十八萬九千二百三十四貫銅錢逐監錢數阜財監兩京二十萬貫黎陽監衛州二十萬貫永興軍華州陜府錢監各鑄二十萬貫計六十萬貫垣曲監絳州二十六萬貫永安監舒州一十萬貫神泉監睦州一十萬貫富民監吳國軍二萬貫熙寧監衡州二十萬貫寶泉監鄂州一十萬貫廣寧監江州三十四萬貫永豐監池州四十四萬五千貫永平監饒州六十一萬五千貫豐國監建州二十萬貫永通監韶州八十萬貫阜民監惠州七十萬貫鐵錢逐監錢數在城朱陽兩監虢州各十二萬五千貫阜民洛南兩監商州各十二萬五千貫威逺鎮通逺軍滔山鎮岷州兩監共二十五萬貫嘉州二萬五千貫卭州七萬三千二百三十四貫興州四萬一千貫衍義補尚書省言崇寧監鑄御書當十錢每貫重一十四斤七兩用銅九斤七兩二錢鉛四斤一十二兩六錢錫一斤九兩二錢除火耗一斤五兩每錢重三錢洪遵曰余按顧烜錢譜金光襲錢寶録李孝美錢譜以大泉寶貨兩存之董逌錢譜始去大泉余謂此錢當以班史為正董説得之矣錢志余按班馬二史皆云莢錢不載錢文顧烜之説蓋近之矣金光襲董逌皆因之李孝美以為楷書文曰漢興莢錢自科斗之法熄而篆𨽻行至東漢末始變為楷何其説之妄耶張台曰五銖錢品數最多有薄形者名蜀錢肉好有郭者名梁錢背文四出者名角錢及有赤側當兩女錢之類文皆五銖又於此外有穿上一星至五星穿下一星穿上下各一星漫面穿傍一星至三星五字之內上下各一星背上或有小字或有王字穿上橫文穿下橫文穿面四角決文穿背四角決文有郭無郭濶緣細緣不可窮盡劉巴説先主鑄直百錢傳形五銖此又近之未知孰是張台曰今自巴蜀至於襄漢此錢甚多皆是昭烈舊地斷在不疑李孝美曰皇朝宗正少卿趙安易使蜀以蜀用鐵錢甚賤物價益貴因上言請如昭烈時鑄大錢當百同上洪遵曰余按東西魏皆鑄永安五銖故存於今甚多其品有三面文獨曰永安五銖者幕文土字者背文四出者唐書食貨志曰第五琦為相復命絳州諸爐鑄重輪乾元錢與開元通寶錢並行以一當五十肅宗以新錢不便上元元年減重輪錢以一當三十開元舊錢與乾元十當錢皆以一當十代宗即位乾元重寶錢以一當三重輪錢以一當三凡三日而大小錢皆以一當一自第五琦更鑄犯法者日數白州縣不能禁止至是人甚便之唐肅宗實録曰乾元二年九月戊辰新鑄大錢其文依乾元重寶而重其輪以别之一當五十大厯錢史氏不敘鑄作之因切考代宗實録云大厯四年正月丁酉關內道鑄錢等使第五琦上言請于絳州汾陽銅源兩監增置五爐鑄錢許之豈非當時鑄此耶洪遵曰余按此錢銅質渾厚字文明坦質之史氏無改鑄大錢之文以意推之唐食貨志云建中初判度支趙贊採蓮州白銅鑄大錢一當十以權輕重安知斯錢非當時所鑄耶舊譜曰武宗會昌年鑄時初廢天下佛寺宰相李德裕奏請以廢寺銅鐘佛像僧尼瓶碗等所在本道鑄錢揚州節度使李紳乃於新錢背加昌字以表年號而進之有敇遂敇鑄錢之所各以本州郡名為背文于是京兆府以京字右穿上洛陽以洛字在穿上揚州改以揚字在穿上西川以益字在穿上藍田縣以藍字在穿右襄州以襄字在穿上江陵府以荆字在穿右越州以越字在穿下宣州以宣字在穿左江西以洪字在穿上湖南以潭字在穿左兖州以兖字在穿上浙西以潤字在穿上鄂州以鄂字在穿上平州以平字在穿上興元府以興字在穿上梁州以梁字在穿右廣州以廣字在穿右東川以梓字在穿上福州以福字在穿上丹州以丹字在穿上桂陽監以桂字在穿右李孝美曰此錢背文復有襄字或在穿右梁字或在穿上者但揚字錢終莫之見疑當時已行昌字而未嘗改耳俱同上荀悅漢紀曰居攝二年夏四月更造錯刀一直五千與五銖並行余按五銖沿漢迄隋因革不一品目尤夥文四出謂之角錢去肉郭謂之女錢狹小其制謂之稚錢三面無郭謂之白錢有反其文名傳形者有輪郭去盡名對文者有上下其字名竒品者以至赤側當兩鵝眼雞目四柱兩柱之類隋書食貨志曰梁武帝鑄五銖錢又别鑄除其肉郭謂之女錢二品並行百姓或私以古錢交易有五銖女錢太平百錢五銖稚錢五銖對文等號輕重不一天子頻下詔書非新鑄二種之錢並不許用荀悅漢紀曰居攝二年夏四月更造契刀一直五百與五銖並行課額漢律人出一等算百二十錢惟賈人與奴婢倍算漢儀注置鹽鐵官算緡錢舟車通鑑曰於是以齊大煮鹽東郭咸陽大冶孔瑾為大農丞領鹽鐵事洛陽賈人子桑𢎞羊以心計年十三侍中三人言利事析秋毫矣詔禁民敢私鑄鐵器煮鹽者􅎂左趾沒入其器物又令諸賈人末作各以其物自占率緡錢二千而一算及民有船車者皆有算匿不自占占不悉戍邊一嵗沒入緡錢有能告者以其半畀之其法大抵出張湯漢孝武帝遣使治郡國緡錢殺右內史義縱通鑑曰上既下緡令錢而尊卜式百姓終莫分財佐縣官於是楊可告緡錢縱矣可告緡遍天下中家之上大抵皆遇告杜周治之少反者分遣御史廷尉正監即治郡國緡錢得民財物奴婢以億萬計田宅亦如之於是商賈中家之上皆破民偷食好衣不事畜業內史義縱以為此亂民部吏捕其為可使者上以縱為廢格沮事棄縱市杜周南陽杜衍人同上元平元年春二月減口賦錢什三口賦錢民年七嵗至十四出口賦人二十三錢二十錢以食天子其三錢者武帝加口賦以補車騎馬漢儀注宣帝五鳳二年令郡國毋斂今年馬口錢經濟編東都民有犯私麴者留守孔循族之或謂聽民造麴而於秋稅畝收五錢從之會編齊主初立厲精為治詔僕射薛琡取魏麟趾格討論損益以為齊律簡練六坊之人每一人必當百人任其臨陳必死然後取之謂之百保鮮卑又簡華人勇力者謂之勇士以備邊要始立九等之户富者稅其錢貧者役其力通鑑圖經云在句容縣西南三十里源出絳巖山周回二十里溉田一百頃舊收嵗課錢二百二十貫咸平三年正月奉敇除放六朝事迹唐武德七年移新州却復舊址升為望管縣七鄉一百九十四户十四萬三本作二千二當作三百六十一雜稅茶鹽酒等錢六十九萬二千八百八十五貫七十六文吳縣九萬九千九百六十三貫七十三本無三字文長州縣九萬八千五百七十六貫五百七十六文嘉興縣一十七萬八千七十六貫一百二十文崑山縣一十萬九千五百三貫七百三十八文常熟縣九萬七百五十貫七百七十四本無四字文華亭縣七萬二千一百八十二貫四百三十一文海鹽縣四萬六千五百八十一貫五十八文續添吳江縣三萬六千二百六十九貫一百文使司割𨽻醬菜錢一十萬七千七百二十貫二百四作四十六作八文留蘇州軍事醬菜衣糧等錢一十七萬八千三百四十九貫九十八文當作九百二文團練使軍資等三十本無十字萬六當作七千八百三十貫文送納本無納字上都吳地記兩浙身丁錢者始未行鈔法以前歲計丁口官散蠶鹽每丁給鹽一斗輸錢百六十有六謂之丁鹽錢自鈔法既行之後鹽盡通商而民無所給每丁仍增錢為三百六十謂之身丁錢宋户口建炎三年詔以一半折絹一半納見錢於是嵗為絹二十四萬匹綿百萬兩錢二十萬緡紹興初又用嚴守顔為言曽得解人免丁錢二十五年上念浙民之困免丁絹錢綿一年以內府錢帛償户部同上祥符中張詠知益州患蜀人鐵錢重不便貿易設質劑之法一交一緡以三年為一界而换之六十五年為二十二界謂之交子使富民十六户主之後富民稍衰不能償所負爭訟不息轉運使薛田張若谷請置交子務以𣙜其出入禁私造者帝從其議立務於益州界以百二十五萬六千三百緡為額宋史國朝茶利除官本及雜費外淨入錢禁𣙜時取一年最中數計一百九萬四千九十三貫八百八十五內六十四萬九千六十九貫茶淨利賣茶嘉祐二年收十六萬四百三十一貫五百二十七除官本及雜費外得淨利五十四萬二千二百一十一貫五百二十四四十四萬五千二十四貫六百七十茶稅錢最中嘉祐元年所收數除川茶錢在外通商後來取一年最中數計一百一十七萬五千一百四貫九百一十九錢內三十六萬九千七十二貫四百七十一錢茶租嘉祐四年通商直定茶交引錢六十八萬四千三百二十一貫三百八十後纍經減放至治平二年最中分收上數八十萬六千三十二貫六百四十八錢茶稅最中治平三年除川茶稅錢外會此數夢溪筆談淳化四年初行交引罷貼射法西北入粟給交引自通利軍始是嵗罷諸處𣙜貨務尋復依舊至咸平元年茶利錢以一百三十九萬二千一百一十九貫為額景德二年許人入中錢帛金銀謂之三稅至祥符九年茶引益輕用知秦州曹瑋議就永興鳳翔以官錢收買客引以救引價前此纍增加饒錢至天祐二年鎮戎軍納大麥一斗本價通加饒共支錢一貫二百五十四乾興元年改三分法支茶引三分東南見錢二分半香藥四分半天聖元年復行貼射法行之三年茶利盡歸大商官場但得黃晚惡茶乃詔孫奭重議罷貼射法三部副使各罰銅二十斤自貼射茶法廢而河北入中虛估之弊益甚李咨既居相府請復行見錢法乃訪利害於商人遂罷入中虛估以實錢償芻粟實售官茶皆如天聖元年之製又命商持劵徑趨𣙜貨務驗實立償之錢而三稅之法廢縣官自此省費矣通鑑𣙜茶之法擇要地置𣙜貨務會給交鈔往還而不積茶貨其淮南蘄黃廬舒光夀六州官自為場置吏謂之山場凡十三所六州采茶之民皆𨽻焉謂之園户陜西河北商人入芻糧者𣙜貨務給劵以茶償之又益以東南緡錢及香藥犀象為虛實三估謂之三稅至用十四錢易官錢百其法屢更不能無弊上命咨等校嵗入登耗更定之咨等言淮南十三場茶歲課五十萬緡天禧五年才及二十三萬緡每劵直錢十萬鬻之售錢五萬五千總為實錢十三萬緡除九萬緡為本錢嵗才得息二萬餘緡而官吏廩給雜貨不與焉是則虛數雖多實利殊寡請罷三稅以十三場本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息如鬻部舒州羅源場茶斤售錢五十有六官不復給但使商人輸息錢三十有一而已然輦茶入官隨商人所指而與之給劵為驗以防和售謂之貼射若嵗課貼射不盡則官市之如舊商人入芻糧塞下者隨所在實估度地里逺近量增其直給劵至京一以緡錢償之謂之見錢法咨等又以鹽之類有二解池引水而成曰顆鹽淮浙蜀廣鬻海或井或鹻而成曰末鹽皆通商貿易乾興初解鹽計嵗入二十三萬緡視天禧中數損十四萬請罷之專令兩池入中並邊芻粟上皆從之國朝六𣙜貨務十三山場都賣茶歲一千五十三萬三千七百四十七斤半租額錢二百二十五萬四千四十七貫一十其六𣙜貨務取最中嘉祐六年拋占茶五百七十三萬六千七百八十六斤半租額錢一百九十六萬四千六百四十七貫二百七十八荆南府租額錢三十一萬五千一百四十八貫三百七十五受納潭鼎澧嶽歸峽州荆南府片散茶共八十七萬五千三百五十七斤漢陽軍租額錢二十一萬八千三百二十一貫五十一受納鄂州片茶二十三萬八千三百斤半蘄州蘄口租額錢三十五萬九千八百三十九貫八百一十四受納潭建州興國軍片茶五十萬斤無為軍租額錢三十四萬八千六百二十貫四百三十受納潭筠袁池饒建歙江洪州南康興國軍片散茶共八十四萬二千三百三十三斤真州租額錢五十一萬四千二十二貫九百三十二受納潭袁池饒歙建撫筠宣江吉洪州興國臨江南康軍片散茶共二百八十五萬六千二百六斤海州租額錢三十萬八千七百三貫六百七十六受納睦湖杭越衢溫婺台常明饒歙州片散茶共四十二萬四千五百九十斤十三山場租額錢共二十八萬九千二百九十九貫七百三十二共買茶四百七十九萬六千九百六十一斤光州光山場買茶三十萬七千二百十六斤賣錢一萬二千四百五十六貫子安場買茶二十二萬八千二十斤賣錢一萬三千六百八十九貫三百四十八商城場買茶四十萬五百五十三斤賣錢二萬七千七十九貫四百四十六夀州麻步場買茶三十三萬一千八百三十三斤賣錢二萬四千八百一十一貫三百五十霍山場買茶五十三萬二千三百九斤賣錢三萬五千五百九十五貫四百八十九開順場買茶二十六萬九千七十七斤賣錢一萬七千一百三十貫廬州王同場買茶二十九萬七千三百二十八斤賣錢一萬四千三百五十七貫六百四十二黃州麻城場買茶二十八萬四千二百七十四斤賣錢一萬二千五百四十貫舒州羅源場買茶一十八萬五千八十二斤賣錢一萬四百六十九貫七百八十五太湖場買茶八十二萬九千三十二斤賣錢三萬六千九十六貫六百八十蘄州洗馬場買茶四十萬斤賣錢二萬六千三百六十貫王祺場買茶一十八萬二千二百二十七斤賣錢一萬一千九百五十三貫九百九十二石橋場買茶五十五萬斤賣錢三萬六千八十貫夢溪筆談紹興間歲支鹽三十餘萬席為錢六七百萬緡吳陵志初蜀中財賦入户部三司者五百餘萬緡入四總領所者二千五百餘萬緡金銀綾錦之類不預焉自寶慶三年失關外端平三年蜀地碊破所存州郡無幾國用益窘宋史秋七月稅青苖錢給百官俸唐租庸調之法壞代宗以畝定稅斂以夏秋時又以國用急不及秋苖方青即征之號青苖錢通鑑五月增商稅為什一以軍興故也譏重斂也於是以軍興增及商稅越明年而田稅錢亦增矣會編五月詔增稅錢淮南節度使陳少遊奏本道稅錢每千請增二百詔他道皆增稅錢視此又詔鹽每斗價皆增百錢通鑑初行稅間架除陌錢法時河東澤潞河陽朔方四軍屯魏縣神策永平宣武淮南浙西荆南江西沔鄂湖南黔中劒南嶺南諸軍環淮寧之境舊制諸道軍出境則仰給度支上優恤士卒每出境加給酒肉本道糧仍給其家一人兼三人之給故將士利之各出軍才逾境而止月費錢百三十餘萬緡常賦不能供判度支趙贊乃奏行二法所謂稅間架者每屋二架為間上屋稅錢二千中稅千下稅五百敢匿一間杖六十賞告者錢五十緡所謂除陌錢者公私給與及賣買每緡官留五十錢給他物及相貿易者約錢為率敢隱錢者百杖六十罰錢二千賞告者錢十緡賞錢皆出坐者於是愁怨之聲盈於逺近會編王播奏約𣙜茶額每百錢加稅五十李珏等諫曰𣙜茶近起貞元多事之際今天下無虞所宜寬橫斂之目而更增之百姓何時當得息肩不從唐徵諸郡丁口鹽錢丘氏濬曰後世徵户口食鹽錢自此始自元昊反軍興用度不足因聽並邊入中芻粟豫劵趨京師𣙜貨務受錢若金銀入中他貨豫劵償以池鹽由是羽毛筋角膠漆鐵炭瓦木之類一切以鹽易之猾商貪吏表裏為姦至入椽木二估錢千給鹽二百二十斤鹽直益賤販者不行至是詔凡商人虛估受劵及已受鹽未粥者皆計直輸虧官錢內地州軍民間鹽悉收市入官官為置場增價出之復禁永興等十一州軍商鹽官自輦運以衙前主之又禁商鹽私入蜀置折搏務於永興鳳翔聽人入錢若蜀貨易鹽趨蜀中以售已而東南末鹽悉復禁𣙜會編條例司上言民間多願借貸青苖錢乞遍下諸路轉運司施行仍詔諸路各置提舉二員管當一員掌行青苖免役農田水利諸路凡四十一人提舉官既置往往迎合王安石意務以多散為功富民不願取貧者乃欲得之即令隨户等髙下召配又令貧富相兼十人為保首王廣淵在京東一等户給十五千等而下之至五等猶給一千民間喧然以為不便廣淵入奏謂民皆歡呼感德諫官李常御史程皓論廣淵抑配掊克迎朝廷旨意以困百姓會河北轉運使劉庠不散青苖錢奏適至安石曰廣淵力主新法而遭劾劉庠欲壞新法而不問舉事如此安得人無向背繇是常皓之言皆不行時免役出錢或未均吕惠卿用其弟曲陽縣尉和卿計創手實法其法官為定立物價使民各以田畝屋宅資貨畜産隨價自占凡居錢五當蕃息之錢一非用器食粟而輒隱落者許告有實以三分之一充賞預具式示民令依式為狀縣受而籍之以其價列定髙下分為五等既該見一縣之民物産錢數乃參會通縣役錢本額而定所當輸錢詔從其言於是民家尺椽寸土檢括無遺至於雞豚亦編抄之民不聊生初惠卿制是法然猶災傷五分以上不預荆湖察訪使蒲宗孟上言此天下之良法使民自供初無所擾何待豐歲願詔有司勿以豐凶弛張其法從之民於是益困矣俱同上初胥吏杜公才獻策於內侍太傅楊戩立法索民田契自甲之乙乙之丙展轉究尋至無可證則度地所出增之賦租始於汝州浸淫於京東西淮西北括廢堤棄堰荒山退灘皆勒民主佃額一定後雖充蕩回復不可減一邑率於常賦外增租錢至十餘萬緡水旱蠲稅此不得免擢公才為觀察使至是戩死以內侍李彥繼之彥狠愎密與王黼表裏置局汝州臨事愈劇凡民間美田使他人投牒告陳皆指為天荒雖執印劵皆不省魯山闔縣盡括為公田訴者輒加威刑致死者千萬京西提舉官及京東州縣吏皆助彥為虐民不勝忿痛發物供奉大抵類朱勔責辦於民無休息期農不得之田牛不得耕墾殫財靡芻力竭餓死或自縊轅軛間如龍麟薜荔一本輦致之費踰百萬喜賞怒刑禍福轉手因之得美官者甚衆前執政冠帶操笏迎謁彥馬首彥處之自如所至倨坐堂上監司郡守不敢抗禮有言於帝梁師成適在旁抗聲曰王人雖微序於諸侯之上豈足為過言者俱不敢復言宋史政和間陳享伯為陜西轉運使創經制錢大率添酒價增稅額官賣契紙與凡公家出納每千納頭子錢二十三文其後行之東南及京東西河北嵗入數百萬緡所補不細今邊事未寧費用日廣請復行之諸路一嵗無慮數百萬計賢於緩急暴斂多矣帝從之至是又因經制之額增折為總制錢嵗收至七百八十餘萬緡宋史中興係年録自趙開行鈔法每茶百斤為一大引令商人輸引錢市利八百文至紹興十三年遞增為十一引時物價騰踊茶商取息頗厚明年主管官賈思誠又增為十一引三百文于是諸場類皆溢額而買馬之數復不加多人但知茶馬司之富甲天下其實所收引錢視建炎倍增後雖破敗不可復減矣山堂肆考初蜀茶額錢三十萬至提舉李稷加至五十萬後陸師閔代稷又加為一百萬同上齊管子曰海上之國謹正鹽莢十口之家十人食鹽百口之家百人食鹽終月大男食鹽五升少半大女食鹽三升少半吾子食鹽二升少半此其大例也鹽百升而釡今鹽之重升加分強釡五十也升加一強釡百也升加二強釡二百也鍾二千十鍾二萬百鍾二十萬千鍾二百萬萬乘之國人數開口千萬也禺莢之商日二百萬十日二千萬一月六千萬萬乘之正九百萬也月人三十錢之籍為錢三千萬今吾非籍之諸君吾子而有二國之籍者六千萬使君施令曰吾將籍於諸君吾子則必囂號令天給之鹽莢則百倍歸於上人無以避此者數也文獻通考孝惠帝時令女子年十五以上至三十不嫁五算漢算人百二十錢賈與奴婢倍算今五算罪之也初算緡錢此漢以來征𣙜居貨之始按武帝於元光五年既算其行者之車至是又用公卿言凡居貨者各隱度其財物之多少於商賈末作率計有緡錢二千者出一算於手力所作而賣者率計有緡錢四千者出一算嗚呼出諸途者既征其齎載之具藏諸家者又算其儲積之物取利至此哉王充論衡喻希學淮關志凡船梁頭滿八尺者稅錢六十文王仲舒觀察江西道奏罷𣙜酤錢九十萬昌黎選墓志注一本云九千萬非勝覽云笋筤山在治西北五十餘里有前筤後筤以山多笋故名春時州人百十為羣入山劚取紹興間始立笋租以贍學歲收緡錢八十千土人名為錢筤山四川名勝志先是天下賦法有三曰上供曰送使曰留州建中初釐定常賦而物重錢輕其後輕重相反民輸率一倍其初而所在以留州送使之入又降省估使就實估以自潤故賦益苛齊民重困垍奏禁之一以省估準物觀察使得用所治州租調至不足乃取支郡以贍故送使之財悉為上供漢髙祖四年初為算賦注民年十五以上至五十六出賦錢人百二十為一算為治庫兵車馬大學衍義補孝明時盜賊日滋征討不息國用耗竭豫徵六年租調猶不足乃罷百官所給酒肉又稅入市者人一錢凡市店皆有稅百姓嗟怨郎中辛雄上疏以為夷夏之民相聚為亂豈有餘憾哉正以守令不得其人百姓不堪其命故也同上春賦以斂繒帛夏貸以收秋實是故民無廢事而國無失利也故天子籍於幣諸侯籍於食中嵗之榖糶石十錢大男食四石月有四十之籍大女食三石月有三十之籍吾子食二石月有二十之籍歲凶榖貴糴石二十錢則大男有八十之籍大女有六十之籍吾子有四十之籍是人君非發號令收䆄而户籍也彼人君守其本委謹而男女諸君吾子無不復籍者也大學衍義補自茶為官𣙜民私蓄盜販皆有禁臘茶之禁尤嚴園户困於徑取官司並緣侵擾因陷罪戾至破産逃匿者嵗比有之著作佐郎何鬲三班奉職王喜麟皆上書請罷給茶本錢縱園户貿易而官收租錢與所在征算歸𣙜貨務以償追糴之費可以疏利源寬民力富弼韓琦曽公亮然其策請於帝行之下三司議三司言茶課給本收利所獲甚微而煩擾為患園户輸納侵害日甚小民趨利犯法益繁宜約嵗入息錢之數均賦于民恣其買賣所在收算而不給本錢遂詔弛舊禁俾通商利凡嵗輸緡錢三十三萬八千有竒謂之租錢與諸路本錢悉儲以待邊糴自是惟臘茶禁如舊餘茶肆行天下矣論者又謂茶户困於輸錢良民賦不時入刑亦及之商賈利薄販鬻者少必致嵗額不登經費日蹙翰林學士歐陽修知制誥劉敞皆請除前令帝不聽會編後漢南蠻傳曰秦惠王并巴中以巴氏為蠻夷君長其君長嵗出賦二千一十六錢三嵗一出義賦千八百錢後漢南蠻傳曰髙祖為漢王發夷人還伐三秦秦地既定乃遣還巴中復其渠帥七姓不輸租賦餘户乃歲入賨錢口四十錢通卷五
