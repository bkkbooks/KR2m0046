body:
  text: 錢通卷八明胡我琨撰竒品右臺主衣庫錢顧烜曰中王之錢臺主衣庫今有此錢徑四寸重八兩面文曰中王之錢背文曰五銖七千舊譜曰五銖千敦素曰所謂古字者古萬字也此錢錢中最大葢謂一當五銖之千萬固常讀其面文為錢中之王背文為五銖千萬于理為勝右羅紋錢右翅紋錢顧烜曰二錢臺主衣庫今有右北斗錢舊譜曰文曰大泉五十背為北斗之状右軒轅錢顧烜曰今有此錢徑一寸重五銖面紋為北斗軒轅之象背文為矛盾龍鳳之形謂之北斗星錢張台曰唐太宗與建國功臣於禁中馳騎射軒轅錢孔即此錢也右柄文錢右日月錢右井文錢右雙五錢右雙十錢顧烜曰五錢並竒異今世見有洪遵曰余按顧氏所見異錢本七種舊譜移太和五銖入正用品大泉五銖入不知年代品右星月錢右四五錢洪遵曰余按此錢顧烜所載四傍皆篆書五字董逌謂之四五錢李孝美乃以五銖字上下之與舊説抵捂何也右八星錢顧烜曰三錢劉氏錢志所載並未見竒異稀有原始未聞洪遵曰余按顧氏所載本四種舊譜移兩銖入不知年代品右鯨文錢張台曰肉好背面皆有周郭一面有雙魚宛轉之文右兎犬錢舊譜曰此錢形甚瑰麗面作兎犬之文上兎下犬而無文字右明月錢徐氏曰此錢文曰明月洪遵曰余按此錢徑九分重四銖二絫製作鍥薄形質簡古外無輪郭背明澈舊譜所圖與此小異又不載輕重大小計得其名而未見之也右四神錢舊譜曰肉好背面皆有周郭並作青龍白虎朱雀𤣥武之狀亦有一面者大者徑寸八分重三兩右萬國錢洪遵曰余按此錢徑寸六分重十三銖面文平地作水文一字類梵書不可識或云日字背文為星官月兎雲鶴龜形慶善郎中守儀真得之郡圃土中右龍文錢敦素曰徑九分重三銖兩傍有文如日月皆不可識制作肉好者如半兩張台曰以䃋石為之非銅也右三雀錢舊譜曰徑寸三分重十銖背面縁上皆作三雀銜花相面文曰五行大布背文有野草閑花之狀右龜背錢顧烜曰四文龜背錢今有此錢徑寸重六銖文曰太平百錢背文隱起為龜形舊譜曰龜背文錢洪遵曰余按此錢今世尚有之面文曰太平百錢篆書錢字湮晦叵見背文夷漫為龜背形與顧氏所圖背文相類舊譜謂之龜背文錢畫其背為龜甲非也右水波紋錢顧烜曰太平四文錢背有水波紋者三種並徑一寸重六銖文曰太平百錢大體類前條太平四文但製作微為環壯而背有波紋耳今世徃徃有之莫知其始舊譜曰水波紋錢大篆小篆𨽻書三種右雙星錢李孝美曰此錢徑寸一分重五銖面文肉郭右𤣥武錢李孝美曰此錢徑寸二分重八銖文永通萬國背文為𤣥武星劒之象洪遵曰余按此錢銅色精好制作甚工今世尚有之右千秋錢李孝美曰徑寸九分重二十四銖面文曰千秋萬歲背文為龍鳳之象右龍鳳重輪錢洪遵曰余按此錢徑寸三分重七銖二絫背文重輪肉形渾厚面文篆書曰永通泉貨背為龍鳳盤繞之象右雙鳳錢洪遵曰余按此錢徑寸二分重六銖輪郭重厚面文為雙鳳翔舞之狀右雙魚錢洪遵曰余按此錢徑九分重四銖五絫面文為龍鳳盤繞之形背文雙魚相向右四事錢洪遵曰余按此錢徑九分重三銖六絫面文二人相向一立一坐上有飛禽下一走犬背文夷漫右單面龍鳳錢洪遵曰余按此錢徑九分重三銖九絫面文為龍鳳之象背文夷平右龍鳳錢李孝美曰此錢徑寸重七銖面文有肉郭為龍鳳之形背夷漫而為雙鶴鸂䳵盤繞之狀其文皆隱起洪遵曰余按此錢背面文如李氏之説但面文隱起水波紋背文鑿成雲彩又有一種徑九分重三銖六絫面文亦為龍鳳形背為四人執刀楯之狀隱起毬路文右藕心錢四種其一長一寸二分濶九分重一兩二錢無銘其二長一寸一分濶七分重一兩三錢無銘其三長一寸三分濶七分重一兩二錢無銘其四長一寸三分濶三分重二錢有半無銘李孝美曰世有藕心錢不著出於何時洪遵曰余按宣和博古圖云此四錢大小雖殊皆若破藕狀及觀李孝美畫譜與此雖異然其説亦謂上下通缺若藕挺中破狀與此乃正相合但未知其何世物耳神品右輕影錢事載神物右淯水錢事載竒獲右㑹稽船錢事載怪誕右青溪宅錢事載神物右太平錢南齊世祖治盆城時得此一枚右齊興郡錢事載竒獲右齊安郡錢事載竒獲李孝美曰按此與㑹稽齊興錢文字大小皆未之聞右令公百爐錢事載鑄辨封氏曰背文四出張台曰徑八分重二錢五黍李孝美曰按此錢據所有者背文大小皆如封張所説面文輕重不與魏錢小異銅色深赤肉郭向外漸薄如碾輪狀然不知其他如何也右廣宗郡錢事載獻納右偽趙錢事載竒獲右軒轅錢事載怪誕右孫先生錢事載神物右桐城錢事載怪誕右白雀錢事載神物右夀春錢事見怪誕右應元錢事載符懴右北海鐵錢事見鎮壓右嚴君平錢事見神物右科斗錢事見神物右鷰口洞錢事見神物右永安五男錢舊譜曰徑二寸三分重十八銖厚一分上下輪郭之間皆作粟文面上四出文文曰永安五男背作四神之狀又有日月相對者李孝美曰按所見者徑寸二分背面皆四出有粟文面文曰永安五男篆文與後魏永安五銖相似唯男字真書耳右七夕錢舊譜曰徑寸四分重十三銖肉好背面皆有周郭文為牽牛織女相對形穿上為花穿下為草製甚古質李孝美曰據所有者面無好郭右福慶錢舊譜曰徑寸二分半重十銖肉好背面皆有周郭亦有徑寸四分重十八銖者文曰伍男貳女叄公九卿好郭邊作連珠文於外分為八分若箕形其二三五九皆作大字右撒帳錢舊譜曰徑寸重六銖肉好背面皆有周郭其形五出穿亦隨之文曰長命守富貴背面皆為五出文若角錢狀李孝美曰頃見此錢於汝海王霖家形製文字皆如舊譜所説但差大而銅鑄耳右男錢舊譜曰徑寸重四銖懸針書文曰布泉敦素曰徑寸一分形製精巧字體與貨泉畧同疑王莽時鑄後周亦有布泉字皆玉筯與此相並殊不侔也李孝美曰此錢徑九分重五銖背面肉好皆有周郭右辟兵錢舊譜曰徑八分重三銖背面皆有周郭又有兩重於方穿之中復更有小穿邪正安之疑若八角然其文一面曰去殃除凶一面曰辟兵莫當皆篆字其間有八柱郭外仍有小柄右千金錢舊譜曰形製輕重類辟兵錢其文一面曰長毋相忘一面曰日入千金錢間亦有八柱右豐樂錢舊譜曰徑八分重二銖五黍面文有四字皆科斗書其可識者豐樂肉好背面皆有周郭李孝美曰此錢文曰天清豐樂右君宜侯王錢舊譜曰此錢徑寸重如其文文有六字曰君宜侯王五銖並篆書背面但有肉郭而無好郭形製與漢五銖同而不甚精妙李孝美曰漢五銖錢面無好郭而背有之此錢既云背面皆有好郭安得與漢錢同形製也右長年錢舊譜曰徑七分欵文曰長年太寳右富錢晉書石勒載記曰勒鑄豐貨錢舊譜曰徑寸重四銖文曰豐貨洪遵曰余按此錢徑九分重三銖輪深好濶面文有豐貨二字篆書右五男二女錢李孝美曰此錢徑七分厚一分半重十銖背面有字皆曰五男二女右天下太平錢二品李孝美曰此二錢大小不等面文皆曰天下太平背文並隱起大者徑寸重六銖為持挺人傍有躍龍之狀而平地作水紋小者徑八分重五銖為五男二女戲弄之象而平地作毬路文疑亦厭勝之流也洪遵曰余按此二錢今世有之又有二種其一面文亦曰天下太平背文為四人持兵象之象而平地作水紋徑八分重三銖六絫又有一種面文亦曰天下太平背為九子母之形平地作毬路文徑八分重二銖四絫錢通卷八
