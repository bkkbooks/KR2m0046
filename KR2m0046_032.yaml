body:
  text: 錢通卷三十二明胡我琨撰閏三秦用尉繚之計毋愛財物賂其豪臣以亂其謀不過亡三十萬金而諸侯可盡其後漢亦以其計間楚及淮南謀漢所憚不可下者獨汲黯耳千一録漢文遺詔薄葬未幾而盜發園瘞錢當時孝景與其臣未能盡遵詔耶虛地上以實地下無益有害曾是以為孝乎鼂錯論貴粟亡農夫之苦有阡陌之得阡陌字稍訛耳而解者乃以阡伯為錢使古文作鄙語矣嗇夫孫性私賦民錢市衣以進其父父怒宜令以錢還民不必詣閣自言是有求知之嫌矣其曰有君如是何忍欺之辭近於佞佞以求知君子所耻也錢塘其始郡議曹華信募致土石一斛與錢一千來者如雲謬云不復用土皆棄而去塘成因名夫食可去信不可去功以詐成者寧可以再幸哉小人哉議曹何可取也原錢塘之名非始此史記秦紀載之矣士不至饑餓不能出門户不宜言貧杜子美囊惟一錢食柏拾橡則窮甚矣及卜成都草堂有高下亭臺酒有舊醅鵝鴨長數茗飲蔗漿水檻扁舟色色略具亦足以耽詠遣愁無憂溝壑也孔祐隱四明山嘗見山谷中有錢數百萬斛視如瓦石夫數百萬斛錢在野豈獨一人見之亦豈有不為人所取者耶史言其至行通神意者鬼神明以試之而實非錢也志士明此義則取非有必弗為矣毋為鬼所戲耶俱同上西門豹為鄴令倉無積粟府無儲錢兵甲官無計㑹人數言其過於文侯文侯往行其縣果若人言文侯曰翟璜任子治鄴大亂子能變道則可不能將加誅於子西門豹曰王主富民霸主富武亡國富府庫梁朱友圭遽為荒淫內外憤怒駙馬都尉趙巖犨之子太祖之壻也龍虎統軍袁象先太祖之甥也巖奉使至大梁友貞密與之謀誅友圭巖曰此事成敗在楊令公得其一言諭梁軍吾事立辦友貞乃遣腹心說楊師厚曰友圭篡弒人屬在大梁公若因而成之此不世之功也且許事成之日賜犒軍錢五十萬緡師厚與將佐謀之曰方友圭弒逆吾不能即討今君臣之分已定無故改圖可乎或曰友圭親弒君父賊也均王舉兵復讐義也奉義討賊何君臣之有劉景通季年畫䇿備邊纍數百牘其後趣繼光受職京師病革猶問吾所上備邊封事上納之乎未耶垂絶舍人納楮幣褎中瞪目曰我平生不索人錢冥司必不受我錢悉出之乃瞑皇明百將列傳宋齊丘者父為江西鍾傳副使父卒羈旅淮南欲上書干謁而無紙墨行嘆道中有娼婦遇之問曰少年何不樂如此齊丘以情告召歸置食贈錢數千因曰郎時至此不遣郎有所闕也齊丘感之及貴納為正室江南别録豐有俊字宅之四明人登青樓偶見小娼疑故人女纍目之女亦悟酒罷留宿女羞澀良久乃入曰豐官人識妾否詰之果故人女豐曰某所以留者以坐間不敢問也且各寢必有以處汝娼遂退豐與京尹有契明日以白尹且云某僅有錢百千從公更貸二百千嫁之尹嘉其誼即取入府厚奩具擇良士嫁焉尹即王宣子佐也稗史𣙜礬者唐于晉州開成三年罷之宋律白礬出晉汾州坊州緑礬出磁州隰州各置官典護户有䭾錢陳止齊曰私礬之禁為契丹北漢設也本朝不設礬官亦無礬禁大明律私礬一條當時修者失于刪除耳丹鉛總録且夫卜筮者掃除設坐正其冠帶然後乃言事此有禮也言而鬼神或以饗忠臣以事其上孝子以養其親慈父以畜其子此有德者也而以義置數十百錢病者或以愈且死或以生患或以免事或以成嫁子娶婦或以養生此之為德豈直數十百錢哉漢司馬遷日者列傳古者民曰編民書所謂彰善闡惡表厥里宅今之坊牌卓楔排門粉壁是也古者卒字以衣卒衣有題識三代之畫衣冠秦之赭衣也古樂府鴈門太守行有云移惡子姓篇著里端又云則用錢三千買繩禮竿即書其惡跡以標示戒即莊子所謂竿牘也丹鉛總録巴丘南百折山中有道士善檻虎童子皆得飼之已而出諸囚都無雄心道士時與撲跌為戲因而賣與人守門以為常率虎千錢大者千五百錢初猶驚動馬牛後轉見大牛而驚矣同上近日議丘文莊著述者惟劉健謝錦王瓊耳劉閣老嘗戲謂曰丘仲深有一屋散錢只缺索子文莊應之曰劉希賢有一屋索子只缺散錢健默然愧甚皇明從信録杜子美滕王亭子詩民到于今歌出牧來遊此地不知還後人因子美之詩注者遂謂滕王賢而有遺愛於民今郡志亦以滕王為名宦豫考新舊唐書並云元嬰為金州刺史驕佚失度及遷洪州都督以貪聞高宗給麻二車助為錢緡丹鉛總録初太后微時所為金王孫生女俗在民間蓋諱之也武帝始立嬖人韓嫣白之帝曰何為不早言乃車駕自往迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿扶將出拜帝下車立曰大姊何藏之深也載至長樂宮與俱謁太后太后垂泣女亦悲泣帝奉酒前為壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號修成君男女各一人女嫁諸侯男號修成子仲以太后故橫于京師八編類纂順帝進齊公蕭道成爵為王增封十郡下詔禪位于齊順帝當臨軒不肯出逃于佛蓋之下王敬則勒兵殿庭以板輿入迎順帝順帝收淚謂敬則曰欲見殺乎敬則曰出居别宮耳官先取司馬家亦如此順帝泣而彈指曰願後身世世勿復生帝王家宮中皆哭帝拍敬則手曰必無過慮當餉輔國十萬錢公孫詭多奇邪計初見日王賜千金官至中尉號曰公孫將軍多作兵弩弓數千萬而府庫金錢且百巨萬珠玉寶器多于京師帝所幸中書舍人綦母珍之朱隆之直閣將軍曹道剛周奉叔宦者徐龍駒等自山陵之後即與諸人微服遊走市里好于世宗崇安陵隧中擲塗賭跳作諸鄙戲極意賞賜左右動至百數十萬世祖取錢上庫五億萬齊庫亦出三億萬鬱林即位未期歲所用垂盡大將軍霍光秉政褒賜燕王錢三千萬益封萬三千户劉旦怒曰我當為帝何賜也劉胥武帝子封廣陵王始昭帝時胥見上少年無子有覬欲心而楚地巫鬼胥迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須錢使禱巫山㑹昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徵復使巫祝詛之後王廢胥寢信女須等數賜豫錢物宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女為楚王延壽后弟婦數相餽遺通私書後延壽坐謀反誅辭連及胥有詔勿治賜胥黃金前後五千斤它器物甚衆建元六年彗星見淮南王心怪之愈益治攻戰具積金錢賂遺郡國遊士王有女陵彗有口王愛陵多豫金錢為中詗長安約結上左右諸侯王朝見天子漢法凡當四見耳始到日小見到正月朔旦奉皮薦璧玉賀正月法見後三日為王置酒賜金錢財物後二日復入小見辭去凡留長安不過二十日俱同上蕭何為民請曰長安地狹上林中多空棄地願令民得入田毋收藁為獸食上大怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫之數日王衛尉侍前問曰相國胡大罪陛下繫之暴也上曰吾聞李斯相秦皇帝有善歸主有惡自豫今相國多受賈豎金為請吾苑以自媚于民故繫治之王衛尉曰夫職事茍有便於民而請之真宰相事也陛下奈何疑相國受賈民錢乎且陛下距楚數歲陳豨黥布反時陛下自將往當是時何守關中關中搖足則關西非陛下有也相國不以此時為利乃利賈人之金乎武后將造浮屠大像度費數百萬官不能足更詔天下僧日施一錢助之仁傑諫曰工不役鬼必在役人物不天降終繇地出不損百姓且將何求今邊陲未寧宜寬征鎮之徭省不急之務就令顧作以濟窮人既失農時是為棄本且無官助理不得成既費官財又竭人力一方有難何以救之后繇是罷役帝以前世上已九日皆大晏集而寒食多與上已同時欲以三月名節自我為古若何而可李泌請廢正月晦以二月朔為中和節因賜大臣戚里尺謂之裁度民間以青囊盛百榖瓜果種相問遺號為獻生子里閭釀宜春酒以祭勾芒神祈豐年百官進農書以示務本帝悅乃著令與上已九日為三令節中外皆賜緡錢燕㑹李綱對曰道君皇后既居寧德宮皇帝自當時詣省問萬一欲暫到禁中豈有不可之理因遣使賜香茶酒食等錢五百貫給散隨行使臣從人綱以前語具劄子奏知而道君皇后入國門日聶山請以禁衛護宣德門道路喧然識者笑之太宗入謂文德皇后曰我欲加長樂公主禮數魏徵不肯文德皇后聞之大喜遣中使齎錢二十萬絹四百匹詣徵宅宣令魏徵曰比者常聞公中正而不能得見今論長樂公主禮事不許增加始驗從來所聞信非虛妄願公常保此心莫移今日喜聞公言故令將物相賞公有爭道勿為形跡也黃裳居相位不久未究其才及處外天下常所屬意卒後數年御史劾奏黃裳納邠寧節度使高崇文錢四萬五千緡按故吏吳憑及黃裳子載辭服帝念舊功但流憑昭州原載不問謝枋得以江東提刑江西招諭使知信州明年正月師䕫與武萬户分定江東地枋得以兵逆之使前鋒呼曰謝提刑來呂軍馳至射之矢及馬前枋得走入安仁調淮士張孝忠逆戰團坪矢盡揮雙刀擊殺百餘人前軍稍却後軍繞出孝忠後衆驚潰孝忠中流矢死馬奔歸枋得坐敵樓見之曰馬歸孝忠敗矣遂奔信州已而賣卜建陽市中有來卜者惟取米屨而已委以錢率謝不取其後人稍稍識之多延至其家使為弟子論學俱同上今之在位競托高虛納纍鍾之奉忘天下之憂遘災稱疾偃仰自逸一被冊文得賜錢者起矣何疾之易而愈之速也以此消伏災眚興致升平其可得乎函史李少君故深澤侯舍人匿其生長常自謂七十能使物却老以方遍諸侯更饋遺之常餘金錢衣食不治生業而饒給又不知何所人愈信爭事之異教考昆弟諸公暇謂王孫曰有一男兩女所不足者非財也今文君既失身於司馬長卿長卿故倦遊雖貧其人材足依也且又令客奈何相辱如此卓王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人本傳縣令段簡貪暴聞其富欲害陳子昻家人納錢二十萬緡簡薄其賂捕送獄中子昻之見捕自筮卦成驚曰天命不祐吾殆死乎果死獄中陳子昻傳栁州土俗以男女質錢過期則沒入錢主宗元革其法已沒者仍出私錢贖之歸其父母本傳上初欲用蘇軾起居注王安石曰軾豈是可奬之人上曰軾有文學朕見似為人平靜司馬光韓維王存俱稱之安石曰險邪之人臣非茍言之皆有事狀軾遭父喪韓琦等送金帛不受却販數船蘇木入川司馬光言呂惠卿受錢反言蘇軾平靜斯為厚誣陛下欲變風俗息邪說驟用此人則士何繇知陛下好惡所在上乃罷軾不用置之官告院同上神宗熙寧五年始建武學於武成王廟選文武官知兵者為教授入學給食習諸家兵法教授纂次歷代用兵成敗前世忠義之節足以訓者講釋之願試陳隊者量給兵伍在學三年具藝業考試等第推恩未及格者逾年再試以兵部郎中韓縝判武學賜食本錢萬緡生員以百人為額大學衍義補後晉置鄉兵號天威軍教習歲餘村民不間軍旅竟不可用悉罷之但令七户輸錢十千其鎧仗悉輸官而無賴子弟不復肯復農業山林之盜自是而繁經濟編孝武時關東四十九郡同日地動或山崩壞城郭室屋殺六千餘人上乃素服避正殿遣使者弔問吏民賜死者棺錢因大赦勝出為諫議大夫給事中黃霸為揚州刺史夏侯勝復為長信少府遷太子傅受詔選尚書論說賜黃金百斤年九十卒于官賜冢塋葬平陵太后賜錢二百萬為勝服五日以報師傅之恩儒者以為榮本傳於是叔文及其黨十餘家之門晝夜車如市候見叔文伾者至宿其坊中餅肆酒壚下一人得千錢乃容之唐王叔文傳哈密城在平川可三四里東北二門王稱速檀人僅數百户顧非一種多䝉古回回人習俗各異西域三十八國入貢經哈密者相攔出入索道錢乃已四月王冠帶劍長信侯毐作亂而覺矯王御璽及太后璽以發縣卒及衛卒官騎戎翟君公舍人將欲入蘄年宮為亂王知之令相國昌平君昌文君發卒攻毐戰咸陽斬首數百皆拜爵及宦者皆在戰中亦拜爵一級毐等敗走即令國中有生得毐賜錢百萬殺之五十萬盡得毐等衛尉竭中大夫令齊等二十人皆梟首車裂以狥滅其宗及其舍人輕者為鬼薪及奪爵遷蜀四千餘家家房陵左編永樂間廣信永豐有丐子寒暑惟著破衲臭穢不可聞懸一燒瓶行歌於市自稱呂貧子洞𤣥宮前有米賈常施以錢一日來乞而賈冗且厭頻來擲一錢與之誤墮街心石上貧子不拾但以足趾踏錢入石沒輪貧子故宿東嶽山頂早出晚歸風雨不間賈駭踏錢事往尋之而已死矣尚為藁葬後十餘年賈為縣所役解銀藩司居半月不得報牒食盡大窘忽遇貧子於章江門曰汝死矣尚在乎曰未也公今日得牒矣賈言食盡貧子曰得牒時來就我往果得牒就貧子貧子著以雙草履使閉目行誡聞水碓聲始可開目必永豐始有水碓也行數刻聞水碓聲果抵縣投牒令大詫曰藩司今辰所發牒何以遽至賈言其故方知是仙為建呂仙祠粹語舊唐書西戎傳曰康國生子必以膠置掌內欲其成長掌中持錢如膠之黏物徐兢高麗圖經曰廣化門東南即鑄錢監他貨皆以物交易唯市藥則間以錢貨魏略曰東沃沮國嫁娶之法女家責錢錢畢乃復還壻傳燈録曰城於洪州開元寺受新羅僧金大悲錢二十千令取六祖大師首歸海東供養後周書異域傳曰波斯賦稅准地輸銀錢隋書西域𫝊曰波斯國人年三嵗已上出口錢四文新唐書西域𫝊曰波斯國偷者輸銀錢余按地賦口算盜罰當是三種諸史互舉其一何也又按西域記云波剌斯國舊曰波斯貨用大銀錢户課賦稅人四銀錢然則波斯波剌斯一也唐史云波斯居逹遏水乂于他國旁出云波斯治蘇剌薩倘那城賦稅口出四銀錢二書所載口稅同而史氏不於波斯國表見豈誤以為二國耶隋書西域傳曰女國在葱嶺之南其女王死國中則厚斂金錢求死者族中之賢女二人一為女王次為小王舊唐書西戎傳曰中天竺國謀反者幽殺之小犯罰錢以贖罪唐書西域傳曰葱嶺以東俗喜淫龜兹于闐置女肆征其錢西域記曰那揭羅曷國昔如來在世之時牧牛之士以金錢買花供養受記又云諸欲見如來頂骨者稅一金錢若取印者稅五金錢西域記曰健䭾邏國有貧士得一金錢願造佛像酬工尚少復有一人持一金錢求畫佛像畫丁是時受二人錢共畫一像西域記曰室邏伐悉底國王威風遠洽臣諸印度日以五億金錢周給貧窶一使人剃髮輒賜一億金錢西域記曰羯若鞠闍國有佛牙長餘寸半士庶瞻仰監守者繁其喧雜權五重稅欲見佛牙輸大金錢西域記曰鉢邏那伽國城中有天祠靈異多端衆生於此祠捨一錢功踰他所施千金西域記曰婆羅痆斯國有隱士遇一人悲號逐路以五百金錢遺之西域記曰摩揭陀國有伽藍其地本菴沒羅國五百啇人以十億金錢買以施佛西域記曰伊爛拏鉢代多國者一長者晚有繼嗣時有報者輒賜金錢一百億因名其子聞二百億西域記曰橋薩羅國王為龍猛菩薩鑿山建立伽藍記工人所食盬價用九拘胝金拘胝者唐言億阿育王傳曰摩突羅國有長者出錢於山中作精舍又一長者鑄錢財衰耗唯五百舊金錢在詣尊者毱多所而求出家韋節西番記曰康居國以六月一日為歲首至此日王及人庶在國域東林下七日馬射至欲罷日置一金錢于帖上射中者則得一日為王也四分律曰佛在舍衛國時舍衛城中諸長者集㑹先有制其有不至者罰錢五百後漢南蠻傳曰秦惠王并巴中以巴氏為蠻夷君長其君長歲出賦二千一十六錢三歲一出義賦千八百錢後漢南蠻傳曰秦昭襄王時有巴郡閬中夷人能作白弩射殺白虎昭王嘉之乃刻石盟夷人傷人者論殺人得以倓錢贖死後漢南蠻傳曰高祖為漢王發夷人還伐三秦秦地既定乃遣還巴中復其渠帥七姓不輸租賦餘户乃歲入賨錢口四十僕按𤣥帝道家所尊天樞北極相傳昉自黃虞代著顯赫神靈威武掃蕩邪魅所建宮宇若泰和若齊雲動發內帑金錢不資歲時享祀俱領於祝官乃者曷為著靈于浦豈浦斗度分野所𨽻而北極𤣥武實係斗牛七星之神度有專屬故神有專嚮理或然也江浦縣志葉法善字道元嘗因八月望夜師與𤣥宗遊月宮聆月中天樂問其曲名曰紫雲曲𤣥宗素曉音律默記其聲歸傳其㫖名之曰霓裳羽衣自月宮還過潞州城上俯視城郭悄然而月光如晝師因請𤣥宗以玉笛奏曲時玉笛在寢殿中師命人取頃之而至奏曲既投金錢於城中而還旬日潞州奏八月望夜有天樂臨城兼獲金錢以進集異記先是清河客李蕚年二十餘為郡人乞師於真卿曰公首倡大義河北諸郡待公以為長城今清河公之西鄰國家平日聚江淮河內錢帛於彼以贍北軍今有布三百餘萬匹帛八十餘萬匹錢三十餘萬緡糧三十餘萬斛昔討默啜甲兵皆貯其庫今有五十餘萬事户七萬口十餘萬竊計財足以三平原之富兵足以倍平原之强公誠資以士卒撫而有之以二郡為腹心則餘郡如四支無不隨所使矣㑹編䝉古立炮攻洛兵圍其三面强伸括衣帛為幟立之城上率士卒赤身而戰以壯士數百往來救應大呼以憨子軍為號其聲勢與萬衆無異兵器已盡以錢為鏃金史林靈素置千道㑹設高座令靈素講經帝設幄于側以聽貧下者買青衣幅巾赴之亦得飫餐若施錢然函史陳平用陸生之計乃以五百金為綘侯壽厚具樂飲太尉亦報如之此兩人深相結則呂氏謀益衰陳平乃以奴婢百人車馬五十乘錢五百萬遺陸生為飲食費陸生以此游漢庭公卿間名聲藉盛及誅諸呂立孝文帝陸生頗有力焉經濟編漢譙𤣥以王莾居攝變姓名隱遁後公孫述僣號于蜀連聘不詣述乃遣使者備禮徵之𤣥不肯起賜以毒藥太守乃自齎璽書至𤣥廬𤣥子瑛泣血叩頭于太守曰方今國家東有嚴敵兵師四出國用軍資或不常充足願奉家錢千萬以贖父死太守為請述聽許之𤣥遂隱藏田野終述之世同上編慕容評為人貪鄙鄣固山泉鬻樵及水積錢帛如丘陵士卒怨憤莫有鬬志王猛聞之笑曰慕容評真奴才雖億兆之衆不足畏況數十萬乎左編趙元昊反有詔削奪其身官爵募能生擒元昊若斬首者即為節度使仍賜錢萬貫吕夷簡時在大名府聞之驚曰謀之誤矣諌官張方平言自元昊為寇三年雖常得逞而絶其俸賜禁諸關市今賊中尺布可直錢數百此以揣賊情安得不困倘有悔心勢未能自通今因南郊大禮宜特推曠恩以示綏懷或特降一詔或著之赦文願陛下延召大臣商愚計而施行之上書曰是吾心也命方平以疏付中書吕夷簡讀之拱手曰公言至此社稷之福也同上昌署石職所親吏張觀范堯臣依據說勢市權招賂擅給太原九姓羊錢千萬帝怒召乾曜隱甫刑部尚書韋抗即尚書省鞠之右編張說𫝊侯景取梁主之女溧陽公主甚愛之景請簡文褉宴于樂游苑帳飲三日其逆黨咸以妻子自隨皇太子以下並令走馬射箭中者賞以金錢左編帝手書勞張浚曰近日邊報中外鼓舞十年來無此克捷詔以顯忠為淮南京東河北招討宏淵副之是時顯忠名出宏淵右符離府庫中尚有金三千餘兩銀四萬餘兩絹一萬二千匹錢五萬緡米豆共糧六萬餘石布袋十七萬條衣縧棗羊粆各一庫酒三庫乃縱親信部曲恣其搬取所餘者始以犒軍人三兵共一緡士卒怨怒曰得宿州賞三百得南京須得四百既而復出戰悉棄錢溝壑由是軍情憤詈人無鬪志浚乃移書令宏淵聽顯忠節制宏淵不悅已而復令顯忠宏淵同節制於是悉無體統矣同上唐德宗以宦者為宮市使置白望數百人抑買人物以紅紫染故衣敗繒尺寸裂而給之仍索進奉門户及腳價錢名為宮市其實奪之徐州節度使張建封入朝具奏之以問判度支蘇辨希宦者意對曰京師游手萬家無生業仰宫市取給上信之故凡言宫市者皆不聽大學衍義補蔡京拔故吏魏伯芻領𣙜貨造料次錢劵百萬緡進入徽宗大喜持以示左右此太師與我奉料也擢伯芻至徽猷閣待制京每為帝言今泉幣所積嬴五千萬和足以廣樂富足以備禮於是鑄九鼎建明堂修方澤立道觀作大盛樂制定命寶任孟昌齡為都水使者鑿大抔三山大興工役無慮四十萬延福宫景龍江之役起浸淫及於艮嶽矣左編錢通卷三十二
