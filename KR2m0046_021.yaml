body:
  text: 錢通卷二十一明胡我琨撰十一之弊錢之有利而無弊分砥之失其砥則為壅為濫竊者乗焉烏乎砥無吝以自壅無奢以自濫上下一無渝志斯惟以美利利天下矣以美利在天下即小逋必有鑒矧之行吾私乎故十一曰弊壅滯哲宗元祐六年申錢幣䦨出之禁立銅錢出界徒流編配首從之法言者謂自熈寧七年削除錢禁以此邊闗重車而出海舶飽載而囘沿邊州軍錢出外界但每貫收税錢而已是中國貨寳與四夷共用之也元和十二年敕自今文武官僚不問品秩髙下並公郡縣主中使下至士庻商旅寺觀坊市所有私貯見錢並不得過五千貫如有過此許從敕出後限一月市利物收貯如限内未了更請限亦不得過兩月限滿違犯者白身人處死有官人等聞奏科貶其賸貯錢納官五分取一充賞時京師里閈區肆所積多方鎮錢如王鍔韓𢎞李惟簡少者不下五十萬貫于是競買地屋以變其錢而髙貲大賈多依倚左右軍官錢為名府縣不能究治竟不行文獻通考自薛向立鹽鈔本其後多虚鈔而鹽益輕至是多言官賣不便乞通商王安石主提舉張景温之言至課民買官鹽随貧富作業為多少之差買賣私鹽聽人告以犯人家財給之買官鹽食不盡留經宿者同私鹽法于是民間騷怨鹽鈔舊法每席六緡至是二緡有餘商不入粟邊儲失備蔡京欲嚢括四方之錢實中都以誇富强而固恩寵俾商人先輸錢于𣙜貨務請鈔赴産鹽州郡授鹽而舊鈔悉不用商人凡三輸錢始獲一直之貨因無資更鈔已輸錢悉乾沒于是有齎數十萬劵一旦廢棄者朝為豪商夕儕流丐有赴水投繯而死者商賈不通邊儲失備提㸃淮東刑獄章繹見而哀之奏改法誤民上怒奪繹官宋史王莽作錢布之品名曰寳貨小錢徑六分重一銖文曰小錢直一次七分三銖曰么錢一十顏師古曰么小也次八分五銖曰幼錢二十次九分七銖曰中錢三十次一寸九銖曰壯錢四十因前大錢五十是為錢貨六品直各如其文文質周郭倣漢五銖錢百姓憒亂其貨不行民私以五銖錢市買莽患之下詔有敢挾者為惑民投諸四裔以御魑魅于是農商失業食貨俱廢民涕泣于市道抵罪者不可稱數莽知民愁迺但行小錢直一與大錢五十二品並行龜貝布屬且寢前漢食貨志孟昶聞世宗下秦鳳愈不自安多積芻粟以鐵為錢禁民私用鐵而自鬻器用以専利民甚苦之曽鞏五朝隆平集董卓悉椎破銅人鐘簴及壞五銖錢更鑄為小錢大五分無文章肉好無輪郭不磨鑢于是貨輕物貴穀一斛至數十萬自後錢貨不行魏志偽竊建炎四年有女子詣闕稱為柔福自北方潜歸詔遣老宫人視之其貌良是問以宫禁舊事畧能言彷彿但以足長大疑之女子顰蹙曰金人驅迫如牛羊跣足行萬里寧復故態哉上惻然不疑其詐即詔入宫授福國長公主下降髙世榮汪龍溪行制詞云彭城方急魯元嘗困于面馳江左既興益夀宜充于禁臠資粧一萬八千緡紹興十二年顯仁太后囘鑾言柔福死于北方久矣始知其詐執付詔獄乃一女巫也嘗遇一宫婢謂之曰子貌甚類柔福因告以宫禁事教之為詐遂伏誅前後請給錫賚計四十七萬九千緡東觀奏紀公孫賀為丞相其子敬聲為太僕驕奢不奉法盜用北軍錢千九百萬貫時詔捕陽陵大俠朱安世甚急賀自請逐捕安世以贖敬聲上許之且索一豪民亭長之責至煩丞相親捕主守盜賊至于千九百萬貫以捕一匹夫便得贖漢網可謂闊疎矣至武帝以後則不然也雲麓謾抄帝志復河隴㑹定州駐泊都監張守約請名古渭為軍以根本隴右帝從之築古渭為安逺軍以王韶知軍事知秦州郭逵奏韶盜貸市易錢王安石以為不足挍徙逵涇州㑹編齊丘固求豫政事唐主聽入中書又求領尚書乃以齊丘知尚書省事數月親吏夏昌圖盜官錢三十緡齊丘判貸其死唐主大怒斬昌圖齊丘稱疾請罷從之㑹編上之在華州商賈輻凑韓建重征之得錢九百萬緡至是朱全忠盡取之是時京師無天子行在無宰相崔𦙍等列狀請全忠西迎車駕全忠復書曰進則懼脅君之謗退則懐負國之慚然不敢不勉同上羅鳥雀于閭里者皆為暴横以取人錢物至有張羅網于門或張井上近之輒曰汝驚供奉鳥雀即痛毆之出錢物求謝乃去或相聚飲食于酒肆賣者就索其直多被毆詈或時留蛇一嚢為質賣者求哀乃挈而去上在東宫知其弊故即位首禁之同上安祿山生日上及楊妃賜予甚厚後三日召入禁中貴妃以錦繡為大襁褓裹之使宫人以綵輿舁之上聞問故左右以貴妃洗祿兒對上賜貴妃洗兒金銀錢同上莽下書以洛陽為東都常安為西都諸侯員千八百附城數亦如之以俟有功諸公一同有衆萬户其餘以是為差以圖簿未定未受國邑且令受奉都内月錢數千諸侯皆困乏同上初陳崇張竦奏稱莽功徳以為宜恢國如周公至是王舜等及吏民上書者八千餘人復請如崇言章下有司有司請益封公以新息邵陵二縣及黄郵聚新野田采伊尹周公稱號加公為宰衡位上公三公言事稱敢言之賜公太夫人號功顯君封子男二人為侯加后聘合為一萬萬以明大禮莽稽首辭讓不聽及起視事止減邵陵黄郵新野之田復以所益納徴錢千萬遺太后左右奉共養者莽雖専權然所以媚事誑耀太后下至旁側長御方故萬端賂遺以千萬數知太后厭居深宫中迺令太后四時車駕巡狩四郊存見孤寡貞婦賜民錢帛牛酒嵗以為常王舜奏言天下聞公不受千乗之土辭萬金之幣莫不鄉化蜀郡男子路建等輟訟慚怍而退雖文王卻虞芮何以加宜報告天下奏可于是孔光愈恐固稱疾辭位詔太師母朝十日一入省中置几杖賜餐物官屬按職如故同上劉仁恭令燕人用堇土為錢悉歛銅錢鑿山而藏之已而殺工以滅口後人皆莫知其處五代史袁盎多受吳王金錢専為蔽匿京下忽闕見錢市間頗皇皇忽一日秦檜呼一鑷工櫛髪以五千當二錢犒之諭云此錢數日間有旨不使早用了鑷工親得鈞旨遂與外人言之不三日間京下見錢頓出此宰制天下之小術耳檜在相位頥指上下無敢弗從時都下貨壅乏見鏹市㕓大闕府尹以聞檜笑曰易耳即召文思院官未至促者絡繹奔而來諭之曰適得旨欲變錢法可鑄樣錢一緡進呈廢見鏹不用約翌午畢事院官唯唯而出召工為之富家聞者盡出宿鏹市金粟物價大昂泉溢于市既而樣錢上省寂無聞矣進士崔涯張祐下第後多遊江淮常嗜酒侮謔時輩或乗飲興即自稱俠一夕有非常人裝飾甚武腰劍手嚢一物流血于外入門謂曰此非張俠士居也曰然張揖客甚謹既坐客曰有一讐人十年莫得今始獲之喜不可已指其嚢曰此其首也問張曰有酒否張命酒飲之曰此去三數里有一義士余欲報之則平生恩讐畢矣聞公氣義可假余十萬緡立欲酬之是余願矣此後赴湯蹈火為狗為雞無所憚張且不吝深喜其説乃扶嚢燭下籌其縑素中品之物量而與之客曰快哉無所恨也乃留嚢首而去期以却囘及期不至五鼔絶聲東曦既駕杳無踪跡張慮以嚢首彰露且非已為客既不來計將安出遣家人將欲埋之開嚢出之乃豕首矣因方悟之而歎曰虚其名無其實而見欺之若是可不戒歟豪俠之氣自此而喪矣桂苑叢談嘉熈七年秘閣挍理蔡抗為廣東轉運使先是岑水銅冶大廢官市諸民止給空文積逋鉅萬姦民無所取資羣聚私鑄與江西鹽盜合郡縣患之督捕甚急抗曰採銅皆惰游之民銅悉入官不畀其直非私鑄衣食安所給又從而誅之是豈但民犯法也因命銅入門給直民盡樂輸私鑄遂絶長編劉知逺乃嚴設科禁有軍士盜紙錢一襆被擒左右請釋之知逺曰吾誅其情不計其直竟殺之繇是衆皆畏服經濟編王承宗上疏請赦吳元濟使人白事悖慢不恭武元衡叱去承宗怨數上章誣詆未幾入朝出靖安里第夜漏未盡賊乗暗呼曰滅燭射元衡中肩復擊其左股徒御格鬬不勝皆駭走遂害元衡批顱骨持去侍郎許孟容言于帝曰國相横尸路隅而盜不獲為朝廷辱帝乃下詔能得賊者賞錢千萬授五品官與賊謀及舍賊能自言者亦賞有不如詔族之積錢東西市以募告者于是左神䇿將軍王士則左威衛將軍王士平以賊聞捕得張晏等十八人言為承宗所遣皆斬之逾月東都防禦使吕元膺執淄青都邸賊門察訾嘉珍二人自言始謀殺元衡者㑹晏先𤼵故藉之以告師道而竊其賞帝密誅之左編史思明更國號大燕建元順天自稱應天皇帝以朝義為懷王號范陽燕京洛陽周京長安秦京更以州為郡鑄順天得一錢同上宋李全往青州取東平不克劉全以劵易制司錢不如欲復謀亂楊氏出二千緡解之乃止同上全使人説時青附已餽金五百兩青見義斌死乃附全自移屯淮隂全招靑入城飲折俎銅劵二千他餽稱是恩徧麾下晞稷宴靑全餽折俎如前全將往山東以南軍七百從官犒鉄錢劵人五千錢全犒銅錢三倍許攜南貨免税于是請行者不已得千人以俱晞稷又以千八百人繼之同上唐主景屬中國多故跨據江淮三十餘州擅魚鹽之利即山鑄錢物力富盛頗有窺覦中國之志及淮甸入于周浸以衰弱宋平揚州景懼甚乃遷豫章以太子從嘉守建康豫章城邑迫隘羣臣日夜思歸景怒欲誅賛行者㑹編楚漢春秋曰項梁隂養死士九十人㕘木者所欲計謀也木徉疾於室中鑄大錢也前漢吳王濞𫝊曰吳有豫章郡銅山即招致天下亡命者盜鑄錢前漢鄧通𫝊曰文帝賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下景帝立人有告通盜出徼外鑄錢後漢書公孫述𫝊曰述廢銅錢置鉄官以鑄錢袁宏後漢紀曰初平元年六月董卓壊洛陽城中鍾簴鑄以為錢錢不成文更鑄五銖錢文章肉郭不可把持于是貨輕物貴穀一斛至數百萬洪遵曰余按後漢書魏志張璠後漢紀英雄記皆載卓鑄小錢獨袁有五銖之説未詳晉書食貨志曰吳興沈充又鑄小錢謂之沈郎錢李孝美曰按此錢雖未之見而李賀集有殘絲曲云榆莢相催不知數沈郎青錢夾城路竊謂自古詩人比興其則不逺得非此錢大小與漢興所鑄如榆莢者不多較耶晉書張軌𫝊曰太府叅軍索輔言古以金貝皮幣為貨息穀帛量度之耗二漢制五銖錢通易不滯太始中河西荒廢遂不用錢裂匹以為段數縑布既壊市易又難徒壞女工不任衣用弊之甚也今中州雖亂此方安全宜復用五銖以濟通變之㑹軌納之立制凖布用錢錢遂大行人賴其利丘悦三國典畧曰王則除洛州刺史舊太原佛像毁以鑄錢世號河陽錢唐書食貨志曰史思明據東都鑄得壹元寳錢以一當開元通寳之百唐書食貨志曰史思明惡得壹非長久之兆改其文曰順天元寳曽鞏五朝隆平集蜀孟昶聞世宗下秦鳳愈不自安多積芻粟以鉄為錢禁民私用鉄而自鬻器用以専利民甚苦之董􅓉曰馬殷據湖南八州地建天䇿府因鑄天䇿府寳洪遵曰余按此錢文曰天䇿府寳徑寸七分重三十銖二絫銅質輝重字文明坦史氏失其𫝊張董之説當有所憑也十國紀年吳越史曰周顯徳四年正月忠懿王俶始議鑄錢而洪遵曰余按十國紀年云晉開運三年忠獻王𢎞佐嘗議鑄鉄錢衙内都虞侯𢎞億上疏以為不可王從之至忠懿王復議鑄錢則是錢制行矣十國年紀閩史曰王審知為閩王梁貞明元年汀州寧化縣出鉛置鉛塲二年鑄鉛錢與銅錢並行陶岳貨泉錄曰王審知鑄大鉄錢闊寸餘甚麤重亦以開元通寳為文仍以五百文為貫俗謂之銠􅀈錢與鉛錢並行五代史閩世家曰王延羲立改元永隆鑄大鉄錢以一當十又十國紀年閩史曰王延羲永隆四年八月鑄永隆通寳大鉄錢一當鉛錢百十國紀年閩史曰王延政天徳二年鑄天徳通寳大鉄錢一當百貪黷庾炳之字仲文領選頗通貨賄諸見人有物鮮或不求聞劉遵考有材便乞材見好燭盤便復乞之劉伯龍大慷慨仲文所行有人送張㓜緒語人吾雖得一縣負錢三十萬荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無政有佳驢耳仲文便答甚是所欲客出門遂相聞索之在尚書中令奴沽􅀈酒利其百十亦是立臺閣所無宋書止云仲文天中記益州新昌縣令夏侯彪之初下車問里正曰雞子一錢幾顆曰三顆彪之乃遣取十千錢令買三萬顆謂里正曰吾未要且寄雞母抱之遂成三萬頭雞經數月長成令便與我賣卻一雞三十錢半年之間成三萬又問竹笋一錢幾莖一錢五莖又取十千錢付之買得五萬莖謂里正曰吾未須笋且林中養之至秋竹成每一莖十錢遂成五十萬其貪猥不道皆此類僉載張崇帥廬州好為不法士庻苦之常入覲江都廬人幸其改任皆相謂曰渠伊必不復來矣崇復歸乃計口索渠伊錢明年又入覲盛有罷府之議人不敢指實道路相見皆埒鬚相慶崇歸又徴埒鬚錢嘗因燕次一伶人假為死者被譴當作水族隂吏請于主者主者判云焦湖百里一任作獺崇因大慙南唐近事少府監裴匪舒善營利奏賣苑中馬糞嵗得錢二十萬緡上以問劉仁軌對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也乃止㑹編李石用金部員外郎韓益判度支而益坐贓三千餘緡繫獄石按之曰臣始以益頗曉錢穀故用之不知其貪乃如是上曰宰相但知人則用有過則懲如此則人易得卿所用人不掩其惡可謂至公從前宰相用人好曲蔽其過不欲人彈劾此大病也乃貶益官同上潘美尹崇琦帥兵攻南漢郴州克之初南漢主懵然莫以為慮至是始懼之以廷琄為招討使屯洸口朝廷既克郴得南漢内侍餘延業帝訪其國政延業具言其主作燒煑剝剔刀山劍樹之刑或令罪人鬭虎扺象又賦斂繁重邕民入城者人輸一錢瓊州斗米税四五錢置媚川都定其課令入海探珠所居宫殿以珠玳瑁飾之宫城左右離宫數十遊幸常至月餘或旬日以豪民為課户供宴犒之費帝驚駭曰吾當救此一方民時方謀下蜀未遑也同上金人欲謀南侵迺造戰船于通州遣使籍諸路先安部族但契丹奚人不限丁數悉僉之凡二十四萬又僉中都南都中原渤海丁壯年二十以上五十以下者皆籍之凡二十七萬雖親老丁多求一子留侍亦不聽又遣使分詣諸道總管府督造兵器命諸路舊貯軍器並致於燕時方建宫室于汴修城郭于燕其財用皆賦于民民不能堪箭羽一尺至千錢村落間往往椎牛以供筋革至于烏鵲狗彘無不被害者宋史鎮州市人劉方遇家財數十萬方遇妻田氏早卒田之妹為尼常出入方遇家方遇使尼長髪為繼室有田令遵者方遇之妻弟也善貨殖方遇以所積財令令遵興殖也方遇有子年㓜二女皆嫁方遇疾卒子㓜不能督家業方遇妻及二女以家財素為令遵興殖乃聚族合謀請以令遵姓劉為方遇繼嗣即令鬻劵人安美為親族請嗣劵書即定乃遣令遵服斬衰居喪而二女初立令遵時先邀每月供利二萬及後求取無厭而石李二女夫使二女詣本府論訴之令遵冐姓奪父家財令遵下獄石李二夫族與本府要吏親黨上至府帥判官行軍司馬隨使都押衙各受方遇二女賂錢數千緡而以令遵與姊及書劵安美同情共盜俱棄市人知其寃府帥李從敏令妻來朝懼事𤼵令内地彌縫侍御史趙都嫉惡論奏明宗驚怒下鎮州委副使符䝉按問果得事實自親吏髙知柔及判官行軍司馬及通貨僧人婦人皆棄市惟從敏初欲削官停任中官哀祈竟罰一季俸議者以受賂曲法殺人而八議之所不及失刑也北夢𤨏言唐中宗委政皇后韋氏安樂長寧公主及韋后妹郕國夫人上官婕妤尚容柴氏女巫第五英兒皆依勢用事賣官鬻爵雖屠沽臧獲用錢三十萬則别降墨敕除官斜封付中書時人謂之斜封官上官婕妤等皆有外第出入無節朝士咸出其門交通賄賂以求進達彚苑崔烈入錢五百萬以買司徒拜之日天子臨軒顧謂左右曰恨不少靳可至千萬焉九州春秋帝令左右賣公卿烈入錢五百萬為司徒問子鈞曰議者以為何鈞曰大人少有英稱議者嫌其銅臭崔烈𫝊王大同太尉嗣宗知西京年踰耳順有一郎監當亦年老以吏事被責大同忘己之年遽云年已老何不休官做甚徐悟顧洛陽知縣蕭秘丞云我只要料錢養家江鄰幾雜志王界為刑部尚書性貪恡不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜唐書曹武為右衛將軍晩節在雍州致見錢七千萬皆厚輪大郭齊書馬援平交趾上言太守蘇定張眼視錢自討賊怯于戰功宜加切敕後定果下獄東觀漢記五代鳳翔李永吉初朝京師蘇逢吉以永吉故秦王從曮子家世王侯當有奇貨使人告永吉許以一州而求其先世玉帶永吉以無為辭逢吉乃使人市一玉帶直數千緡責永吉償之竟不與州辛漢臣𫝊元誕遷齊州刺史在州貪暴大為人患有沙門為誕採藥還誕問外消息對曰唯聞王貪願王早代誕曰齊州七萬家吾至齊州一家未得三斗錢何言貪也後魏書唐汴州刺史王志愔飲食精細對賔下脱粟飯商客有一騾日行三百里曽三十千不賣市人報價云十四千愔曰四千太少更増一千又令買單絲羅匹至三千愔問用幾兩絲對曰五兩愔令豎子取五兩絲來每兩别與十錢手工之直朝野僉載洛中有僧得數粒所謂舍利者貯于琉璃器中晝夜香火檀越之禮日無虚焉有士子迫于寒餒因請僧願得舍利一觀僧出瓶授與遽即吞之僧惶駭如狂復慮聞之于外士子曰與吾錢當服藥出之僧喜甚遂贈二百緡乃服巴豆㵼下僧取濯而收之尚書故事唐扶為福州觀察使濫殺人風節不立及卒奴婢爭財有司按其貲至十餘萬山堂肆考前蜀王衍太后太妃以教令賣官自刺史以下每一官闕必數人並爭而錢多者得之同上晉武帝問劉毅朕方漢何帝曰桓靈帝曰若是其甚乎曰桓靈賣官錢入官庫陛下賣官錢入私門殆不如也五代史漢王章為三司使征利剝下緡錢出入元以八十為伯章每出錢伯必減其三至今七十七為官省錢者自章始然今官府于七十七之中又除頭子錢五文有奇則愈削于章矣鶴林玉露錢通卷二十一
