body:
  text: 錢通卷十七明胡我琨撰九之分泉人之命定其獲弗竒蠱于竒其衡命也必戾此無故唯數逆且無償也是故冶躍履安而鑑前因之報可以治蠱可以立命泉行固有所止也誰司其契惟曰分故分曰九前定建安有村人往來建溪忽有數錢流下尋至山半樹下有大甕錢滿其中而甕少欹故錢流出于是推正以石壓之惟取五百餘錢歸率家人將盡取之而忘其所夜夢人曰錢有主不可取向者五百顧爾正欹甕耳徐鉉録上虞魏全家在縣北忽有一人著孝子服皂笠手巾掩口來詣全家語曰君有錢一千萬銅器亦如之大柳樹錢在其下取錢當得爾於君家大不吉僕尋為君取此便去自爾出三十年遂不復來全家亦不取錢搜神後記邠公杜悰福夀少倫日辰五飱一食之費皆至萬錢京西李客見人牧羊遍滿山谷不知幾千萬口詰之自何而來自邠夏供相公食耳指顧之際轉首恍然並無所覩乃神靈所授也中朝故事隋末一書生居太原苦于貧所居抵官庫因此而見有錢數萬貫遂欲携掣見一金甲人持戈曰汝要錢可取尉遲公帖來此尉遲公錢也書生訪求至鐵冶處有尉遲敬德者方袒露蓬首煆煉之次乃前拜之公問曰何故曰乞錢五百貫以濟貧困尉遲怒曰打鐵人安得錢生曰足下若能哀憫但乞一帖公不得已令生執筆曰錢付某五百貫具年月日著名書生持去至庫復見金甲人令繫于梁上取錢五百貫而去後敬德佐唐太宗得天下賜錢一庫開庫缺五百貫將罪主者忽于梁上見有一帖乃打鐵時書帖纍日驚歎求書生厚贈遣之逸史陳復休號陳七子貞元中來舉褒城耕農樵採與常無異如五十許人昌明令胡倣常師事之將赴任留錢五千為復休市酒笑而不取曰吾金玉甚多恨不能用耳以鋤授倣使之劚地不二三寸金玉錢貨隨劚而出曰人間之物固若是矣但世人賦分有定不合多取若吾用之豈有限約乎仙傳拾遺貞元中有孟員外者少時應進士舉久不中第將罷舉又無所歸託于親丈人省郎殷君宅為殷氏賤厭瘴瘧日甚乃白于丈人曰某貧薄疾病必不可救恐汚丈人華宇願委運乞待盡他所殷氏亦不與語贈三百文出門不知所適街西有善卜者每以清旦决卦晝後則閉肆下簾孟君乃謁之具陳羈蹇將填溝壑盡以所得三鐶為卜資卜人遂留宿為决一卦卦成驚曰郎君更十日合處重職俸入七十千錢何得言貧賤卜人遂留厚供給已至九日並無消息又却往殷君宅殷氏見甚薄之亦不留連寄宿馬廄至明有敇以禁兵將為賊境觀察使其人與殷友善馳扣殷氏之門武人都不知書云便須一謝表兼鎮撫寇敓事故頗多公有親故文士頗能相助否殷良久思之無可應者忽記得孟君久曾應舉可以充事遽引見之令草一表詞甚精敏因請為軍中職事月俸正七十干乃卜後十日也逸史齊君房者家于吳雖勤學而寡記性壯有篇詠常為凍餒所驅役役吳楚間干謁多不遇雖時有獲未嘗積一金脫錢滿一繩則必病罄而復愈纂異記王狀元未第時醉墮汴河水神扶出曰公有三百千料錢若死何處消散士有效者陽墮河河神亦扶出士喜曰我料錢幾何神曰有三百甕黃虀無處消散爾周文育隨監州王勵至大庾嶺詣卜者卜者曰君北下不過作舍令長南入則為公侯文育曰足錢便可誰望公侯卜人曰君須臾當暴得銀二千兩若不見信以此為驗其夕宿逆旅有賈人求博文育勝之得銀二千兩韓太傅為諸生時一有月之兩字借相工錢與之俱入璧雍之中相璧雍弟子誰當貴者相工指倪寬曰彼生當貴秩至三公王充論衡里子客瓜州一日坐肆中見門前有一錢起拾之無有也坐則復見如是者三四頃之丐者拾其錢而去里子追視之以二錢易之遍示其儕言一錢有分定也于時市人俱有萌焉千一録江陵副使李君未第時于華隂店中見白衣人與之圍爐飲啜隨與同行至昭應白衣人曰凡事預定不可多求君欲知後事當留一筆乃書三封題緘云甚急則開之遂謝别而去後連求第不得且無資糧乃開書一封則曰青龍寺門前坐遂往已晚矣坐良久不敢歸適寺僧將閉門見李君延入熟視久之曰得非松滋李長官之子乎李君曰然僧曰長君我故舊也曾有錢二千貫寄在我處今付還郎君幸之幸矣明日李君載而行遂為富室後又不第進退兩難再開書一封則曰西市鞦轡行頭坐即往坐樓飲適樓下有議將錢買科甲者問之曰曾有願出錢一千貫買及第者約之不至所以主試郎君在此李即自買之及第官至殿中江陵副使後患心痛危急開第三封書則曰可處置家事矣繇是遂卒艷異編韋丹年四十不第嘗騎驢至洛陽中橋見一黿長數尺呼呷將死丹不覺惻然問其直則曰得錢二貫則鬻時天大寒丹自度衫襖無可當者即以所乘驢易黿放之于水而去時有胡蘆先生丹因之問命胡蘆曰我焉知元君乃吾師也往當自詳之遂相與偕行至通利坊靜巷見一小門胡蘆先生叩門俄而老人從二青衣出自稱元濬之向丹致拜曰老夫將死之命賴君以生恩德如天豈容酬報丹始矍然知是黿也遂具珍羞留連竟日抵暮辭歸老人取一通文字授之曰知君要問命敬往天曹録得一報凡一生皆前定只先知耳又謂胡蘆曰幸借我五十千以充韋君乘早决西行丹遂自五經及第以至江西觀察使每授一官日月無差因果録命逹王嶷性仁謹廉儉不事財賄齊庫失火燒荆州還資評直三千餘萬杖主局數十而已疾篤遺令諸子曰才有優劣位有通塞運有貧富此自然之理無足以相陵侮也及卒第庫無見錢敕月給錢百萬諡曰文獻鄧差南郡臨沮人大富道逢估人先不相識道邊相對共食羅布殊品呼差與焉差曰君遠行商估勢不在豐何為頓爾珍羞美食估人曰人生在世終止為身口耳一朝死病安能復進甘味乎終不如臨沮鄧生平生不用為守錢奴耳差不告姓名歸至家宰鵝食動筯咬骨哽其喉而死廣五行記李景讓母鄭氏宅後墻陷得錢盈船曰吾聞無勞而獲身之災也天以先君餘慶矜其貧而賜之則願諸孤學問有成此不敢取遽掩之會編呼延贊有膽勇鷙悍輕率官至康州團練使真宗嘗補軍校皆叙已功或至喧譁贊獨進曰臣月俸百千所用不及半忝幸多矣自念無以報國更求遷擢將恐福過災至再拜而退衆善其知分王昭遠事太宗歷拜保靜軍節度使弟昭懿亦至捧日都虞候初祖母郭氏常對昭遠母指之曰此兒有貴相他日必至公卿指昭懿曰此兒俸錢過二萬不能勝矣果皆如其言杭有傭者鬻力以求食食有餘錢輒易酒而醉于市與鄰者或招而諭之曰子日所餘錢謂不可以樹之産乎對曰日餘三五錢也謂三五錢可以樹之産乎或者因曰日餘三錢計嵗千錢五錢幾倍之嵗有積也謂三五所儲不可樹之産乎對曰日亡三五錢則亡一日醉嵗如之則亡一嵗醉令亡嵗亡醉也謂又可以樹之産乎或乃笑而遣之曰子無恆産于飲食可謂有恆心矣淇筠志感有梁十二者名知人至宋州司馬詮作書薦之蘇州刺史李無言李遣日暮至宅乃著黃衣衫令一客著紫自代梁謂客曰向聞公語聲未有官祿又謂黃衣是三品今章服不同何也李乃以實對因請詳視梁云公即合改得上州刺史後果改睦州贈錢一百貫梁云公至彼州必得重厄某為公作一法禳之公須嗔責某妄語鞭背十下仍不得令妻子知也李不可梁再三以請李閔然而從之明早李當衙决梁十下小蒼頭走報其妻李入門妻云何以打梁子無言恨云忘却瞞家人也俄而梁叩鈴請見李曰公何以遣妻子知厄不免矣公既彊與某二百千文無以報公德公厄雖不免然令公得二千貫以充家資取以必無事李在州果取得二千貫錢而死梁又謂丹徒主簿盧惟雅云從此得通事舍人如其言後于京見之云至某年財物莊宅合破散公當與某五十千文某教公一言即免盧不之信不與至某年盧果因賭博莊宅等並盡定命録藍采和不知何許人也常衣破藍衫行歌于城市乞索歌詞極多率皆仙意人莫之測但以錢與之以長繩穿拖地行或散失亦不回顧或見貧人即與之及與酒家神仙傳天寶中相州王叟者家鄴城富有財唯夫與妻更無兒女積粟近至萬斛而夫妻儉嗇頗甚常食陳物才以充腸不求豐厚莊宅猶廣客二百餘户叟嘗巡行客坊忽見一客方食盤餐豐盛叟問其業客云唯賣雜粉香藥而已叟疑其作賊問汝有幾財而衣食過豐也此人云惟有二千之本逐日食利但存其本不望其餘故衣食常得足耳叟遂大悟原化記賣藥翁莫知其姓名有童稚見之逮于暮齒復見其顔狀不改常提一大葫蘆賣藥人告疾求藥得錢不得錢皆與之無阻藥皆稱有效或無疾戲而求藥者得藥尋必失之繇是人不敢妄求敬如神明或戲問有大還丹否曰有一粒一千貫錢人皆笑之以為狂多于城市笑罵人曰有錢不買藥喫盡作土饅頭去人莫曉其意益笑之後于長安賣藥抖擻葫蘆已空內只有一丸極大光明安於掌中謂人曰百餘年無一人肯把錢買藥喫深可哀哉乃自喫藥才入口足下五色雲起飄飄而去續仙傳滎陽鄭還古少有俊才嗜學而天性孝友妻柳氏僕射元公之女也婦道克備弟齊古好博戲賭錢還古帑藏中物雖妻之資玩恣其所用齊古得之輒盡還古每出行必封管鑰付家人曰留待二十九郎償博勿使别為債息為惡人所陷誤也弟感其意為之稍節因話録殷浩字深源識度清遠為風流談論所宗或問浩曰將涖官而夢棺將得財而夢糞何也浩曰官本臭腐故將得官而夢尸錢本糞土故將得錢而夢穢時人以為名言崔唐臣閩人與蘇子容吕晉叔同學相好二公登第崔撫然罷舉後二公入三館乘馬偕出循汴岸見一士艤舟登窗下蓋崔也亟就謁之問其别後况味曰初到篋中有錢百千以其半買此舟來往江湖間其半市雜貨時取贏以自給雖云泛梗飄蓬差愈于應舉覔官時也客齊隨筆劉𤣥英號海蟾子初仕燕劉守光為相素喜道術一日忽有道人自稱正陽子來謁之乃邀坐堂上索雞卵十枚金錢十文以一文置之几上纍十卵于錢若浮圖之狀海蟾驚異之曰危哉道人曰人居榮辱之場履憂患之地其危有甚于此者復盡以其錢擘破為二擲之遂辭去海蟾因大悟廣列仙傳趙僧儼北海人為沙門棲遲山谷常以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一挺以照七尺之軀至夜而亡時人以為知命天中記竒獲龎元英文昌録曰後唐同光三年洛京蕃漢馬步使朱守殷于積善坊役所得古文錢四百五十六文得一元寶四百四十文順天元寶沈存中筆談亦曰熙寧中發地得大錢三十餘千錢文皆曰順天得一僕考唐書志史思明據東都鑄得一元寶錢徑一寸四分以當開元通寶之百既而惡得一非長祚之兆改其文曰順天元寶龎始疑史傳無此年號後得錢氏錢譜乃知史思明鑄僕謂此見唐書甚明元英其未考耶僕家舊有得一元寶一錢字文方重如顔體輪郭甚古後為好事者取去今此二錢人家往往有之文獻通考永明十年齊安郡民王攝掘地得四文古錢一萬二千七百十枚品製如一南齊祥瑞志徐伸寶所居道南有大枯樹僕夫灑掃其下沙中獲錢百餘以告仲寶仲寶自往獲數百如是積年凡得數十萬其家人復于厨側鼠穴中得錢甚多仲寶率人掘之深數尺有一白雀飛出其下獲錢至百萬錢盡白雀乃去徐鉉稽神録元和元年靈武李欒奏黃河岸塌處得古錢三千三百其錢形小方孔三足舊唐書宣和五年郭僎為亳州䝉城令村人于田中掘得古刀柄端有方寸十三字倣佛𨽻書背有方孔不透身形如刀文曰貨布五百舊譜天寶元年西河郡别駕李幼竒于長平溪澗中得古刀又得長平異布面文科斗同上王公和學士罷沂州得銀刀一有齊大公杏九字中闕不相屬刀上又有隱起圜形疑即九府圜法嘉祐志咸通八年兖海觀察鄭漢章奏百姓于野內掘得古銅片四千九百五十五片詔翰林驗云上有齊歸化三字舊譜魏郡張奮賣宅于黎陽程應舉家疾轉賣于鄰人何文文獨持大刀暮入北堂宿一更中有人丈餘高冠黃衣升堂呼細腰何以有生人氣答曰無之須臾有高冠青衣者又有高冠白衣者問答並如前及將曙文乃下堂中如向法呼之曰黃衣者金也在堂西壁下青衣錢也在堂前井邊五步白衣銀也在牆東角柱下汝誰也曰我杵也在竈下文按次掘之得金銀各五百斤錢千餘萬仍取杵焚之宅遂清安搜神記右驍衛大將軍張籛出逰近郊于大冡之上忽有黃雀銜一銅錢置之而去未幾復于衙院晝卧見二雀相鬬畢各嗛一錢落于前籛後以所獲三錢常祕于巾箱識者以為大富之徴晉書柳積字德封勤苦為學夜燃木葉以代燈火中夕聞窗外有呼者積出見之有五六丈夫各負一囊傾于屋下如榆莢語曰與君為書糧勿憂業不成明旦起視皆漢古錢計得一百七十千乃終其業宋明帝時官至東宫舍人獨異志元和初洛陽村百姓王清傭力得錢五鐶因買田畔一枯栗樹將為薪以求利經宿為鄰人盜斫創及腹有黑蛇舉首如臂語人曰我王清本也汝勿斫其人驚懼失斤而走及明王清令子孫薪之復掘其根根下得大甕散錢實之王清因是獲利而十餘年巨富遂甃錢形龍號王清本酉陽雜爼上黨鮑瑗家多喪病貧苦淳于智卜之曰君居宅不利故令君困爾君舍東北有大桑樹君徑至市入門數十步當有一人賣新鞭者便就買還以懸此樹三年當暴得財瑗承言詣市果得馬鞭懸之三年浚井得錢數十萬銅鐵器復二萬餘于是業用既展病者亦無恙搜神記東海蔣潛常至不其縣次林中露一尸鳥來食之見一小兒驅鳥鳥即起見尸頭上著通天犀纛揣其價可數萬乃取之鳥集無復驅者續齊諧志王韶之始興記勞口東岸有石四方高百餘仞其狀如臺父老相傳此石昔有三人伐木以作橋上石頂戲見數甕錢共取半甕而還洪州胡氏家貧有子五人其最小者氣狀殊偉此子既生家稍充給令此子主船載麥泝流詣州市截江而渡船勢抵岸力不能制沙塌岸崩穴中得錢數百萬乃棄麥載錢而歸繇是其家益富市置僕馬不欲久居村落因令往來城市行及中道所乘之馬跑地不進顧謂其僕曰船所抵處得錢今馬跑地亦恐有物因令左右斸之得金五百兩他日復詣城市因有商胡遇之知其頭中有珠使人誘而狎之取其珠而去録異記唐洛陽劉貫詞大厯中求丐于蘇州逢蔡霞秀才者一見意頗殷勤問曰兄今泛逰江湖間何為乎曰求止耳曰然則獲幾何而止曰十萬曰設令必得亦廢數年霞居洛中以他故避地音信久絶兄蓬遊之望不擲日月而得于是遺錢十萬授書一緘曰霞居渭橋下合眼叩橋柱當有應者必邀入宅老母奉見時小妹亦令出見使渠助為主人百緡之贈渠當必諾貫詞遂往果見母及妹因曰書中以兄處分令以百緡奉贈既難獨舉須使輕齎今奉一器其價相當命取鎮國碗來授貫詞曰此罽賔國碗其國以鎮災厲唐人得之固無所用得錢十萬可貨之貫詞持碗行數步視手中器乃一黃色銅碗也其價只值三五鐶耳執鬻于市及嵗餘忽有胡客來視之問其價貫詞曰二百緡客曰所直何止二百緡但非中國所用有之何益百緡可乎貫詞許之胡曰此乃罽賔國鎮國碗也此碗失來其國大荒為龍子所竊已四年其君方以國中半年之賦召贖君何以致之貫詞具告其故胡曰罽賔守龍上訴當追尋次此霞所以避地隂冥吏嚴不得陳首藉君為繇送之耳續𤣥怪録隋開皇初廣都孝廉侯遹入城至劍同外忽見四黃石皆大如斗遹愛之收藏干書籠負之以驢因歇鞍取看皆化為金遹至城貨之得錢百萬市美妾十餘人大開第宅又近甸置良田别墅𤣥怪録張老與妻别韋恕曰人世遐遠不及作書奉金二十鎰并與一故席帽曰若無錢可于揚州北邸賣藥王老家取一千萬持此為信遂别復令崑崙奴送出郤到天壇崑崙奴拜别去韋自荷金而歸其家驚訝或仙或妖不知所謂五六年間金盡欲取王老錢復疑其妄曰取爾許錢不持一字此帽安足信既而困極其家强逼之曰必不得錢亦何傷乃往楊州入北邸而王老者方當肆陳藥韋前曰張老令取錢一千萬持此帽為信王曰錢即實有席帽是乎韋曰叟豈不識耶王老未識有小女出青布幃中曰張老常過令縫帽頂其時無皂線以紅線縫之可驗因取看果是遂得錢而歸乃信真神仙也續𤣥怪録唐貞元初廣陵傭工馮俊遇一道士命負藥至山道士遂送俊出謂曰勞汝遠來少有遺汝授與錢一千文令繫腰下至家解觀之自當有異又問家有幾口云妻兒五口授以丹藥可百餘粒曰日食一粒可百日不食俊辭曰此歸路遠何繇可至道士曰與汝圖之遂引行亂石間見一石卧如虎狀令俊騎上以物䝉石頭俊執其末如執轡焉誡令閉目候足著地即開俊如言騎石道士以鞭鞭石遂覺此石騰空而飛久之覺足躡地開目已在廣陵郭門矣人家方始舉燭比至舍妻兒猶驚其速遂解腰下皆金錢也自此不復為人傭工廣置田園為富民焉原化記昔有盧李二生隱居太白山習吐納導引之術李别去後遇盧生問李曰公所缺官錢多少曰二萬貫乃與一拄杖曰將此于波斯店取錢可從此學道無自穢也才曉前馬至二舅令李生去送出門波斯見拄杖驚曰盧二舅拄杖何以得之依言付錢遂得無事其年往汴州行軍陸長源以女嫁之既婚頗類盧二舅北亭子所覩者復解箜篌果有朱書字視之天際之詩兩句也李生具說楊州城南盧二舅亭中筵宴之事妻曰少年兄弟戲書此昨夢見使者云仙官追一如公所言也李公歎訝郤尋二舅之居惟見荒草不復覩亭臺矣逸史杜子春者蓋周隋間人志氣間曠縱酒間逰資産蕩盡投于親故皆以不事事見棄方冬衣破腹空徒行長安中日晚未食倣徨不知所往于東市西門仰天長吁有一老人策杖于前問曰君子何嘆春言其心老人曰幾緡則豐用子春曰三五萬可矣老人曰未也更言十萬曰未也乃言百萬亦曰未也曰三百萬于是袖出一緡曰給子今夕明日午時候子于波斯邸愼無後期及時子春往老人果與錢三百萬不告姓名而去子春既富蕩心復熾自以為終身不復羈旅也乘肥衣輕㑹酒徒徴絲管歌舞于倡樓不復以治生為意一二年間稍稍而盡衣服車馬易貴從賤去馬如驢去驢如步倐忽如初既而復無計自嘆于市門發聲而老人到握其手曰君復如此竒哉吾將復濟子幾緡方可子春慚不應老人因逼之子春愧謝而已老人曰明日午時來前期處子春忍愧而往得錢一千萬未受之初憤發以為從此謀身治生石季倫猗頓小豎耳錢既入手心又翻然縱適之情又却如故不一二年間貧過舊日復遇老人于故處子春不勝其愧掩面而走老人牽裾止之又曰嗟乎拙謀也因與三千萬曰此而不痊則子貧在膏肓矣子春曰吾落拓邪逰生涯罄盡親戚豪族無相顧者獨此叟三給我我何以當之因謂老人曰吾得此人間之事可以立孤孀可以衣食于名教復圓矣感叟深惠立事之後唯叟所使老人曰吾心也子治生畢來嵗中元見我于老君雙檜下續𤣥怪録僞吳楊行密初定楊州有康氏者以傭賃為業僦一室于太平坊空宅中康晨出未返其妻生一子方席藁忽有一異人赤面朱衣冠據門坐妻驚怖叱之乃走如舍西踣然有聲康歸欲至家路左忽有錢五千貫羊牛半邊尊酒在焉因持之歸妻亦告其所見即往舍西尋之乃一金人仆于草間亦曵之歸因烹羊飲酒得以周給自是出必獲利日以富贍宋金銀工楊初配納贍軍錢七百餘千盡鬻家資未支其半初事母至孝每為供軍司追促不令母知恐母為憂一日有道人詣其家問所納官錢以何准備具以困乏言之道人令市生鐵備炭火明日復來燃炭壘鐵以藥投之一夕成銀而去臨行謂初曰我往青城山中與以丹藥俾奉其母後其母髮白更青老能返壯宋陳汝器居仙逰城中之南街家居積善一夕飛錢滿其室汝器與妻朱氏焚香祝曰願有良子錢乞減半其後汝器子可大登政和二年進士遂為望族興化府志勝宋乾德年置寧遠縣實漢之冷道縣唐之延唐縣也志云冷道故城在縣東南大厯故城在春陵縣城北十五里析自延唐者舂陵詳州下其故址在縣北五十里漢長沙王陵墓猶存居民掘地時時得五銖錢永州府志勝陳爵陳挺年皆十嵗以上相與釣于湖涯挺先釣爵後往爵問挺曰釣寧得乎挺曰得爵即歸取竿繩去挺四十步所見湖涯有酒樽色正黃沒水中爵以為銅也涉水取之滑重不能舉挺望見號曰何取爵曰是有銅舉也挺往助之涉水未持樽頓衍更為之盤動行入深淵中復不見挺爵留顧見如錢等正黃數百千枚即共掇摝各得滿手王充論衡牛相公墓在金湖坊鄧家山下墓高五六丈旁環列小塋三十餘陪葬今多夷乃犁鉏之下往得銅錢器物無名可考南安府志勝甘羅城去舊淮隂縣北一里俗傳秦甘羅所築天雨後往往于土中得小錢狀如鐘有篆文不可辨號甘羅錢淮安府志洪崖在洪洞縣城南高踰百尺東西袤五十里澗水出焉流入于汾又秦壁村之寶崖四壁孤絶北俯汾河中藏凹處有小浮圖樵牧往往于此掘得錢寶以近劉淵墓云鄱陽東大山有一石臨河如廪高數丈號曰錢倉户如六尺牀晉太和中有漁人從户過遇户開其錢自出因收得錢四寰宇記風俗通曰魏郡龎儉因亂失父時儉三四嵗母襁抱轉客廬里鑿井得錢千餘萬遂巨富行求老蒼頭使主牛馬耕種直錢二萬有賔婚大㑹堂上作樂奴在竈下竊言堂上母我婦也婢即具白母母使儉呼問事實曰是我翁也母因下堂抱其頸啼泣遂為夫婦儉及子歷二千石刺史七八人時人為之語曰廬里龎公鑿井得銅買奴得翁時人語晉義熙十二載淯陽縣羣童子浴于淯水忽見側有錢出如流沙因競取之手滿放隨流去又以衣盛裹各有所得洽聞記世祖治盆城又得一大錢文曰太平百嵗南齊祥瑞志泰始中建德校尉王和掘地得一鼎容四斗中有大錢三十文曰百當千千當萬因此令公私行錢晉書載記石勒傳錢通卷十七
