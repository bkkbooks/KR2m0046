body:
  text: 錢通卷六明胡我琨撰三之象攻泉之道必自載于象者始也是故攻泉自品始品行始以正行乃偽作而神竒者雜出矣刀布雜而稽諸天則勝者必有厭矣厭其勝而流之四夷服之則采厥産以資疆餙鄙鑄金之狀圓亦中規方亦中矩肉亦中蟲背亦中籕文同而各異其品彚而辯諸所匪以貢而致之天官氏式其地圖而物之尊洪氏也則校其品之鴻纎可以類從者或辯其嵗年或辨其名號或辯其制體或辯其官私或辨其妖祥錯其説於他門叙其署者與其貫者而一綜于象凡象於夷者各憲之於所冶之國乃弗分如洪氏所括若弗從其類也若欲其一也故象曰三正品右虞錢賈逵注周語曰虞夏商周金幣三等黄為上幣銅錢為下幣右夏錢鄭暐南北史雋曰禹遭大水以厯山之金鑄錢救人之用右商錢鄭暐南北史雋曰湯遭大旱以莊山之金鑄錢贖人之賣子者右周錢太公立法鑄荀悦漢紀曰周制錢有文外圓内方李竒曰圜一寸重九兩顧烜曰重十二銖李孝美曰按二家之説若謂重九兩則景王時不患輕也若謂十二銖則更鑄者又何加焉右景王錢前漢食貨志曰景王患錢輕更鑄大錢文曰寶貨肉好皆有周郭唐固曰重十二銖又曰大錢五十右齊錢右晉錢右楚錢楚莊王行越世家曰楚王每赦使使者封三錢之府右趙錢洪遵曰余謂春秋之時下迨戰國以鑄泉立幣各擅其利惟齊志見之管子故暴白後世諸國無所稽考遂致淟汨不𫝊耳右秦錢惠文王初行右秦半兩錢𫝊瓚曰錢之形質如周錢唯文異耳顧烜曰秦始皇鑄重十二銖敦素曰嘗得此錢徑寸三分重八銖右莢錢如淳曰如榆莢也伏無忌曰漢鑄莢錢重三銖顧烜曰今世猶有小錢重一銖半徑五分文曰漢興小篆文右八銖錢前漢髙后紀曰二年行八銖錢舊譜曰重八銖文曰半兩右四銖錢食貨志曰孝文五年更鑄四銖錢其文為半兩應劭曰今民間半兩錢最輕小者是也右三銖錢建元元年鑄顔師古曰新壞四銖造此錢封氏曰半兩錢重三銖兩字中唯作十字不復為兩人穿下有三竪文豈以三畫為三銖之記耶洪遵曰余按此錢史氏以為銷半兩更鑄三銖錢重如其文則三銖之文明矣李孝美又畫半兩錢于下葢蔽封氏之説也右半兩錢建元五年鑄半兩之品甚衆有𫝊形者有肉郭者有對文者有隱起字者右五銖錢元狩五年鑄食貨志曰有司請郡國鑄五銖錢周郭其質令不可摩取鋊舊譜曰此錢厚大者徑一寸重五銖李孝美曰今世所見五銖如張台之説一一甚多但赤側四出文蜀梁當兩女錢并穿上下各一星者自有品目不當更引于此右鍾官赤側錢元狩年鑄如淳曰以赤銅為其郭也今錢見有赤側者不知作法云何右五銖錢建武年鑄右四出文錢中平三年鑄舊譜曰徑寸一分重四銖背文四出俗謂之角錢洪遵曰余按此錢字畫明澈徑寸重三銖一絫右五銖錢魏文帝黄初二年行右直百錢建安年昭烈鑄舊譜曰徑七分重四銖右直百五銖錢昭烈鑄顧烜曰徑一寸一分重八銖文曰五銖直百洪遵曰余按此錢封氏列不知年代品然考諸家之説則昭烈所鑄審矣錢凡四種有徑九分重五銖者字文明坦肉好背面皆有周郭世多有之有徑七分重三銖八絫者形制窳薄有一種面文相類背肉粗惡穿左有一為字又有鐡錢重五銖四絫者輪郭重厚字文湮晦右𫝊形五銖錢顧烜曰劉備鑄直百錢𫝊形五銖今所謂蜀錢即𫝊形五銖也時有勒為直百者亦有勒為五銖者大小稱兩如一並徑七分重四銖三呉諸屬縣行之其文為五銖者京師亦頗用焉舊譜曰劉備與直百同時鑄文字輕重大小與漢五銖無異但五字居左銖字居右謂之𫝊形右大泉五百錢孫權嘉禾年鑄舊譜曰徑寸二分重十二銖文曰大泉五百洪遵曰余按此錢徑寸一分重四銖六絫今世有之右大泉當千錢孫權赤烏年鑄舊譜曰徑寸四今重十六銖文曰大泉當千洪遵曰余按此錢有二品大者徑寸五分重十二銖六絫字文夷漫輪郭重厚小者徑寸三分重七銖二絫舊譜所圖葢其小者以為重十六銖非也右四銖錢宋元嘉年鑄顔竣𫝊曰輪郭形製與五銖同用費損無利故百姓不盗鑄張台曰據所見背面皆有周郭徑七分重二銖已下文甚分明舊譜曰文曰四銖重如其文洪遵曰余按此錢徑七分重二銖四絫肉薄好濶背面皆有周郭字文甚明右當兩大錢宋元嘉年鑄舊譜曰重八銖右孝建錢舊譜曰徑八分半重四銖文曰孝建背文曰四銖孝建則薤葉四銖則大篆其後稍去四銖専為孝建漸至薄八文字夷漫至明帝泰始三年罷焉顧烜曰孝建元年鑄四銖錢一邊為孝建一邊為四銖洪遵曰余按此錢徑七分重二銖今世尚有之右二銖錢宋永光年鑄舊譜曰重如其文右景和錢宋景和年鑄金光襲曰其文小篆洪遵曰余按此錢李孝美不入譜烜梁人距宋不逺其説當審矣右鵞眼錢顧烜曰宋中廢帝景和元年鑄右五銖錢肉好周郭文曰五銖重如其文顧烜曰天監元年鑄徑一寸文曰五銖重四銖三絫二黍每百枚重一斤二兩張台曰五銖錢皆無好郭惟此一種有之李孝美曰按此錢亦多見之復有一種徑八分重三銖形製惟肖而面漫薄惡疑當時所盗鑄者右公式女錢隋書食貨志曰梁武帝又别鑄五銖除其肉郭謂之女錢徑一寸張台曰背有好郭者謂之公式女錢背無好郭者正謂之女錢葢聽民私鑄有不精也右五銖鐡錢梁普通年鑄顧烜曰五銖鐡錢徑一寸一分文曰五銖背為四出文洪遵曰余按此錢今世有之輪郭重厚字蹟微漫背文四出徑七分重三銖六絫右大吉錢普通年鑄顧烜曰錢大小輕重如銖文曰五銖大吉背文四出右大通錢普通年鑄顧烜曰大小輕重如五銖文曰五銖大通背文四出右大富錢普通年鑄顧烜曰大小輕重如五銖大富背文四出右當十錢梁元帝時鑄右四柱錢梁太平年鑄右五銖錢陳天嘉年鑄右大貨六銖錢陳太建年鑄洪遵曰余按此錢製作精妙肉皆有周郭徑寸重如其文右太和五銖錢後魏太和年鑄洪遵曰余按此錢徑八分重如其文銅質粗惡字文湮漫計當時令民自鑄故其製不精也右五銖錢永平年鑄右永安五銖錢永安年鑄舊譜曰徑九分文曰永安五銖重如其文李孝美曰此錢徑八分周郭完厚所見至多右永安土字錢面文永安五銖幕文有一土字徑九分重二銖四絫銅色純赤輪濶皆夷計後魏所鑄右五銖錢大統年鑄舊譜曰以赤銅鑄右永安五銖錢齊神武帝鑄右常平五銖錢北齊天保年鑄舊譜曰徑八分李孝美曰此錢徑寸舊譜列在偽品右布泉錢後周保定年鑄舊譜曰徑寸其文左曰布右曰泉皆玉筋篆非男錢也右大布錢建徳年鑄舊譜曰徑寸一分張台曰此錢小者至徑六分其舊錢之文上五下行左大右布又有大布字飜在上下者右永通萬國錢大象年鑄舊譜曰徑寸三分重十二銖背面肉好皆有周郭又有徑寸二分半重八銖己下者張台曰此錢輪郭與布泉相似其小省至徑七分亦有輪郭濶厚及對文者李孝美曰此錢又有徑寸五分重十八銖背面皆有此四字者銅色青白製作尤佳右白錢隋開皇年鑄背面肉好皆有周郭文曰五銖而重如其文每一千重四斤二兩唐書食貨志曰隋行五銖白錢舊譜曰徑一寸重一銖六黍肉郭平濶五字右邊傍好有一畫餘三面無郭用鑞和鑄故錢色白右開元錢唐武徳年鑄新唐書食貨志曰徑八分重二銖四絫積十錢重一兩得輕重大小之中其文以八分篆𨽻三體李孝美曰此錢元字次畫端或有挑向左者世謂之左挑而俗甚愛重背文亦有兩甲㾗者銅色黒濁不至精好詳考此錢郭有大小肉有輕重皆嵗久適然凡八分篆𨽻三品而皆有甲文者製作精好今世尤多李孝美獨圖其一失之畧矣右乾封錢新唐書食貨志曰徑寸重二銖六分右乾元十當錢乾元年使第五倫鑄食貨志曰徑一寸每緡重十斤舊譜曰徑寸二分重五銖李孝美曰此錢今多大小不同寸二分至七分相較一分凡六品字體形製畧異右重輪錢第五琦復命鑄徑一寸二分其文亦曰乾元重寶背之外郭重輪每緡重十二斤舊譜曰徑二寸四分重十二銖李孝美曰此錢有兩品小者至薄而文字昏暗徑寸重五銖大者極厚而製作精好徑寸五分重十四銖與唐志舊譜所載不同右小乾元錢洪遵曰余按此錢重三銖三絫徑與開元錢同今世所存至多計肅宗所鑄而史氏疏畧不載大元厯錢張台曰大厯是代宗年號計此時所鑄洪遵曰余按此錢徑九分重三銖六絫銅色昏濁字畫遒勁右開元大錢徑寸二分重十二銖六絫右建中錢張台曰按此錢未施用今民間往往有之輕小于開元錢徑十分重二銖以下文曰建中通寶文字漫暗銅色純赤肉好薄小殊乖白銅大錢之義右新開元錢背文右咸通錢右天成錢洪遵曰余按此錢徑九分重三銖六絫文曰天成元寶計當時所鑄而五代史後唐紀不載右天福錢洪遵曰余按此錢徑七分重二銖四絫銅質薄小字文昏昧葢以私鑄不精也右漢通錢洪遵曰余按此錢徑寸重三銖六絫文曰漢通元寶字文明坦製作頗精葢懲天福之弊則漢代所鑄明矣右周通錢鄭向五代開皇紀曰顯徳二年九月甲寅詔禁天下銅器始議鑄錢偽品右項梁錢右呉王濞錢西京雜記曰呉有銅山鑄錢錢微重文字肉好與漢錢不異洪遵曰余按漢文帝時更鑄錢其文為半兩呉鄧錢文字與漢錢同則錢之半兩也右鄧通錢西京雜記曰文帝賜鄧通蜀銅山聽自鑄錢文字肉好與天子錢同故富侔人主右大錢漢書食貨志曰王莽居攝變漢制更造大錢徑寸二分重十二銖文曰大錢五十敦素曰按今所見模狀不同字體各異小者不及二銖又有面文重外髙内下精妙可觀殊不知莽之所鑄復是後人倣傚何不相同也如此張台曰此錢亦有數種有對文者有穿上一星者有泉字諸畫並方者右小錢五等荀悦漢紀曰王莽建國元年春更作小錢徑六分文曰小錢與大錢一直五十者為二品並行封氏幺錢别種文曰直十張台曰嘗見壯錢薄于開元錢右貨泉錢王莽天鳳年鑄食貨志曰徑一寸重五銖文右曰貨左曰泉枚直一張台曰此錢今世所見有徑寸四分重二十四銖者有徑六分重二銖者有玉筯篆者有𫝊形者有肉郭重文者穿面四角决文穿背四角决文穿上一星穿下一星濶縁細縁不少于五銖李孝美曰此錢今世多見有徑寸五分至四分者十餘品而好郭或有或無或作重文種種不一右鐡錢公孫述鑄舊譜曰文字輕重大小未聞右小錢初平年董卓鑄右五銖錢董卓鑄右沈郎錢呉興沈充鑄舊譜曰或言小于五銖文字輕重未聞右五銖錢晉張軌納太府㕘軍索輔言立制凖布用錢右河陽錢三國王則鑄右得壹錢唐史思明鑄舊譜曰徑寸三分重十三銖洪遵曰余按此錢重十二銖六絫右順天錢史思明改鑄舊譜曰徑寸五分重十五銖李孝美曰二錢如一但順天重而得壹輕洪遵曰余按此錢重十三銖二絫右永通錢南唐鍾謨請鑄洪遵曰余按此錢有三品字八分書者徑寸五分重八銖七絫背面肉好皆有周郭篆文者徑寸三分重五銖七絫輪郭重厚銅色昏暗又有面為篆文背為龍鳳形者此錢見竒品計皆李氏所鑄李孝美獨載八分書者遺此一種豈未之見耶右開元錢洪遵曰余按此五錢制度大小各殊有徑九分重三銖者有徑七分重二銖二絫者字文並類大唐錢有徑寸二分重八銖與徑九分重三銖者形製相肖文皆篆字有徑八分重二銖六絫者字合八分及𨽻體背文有圓㸃于五錢中最少又有小唐國鐡錢重二銖八絫形製肖銅錢之小者右大唐錢洪遵曰余按此錢徑八分重二銖四絫文曰大唐通寶又有徑七分者字文相類豈當時盗鑄耶右永平錢五代史前蜀世家曰王建武成三年十二月大赦改明年元為永平右通正錢五代史前蜀世家曰王建永平五年改元通正右天漢錢五代史前蜀世家曰王建通正元年十月大赦改明年元曰天漢國號漢右光天錢五代史前蜀世家曰王建天漢元年十二月大赦改明年元曰光天右乾徳錢五代史前蜀世家曰王建卒子衍立明年改元乾徳右咸康錢五代史前蜀世家曰王衍乾徳七年改元曰咸康李孝美曰按此五錢文皆王氏父子年號計當時所鑄並徑七分重五銖形製粗惡今世所存甚多洪遵曰余按通正天漢光天乾徳錢皆重三銖獨咸康錢重三銖三絫右廣政錢五代史後蜀世家曰孟昶明徳五年改元曰廣政十國紀年後蜀史曰蜀主昶明徳三年十二月丁亥申嚴錢禁明年改元廣政洪遵曰余按此錢計當時所鑄徑九分重三銖銅質渾厚字八分書右鐡錢一十國紀年後蜀史廣政二十五年以屯戍既廣調度不足始鑄鐡錢右乾亨錢五代史南漢世家曰梁貞明三年劉龔即位國號大越改元曰乾亨李孝美曰此錢文曰乾亨重寶徑七分重六銖疑當時所鑄洪遵曰余按此錢止重三銖六絫右鉛錢十國紀年漢史曰劉龔以國用不足鑄鉛錢十當銅錢一洪遵曰余按鉛錢有二品輪廓鍥薄文曰乾亨重寶大者徑寸重三銖九絫重寶二字𫝊形小者徑九分重三銖六絫余抵嶺外始獲此錢若銅錢今世所存至多右乾封錢五代史楚世家曰髙郁諷馬殷鑄鉛鐡錢以十當銅錢一洪遵曰余按此錢徑寸七分重十七銖圍五寸半文曰乾封泉寶以銅為之而楚史湖南故事以為鐡錢豈當時鑄銅錢二種耶右天策錢五代史楚世家曰馬殷請依唐太宗故事開天策府梁太祖拜殷天策上將軍張台曰馬氏錢也洪遵曰余按此錢文曰天策府寶徑寸七分重三十銖二絫銅質輝重字文明坦史氏失其𫝊張董之説當有所慿也右呉越錢王俶議鑄右鉛錢王審知為閩王時鑄右鐡錢王審知鑄右永隆錢洪遵曰余按此錢徑寸四分重十銖三絫文曰永隆通寶字文夷漫製作不精以銅為之五代史不載錢文十國史又遺銅品此錢計當時所鑄右天徳錢董逌曰建州王氏錢面文天徳重寶背文穿上有殷字洪遵曰余按王延政以建州建國稱殷故幕文為殷字通寶重寶之異亦當時鑄此二品耳右大興錢董逌曰張台云馮洪所鑄右土錢宋白續通典曰劉仁恭造泥錢號為山庫陶岳貨泉録曰劉仁恭下令境内以泥為錢以膠泥固濟而鍜之大抵類甆様度麤鹵右應天錢董逌曰幽州劉守光錢而文曰應天元寶背文曰萬錢通卷六
