body:
  text: 錢通卷二十五明胡我琨撰論䇿二丘濬曰臣按天立君以子民付之利權使其通融以濟天下非專以為一家一人用也所以通百物以流行於四方者幣也金銀之屬細分之則耗布帛之屬片析之則廢惟鑄銅以為錢物多則予之以多物少則予之以少惟所用而皆得焉且金銀出於天幣帛成於人錢也者合天人以成其器銅天生者也銅而成錢則人為之矣自古論錢法者多矣惟南齊孔顗所謂不惜銅不愛工此二語者萬世鑄錢不易之良法也銅出於天吾無所惜工成於人吾無所愛則其錢之為錢體質厚而肉好適均製作工而輪郭周正造一錢費一錢本多而工費雖驅之使鑄彼亦不為矣况冐禁犯法而盜為之哉然自太府圜法以來以銅為泉或為半兩或為榆莢或為八銖或為四銖不知幾變矣惟漢之五銖為得其中五銖之後或為赤仄或為當千或為鵞眼綖環或為荇葉又不知其幾變矣惟唐之開元為得其中二者之外或以一當三或以一當十或以一當百然皆行之不久而遽變惟其質製如開元者則至今通行焉惜乎世道降而巧偽滋古錢之存於世者無幾凡市肆流行而通使者皆盜鑄之偽物耳其文雖舊其器則新律非無明禁也彼視之若無作之者無忌用之者無疑銷古以為今廢眞而售贗滔滔皆然卒莫如之何也已矣為今之計莫若拘盜鑄之徒以為工收新造之錢以為銅本孔顗之說别為一種新錢以新天下之耳目通天下之物貨革天下之宿弊利天下之人民今請先勑所司遣人分行天下緝訪盜鑄所在親臨其地拘集其人免其人罪罰就於其私鑄之所立塲開鑪就用其徒以為工作見丁着役著籍定期給廪以食之置官以督之如此則鑄作之工不徵於民而得之矣次敕内帑精選唐宋以來眞錢如開元太平之類得百萬發下户部分散天下於闤闠市集所在用繩聯貫古錢百文隨處懸掛以為式様使小民知如此様者是為舊錢非此様者亦皆俾其具數赴官首告官即收之每偽錢十斤量償以新錢六七斤則民不失利官得其用如此則鼓鑄之銅不求之民而得之矣雖然貧民之家僅有千百之錢恃此以為生計一日無之則失所恃矣官府改造動經嵗月彼安能待哉請于未出令之先預令内外帑藏拘刷無用之銅器没入之偽錢盡行送赴開鑪去處照様錢鑄造一年之後新錢既成方行倒換之令倒換既多次第改造不出十年偽錢盡矣夫然則天下所用者皆前代之眞劑今日之新規行之既久雖不能保其無弊然亦可以持循百年有利而無害焉所以為新製者當如何曰每錢以十分為重中間泉文必以古篆或用年號或别製佳名其漫加識以楷書二字上書皇下書明輪郭之旁週廻鑿以花紋每文計用銅十五分剉磨之餘去五而存十新錢既成之後又令天下輸舊錢于官以易新者將所得舊錢周以細紋錢如新錢製其漫亦剗以兩字或兩旁或上下然後散之仍誥天下非此二様錢不許用而又申明廢銅赴官中賣之律鉟銷為器者有禁漏出外國者有刑如此則錢法流通而公私俱便矣或曰凡興作必約工計本今耗銅而費工其多如此國家何利之有臣故曰天立君以子民付之利權使之通融以濟天下非專以為一家一人用也皇明經濟錄蘇轍曰太祖用李漢超馬仁瑀韓令坤賀惟忠何繼筠等五人使備契丹用郭進武守琪李謙溥李繼勲等四人使備河東用趙贊姚内斌董遵誨王彦昇馮繼業等五人使備西羌皆厚之以關市之征饒之以金帛之賜其家屬之在京師者仰給于縣官貿易之在道路者不問其商稅故此十四人者皆富厚有餘其視棄財如棄糞土賙人之急如恐不及是以死力之士貪其金錢捐軀命冐患難深入敵國刺其陰計以效之至于飲食動靜無不畢見每有入冦輙先知之故其所備者寡而兵力不分是以當此之時備邊之兵多者不過萬人少者五六千人以天下之大而三十萬兵足為之用今則不然一錢以上皆籍于三司有敢擅用謂之自盜而所謂公使錢多者不過數千緡百須在焉而監司又伺其出入而繩之以法至于用間則曰官給茶綵夫百餅之茶數束之綵其不足以易人之死也明矣是以今之為間者皆不足恃聽傳聞之言採疑似之事其行不過于出境而所聞不過于熟户茍可信口以欺其將帥則止矣非有能知敵之至情者也大學衍義補為人後者為其父母服自三代以來有天下國家者莫不用之而晉氏不用也出帝之于敬儒絶其父道臣而爵之非特以其義不當立不得已而絶之葢亦習見閭閻鄙俚之所為也五代干戈賊亂之世也禮樂崩壞三綱五常之道絶如寒食野祭而焚紙錢天子而為閭閻鄙俚之事者多矣歐陽修晉出帝論中尉脫卒動數萬人王溫舒樂安隱田幾四百頃康衡闗東流民無名者四十萬石慶少府陂澤多為貴戚冐墾石顯版籍甚不明而口算田租所入甚無定數也近稅武闗以給守卒遠田車師以給過使上武紀下西域公車索米于長安東方朔掖庭出私錢以養宗室丙吉郎官出私錢以市財用揚惲劑劵甚不明而廪祿所給甚無定所也會稽計籍三年不上嚴助内史假貨殖多不入倪寛東郡官錢放散至千餘萬韓延壽乘傳而行郡國矯賦至六百萬賈誼課最甚不嚴而州縣所供甚鹵莾而無定期也乘輿賜竭取給大農食貨大農錢盡續以少府賈誼平陵工作取諸水衡宣紀私用經費甚不常而緩急所移用甚紊亂而無定制也以至無額雜賦羡租之積尤為泛然無統如贖罪之錢儲于北軍江充無名之錢儲于郡内張安世卒吏之錢寄于州郡東海廪犧之錢寄于馮翊韓延壽軍市之租委于邊吏馮唐則其涣散尚未有易究者執掌之官吏出入之司尤存不聞有奉公亷平者糴邉穀百萬而虚數至六十萬斛趙充國僦民牛車而增價至三十萬田延年甚者或私僦賓客而入多逋負鄭當時則其轉移侵藉尚有未易悉數者鄭伯謙計會論按昔人有言買田者志于吞併故必須上之人立法以限其頃畆蓄錢者志于流通初不煩上之人立法以敎其懋遷也憲宗徒以錢重物輕之故立蓄錢之限不亦甚乎大學衍義補丘濬恤民䟽若遇饑歉之年民有鬻子者官為買之每一男一女費以五緡以上為率量與所賣之人以為養贍之計用其所餘之貲以為調養之費因其舊姓賜以新名傳送邉郡編為隊伍給以糧賞配之軍士之家俾其養育死者不許勾丁如此既得以全其姓名又得以濟其父母内郡不耗邊城充實是于救荒之中而有實邊之效或者若謂國家府庫有限費無所在惟今江南之人有謫戍西北二邉者勾丁補伍有如棄市及至戍所多不得用今後遇有荒歲預借官錢買之待後于江南民户有𨽻戎伍于極邉者願出五百緡以上者除其户籍出二百緡以上者改𨽻近衛如此則除一軍得百軍移一軍得四十軍隨以所得抵數還官數十年之後邉境之軍日增而南方之伍亦不缺矣皇明經濟錄自開闢以來東南財用之饒見諸載史者莫盛于唐而宋猶且加增數倍唐時歲運東南粟以實闗中不贏二百萬石而宋朝漕運大增歲至六百餘萬石唐朝出銅鐵銀錫之冶凡六州而五在江浙宣潤饒衢信州歲鑄錢多止于十數萬緡而宋朝鼓鑄大增歲至百餘萬緡唐朝鹽利初不過四十萬緡至劉晏幹盡其利常增至六百萬緡鹽不常有而宋朝鹽利大增多至歲二千萬緡而海鹽之利居多茶利興自唐季正元中始定之額得四十萬緡自後代有增加終唐世不過倍正元之額而宋茶利大增歲至二百二十萬緡而皆在東南此皆熈豐以前國家常賦之歲額也戴至德謂王福畤曰高陽公任遇如是何以謚之為繆對曰昔何曾既忠且孝徒以日食萬錢秦秀謚之曰繆許敬宗忠孝不加于曾而飲食男女之累過之謚之曰繆不負許氏矣大學衍義補林駉曰唐府兵之制當給馬者官與其直市之每匹錢二萬五千刺史折衝果毅歲周不任戰者鬻之以其錢更市不足則府供之此給錢以市也至府兵漸壞兵貧難致乃給以監牧之馬此給馬以用也大抵唐之馬政皆給于官民無與焉同上趙孟頫曰始造鈔時以銀為本虚實相權今二十餘年間輕重相去數十倍故改中綂為至元又二十年至元必復如中統使民計鈔抵法疑於太重古者以米絹民生所須謂之二實銀錢與二物相權謂之二虚四者為直雖升降有時終不大相逺也以絹計贓最為適中况鈔乃宋時所創施於邉郡金人襲而用之皆出於不得已廼欲以此斷人死命似不足深取也左編今郡縣之吏方以青苖錢為殿最又青苗錢未足未得催二稅郡縣吏懼其黜免思自救解其材者猶能小為方略以強民其下者直以威力刑罰督迫之如此民安得不請安得不納而謂其願而不可止者吾誰欺欺天乎在唐之時皇甫鎛裴延齡用此術致位公相雖然二人者猶不敢避其聚歛之名不如介甫直以周公聖人為證上則使人主無疑下則使廷臣莫敢非若是乎周公之為桀跖嗃矢桁楊接槢也商鞅為秦變法其後夷滅張湯為漢變法後亦殺為法逆於人心未有保終吉者也且朝廷取青苗之息專為備百姓不足至其盈溢能以代貧下賦役乎府庫既滿我且見其不復為民矣外之則尚武開斥境土内之則廣游觀崇益宫室鄙語曰富不學奢而奢自至自然之勢也介甫一舉事其敝至此可無念哉可無念哉劉攽與王介甫書唐魏元忠曰自仁貴等覆師䘮氣故虜得跳梁上谷又師行必藉馬力不數十萬不足與虜爭臣請天下自王公及齊人挂藉之口人稅百錢又施天下馬禁使民得乘大馬不為數限官藉其凡勿使得隱不三年人閒畜馬五十萬即詔州縣以所稅口錢市之盜者剟寢户之簾搴兩廟之器白晝大都之中剽吏而奪之金矯偽者出幾十萬石粟賦六百餘萬錢乘傳而行郡國此其亡行義之尤至者也經濟編今天下食祿之家凡有八入臣請為陛下數之節度使奏改一入也用錢買官二入也諸色功優三入也從武入文四入也虚銜入仕五入也改偽為真六入也媚道求進七入也無功受賞八入也國有九破陛下知之乎終年聚兵一破也蠻夷熾興二破也權豪奢僭三破也大將不朝四破也廣造佛寺五破也賂賄公行六破也長吏殘暴七破也賦役不等八破也食祿人多輸稅人少九破也臣聞自古帝王終日勸農猶恐其飢終日勸桑猶恐其寒此軰不農不桑坐食天下欲使天下之人盡為將士矣舉國之人盡為僧尼矣舉國之人盡為刼賊矣欲使誰人蠶桑乎今天下蒼生凡有八苦陛下知之乎官吏苛刻一苦也私債徵奪二苦也賦稅繁多三苦也所在乞歛四苦也替逃人差科五苦也寃不得理屈不得申六苦也凍無衣饑無食七苦也病不得醫死不得葬八苦也仍有五去勢力侵奪一去也奸吏隱欺二去也破丁作兵三去也降人為客四去也避役出家五去也人有五去而無一歸人有八苦而無一樂國有八破而無一成官有八入而無一出凡有三十餘條上古已來未之有也天下百姓哀號于道路逃竄于山澤夫妻不相活父子不相救百姓有寃訴于州縣州縣不理訴于宰相宰相不理訴于陛下陛下不理何以歸哉伏見蠻冦欺侵神道誑惑我國家作亡命之渠魁為逋逃之窟穴徵兵五年今日誅之何見之晚也臣聞却以未終銷兵于當時本無養兵日為亂臣張本也今不除其亂本而除其亂苗士卒蕩盡于中原玉帛多亡于道路猶以為上䇿臣恐今年除一承嗣明年又生一承嗣天下征戰未有了期則禍難起于腹心蜂蠆生于手足陛下左右無人敢言但知潤色美詞悅情暢志而已豈知千里零落萬里凋殘者哉今國家狼戾如此天下知之陛下獨不知之天下不敢言臣獨言之萬死一生臣死一介之命救萬民之命臣今雖死猶勝于生臣獻策千條未䝉一問覊孤貧病流落風塵眷戀朝廷而不能去儻陛下覽臣愚見知臣愚忠則理亂斯須存亡瞬息太平之日昭然目前必也陛下不以萬國為心不以百姓為本臣當幸歸滄海葬江魚之腹不忍見國難微臣之願畢矣臣懇擗不勝痛切感懼之至同上主帥剝偏裨偏裨剝隊伍有日給千錢而不足衾絮者有月廪數斛而不飽糟糠者以此飾苞苴以此買歌舞于是乎兵貧至骨矣眞德秀應䇿論當今事勢夫大農之家建田阡陌積粟萬斛兼陂池之利并林麓之饒則其居必卜于郊野大賈之室歛散金錢以逐十一之利出納百貨以收倍稱之息則其居必卜于市區何則所操之術殊則所托之地異矣論大梁可都禆編唐有鹽池十八井六百四十皆𨽻度支蒲州安邑解縣有池五總曰兩池歲得鹽萬斛以供京師鹽州五原有烏池白池瓦池細項池靈州有温泉池兩井池長尾池五泉池紅桃池囬樂池私靜池㑹州有沔池三州皆輸米以代鹽安北都䕶府有胡洛池歲得鹽萬四千斛以給振武天德黔州有井四十一成州嶲州井各一果閬開通井百二十三山南西院領之卭眉嘉有井十三劔南西川院領之梓遂綿合昌渝盧資榮陵簡有井四百六十劍南東川院領之皆隨月督課幽州大同横野軍有鹽屯每屯有丁有兵歲得鹽二千八百斛下者千五百斛負海州歲免租為鹽二萬斛以輸司農青楚海滄𨽻杭蘇等州以鹽價市輕貨亦輸司農天寳至德間鹽每斗十錢乾元元年鹽鐵鑄錢使第五琦初變鹽法就山海井竈近利之地置鹽院游民業鹽者為亭户免雜徭盜鬻者論以法及琦為諸州𣙜鹽鐵使盡㩁天下鹽斗加時價百錢而出之為錢一百一十自兵起流庸未復稅賦不足供費鹽鐵使劉晏以為因民所急而稅之則國足用于是上鹽法輕重之宜以鹽吏多則州縣擾出鹽鄉因舊鹽置吏亭户糶商人縱其所之江嶺去鹽逺者有常平鹽每商人不至則減價以糶民官收厚利而人不知貴晏又以鹽生霖潦則鹵薄暵旱則土溜􅀈及隨時為令遣吏曉導倍于勸農吳越揚楚鹽廪至數千積鹽二萬餘石有漣水湖州越州杭州四塲嘉興海陵鹽城新亭臨平蘭亭永嘉大昌侯官富都十監歲得錢百餘萬緡以當百餘州之賦自淮北置巡院十三曰揚州陳許汴州廬壽白沙淮西甬橋浙西宋州泗州嶺南兖鄆鄭滑捕私鹽者姦盜為之衰息然諸道加𣙜鹽錢商人舟所過有稅晏奏罷州縣率稅禁堰埭邀以利者晏之始之也鹽利歲纔四十萬緡至大厯末六百餘萬緡天下之賦鹽利居半宫闈服御軍饟百官祿俸皆仰給焉明年而晏罷貞元四年淮西節度使陳少游奏加民賦自此江淮鹽每斗亦增二百為錢三百一十其後復增六十河中兩地鹽每斗為錢三百七十江淮豪賈射利或時倍之官收不能過半民始怨矣劉晏鹽法既成商人納絹以代鹽利者每緡加錢二百以備將士春服包佶為汴東水陸運兩稅鹽鐵使許以漆器瑇瑁綾綺代鹽價雖不可用者亦高估而售之廣虚數以罔上亭户冐法私鬻不絶巡捕之卒遍于州縣鹽估益貴商人乘時射利逺鄉貧民困高估至有淡食者其後有以穀數斗易鹽一升私糴犯法未嘗少息順宗時始減江淮鹽價每斗為錢二百五十河中兩池鹽斗錢三百增雲安漁陽塗􅀢三監其後鹽鐵使李錡奏江淮鹽斗減錢十以便民未幾復舊方是時錡盛貢獻以固寵朝廷大臣皆餌以厚貨鹽鐵之利積于私室而國用耗屈𣙜鹽法大壞多為虚估率千錢不滿百三十而已兵部侍郎李巽為使以鹽利皆歸度支物無虚估天下糶鹽稅茶其贏六百六十五萬緡初歲之利如劉晏之季年其後則三倍晏時矣兩地鹽利歲收百五十餘萬緡四方豪商猾賈雜處解縣主以郎官其佐貳皆御史鹽民田園籍于縣而令不得以縣民治之憲宗之討淮西也度支使皇甫鎛加劍南東西兩川山南西道鹽估以供軍貞元中盜鬻兩池鹽一石者死至元和中減死流天德五城鎛奏論死如初一斗以上杖背没其車驢能捕斗鹽者賞千錢州縣團保相察比于貞元加酷矣自兵興河北鹽法覊縻而已至皇甫鎛又奏置𣙜鹽使如江淮𣙜法犯禁歲多及田宏正舉魏博歸朝廷穆宗命河北罷𣙜鹽户部侍郎張平叔議𣙜鹽法弊請糶鹽可以富國詔公卿議其可否中書舎人韋處厚兵部侍郎韓愈條詰之以為不可平叔屈服宣宗即位茶鹽之法益宻以壕籬者鹽池之隄禁有盜壞與鬻鹻皆死鹽盜持弓矢者亦皆死刑判度支周墀又言兩池鹽盜販者迹其居處保社按罪鬻五石市二石亭户盜糶二石皆死是時江吳羣盜以所剽物易茶鹽不受者焚其室廬吏不敢枝梧鎮戍塲鋪堰埭以闗通致富宣宗乃擇嘗更兩畿輔望縣令者為鹽院官其後兵遍天下諸鎮擅利兩池為河中節度使王重榮所有歲貢鹽二千車中官田令孜募新軍五十四都運轉不足乃倡議兩池復歸鹽鐵使而重榮不奉詔至舉兵反僖宗為再出然而卒不能奪德宗時户部侍郎韓洄建議山澤之利宜歸王者自是皆𨽻鹽鐵使元和初天下歲采銀萬二千兩銅二十六萬六千斤鐵二百七萬斤錫五萬斤鉛無常數開成元年復以山澤之利歸州縣刺史選吏主之其後諸州牟利以自殖舉天下不過七萬餘緡不能當一縣之茶稅及宣宗增河湟戍兵衣絹五十二萬餘疋鹽鐵轉運使裴休請復歸鹽鐵使以供國用大學衍義補鹽之類有二引池而成者曰顆鹽周官所謂盬鹽也煑海煑井煑鹻而成者曰末鹽周官所謂散鹽也宋自削平諸國天下鹽利皆歸縣官官鬻通商隨州郡所宜然亦變革不常而尤重私販之禁咸平中度支使梁鼎言陜西沿邉解鹽請勿通商官自鬻之杜承睿言鄜延環慶儀渭等州自禁青鹽之後今商人入芻䍘運解鹽于邉貨鬻其直與青鹽不至相懸是以民食賤鹽須至畏法而蕃部青鹽難售今聞運解鹽于邉欲與内地同價邉民必冐法圖私却入蕃界私販青鹽是助㓂資而結民怨矣詔罷之天聖八年上書者言縣官禁鹽得利㣲而為害博兩池積鹽為阜其上生木合抱數莫可較宜聽通商平估以售可以寛民力詔翰林學士盛度御史中丞王隨議更其制度因畫通商五利上之十月詔罷𣙜法聽商人入錢若金銀京師𣙜貨務受鹽兩池行之一年增緡錢十五萬貫自元昊反聚兵西鄙並邉入中芻粟者寡縣官急于兵食調發不足因聽入中芻粟予劵趨京師𣙜貨務受錢若金銀入中他貨與劵償以池鹽繇是羽毛筋角膠漆鐵炭瓦木之類一切以鹽易之猾商貪吏表裏為奸至入椽木二估錢千給鹽一大席為鹽二百二十斤虚費池鹽不可勝計鹽直益賤販者不行公私無利咸平四年秘書丞孫冕請令江南荆湖通商賣鹽緣邉折中糧草在京入納金銀錢帛且免和雇車乘差擾民户詔吏部侍郎陳恕等議恕等謂江湖官賣鹽葢近煑海之地欲息犯禁之人今若通商住賣官鹽立乏一年課額冕議遂寢至天禧初始募人入緡錢粟帛京師及淮浙江南荆湖州軍易鹽明道二年叅知政事王隨建言淮南鹽初甚善自通泰楚運至眞州自眞州運至江浙荆湖綱吏舟卒侵盜販鬻從而雜以沙土渉道愈遠雜惡殆不可食吏卒坐鞭笞徒配相繼而莫能止比歲運河淺涸漕輓不行逺州村民頓乏鹽食而淮南所積一千五百萬石至無屋以貯則露積苫覆歲以損耗又亭户輸鹽應得本錢或無以給故亭户貧困徃徃起為盜賊其害如此願權聽通商三五年使商人入錢京師又置折博務于揚州使輸錢及粟帛計直予鹽鹽一石約售錢二千則一千五百萬石可得緡錢三千萬以資國用一利也江湖遠近皆食白鹽二利也歲罷漕運縻費風水覆溺舟人不䧟刑辟三利也昔時漕鹽舟可移以漕米四利也商人入錢可取以償亭户五利也詔知制誥丁度等議皆謂聽通商恐私販肆行侵蠧縣官請益漕船運至諸路使皆有二三年之蓄復天禧元年制聽商人入錢粟京師及淮浙江南荆湖州軍易鹽在通楚㤗海眞揚漣水高郵貿易者毋得出城餘州聽詣縣鎮毋至鄉村其入錢京師者增鹽予之并敕轉運司經畫本錢以償亭户詔皆施行景祐二年諸路博易無利遂罷而入錢京師如故康定元年詔商人入芻粟陜西並邉願受東南鹽者加數與之謂河北穀賤三司因請内地諸州行三税法亦以鹽代京師所給緡錢糴二十萬石至慶厯二年又詔入中陜東河東粟持劵至京師償以錢及金帛各半之不願受金帛者予茶鹽香藥惟其所欲而東南鹽利厚商旅皆願得鹽八年河北行四税法鹽居其一而並邉芻粟皆有虚估騰踊至數倍劵至京師反為蓄賈所抑鹽萬八斤舊售錢十萬至是六萬商人以賤估售劵取鹽不復入錢京師帑藏益乏皇祐二年復入錢京師法視舊錢數稍增予鹽而並邊入中先得劵受鹽者河東陜西入芻粟直錢十萬止給鹽直七萬河北又損為六萬五千且令入錢十萬于京師廼聽兼給謂之對貼自是入錢京師稍復故丘濬曰臣按泉府之設以泉為名蓋主泉布泉古錢字之官也古者以泉布流通天下之物無非以便民而已泉布出于上貨物生于民民之貨物不能以皆有也欲通其有無必資錢以易物然後無者各有焉然其物之聚也有多有少時之用物也有急有緩少而急于用則通多而不急于用則滯上之人因其滯也則以泉布收之俾其少而通焉所以厚民生也上既收之矣下之人或有所急而需焉則隨其厚價而賣之所以濟民之用也然買物必以價彼民之貧者無價以買官則或賖或貸與之賖則取償而不取息貸則按本以計其息所以不取息者應其䘮祭之急而必取息者限其浮浪之費也然其取息也則又不以錢而以力焉所謂國服為之息者償本之後以服役公家為息服如國中七尺及六十野自六尺及六十有五征之以供服役之服也凡若此者無非以阜民之財濟民之急而上之人無分毫利焉豈若王莾王安石之所為哉宋太祖時許商人入錢左藏庫以諸州錢給之而商旅先經三司投牒乃輸于庫所繇司計一緡私刻錢二十尋置便錢務邱濬曰臣按此即唐人飛錢之法此法今世亦可行之但恐奉行者于民之給受有停滯之弊于錢之出入有減換之弊耳宋𣙜茶之制擇要㑹之地曰江陵府曰眞州曰海州曰漢陽軍曰無為軍曰蘄州之蘄口為𣙜貨務六初京城建安襄復州皆置務後建安襄復州務廢京城務雖存但㑹給交鈔往還而不積茶貨産茶之州官自為塲置吏總之謂之山塲采茶之民皆𨽻焉謂之園户歲課作茶輸租餘則官悉市之其售于官者皆先受錢而後入茶謂之本錢又民歲輸稅願折茶者謂之折稅茶悉送六𣙜貨務鬻之民之欲茶者售于官給其日用者謂之食茶出境則給劵商賈貿易入錢若金帛京師𣙜貨務以射六務諸山塲茶給劵隨所射與之願就東南入錢若金帛者聽計直與茶如京師至道末鬻錢二百八十五萬二千九百餘貫天禧末增四十五萬餘貫天下茶皆禁唯川廣陜南聽民自賈賣禁其出境凡民茶折稅外匿不送官及私販鬻者没入之計其直論罪園户輙毁敗茶樹者計所出茶論如法舊茶園荒薄采之不充其數者蠲之當以茶代稅而無茶者許輸他物主吏私以官茶貿易及一百五百者死自後定法務從輕減茶之為利甚博商賈轉致于西北利嘗至數倍雍熙後用兵切于餽餉多令商人入芻糧塞下酌地之逺近而為其直取市價而厚增之授以要劵謂之交引至京師給以緡錢又移文江淮荆湖給以茶及夥末鹽端拱二年置折中倉聽商人輸粟京師優其直給茶鹽于江淮淳化三年秘書丞劉式等請罷諸𣙜務令商人就出茶州軍官塲筭買既大省輦運又商人皆得新茶西京作坊使楊允恭言商人市諸州茶新陳相糅兩河陜西諸州風土各有所宜非參以多品則少利罷𣙜務令就茶山買茶不可行太宗欲究其利害之說命宰相召鹽鐵使陳恕等與式允恭定議召問商人皆願仍舊式議遂寢二年淮南十二州軍鹽官鬻之商人先入金帛京師及揚州折博務者悉償以茶自是鬻鹽得實錢茶無滯積歲課增五十餘萬貫及南北和好罷兵邉儲稍緩物價差減而交引虚錢未改既以茶代鹽而買茶所入不補其給交引停積故商旅所得茶指期于數年之外京師交引愈賤至有裁得所入芻粟之實價官私俱無利仁宗時交引益賤京師裁直五千有司惜其費茶五年出内庫錢五十萬貫令閣門祗候李德明于京師市而毁之乾興以來西北兵費不足募商人入中芻粟如雍熙法給劵以茶償之後又益以東南緡錢香藥犀齒謂之三税而塞下急于兵食欲廣儲偫不愛虚估入中者以虚錢得實利人競趨焉及其法既弊則虚估日益高茶日益賤入實錢金帛日益寡而入中者非盡行商多其土人既不知茶利厚薄且急于售錢得劵則轉鬻于茶商獲利無幾茶商或以劵取茶或收蓄貿易以射厚利繇是虚估之利皆入豪商巨賈劵之滯積雖二三年茶不足以償而入中者以利薄不趨邉備日蹙茶法大壞初景德中丁謂為三司使嘗計其得失以謂邉糴纔及五十萬而東南三百六十餘萬茶利盡歸商賈當時以為至論厥後雖屢變法以捄之然不能亡敝天聖元年更定其法吕夷簡李諮首考茶法利害奏言十三塲茶歲課緡錢五十萬天禧五年緡及緡錢二十三萬每劵直錢十萬鬻之售錢五萬五千總為緡錢實十三萬除九萬餘緡為本錢歲纔得息錢三萬餘緡而官吏廪給雜費不預是則虚數多而實利寡請罷三税行帖射法其法以十三塲茶買賣本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息如鬻舒州羅源塲茶斤售錢五十有六其本錢二十有五官不復給但使商人輸息錢三十有一而已然必輦茶入官隨商人所指予之給劵辦驗以防私害故有貼射之名若歲課貼射不盡或無人貼射則官市之如舊園户過期而輸不足者計所負數如商人入息其入錢以射六務茶者如舊制商人入芻粟塞下者隨所在實估度地里逺近量增其直以錢一萬為率逺者增至七百近者三百給劵至今一切以緡錢償之謂之見錢法願得金帛若他州錢或茶鹽香藥之類者聽大率使茶與邉糴各以實錢出納不得相為輕重以絶虚估之弊朝廷皆用其說行之期年豪商大賈不能為輕重而論者謂邉糴償以見錢恐京師府藏不足以繼爭言其不便諮等因條上利害且言當遣官視陜西河北以鎮戎軍定州為率鎮戎軍入粟直二萬八千定州入粟直四萬五千納茶皆直十萬以蘄州市茶本錢視鎮戎軍粟直反亡本錢三之一得不償失弊在茶與邉糴相須為用故更今法以新舊二法較之舊用三稅法京師實入緡錢五十七萬有竒邉儲芻二百五萬餘圍粟二百九十八萬石用新法京師實入緡錢增一百四萬有竒邉儲芻增一千一百六十九萬餘圍粟增二百一十三萬餘石推行新法功緒已見詔有司榜諭商賈以推行不變之意然論者猶不已天聖三年詔翰林侍講學士孫奭等同究利害奭等言十三塲茶積而未售者六百一十三萬餘斤蓋計商人貼射則善者皆入商人其入官者皆粗惡不時故人莫肯售又園户輸歲課不足者使如商人入息而園户皆細民貧弱力不能給煩擾益甚又奸人倚貼射為名強市盜販侵奪官利其弊不可不革十月遂罷貼射法官復給本錢市茶然自奭等改制而茶法寢壞大約虚估居十之八米斗七百甚者千錢劵至京師為南商所抑茶每直十萬止售錢三千富人乘時收蓄轉取厚利三司患之請行貼買之法每劵直十萬北市估三千倍為六千復入錢四萬四千貼為五萬給茶直十萬詔又損錢一萬然亦不足以平其直久之劵比售錢三千者纔得二千往往不售北商無利入中者寡皇祐二年三司奏散于民間者既多所在積而不售故劵直亦從而賤茶直十萬舊售錢六萬五千今止二千以至香一斤舊售錢三千八百今止五六百公私兩失其利請復行見錢法一用景祐三年約束是時雖改見錢法而京師積錢少恐不足以支入中之費帝又出内藏庫錢帛百萬以賜三司久之入中者寢多京師帑藏益乏商人持劵以俟動彌歲月至損其直以售于蓄賈之家言利者請出内藏庫錢稍增價售之歲可得遺利五十萬緡既行而諫官范鎮謂内藏庫𣙜貨務皆領縣官豈有𣙜貨務故稽商人而令内藏乘時射利詔即罷之然自此並邉虚估之弊復起至和三年河北提舉糴便糧草薛向建議請罷並邉入粟自京輦錢帛至河北專以見錢和糴未數年論者謂輦運科析煩擾居民且商人入錢者少芻豆虚估益高茶益賤詔翰林學士韓絳等言自改法以來邉儲有備商旅頗通未宜輕變唯輦運之費悉從官給而本路舊輸稅絹者毋得折為見錢入中芻豆罷勿給茶所在平其市估至京償以銀紬絹自是茶法不復為邉糴所須而通商之議起矣初官既𣙜茶民私蓄盜販皆有禁臘茶之禁又嚴于他茶園户困于征取官司並緣侵擾天聖中有上書者言茶鹽課虧帝謂執政曰茶鹽民所食而強設法以禁之致犯者衆顧經費尚廣未能弛禁爾景祐中葉清臣上疏曰山澤有產天資惠民兵食不充財臣兼利草芽木葉私不得專封園置吏隨處立筦一切官禁人犯則刑既奪其資又加之罪黥流日報踰冐不悛使朝廷有聚歛之名官曹滋虐濫之罰皆商吏恊計倒持利權富人豪族坐以賈贏薄販下估日皆朘削臣竊嘗較計茶利所入以景祐元年為率除本錢外實收息錢五十九萬餘緡又天下所售食茶并本息歲課亦祗及三十四萬緡而茶商見通行六十五州軍所收稅錢已及五十七萬緡若令天下通商秪收稅錢自及數倍即𣙜務山塲及食茶之利盡可籠取又况不費度支之本不置𣙜易之官不興輦運之勞不濫徒黥之辟議者謂𣙜賣有定率征稅無彛準通商之後必虧歲計臣按管氏鹽鐵法計口受賦茶為人用與鹽鐵均必令天下通行以口定賦民獲善利又去嚴刑口數出錢人不厭取俱同上唐之始時授人以口分世業田而取之以租庸調之法其用之也有節蓋其畜兵以府衛之制故兵雖多而無所損設官有常員之數故官不濫而易祿貞觀中初稅草以給諸閑而驛馬有牧田太宗方銳意于治官吏考課以鰥寡少者進考如增户法失勸導者以減户論配租以歛穫早晚險易逺近為差庸調輸以八月發以九月同時輸者先逺民皆自槩量州府歲市土所出為貢其價視絹之上下無過五十匹異物滋味口馬鷹犬非有詔不獻有加配則以代租賦其凶荒則有社倉賑給不足則徙民就食諸州尚書左丞戴胄建議自王公以下計墾田秋熟所在為義倉歲凶以給民太宗善之乃詔畆稅二升粟麥秔稻隨土地所宜寛鄉歛以所種狹鄉據青苗薄而督之田耗十四者免其半耗十七者皆免之商賈無田者以其户為九等出粟自五石至于五斗為差下下户及夷獠不取焉歲不登則以賑民或貨為種子則至秋而償其後洛相幽徐齊并秦蒲州又置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著于令貞觀初户不及三百萬絹一匹易米一斗至四年米斗四五錢外户不閉者數月馬牛被野人行數千里不齎糧民物蕃息四夷降附者百二十萬人是歲天下斷獄死罪者二十九人號稱太平中書令李林甫以租庸丁防和糴春綵稅草無定法歲為㫖符遣使一告費紙五十餘萬條目既多覆問踰年乃與採訪朝集使議革之為長行㫖以授朝集使及送㫖符使歲有所支進畫附驛以達每州不過二紙凡庸調租資課皆任土所宜州縣長者涖定粗良具上中下三物之様輸京都有濫惡督中物之直二十五年以江淮輸運有河洛之艱而闗中蠶桑少菽粟常賤乃命庸調資課皆以米凶年樂輸布絹者亦從之河南北不通運州租皆為絹代闗中庸課詔度支減轉運太府卿楊崇禮句剝分銖有欠折漬損者州縣督選歴年不止其子愼矜專知太府次子愼名知京倉亦以苛刻結主恩王鉷為户口色役使歲進錢百億萬緡非租庸正額者積百寳大盈庫以供天子燕私及安祿山反司空楊國忠以為正庫物不可以給士遣侍御史崔衆至太原納錢度僧尼道士旬日得百萬緡而已自兩京䧟没民物耗敝天下蕭然肅宗即位遣御史鄭叔清等籍江淮蜀漢富商右族訾畜十收其二謂之率貸諸道亦稅商賈以贍軍錢一千者有稅于是北海郡錄事叅軍第五琦以錢穀得見請于江淮置租庸使吳鹽蜀麻銅冶皆有稅布輕貨繇江陵襄陽上津路轉至鳳翔明年鄭叔清與宰相裘冕建議以天下用度不充諸道得召人納錢給空名告身授官勲邑號度道士僧尼不可勝計納錢百千賜明經出身商賈助軍者給復及兩京平又于闗輔諸州納錢度道士僧尼萬人而百姓殘于兵盜米斗至錢七千鬻籺為糧民行乞食者屬路乃詔能賑貧乏者寵以爵秩故事天下財賦歸左藏而太府以時上其數尚書比部覆其出入是時京師豪將假取不能禁第五琦為度支鹽鐵使請皆歸大盈庫供天子給賜主以中官自是天下之財為人君私藏有司不得程其多少及吐蕃逼京師近甸屯兵數萬百官進俸錢又率户以給軍糧至大厯元年以國用急不及秋方苗青即征之號青苗錢又有地頭錢每畆二十通名為青苗錢初轉運使掌外度支使掌内永㤗二年分天下財賦鑄錢常平轉運鹽鐵置二使東都畿内河南淮南江東西湖南荆南山南東道以轉運使劉晏領之京畿闗内河南劍南山南西道以京兆尹判度支第五琦領之及琦貶以户部侍郎判度支韓滉與晏分治時囬紇有助收西京功代宗厚遇之與中國婚姻歲送馬十萬匹酬以縑帛百餘萬匹而中國財力屈竭歲負馬價河湟六鎮既䧟歲發防秋兵三萬戍京西資糧百五十餘萬緡而中官魚朝恩方恃恩擅權君臣猜間邉計兵食置而不議者幾十年而諸鎮擅地結為表裏日治兵繕壘天子不能繩以法顓留意扵祠禱焚帛玉寫浮屠書度支禀賜僧巫歲以鉅萬計然帝性儉約身所御衣必浣染至再三而生日端午四方貢獻數至千萬者加以恩澤朝多留事經歲不能遣置客省以居上封事不足采者蕃夷貢獻未報及失職未敘者食度支數千百人德宗即位用宰相崔祐甫拘客省者出之食度支者遣之歲省費萬計議者以租庸調高祖太宗之法也不可輕改而德宗方信用炎不疑也舊户三百八十萬五千使者按比得主户三百八十萬客户三十萬天下之民不土斷而地著不更版籍而得其虚實歲歛錢二千五十餘萬緡米四百萬斛以供外錢九百五十餘萬緡米千六百餘萬斛以供京師稅法既行民力未及寛而朱滔王武俊田悅合從而叛用益不給而借商之令出初太常博士韋都賔陳京請借富商錢德宗以問度支杜佑以為軍費裁支數月幸得商錢五百萬緡可支半歲乃以户部侍郎趙賛判度支代佑行借錢令約罷兵乃償之京兆少尹韋楨長安丞薛萃搜督甚峻民有不勝其寃自經者家若被盜然總京師豪人田宅奴婢之估裁得八十萬緡又取僦匱納質錢及粟麥糶于市者四取其一長安為罷市市民相率遮邀宰相哭訴盧把疾驅而過韋楨愳乃請錢不及百緡粟麥不及五百斛者免而所獲裁二百萬緡淮南節度使陳少游增其本道稅錢每緡二百因詔天下皆增之自太宗時置義倉及常平倉以備凶荒高宗以後稍假義倉以給他費至神龍中略盡元宗即位復置之其後第五琦請天下常平倉皆置庫以畜本錢至是趙賛又言自軍興常平倉廢垂三十年凶荒饋散餒死相食不可勝紀陛下即位京城兩市置常平官雖頻年少雨米不騰貴可推而廣之宜兼儲布帛請于兩都江陵成都揚汴蘇洪置常平輕重本錢上至百萬緡下至十萬積米粟布帛絲麻貴則下價而出之賤則加估而收之諸道津㑹置吏閱商賈錢每緡稅二十竹木茶漆稅十之一以贍常平本錢德宗納其䇿屬軍用迫蹙亦隨而耗竭不能備常平之積是時諸道討賊兵在外者度支給出界糧每軍以臺省官一人為糧料使主供億士卒出境則給酒肉一卒出境兼三人之費將士利之逾境而屯趙賛復請稅間架筭除陌常州刺史裴肅鬻薪炭案紙為進奉得遷浙東觀察使刺史進奉自肅始也劉賛卒于宣州其判官巖綬傾軍府為進奉召為刑部員外郎判官進奉自綬始也順宗即位乃罷宫市使及鹽鐵使月進憲宗又罷除官受代進奉及諸道兩稅外𣙜率分天下之賦以為三一曰上供二曰送使三曰留州宰相裴垍又令諸道節度觀察調費取于所治州不足則取于屬州而屬州送使之餘與其上供者皆輸度支是時因德宗府庫之積頗約費用天子身服澣濯及劉闢李錡既平訾藏皆入内庫是時河北兵討王承宗于是募人入粟河北淮西者自千斛以上皆授以官度支鹽鐵與諸道貢獻尤甚號助軍錢及賊平則有賀禮及助賞設物羣臣上尊號又有獻賀物穆宗即位一切罷之兩稅外加率一錢者以枉法賍論然自在藩邸時習見用兵之弊以謂戎臣武卒法當姑息及即位自神䇿諸軍非時賞賜不可勝紀已而幽州兵囚張宏靖鎮州殺田宏正兩鎮用兵置南北供軍院而行營軍十五萬不能亢兩鎮萬餘之衆而饋運不能給帛粟未至而諸軍或疆奪于道蓋自建中定兩稅而物輕錢重民以為患至是四十年當時為絹二匹半者為八匹大率加三倍豪家大商積錢以逐輕重故農人日困末業日增帝亦以貨輕錢重民困而用不充詔百官議革其弊而議者多請重挾銅之律自㑹昌末置備邉庫收度支户部鹽鐵物錢宣宗更號延資庫初以度支郎中判之至是以屬宰相其任益重户部歲送錢帛二十萬度支鹽鐵送者三十萬諸道進奉助軍錢皆輸焉懿宗時雲南蠻數内冦徙兵戍嶺南淮北大水征賦不能辦人人思亂及龎勛反附者六七萬自闗東至海大旱冬蔬皆盡貧者以蓬子為麵槐葉為虀乾符初大水山東飢中官令田令孜為神䇿中軍怙權用事督賦益急王仙芝黄巢等起天下遂亂公私困竭昭宗在鳳翔為梁兵所圍城中人相食父食其子而天子食粥六宫及宗室多飢死其窮至如此遂以亡唐志唐田賦大學衍義補錢通卷二十五
