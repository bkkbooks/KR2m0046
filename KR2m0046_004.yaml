body:
  text: 錢通卷四明胡我琨撰二之制王者尊八柄之法不征市而布作焉皆以質媺惡為輕重之紀而頒之邦國戒民侵儥巡而考其犯禁者罰之凡五布之有徴也者均而入於泉府各循修乃制故制曰二代更周景王二十一年將更鑄大錢單穆公曰不可王弗聽卒鑄之國語孫叔敖為楚相莊王以為幣輕更以小為大百姓不便相言之王復如故王許之史記秦兼天下幣為二等黃金鎰為名上幣上幣者二等之中黃金為上而錢為下也銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寶藏不為幣然各隨時而輕重通考史記秦本紀云惠文王立二年初行錢漢興以為秦錢重難用更令民鑄莢錢逐利之民蓄積餘贏以致市物騰涌米至石萬錢焉至匹百金漢史前漢髙后紀曰二年行八銖錢前漢髙后紀曰六年行五分錢顧烜曰髙后時既患莢錢之輕又苦秦錢之重故更鑄八銖錢前漢文帝紀曰五年夏四月除盜鑄令更造四銖錢前漢武帝紀曰建元元年春二月行三銖錢前漢武帝紀曰建元五年罷三銖錢行半兩錢前漢武帝紀曰元狩五年罷半兩錢行五銖錢前漢食貨志曰武帝又造銀錫白錢又鑄赤仄錢終廢不行史記平準書曰武帝鑄五銖錢郡國多姦鑄錢錢多輕而公卿請令京師鑄鍾官赤側一當五賦官用非赤側不得行其後二嵗赤側錢賤民巧法用之不便又廢于是悉禁郡國無鑄錢悉令上林三官鑄錢既多而令天下非三官錢不得行諸郡國所前鑄皆廢銷之輸其銅三官而民之鑄錢益少計其費不能相當惟真工大姦乃盜為之食貨志曰自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘光武紀曰建武十六年始行五銖錢注曰武帝始為五銖錢王莽時廢今始行之王莽居攝變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五十與五銖錢凡四品並行漢史莽以為書劉字有金刀乃罷錯刀契刀及五銖錢而更作金銀龜貝錢帛之品名曰寶貨小錢徑六分重一銖文曰小錢直一次七分三銖曰么錢一十么小也次八分五銖曰幼錢二十次九分七銖曰中錢三十次一寸九銖曰壯錢四十同前大錢五十是為錢貨六品直各如其文黃金重一斤直錢萬朱提銀重八兩為一流直一千五百八十它銀一流直千是為銀貨三品元龜岠冉長尺二寸直二千一百六十為大貝十朋公龜九寸直五百為壯貝十朋侯龜七寸以上直三百為公貝十朋子龜五寸以上直百為小貝十朋是為龜寶四品大貝四寸八分以上二枚為一朋直二百一十六壯貝三寸六分以上二枚為一朋直五十么貝二寸四分以上二枚為一朋直三十小貝寸二分以上二枚為一朋直十不盈寸二分滿度不得為朋率枚直錢三是為貝貨五品大布次布第布壯布中布差布厚布幼布么布小布長寸五分重十五銖文曰小布一百自小布以上各相長一分相重一銖文各以其布名直各加一百上至大布長二寸四分重一兩而直千錢矣是為布貨十品布亦錢凡寶貨五物六名二十八品鑄作錢布皆用銅殽以鏈錫許慎曰鏈銅屬也然則以鏈及雜銅而為錢也鏈音連文質周郭放漢五銖錢云其金銀與他物雜色不純好龜不盈五寸貝不盈六分皆不得為寶貨元龜為蔡非四民所得居有者入太卜受直其後百姓憒亂其貨不行民私以五銖錢市買莽患之下詔敢挾五銖錢者為惑衆投諸四裔于是農商失業食貨俱廢民涕泣于市道抵罪者不可稱數莽知民怨乃但行小錢直一與大錢五十二品並行龜貝布屬遂廢莽天鳳元年復中下金錢龜貝之貨頗增減其價直而罷大小錢改作貨布長二寸五分廣一寸首長八分有竒其廣八分其圓好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖直貨錢二十五貨泉徑一寸重五銖文右曰貨左曰泉枚直一與貨布二品並行又以大錢行久罷之恐民挾不止乃令民且獨行大錢與新貨泉俱枚直一並行盡六年毋得復挾大錢矣每一易錢民破業而陷刑莽以私鑄錢死及非沮寶貨投四裔犯法者多不可勝行乃更輕其法私鑄作泉布者與妻子沒為官奴婢吏及比伍知而不舉告與同罪非沮寶貨民罷作一歲吏免官犯者愈衆及五人相坐皆沒入郡國檻車鐵鎖傳送長安鍾官愁苦死者十六七文獻通考漢錢舊用五銖自王莽改革百姓皆不便之至光武中興除莽貨泉建武十六年馬援又上書曰富國之本在于食貨可如舊鑄五銖帝從之于是復鑄天下以為便晉書食貨志宋書文帝紀曰元嘉七年冬立錢署鑄四銖錢二十四年六月以貨貴制大錢一當兩明年五月罷後漢靈帝紀曰中平三年鑄四出文錢靈帝作角錢錢猶五銖錢有四道連有邊輪識者竊言侈虐已甚形象兆見此錢成必四道而去及京師亂錢果流布四海文獻通考獻帝初平元年董卓壞五銖錢更鑄小錢悉取洛陽長安銅人鍾簴飛亷銅馬之屬以充鑄故貨錢物貴穀石數萬又錢無倫理文章不便人用漢史顧烜曰漢獻帝建安十九年昭烈鑄直百傳形五銖魏志曰文帝黃初二年春初復五銖錢冬以榖貴罷明帝太和元年夏行五銖錢吳志曰孫權嘉禾五年春鑄大錢一當五百孫權赤烏元年鑄當千大錢故吕蒙定荆州賜錢一億錢既大貴但有空名晉自中原喪亂元帝過江用孫氏舊錢輕重雜行大者謂之比輪小者謂之四文晉書食貨志三月晉禁民作銅器初唐世天下鑄錢有三十六冶亂喪以來皆廢絶錢日益耗民有銷錢為銅器故禁之通考孝武孝建初鑄四銖文曰孝建一邊為四銖其後稍去四銖專為孝建孝建則薤葉四銖則大篆其後稍去四銖專為孝建漸至薄小文字夷漫至明帝泰始三年罷焉舊譜宋書前廢帝紀曰大明七年冬諸郡大旱米一升數百孝建已來又立錢署鑄錢百姓因此盜鑄轉偽小商貨不行永光元年春二年庚寅鑄二銖錢三月甲辰罷九月戊午開百姓鑄錢宋書顔竣傳曰前廢帝即位鑄二銖錢形或轉細官錢每出民間即模效之而大小厚薄皆不及也無輪郭不磨鑢如今之剪鑿者謂之耒子顔竣傳曰世祖即位鑄孝建四銖隋書食貨志曰梁武帝鑄五銖女錢二品並行百姓或私以古錢交易有直百五銖顧烜曰天監元年鑄公式女錢徑一寸文曰五銖稱兩如新鑄五銖但邊無輪郭未行用又聽民間私鑄以一萬二千易取上庫古錢一萬以此為率普通三年始興新鑄五銖並行用斷民間私鑄十二月梁鑄鐵錢梁初惟揚荆郢江湘梁益用錢交廣用金銀餘州雜以榖帛交易後鑄五銖錢而民間私用古錢禁不能止乃議鑄銅錢鐵錢隋書食貨志顧烜曰普通四年鑄大吉鐵錢又鑄大通鐵錢梁元帝時初鑄錢一當十賜僧垣十萬貫實百萬也梁書敬帝紀曰太平二年夏鑄四銖錢一準二十壬辰改一準十丙申復開細錢陳書宣帝紀曰宣帝大建十一年又鑄大貨六銖以一當五銖之十與五銖並行後還當一人皆不便乃相與訛言曰六銖錢有不利縣官之象未幾而帝崩遂廢六銖而行五銖竟至陳亡其嶺南諸州多以米布交易俱不用錢食貨志自孝文更造四銖錢至是四十餘年從建元以來用少縣官往往多即銅山而鑄錢民亦盜鑄不可勝數錢益多而輕有司言今半兩錢法重四銖而姦或盜摩錢質而取鋊令縣官銷半兩錢更鑄三銖錢重如其文食貨志後魏食貨志曰孝莊永安二年秋詔改鑄文曰永安五銖官自立爐起自九月至三年正月而止官欲貴錢乃出藏絹分遣使人于二市賣之絹匹止錢二百而私市者猶三百利之所在盜鑄稱衆巧偽既多輕重非一四方州鎮用各不同楊侃傳曰時所用錢人多私鑄稍就薄小乃至風飄水浮侃奏聽人與官並鑄使人樂為而俗弊得改旨下尚書八座不許後再奏孝莊從之乃鑄北史西魏文帝大統六年二月鑄五銖錢十二年三月鑄五銖錢後魏食貨志曰孝莊永安二年鑄永安五銖錢遷鄴之後輕濫尤多武定初齊文襄王奏革其弊于是詔遣使人詣諸州鎮收銅及錢悉更改鑄其文仍舊然姦僥之徒越法趨利未幾之間漸復細薄六年文襄王以錢文五銖名須稱實當稱錢一文重五銖者聽入市百錢重一斤四兩自餘皆準此為數其京邑二市天下州鎮郡縣之市各置二稱懸於市間民所私用之稱皆準市稱以定輕重凡有私鑄悉不禁斷但五銖然後聽用若入市之錢重不五銖或雖五銖而多雜鉛錫並不聽用若有輒以小薄雜錢入有人糾獲其錢悉入告者其小薄之錢若即禁斷恐人交乏絶畿內五十日外州百日為限羣官參議咸以時榖頗貴請待有年王從之乃止北齊神武霸政之初猶用永安五銖遷鄴已後百姓私鑄體制漸别遂各以為名有雍州青赤梁州生厚緊錢吉錢河陽生澀天柱赤牽之稱冀州之北錢皆不行交貿者皆以絹布神武乃收境內之銅及錢仍依舊文更鑄流之四境未幾之間漸復細薄姦偽競起食貨志後周之初尚用魏錢及武帝保定元年乃更鑄布泉之錢以一當五與五銖並行時梁益之境又雜用古錢交易河西諸郡或用西域金銀之錢而官不禁建德三年又更鑄五行大布錢以一當十大收商賈之利與布泉錢並行四年又邊境之上人多盜鑄又禁五行大布不得出入四關布泉之錢聽入而不聽出五年以布泉漸賤而人不用遂廢之隋食貨志隋文帝開皇元年以天下錢貨輕重不一乃更鑄新錢背面肉好皆有周郭文曰五銖而重如其文每錢一千重四斤二兩是時錢既雜出百姓或私有鎔鑄三年四月詔四面諸關各付百錢為樣從關外來勘樣相似然後得過樣不同者則壞以為銅入官詔行新錢以後前代舊錢有五行大布永通萬國及齊常平所在勿用以其貿易不止四年詔依舊不禁者縣令奪半年祿然百姓習用既久猶不能絶五年詔又嚴其制自是錢貨始一所在流布百姓便之是時見用之錢皆須和以錫鑞錫鑞既賤求利者多私鑄之錢不可禁約其年詔乃禁出錫鑞之處並不得私有採取十年詔晉王廣聽于揚州立五爐鑄錢其後姦猾稍多漸磨鑢錢郭取銅私鑄又雜以鉛錫遞相倣效錢遂輕薄乃下惡錢之禁京師及諸州邸肆之上皆令立榜置樣為準不中樣者不入于市十八年詔漢王諒聽於並州立五爐鑄錢又江南人間錢少晉王廣又請于鄂州白紵山有銅礦處鑄錢于是詔聽置十爐鑄錢又詔蜀王秀于益州立五爐鑄錢是時錢益濫惡乃令有司撿天下邸肆見錢非官鑄者皆毁之其銅入官而京師以惡錢貿易為吏所執有死者數年之間私鑄頗息大業以後王綱弛紊巨姦大猾遂多私鑄錢轉薄惡每千直重二斤後漸輕至一斤或剪鐵鍱裁皮糊紙以為錢相雜用之貨賤物貴以至于亡食貨志北史齊文宣帝紀曰天保四年春正月己丑鑄新錢文曰常平五銖隋書食貨志曰文宣受禪除永安之錢改鑄常平五銖重如其文其錢甚貴且製造甚精後周書宣帝紀曰大象元年十一月丁巳初鑄永通萬國錢以一當十與五行大布並行新唐書食貨志曰髙祖初入關民間用線環錢其製輕小凡八九萬才滿半斛乃鑄開元通寶鄭虔會粹云詢初進蠟樣日文德皇后掐一甲迹故錢上有掐文每兩二十四銖則一錢重二銖半以下古稱比今稱三之一也則今錢為古稱之七銖以上古五銖則加重二銖以上新唐書食貨志顯慶五年以盜鑄惡錢多官為市之以一善錢售五惡錢民間藏惡錢以待禁弛唐史新唐書食貨志曰乾封元年改鑄乾封泉寶錢以一當舊錢之十踰年而舊錢多廢明年以商賈不通米帛踊貴復行開元通寶錢二年正月詔乾封新鑄之錢令所司貯納更不須鑄初唐憲宗令商賈至京師委錢諸道富家以輕裝趨四方合劵乃取號曰飛錢太祖因其制許民入錢京師于諸道更换宋史元和四年京師用錢緡少二十及有鉛錫錢者捕之非交易而錢行衢路者不問復詔采五嶺銀坑禁錢出嶺六年貿易錢十緡以上者參用布帛蔚州三河冶距飛狐故監二十里而近河東節度使王鍔置爐疏拒馬河水鑄錢工費尤省以刺史李聽為使以五爐鑄月鑄錢三十萬自是河東錫錢皆廢自京師禁飛錢家有滯藏物價頓輕判度支盧坦兵部尚書判户部事王紹鹽鐵使王播請許商人于户部度支鹽鐵三司飛錢每千緡增給百錢然商人無至者復許與商人敵貫而易之然錢重幣輕如故憲宗為之出內庫錢五十萬緡市布帛每匹加舊估十之一會吳元濟王承宗連衡拒命以七道兵討之經費屈竭皇甫鎛建議內外用錢每緡墊二十外復抽五十送度支以贍軍唐史唐書食貨志曰肅宗乾元元年經費不給鑄錢使第五琦鑄乾元重寶錢與開元通寶參用以一當十亦號乾元十當錢元載肅宗實録曰乾元九年秋七月鑄金光襲曰乾元二年新鑄小錢一當一唐書食貨志曰建中初戶部侍郎韓洄以商州紅崖冶銅多請復洛源廢監起十爐鑄錢十萬二千緡每千錢費九百德宗從之江淮多鉛錫錢以銅蕩外不盈斤兩帛價益貴銷千錢為銅六斤鑄器則斤得錢六百故銷鑄者多而錢益耗判度支趙贊採蓮州白銅鑄大錢一當千以權輕重唐書食貨志曰武宗廢浮屠法永平監官李郁彥謂以銅像鐘磬爐鐸皆歸巡院州縣銅益多矣鹽鐵使以工有常力不足以加鑄許諸道皆得置錢坊淮南節度使李紳請天下以州名鑄錢京師為京錢大小徑寸如開元通寶舊譜曰唐咸通十一年桂陽監鑄錢官王彤進新鑄錢文曰咸通玄寶尋有敇停廢不行宋白續通典曰天成元年十二月敇中外所使銅錢內鐵鑞錢即宜毁棄不得行使二年八月禁銷銅錢四年禁鐵鑞錢宋白續通典曰晉天福三年十一月詔三京鄴都諸道州府無問公私應有銅者並許鑄錢仍以天福元寶為文左環讀之委鹽鐵司鑄樣頒下諸道宋白續通典曰漢乾祐元年四月膳部郎中羅周裔上言請在京置錢監俾銅盡為錢以濟軍用蘇耆開談録漢乾祐中以晉室鼓鑄錢幣偽濫非一乃禁銅貨悉歸公帑周顯德二年帝以縣官久不鑄錢而民間多銷錢為器皿及佛像錢益少乃立監採銅鑄錢自非縣官法物軍器及寺觀鐘磬鈸鐸之類聽留外自餘民間銅器佛像五十日內悉令輸官給其直過期隱匿不輸五斤以上罪死不及者論刑有差其銅鏡官中鑄于東京置坊貨賣許人户收買興販朝廷及諸州見管法物軍器舊用銅製及裝飾者候經使用破壞即仰改造不得更使銅內有合使銅者奏取進止五季史五代史周紀論曰世宗即位之明年廢天下佛寺三千三百三十六是時國中乏錢乃詔毁天下銅佛以鑄錢太祖皇帝建隆二年禁諸鐵鑞錢民間有者悉送官宋史太祖建隆六年將議改元語宰相勿用前世舊號于是改元乾德其後因于禁中見內人鏡背有乾德之號以問學士陶榖榖曰此偽蜀時年號也因問內人乃是故蜀王時人太祖繇是益重儒士而歎宰相之寡聞也歸田録乾德五年禁輕小惡錢限一月送官先是許商人入錢左藏庫以諸州錢給之而商旅先經三司投牒乃輸于庫所繇司計一緡私刻錢二十開寶三年置便錢務令商人入錢者詣務陳牒即日輦致左藏庫給以劵仍敇諸州凡商人齎劵至當日給付不得住滯違者科罰自是毋復停滯至道末商人便錢一百七十餘萬貫天僖末增一百二十三萬貫宋史宋初錢文曰宋元通寶太平興國後又鑄太平通寶錢太宗親書淳化元寶作真行草三體自後每改元必更鑄以年號元寶為文仁宗即位改元天聖時章獻明肅太后臨朝稱制議者謂撰號者取天字于文為二人以為二人聖者悅太后爾至九年改元明道又以為明字于文日月並也與二人旨同無何以犯契丹諱明年遽下作遂改曰景祐是時連嵗天下大旱改元詔意冀以迎和氣也五年因郊又改元曰寶元自景祐初羣臣慕唐玄宗以開元加尊號遂請加景祐於尊號之上至寶元亦然是嵗趙元昊以河西叛改姓元氏朝廷惡之遽改元曰康定而不復加于尊號而好事者又曰康定乃諡爾明年又改曰慶厯至九年大旱河北猶甚民死者十八九于是又改元曰皇祐猶景祐也六年日蝕四月朔以謂正陽之月自古所忌又改元曰至和三年仁宗不豫久之康復又改元曰嘉祐自天聖至此凡年號九皆有謂也歸田録國朝錢文皆用元寶而冠以年號及改號寶元文當曰寶元元寶詔學士議因請改曰豐濟元寶仁宗特命以皇宋通寶為文慶厯以後復冠以年號宋斷新錢專用古錢會編髙宗紹興元年因婺州之屯駐有司請樁辦合用錢而舟楫不通錢重難致乃詔户部造見錢關子付婺州召客人入中執關赴𣙜貨務請錢有願得茶鹽香貨鈔引者聽于是州縣以關子充糴本未免抑配而𣙜貨務又止以日納三分之一償之人皆嗟怨三年春正月鑄當十大錢自太祖以來諸路置監鑄錢有折二折三當五隨時立制未嘗鑄當十也至是蔡京將以利惑人主始請鑄于諸路與小平錢通行于時四年尚書省言東南諸路盜鑄當十錢者多乃詔廣南福建路更不行使當十錢有者兊换于别路行使其本路别鑄小平錢以閩廣係出銅處故也又詔荆湖江浙當十錢並改作當五錢六年二月詔置行在交子務臣僚言朝廷措置見錢關子有司浸失本意改為交子官本無錢民何以信極論其不可于是罷交子務令𣙜貨務所儲見錢印造關子二十九年印給公據關子赴三路總領所淮西湖廣各關子八十萬緡淮東公據四十萬緡皆自十千至百千凡五等內關子作三年行使公據二年許錢銀中半入納三十年户部侍郎錢端禮被旨造會子儲見錢于城內外流轉其合發官錢並許兊會子赴左藏庫送納明年二月詔會子務𨽻都茶場正以客旅算請茶鹽香礬等歲以一千萬貫可以隂助稱提不獨恃見錢以為本又非全仰會子以佐國用也三十二年十二月詔定偽造會子之罰犯人處斬賞錢一千貫如不願支賞與補進義校尉若徒中及窩藏之家能自告首時與免罪亦支上件賞錢或願補前名目者聽日造會子監官分押每一萬道解赴户部覆印當時會紙取于徽池州續造于成都府又造於臨安府會子初止行于兩浙後又詔通行于淮浙湖北京西除亭户鹽本並用見錢外其不通水路去處上供等錢許盡用會子解發其沿流州軍錢會中半民間典賣田宅畜車船等如之或全用會子者聽俱宋史自太祖以來閩蜀陜西多用鐵錢每十文當銅錢一文至是河東轉運判官洪中孚言遼夏以鐵錢為兵器若雜以鉛錫則脆而不可用請改鑄之乃詔置陜西河東北京西十八監鑄當二夾錫鐵錢用之紹興十五年置利州紹興監鑄錢十萬緡以救錢引地多山林宜炭鐵仍增鑄十五萬緡未行卒減鑄十萬二十二年嘉州守臣王知道乞復嘉之豐逺卭之惠民二監鑄小錢二十九年立為限制命官之家存留見錢二萬貫民庶半之餘限二年聽變轉金銀算請茶鹽香礬鈔引之類越數隱寄許人告孝宗隆興元年詔鑄當二小平錢如紹興之初自乾淳迄嘉泰開禧皆如之乾道六年并鑄錢司歸發運司七年復置八年于饒贛各置提點官開寶五年禁民鑄錢為佛像浮屠及人物之無用者上慮農民多毁農器以徼福故禁之俱會編自大中祥符及崇寧以來錢皆精好髙宗嘗諭近臣欲盡如舊制不較工料之費乾道八年孝宗以新鑄錢淆雜詔提點鑄錢及永平監官左藏西庫監官户工部長二議罰有差熙寧末年旱詔議改元執政初擬大成神宗曰不可成字于文一人負戈繼又擬豐亨復曰不可亨字為子不成惟豐字可用改元豐石林宴語大中祥符七年凌策又請鑄大錢以一當十嘉州豐逺監卭州惠民監置爐鼓鑄嘉熙四年趙抃乞罷十年以寬民力熙寧間轉運司復言罷纍年民間見錢關少乞減半鑄與交子相權詔從之宋史徽宗崇寧二年二月庚午初令陜西鑄折十銅錢並夾錫錢寧宗嘉定元年即利州鑄當五大錢嘉定三年春制總司收换九十一界二千九百餘萬緡其千二百萬緡以茶馬司羡餘錢及制司空名官告總所樁管金銀度牒對鑿餘以九十三界錢引收兌又造九十四界錢引五百餘萬緡以收前宣撫程松所增之數凡民間輸納者每引百帖八千其金銀品搭率用新引七分金銀三分其金銀品色官稱不無少虧每舊引百帖納二十引蓋自元年三年兩收舊引而引直遂復如故昔髙宗因論四川交子最善沈該稱提之説謂官中嘗有錢百萬緡如交子價減即官用錢自買方得無弊宋史七年二月川陜副帥吳玠請置銀會于河北五月中書省言引數已多慮害成法詔止之蓋祖宗時蜀交書放兩界每界止一百二十餘萬令三界通行為三千七百八十餘萬以至於紹興末年積至四千一百四十七萬餘貫所有鐵錢僅及七十萬貫又以鹽酒等隂為稱提是以餉臣王之望亦請添印錢引以救目前不得不為朝廷久逺之慮當時詔添印三百萬委之望約度給用即止後之望只添印一百萬先是寧宗之世會子擁滯物價湧甚民不勝其苦朝廷無如之何至是更造金銀見錢關子以一準十八界會子三出奉宸庫珍貨收幣會于官廢十七界會子不用其關子之制上一黑印如西字中三紅印相連如目字下兩傍各一小長黑印宛然一賈字也銀關行物益貴李咨以實錢入粟實錢售茶二者不得相為輕重既行而商人失厚利怨謗蜂起上疑變法之弊下詔責計置司而遣官行視咨具言新法之便令孫奭等論其煩擾遂罷其法官仍給本錢市茶商人入錢售之茶法復壞解鹽亦復𣙜之宋史廣惠食田本絶户業以賑濟者也王安石請鬻之以為河北東西陜西京東四路青苖本錢詔從之俱同上本朝厯凡十變在建隆則曰應天在太平興國則曰乾元在咸平則曰議天在天聖曰崇天在治平曰明天在熙寧曰奉天在元祐曰觀天在崇寧曰占天未幾又改曰紀元在紹興曰統元楓忩小牘川陜舊皆行鐵錢祖宗時益利夔三州皆有鐵冶故即山鑄錢卭州舊鑄嵗十萬緡建炎初轉運判官靳博文以為嵗費本錢二十一萬得不償費乃罷之紹興十五年鄭重為四川宣撫使始即利鑄錢嵗十萬緡以救錢引之弊率費二千而得千錢置官六人兵匠五百人嵗用鹽官錢七萬緡四路稱提錢十四萬緡為鑄本具後增至十五萬二十三年嘉守王知道請復嘉卭鑄錢監事下計司于是復置監于卭州明年詔州嵗鑄三萬緡利州九萬緡共費本錢引十七萬五千緡每千費本四百二十五年又詔利州鑄大小錢各二萬凡大錢千重十二斤小錢千重七斤有竒于是歲省鼓鑄所錢三萬三十一年再減利州錢為六萬緡大小各半云施州舊亦鑄錢萬緡南平軍數千緡紹興末皆減今蜀中歲鑄錢十萬淮上舊鑄銅錢兵火後舒州不復鑄錢但行饒建等錢而已乾道初林樞密安宅為右諫議大夫議以銅錢多入北境請禁之而即蜀中取鐵錢行之淮上事既行洪景伯參政言其不可上問之景伯曰今每州不得千緡一州以萬户計之每家才得數百恐民間無以貿易且客旅無回貨鹽場大有利害上以為然乃不行但于蜀中取十五萬緡行之盧和二州而已五年秋王公明使蜀復伸前議六年夏遂令司農寺丞許子中往淮西措置即舒蘄二州鑄夾錫鐵錢舒州同安監歲二十五萬緡蘄州蘄春監十五萬緡淳熙七年春舒守趙子濛蘄守施昷舒皆以鑄羡遷官然淮民大以為擾八年秋王謙仲知舒州入見為上言之遂減舒州錢額十萬緡與蘄州通為三十萬後踰月又詔權罷鼓鑄一年二州既復鑄錢因命淮西漕兼提舉江淮湖北鐵冶鑄錢公事歲增額至六十萬緡然淮錢日夥而又著令不許過江人甚賤之乃復減為四十萬國朝初平江南嵗鑄錢七萬貫自後稍增廣至天聖中嵗鑄一百餘萬貫慶厯間至三百萬貫熙寧六年以後嵗鑄銅鐵錢六百餘萬貫夢溪筆談冬十月女真初鑄銅錢先是止用前代舊錢也金史金以銅少循宋交子法造鈔引一貫二貫三貫五貫十貫五等謂之大鈔一百二百三百五百七百五等謂之小鈔與錢並用以七年為限納舊易新諸路置官庫受之每貫取工墨錢十五文公私便焉女真造承安寶貨時銀每錠以五十兩其直百貫民間或有截鑿之者價隨以低昻遂改鑄銀名承安寶貨一兩至十兩分五等每兩折錢二貫公私同見錢用未幾寶貨多夾雜銅錫浸不能行乃罷之二月女真造真祐通寶自百至三千等之為十凡一貫當寶劵千貫聽各路轉運司印造與舊劵參用而鈔愈賤同上元行鈔法雖皆以錢為文而廢錢弗鑄至是始設大都立資國院山東河東遼陽江淮湖廣四川立泉貨監六産銅之地設提舉司十九鑄曰至大通寶者每一文準銀鈔一釐曰大元通寶者準至大錢十文與歷代錢通用其當五當三折二並以舊數用之既而御史言至大銀鈔始行品目繁多民猶未悟而又兼行銅錢慮有相妨今民間拘收銀器甚急民殊不便乞與省臣詳議不報元史大秦國以金銀為錢十銀錢當一金錢司馬彪續漢書儀鳳四年以天下惡錢轉多令東都出逺年糙米及粟于市糶斗别納惡錢百文其惡錢令少府司農相訖即令鑄破其厚重合斤兩者任將行用唐史二十四年罷鑄錢司歸之漕司宋史前漢書食貨志曰王莽鑄大布次布第布壯布中布差布厚布幼布么布小布小布長寸五分重十五銖文曰小布直一百自小布以上各相長一分相重一銖文各為其布名直各加一百上至大布長二寸四分重一兩而直千錢矣是為布貨十品錢通卷四
