body:
  text: 錢通卷十九明胡我琨撰十之異天有神地有怪人有冥合此三者然後可以為泉雨有時以凝土有時以化魂魄有時以徴異故然也聖人欲有所取之取諸異也􅀢其異欲其蚤之正也故異曰十神物道書云牽牛娶織女天帝借二萬錢下禮久不還被驅在營室中北落師門西北有十星曰天錢晉書天文志其王是漫陁多王頂上而生後為輪王以福力故天雨寶錢滿國皆富頂生經周成王時咸陽雨錢終日而絶異林漢世𨽻川民家雨金銖錢述異記王莾時未央宫中雨五銖錢既至地悉為龜兒同上朱漢賔少時善射嘗因與同軰出獵指一飛鴈隨矢而落其鏃中正其臆上貫一金錢有篆文示其郡之碩儒皆無識者人甚異之繇是人皆號之曰朱落鴈晉史益州嚴貞觀有通僊井相傳此井與廣漢綿竹君平宅井相通有人淘井得銅錢三徑可二寸因恍惚不安復投井中立愈或云此君平卜卦錢也趙汴成都記華亭縣北七十里有澱湖山上有三姑廟有漁舟艤湖口忽見一婦人附舟云欲到澱山寺及抵岸婦人直入寺去舟中止遺一履漁人執此履以往索渡錢寺僧甚訝之曰此必三姑顯靈因相隨至殿中果見左足無履坐傍百錢在焉遂抵漁人而去閑牕括異志世祖于其住堂内得異錢文為北斗星雙刀雙旗及有形帶劒南史齊本記永明七年齊興太守劉元寶治郡城于塹中獲錢百萬形極大以獻臺以為瑞世祖班賜朝臣以下各有差南齊祥瑞志唐乾符中蜀州刺史李師㤗理第于錦浦里北門西與李冰祠隣距宅之北地形漸高崗走西南與祠相接于其堂北鑿地五六尺得大冢甎甓甚固得金錢于甎外數十枚各重十七八銖徑一寸七八分圓而無孔去縁二分有隠起規規内面各科斗書二十一字其縁甚薄有刃焉督役者以白師㤗師㤗命并金錢復瘞之趙汴成都記皇朝淳化三年昇州奏二月十五日夜忽有雷聲茅山鷰口洞宫石開二尺裏面得銅鐵錢三十一文樂史總仙記黄尋家貧一日大雨天飛錢至其家無數因致富幽冥録巴東阮僧水際得青磁椀折花及米其中皆滿以錢及金銀置之皆然自是富貴僧年老擲椀江中謂徒弟曰不欲爾增罪累也秘閣閑談河州有林氏其先為郡守任罷家居一日天忽雨錢充積其家林氏乃整衣仰天祝曰非常之事必將為禍于此速止林氏之福也應聲而止收錢鉅萬為富人云稽神録西魏大統七年正月東魏有雀御永安錢置渤海王高歡前歡世子澄乃令百爐别鑄此錢鄴中號令公百爐錢三國典畧建業有庫子姓邢家貧聚錢滿二千輙病或失去其妻竊聚錢埋于地中一夕忽聞有聲如蟲飛自地穿户而去有觸牆壁墜地者明日視之皆錢其妻乃告埋瘞之處視皆亡矣邢後得一自然龜狀如眞置庭中石榴樹下或見之曰此寶物也因收置筐篋中自爾稍充足後頗富矣稽神録慶元二年十二月呉縣金鵞鄉銅錢百萬自飛宋史乾元中李輔國奏内飛龍廐鑄銅鍾乃投乾元錢二文于鑪中祈曰如聖躬萬福國祚無疆宄孽殄除則願不消不鑠一隂一陽並見于外及鐘成一如所祈唐書宻收張籛少年時常有一飛鳥狀若斥鷃銜一青銅錢墮于張懐袖間張異之常繋錢于衣衿間其後累財巨萬玉堂閒話茅山黄尊師法籙甚高于茅山側修起天尊殿講説教化日有數千人時講筵初合忽有一人排闥呌呼相貌麤黑言辭鄙陋腰揷騾鞭如隨商客騾仗者罵道士汝聚衆作何物不向深山學道還敢謾語耶黄尊師不測下講筵遜詞衆人悉懼不敢牴牾良久詞色稍和曰修一殿却用幾錢曰要五千貫曰盡搬破甑釡及雜鐵來約八九百斤掘地為爐以火銷之探懐中取葫蘆㵼出兩丸藥以物攪之少頃去火已成上銀曰此合得萬餘貫修觀計用有餘逸史光獻在父母家時與羣女共為撚錢之戲而後一錢輙獨旋轉盤中凡三日方止避暑漫抄留錢山在縣西南十六都唐乾符間一夕山上有聲錚錚焉及旦視之雨錢滿山以億萬計樹木皆折據郡志則云乾符中池錫家雨錢數萬其家畜一鶴日盤旋山間下于庭除因號其山曰朱頂林曰白鶴云福州府志勝冥夢周犨者家貧夫婦夜田天帝見而矜之問司命曰此可富乎司命曰命當貧有張子錢可以借之乃借而與之期曰車子生急還之田者稍富利及期夫婦輦其賄以逃同宿路蓬夫妻寄車下宿夜生子問名于夫夫曰生車間可名車子也從是所向失利遂以貧困捜神記許至雍妻早亡雍每感嘆悲泣一日忽覺有人行吁嗟聲良久聞語云乃是亡妻云若欲得相見遇趙十四毋惜三貫六百錢自此常記其言後數年至蘇州將謁呉太伯廟遇男巫趙十四具陳懇切之意遂教其見言語悲喜恩情如生良久趙生曰可去矣許相隨涕泣曰願惠一物可以為記妻泣曰幽㝠惟有淚可以傳于人代令許雍汗衫懸樹枝掩而大哭而去許取汗衫視之皆血痕也靈異記趙雋字子竒平陽岳陽人母卒哀毁過制縣令京兆常伯倫知之給米粟蠲其家雋將葬母貧鬻其子質劑已定其夜夢一人請曰小舍東有錢百萬乃自發之及旦雋自舍東手掘之果得錢符夢數焉史系衢州江山毛知録嘗夢入冥吏引至一處若官府兩廡皆大屋貯錢滿中各以官為標識問之曰此俸禄也毛視其俸吏指一處積鏹五百餘千曰此爾俸也位至丞郡乂見傍别積十二千題曰饒州德興某人俸毛後為徽州録叅値方宼作州倅逃去毛攝倅兩月而賊至遇害德興某人者後登第授一尉到官一月而卒劉運使文伯説陳宜中之先為吏每以利物為心日計所及以錢投大缶中一錢為一事久而不可勝計人多德之嘗負官錢在囹圄囑其孫往貸于葛宣義葛居外沙資累鉅萬宿夢黑龍繞其㕔柱覺而異之夙興未䪻徑出徬徨若有所伺家人呼之不顧果有小兒來年可十許嵗問為誰曰陳某孫又問來故以實對又問所需幾何曰百千如數付之癸辛雜識天寶十一年朔方節度判官大理司直王掄廵至中城病死凡十六日而蘇初疾亟屬纊之際見二人追去須臾入大城門掄兄攝亡已六年時見之攝云爾未當死若得錢三千貫即重生也掄家在西定遠去中城數百里便見一山下有﨑嶇小逕馳歸其家斯須而升堂告妻曰我已死矣若得錢三千貫可再生其夕舉家咸聞牕牖間窣然有物聲犬亦迎吠既明其妻泣言夢掄已死求錢三千貫即取紙剪為錢財召巫者焚之掄得之即與人間錢不殊吏曰君有禄及夀然此中之事必不得洩之言畢􅍕然而活再生記王導子悦為中書侍郎導夢人以百萬錢買悦甚惡之後掘地得錢百萬一皆藏閉而悦果死晉書問曰何故經中為亡人造作黄旛掛于塜塔上者荅曰雖未見經釋然可以義求此五大色中黄色居中用表忠誠盡心修福為引中隂不之惡趣莫生邊國也又黄色像金鬼神冥道將為金用故俗中解祠之時剪白紙錢鬼得銀錢用剪黄紙錢鬼得金錢用問曰何以得知答曰冥報記冥祥記具述可知擅篇陳國張漢直到南陽從京兆尹延叔堅學左氏傳行後數月鬼物持其妹為之揚言曰我病死䘮在陌上常苦饑寒操二三量不借挂屋後楮上傳子方送我五百錢在北牖下皆亡取之又買李㓜一頭牛本劵在書篋中往索取之悉如其言搜神記唐盧懐愼無疾暴終夫人崔氏止其兒女哭號曰公命未盡我得知之公清苦謙退四方賂遺毫髪不留與張説同時為相説今約貨山積其人尚在而奢儉之報豈虚也哉及宵分公復生左右以夫人之言啟陳公曰理固不同冥司有三十爐日夕為説鼔鑄横財我無一焉惡可並哉言訖復絶獨異志胡秉實武昌人子死而身亦死但心微温耳後數日甦曰將錢來給送者其家問故曰閻王撿簿曰汝某郡别駕夀幾何有四子皆晚得今尚未也然汝誤來即命馬卒送之歸當來時更借與錢期見償書字馬卒手上恐忘之而公從其屋天牕轉至牀頂上躍下取錢勞卒亦償借錢隂司亦貴此阿堵耶唐元和初上都東市惡少李和子常攘人猫狗食之市人皆嫉之嘗臂鷂獨仃見二紫衣人呼曰冥司追汝可即去因探懐中出一牒印文猶濕見其姓名為猫犬四百六十頭訴事和子驚懼棄鷂子拜祈之且曰我分死矣必為我暫留二鬼相顧曰姑遲我數刻當返未移時至曰君辦錢四十萬為君假三年命也和子許諾以翊日午為期遽歸作念鑿楮如期備酬焚之自見二紫衣人挈錢而去三日和子忽自言曰鬼使受賄事發冥司復追我言訖遂死問羊集文帝夢磨錢文欲滅而復明周宣占之曰此陛下家事時帝欲治弟植逼于太后但加貶爵魏書勝業里有司門令史辛察者忽患頭痛而絶心上微暖初見有黄衫人就其牀以手相挽而出既而返顧本身則已殭矣至門外黄衫人踟蹰良久謂察曰君未合去但致錢二十緡便當相捨察辭以貧黄衫曰紙錢也遂相與却入庭際黄衫乃指一家僮教察以手扶其背因令遂語求錢于是其家果取紙錢焚之即皆化為銅錢黄衫乃求脚直送出城察悟所居之西有傭車者遂與黄衫俱詣其門叩之曰有客要載錢至延平門外傭曰諾即來裝其錢訖三人相引部領歴城西街時落月鼓將動黄衫曰天方曙不可往矣當且止沈氏廟其門閉叩之曰有少錢未可遽提去請借一隙處暫貯搬置其錢于廟西北角又于户外見有葦蓆數領遂取覆之纔畢天色方曉黄衫辭謝而去察與傭者相隨歸不覺形神合而蘇曰向者更何事妻具言歴歴如在目前即往沈氏廟于廟西北角見一兩片蘆葦其下紙緡存焉河東記裴齡死而復生述冥吏語曰世作錢于都市其錢多為地府所收宜呼鑿錢人于家中宻室作之畢可以袋盛當于水際焚之受錢之時若横風動灰即本鬼得若有風颺灰即為地府及他鬼神所受又鬼神常苦饑燒錢時設少酒飯以兩束草立蓆上鬼神映草而坐即得食廣異記郭承嘏嘗寶惜法書一卷每􅂝隨身初應舉就雜文試文成尚早緘置篋中及納試而誤納所寶書帖歸計無所出來往于棘闈門外見一老吏詢其試事具以實告吏曰某能換之然其家貧居興道里倘换得願以錢三萬見酬承嘏許之逡廵齎程試入而書帖出授嘏明日擕錢詣興道里詢吏姓氏吏家人出云主父死三日力貧未辦周身之具承嘏驚嘆方知棘闈所見乃鬼也遂以錢贈其家尚書譚録潞城縣令周混妻者姓韋名璜乾元中卒月餘忽至其家附婢靈語云至太山府君嫁女理極榮貴令我為女作妝今得臙脂及粉來與諸女因而開手有脂粉並不異人間物又云府君家撒帳錢甚大四十鬼不能舉一枚我亦致之因空中落錢大如盞廣異記龍朔中豫章人陳導行商于楚夜泊隔舟窺見一人龎眉大鼻如吏在舟撿勘文書導乃邀過船中備酒饌飲經數廵乃問其姓氏答曰某姓司徒名弁又問所主何事弁曰君此行愼勿以楚為意願適他土吾非人乃冥司使者吾往楚行災君亦其人也然君須以錢物計俟吾從楚回君可備緡錢一二萬相貺當免君災導許諾告謝而别是嵗果荆楚大火延燒數萬家蕩無孑遺導自别弁後以憂慮繋懐及移舟而返既至豫章弁亦至矣託以他事未辦所許錢使者怒乃令從者持書一緘與導導開讀未終而宅内掀然火起未損他室惟燒導家集異記岳州刺史李俊舉進士連不中第貞元二年有故人國子祭酒包佶者通于主司援成之榜前一日初五更俊將候佶里門未開立馬門側傍有賣糕者一吏小囊氊㡌頗有埀涎之色俊為買而食之吏喜甚附俊馬曰某乃冥吏送進士名送堂之榜在此可自尋之因出俊視無名而泣客曰能行少賂于冥吏即于此取其同姓者易其名可乎俊問幾何而可曰隂錢三萬貫將遺牘吏來日午時送可也復授筆使俊自注從上有故太子少師李夷簡名俊欲指之客曰不可此人禄重未易動也又其下有李溫名客曰可矣乃揩去溫字注俊字客遽卷而行曰無違約既而俊詣佶曰今當呈榜之晨冐責奉謁佶唯伺佶出隨之經皇城東北隅逢春官懐其榜將赴中書佶揖問曰前言遂否春官曰廹于大權難副高命佶怒曰君移妄于某葢以某官閒也春官曰如此寜得罪于權右耳請同尋榜揩名填之祭酒開榜見李公夷簡欲揩春官急曰此人宰相處分不可去指其下李溫曰可矣遂揩去溫字注俊字榜既出其日午時俊不及赴冥吏之約廹暮將歸道逢此吏泣曰為君所誤得杖矣來日午時送五萬緡亦可無追勘之厄及到時焚之遂不復見太平廣記謝奉與郭伯猷善忽夢猷與人争錢因落水死奉為凶具忽覺即往猷處説猷曰吾昨夜夢與人争錢惆悵不語落厠而死奉為凶具一如前夢搜神記符䜟建武六年蜀童謡曰黄牛白腹五銖當復是時公孫述僭號于蜀時人竊言王莾稱黄述欲繼之故稱五銖漢家貨也明當復也述遂誅滅後漢五行志莾忌漢而錢文有金乃鑄貨泉以易之既而光武起於舂陵之白水鄉貨泉之文為白水眞人也符瑞志廬山太平觀乃九天採訪使者祠唐開元中創建元豐二年道士發地得一缾封鐍甚固破之有一銅錢文有應元保運四字不以為異元豐四年忽有詔進號九天採訪使者為應元保運眞君與錢文符同本觀乃以其錢表獻之沈括筆談安禄山未反時童謡曰燕燕飛上天天上女兒鋪白氊氊上有千錢時幽州又有謡曰舊來誇戴竿今日不堪看但看五月裏清水河邊見契丹史異瑯琊王溥其先家貧穿井得鐵印銘曰傭力得富錢至億庾一土三田軍門主簿後以一億錢輸官得中壘校尉三田一土壘字也中壘校尉掌北軍壘門故曰軍門主簿拾遺記周廣順初江南伏龜山圮得石函長二丈廣八寸中有鐵銘云維天監十四年秋八月葬寶公于是銘背有引曰寶公嘗為此偈大字書于板帛冪之人欲讀之者必施數錢乃得讀訖即冪之是時名士陸倕王鈞姚察而下皆莫知其㫖或問之云在五百年後至卒乃歸其銘合葬焉銘曰莫問江南事江南自有馮秉雞登寶位跨犬出金陵子建司南位安人秉夜燈東隣家道闕隨虎遇明興其字皆小篆體勢完具徐鉉徐鍇韓載皆不能解及李煌歸宋好事者云以丁酉年生辛酉年襲位即秉雞也開寶八年甲戌江南國滅是跨犬也當王師圍城而曺彬營其南是子建司南位潘美營其北是安仁秉夜燈也其後太平興國三年淮海王錢俶舉國入覲即東隣也家道闕意無錢也隨虎遇戊寅年也史異高宗紹興七年梟鳴于劉豫後苑又羣鳥鳴于内庭如曰休也豫惡之募人獲一梟者予錢五千是嵗偽齊亡同上桓帝初京都童謡曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間姹女工数錢以錢為室金為堂石上慊慊舂黄梁梁下有懸鼔我欲撃之丞相怒案此皆謂人主好聚歛為貪政也後漢書五行志姚生某謁九鯉祠問功名成否夢仙人書八字曰斗米三錢夜門不閉圓者曰斗米三錢不貴也夜門不閉無關也君此夢葢賤而無官也耶後果然鯉湖定本錢通卷十九
