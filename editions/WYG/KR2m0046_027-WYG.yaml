body:
  text: 錢通卷二十七明胡我琨撰條議二一臣竊見議者言青苗錢取利於民為非而朝廷深惡其說至煩聖聽命有司具述本末委曲申諭中外以朝廷本為惠民之意然告諭之後縉紳之士議論益多至於田野之民蠢然固不知周官泉府為何物但見官中放債每錢一百文要二十文利爾是以申告雖煩而莫能諭也臣亦以謂等是取利不許取三分而許取二分此孟子所謂以五十歩笑百歩者以臣愚見必欲使天下曉然知取利非朝廷本意則乞除去二分之息但令只納元數本錢如此始是不取利矣蓋二分之息以為所得多耶固不可多取於民所得不多耶則小利又何足顧何必以此上累聖政臣撿詳元降指揮如災傷及五分已上則夏料青苗錢令於秋料送納秋料於次年夏料送納臣竊謂年歲豐凶固不可定其間豐年常少而凶歲常多今所降指揮蓋只言偶然一料災傷爾若連遇三兩料水旱則青苗錢積壓拖欠數多若纔遇豐熟却須一併催納則農民永無豐歲矣至於中小熟之年不該得災傷分數合於本料送納者或人户無力或頑猾拖延本料尚未送納了當若令又請次料合俵錢數則積壓轉多必難催索臣今欲乞人户遇災傷本料未曾送納者及人户無力或頑猾拖延不納者並更不支俵與次料錢如此則人户免積壓拖欠州縣免鞭朴催驅官錢免積久失陷言青苗錢劄子且夫錢者官之所為米粟布帛者民之所生也古者上出錢以權天下之貨下出米粟布帛以補上之闕上下交易故無不利今青苖免役皆責民出錢是以百物皆賤而惟錢最貴欲民之無貧不可得也蘇轍論時事熈寧雇役之法三等人户並出役錢上户以家業高強出錢無藝下户昔不充役亦遣出錢故此二等人户不免咨怨至於中等昔旣已有差役今又出錢雇法之行最為其便及元祐罷行雇法上下二等欣躍可知惟是中等則反為害臣且借畿内為比則其餘可知矣畿縣中等之家大率歲出役錢三貫若經十年為錢三十貫而已今差役旣行諸縣於力最為輕役農民在官日使百錢最為輕費然一歲之用已為三十六貫二年役滿為費七十餘貫罷役而歸寛鄉得閒三年狹鄉不及一歲以此較之則差役五年之費倍於雇役十年所供賦役所出多在中等如此安得民間不以今法為害而熈寧為利乎蘇轍論分别邪正只如淳化中李順慶歴中張海等熈寧中廖恩此數夥盜賊計其燔燒官寺刼略倉庫以至發兵命將轉輸糧食耗失兵械募士賞功之費大率不下數百萬貫但得事了豈敢言費然方其未發有能建言乞捐數十萬貫以消其變則上下爭執如惜支體不肯割截此天下之大迷古今之通患也故臣願於元豐庫或内藏庫乞錢三十萬貫上以為先帝收恩於既往下以為社稷消患於未萌伏願陛下權福禍之重輕較得䘮之多少斷而行之毋使有司吝於出納以害大計蘇轍乞招河北保甲狀陛下富有四海而元豐及内庫錢物山積莫可計數只如近日内降睿思殿金銀一色令别庫收貯者自約及百餘萬貫皆是先帝多方收拾以備緩急支用不取於民聖算深遠非凡所及若積而不用則與東漢西園殘唐之瓊林大盈二庫何異於先帝聖德不為無損故臣願乞三十萬貫為招軍例物選文武臣僚有才幹者一二人分往河北逐路於保甲中招其強勇精悍者為禁軍隨其人才以定軍分本州無闕則自近及遠或押上京不過一二萬人則河北豪傑畧盡矣同上昔宇文融括諸道客户州縣觀望虚張其數以實户為客雖得户八十餘萬歲得錢數百萬而百姓困弊實召天寳之亂均稅之害何以異此蘇轍民賦序古者三年耕必有一年之蓄以三十年之通制國用則九年之蓄可跂而待也今者一歲之入金以兩計者四千三百而其出之不盡者二千七百銀以兩計者五萬七千而其出之多者六萬錢以千計者四千八百四十八萬除米鹽錢後得此數而其出之多者一百八十二萬紬絹以匹計者一百五十一萬而其出之多者十七萬穀以石計者二千四百四十五萬而其出之不盡者七十四萬草以束計者七百九十九萬而其出之多者八百一十一萬然則一歲之入不足以供夫一歲之出矣蘇轍收支敘然則為今之䇿下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則令被災之州為十萬户如一户得粟十石得錢五千下户常產之貲平日未有及此者也彼得錢以完其居得粟以給其食則農得修其􅅵畆商得治其貨賄上得利其器用閑民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廩於上而勢不暇乎他為豈不遠哉此可謂深思遠慮為百姓長計者也繇有司之說則用十月之費為粟五百萬石繇今之說則用兩月之費為粟一百萬石况貸之於今而收之於後足以振其艱乏而終無損於儲峙之實所實費者錢五鉅萬貫而已此可謂深思遠慮為公家長計者也曾鞏救災議且今河北州軍凡三十七災害所被十餘州軍而已他州之田秋稼足望今有司於糴粟常價斗增一二十錢非獨足以利農其於增糴一百萬石易矣斗增一二十錢吾權一時之事有以為之耳以實錢給其常價以荼荈香藥之類佐其虚估不過捐荼荈香藥之類為錢鉅萬貫而其費已足茶荈香藥之類與百姓之命孰為可惜不待議而可知者也夫費錢五鉅萬貫又捐茶荈香藥之類為錢數鉅萬貫而足以救一時之患為天下之計利害輕重又非難明者也同上舊時孤貧無業惟務販鹽所以五六年前盜賊稀少是時告捕之賞未嘗破省錢惟是犯人催納役人量出今鹽課浩大告訐如麻貧民販鹽不過一兩貫錢本偷稅則賞重納稅則利輕欲為農夫又值凶歲若不為盜惟有忍饑所以五六年來課利日增盜賊日衆臣勘㑹宻州鹽稅去年一年比祖額增二萬貫却支捉賊賞錢一萬一千餘貫其餘未獲賊人尚多以此較之利害得失斷可見矣蘇軾論河北京東盜賊狀又茍朝廷捐十萬貫錢買此兩路之人不為盜賊所獲多矣夫使朝廷為此兩路饑饉特出一二十萬貫見錢散與人户人得一貫只及二十萬人而一貫見錢亦未能濟其性命若特放三百斤以下鹽稅半年則兩路之民人人受賜貧民有衣食之路富民無盜賊之憂其利豈可勝言哉若使小民無以為生舉為盜賊則朝廷之憂恐非十萬貫錢所能了辦又况所支捉賊賞錢未必少於所失鹽課臣所謂較得喪之孰多權禍福之孰重者為此也去年杭州管常平米二十三萬石今年已糶過十五萬石雖餘八萬石而糶賣未巳又緣去年災傷放稅及和糶不行省倉闕數所有上件常平米八萬石只了兌撥充軍糧更無見在惟有糶常平米錢近八萬貫而錢非救饑之物若來年米益貴錢益輕雖積錢如山終無所用熈寧中兩浙市易出錢百萬緡民無貧富皆得取用而米不可得故曵羅紈帶金玉横尸道上者不可勝計今來浙東西大抵皆糶過常平米見在絶數少熈寧之憂凛凛在人眼中矣蘇軾奏浙西災傷狀自甲及乙自乙及丙無有窮已每限皆空身到官或三五限得一二百錢謂之破限官之所得至微而胥徒所取蓋無虚日俗謂此等為縣胥食邑户嗟乎聖人在上使民不得為陛下赤子而皆為姦吏食邑户此何道也蘇軾論積欠臣聞之父老章獻皇后臨朝日以江水有皇天蕩之險内出錢數十萬貫築長蘆起僧舍以拯溺者又見先帝以長淮之嶮賜錢十萬貫米十萬石起夫九萬二千人以開龜山河今浮山之嶮非特長蘆龜山之比而二聖仁慈視民如傷必將捐十五萬緡以平此積嶮也蘇軾乞開西湖狀軾官於鳳翔見民之所最畏者莫若衙前之役自其家之甕盎釜甑以上計之長役及十千鄉户及二十千皆占役一分所謂一分者名為糜錢十千可辦而其實皆十五六千至二十千而多者至不可勝計也科役之法雖始於上户然至於不足則遞取其次最下至於家貲及二百千者於法皆可科自近歲以來凡所科者鮮有能大過二百千者也夫為王民自甕盎釜甑以上計之而不能滿二百千則何以為民今也及二百千則不免焉民之窮困亦可知矣然而縣官之事歲以二千四百分為計所謂優輕而可以償其勞者不能六百分而捕獲強惡者願入焉摘發贓弊者願入焉是二千四百分者衙前之所獨任而六百分者未能純被於衙前也民之窮困又可知矣今之最便惟重難日損優輕日增則民尚可以生此軾之所為區區議以官𣙜與民也其詳固已具於府之所錄以聞者從軾之說而盡以予民失錢之以貫計者軾嘗粗較之歲不過二萬失之於酒課而償之以稅緡是二萬者未得為全失也就使為全失二萬均多補少要以共足此一轉運使之所辦也蘇軾上韓魏公論塲務今議者曰吾之法與淮浙不同淮浙之民所以不免於私販而竈戸所以不免於私賣者以官之買價賤而賣價貴耳今吾賤買而賤賣借如每斤官以三錢得之則以四錢出之鹽商私買於竈户利其賤耳賤不能減三錢竈户均為得三錢也寧以予官乎將以予私商而犯法乎此必不犯之道也此無異於兒童之見東海皆鹽也茍民力之所及未有捨而不煎煎而不賣者也而近歲官錢常若窘廹遇其急時百用横生以有限之錢買無窮之鹽竈户有朝夕薪米之憂而官錢在朞月之後則其利必歸於私販無疑也食之於鹽非若饑之於五穀也五穀之乏至於節口并日而况鹽乎故私販法重而官鹽貴則民之貧而懦者或不食鹽往在浙中見山谷之人有數月食無鹽者今將𣙜之東北之俗必不如往日之嗜鹹也而望官課之不虧踈矣且淮浙官鹽本輕而利重雖有積滯官未病也今以三錢為本一錢為利自祿吏購賞修築敖庾之外所獲無幾矣一有積滯不行官之所喪可勝計哉失民而得財明者不為况民財兩失者乎上文侍中𣙜鹽書銅布於下為天下菑何以言之銅布於下則民鑄錢者大抵必雜石鈆鐵焉黥罪日繁此一禍也銅布於下偽錢無止錢用不信民愈相疑此二禍也銅布於下采銅者棄其田疇家鑄者損其農事穀不為則隣於饑此三禍也故不禁鑄錢則錢常亂黥罪日積是陷阱也且農事不為有罪為菑故民鑄錢不可不禁止禁鑄錢必以死罪鑄錢者禁則錢必還重錢重則盜鑄錢者起則死罪又復積矣銅使之然也故銅布於下其禍博矣今博禍可除七福可致何謂七福上收銅勿令布下則民不鑄錢黥罪不積一銅不布下則偽錢不繁民不相疑二銅不布下不得采銅不得鑄錢則民反耕田矣三銅不布下畢歸於上上挾銅積以御輕重錢輕則以術歛之錢重則以術散之則錢必治矣四挾銅之積以鑄兵器以假貴臣小大多少各有制度以别貴賤以差上下則等級明矣五挾銅之積以臨萬貨以調盈虚以收竒羡則官必富而末民困矣六挾銅之積制而棄財以與匈奴逐爭其民則敵必壞矣七此謂之七福故善為天下者因禍而為福轉敗而為功今顧退七福而行博禍可為長太息者此其一也銅布篇宋文帝鑄四銖錢與五銖同用費無利故民不盜鑄及武帝即位又鑄孝建四銖形式薄小盜鑄者衆朝廷患之去歲春詔錢薄小無輪廓者悉不得行民間喧擾沈慶之建議以為宜聽民鑄錢郡縣置錢署樂鑄之家皆居署内平其準式去其雜偽去歲所禁新品一時施用今鑄悉依此格萬稅三千嚴撿盜鑄丹陽尹顔竣駁之以為五銖輕重定於漢世魏晉以降莫之能改誠以物貨既均改之偽生故也今云去春所禁一時施用若巨細總行而不從公鑄利己既深情偽無極私鑄剪鑿盡不可禁財貨未贍大錢已竭數歲之間悉為塵土矣今縱行細錢官無益賦之理百姓雖贍無解官乏唯簡費去華專在節儉求贍之道莫此為貴耳議者又以銅轉難得欲鑄二銖錢竣曰議者以為官藏空虚宜更改鑄天下銅少宜減錢式以救交弊賑國舒民愚以為不然今鑄二銖恣行新細於官無解於乏而民間姦巧大興天下之貨將糜碎至盡空嚴立禁而利深難絶不一二年其弊不可復救民懲大錢之改兼畏近日新禁市井之間必生紛擾遠利未聞切患猥及富商得志貧民困窮此皆甚不可者也乃止經濟類編吳越王宏佐議鑄鐵錢以益將士祿賜其弟牙内都虞候宏億諫曰鑄鐵錢有八害新錢既行舊錢皆流入鄰國一也可用於吾國而不可用於他國則商賈不行百貨不通二也銅禁至嚴民猶盜鑄况家有鐺釜野有鏵犁犯法必多三也閩人鑄鐵錢而亂亡不足為法四也國用幸豐而自示空乏五也祿賜有常而無故益之以啓無厭之心六也法變而弊不可遽復七也錢者國姓易之不祥八也宏佐乃止同上五年蔡京罷相監察御史沈畸言古者軍興錫賞不繼或以一當百或以一當千此權時之宜豈可行於太平無事之日自以當十之議召禍起姦遊手之民一朝鼓鑄無故而有數倍之息何憚而不為雖日斬之其勢不可遏也初王安石既與吕惠卿議定出示蘇轍等曰此青苗法也有不便以告勿疑轍曰以錢貨民本以救民然出納之際吏緣為姦雖有法不能禁錢入民手雖良民不免妄用及其納錢雖富民不免踰限如此則恐鞭箠必用州縣之事煩矣唐劉晏掌國計未嘗有所假貸而四方豐凶貴賤知之未嘗逾時有賤必糴有貴必糶以此四方無甚貴甚賤之病今此法見在而患不修公誠能有意於民舉而行之則晏之功可立竢矣安石曰君言誠有理當徐思之繇是逾月不言青苖㑹京東轉運使王廣淵言春農事興而民苦乏兼并之家得以乗急邀利乞留本道錢帛五十萬貸之貧民歲可獲息二十五萬從之其事與青苖法合安石始以為可用召廣淵至京師與之議於是決意行焉長編古今言錢帛之輕重者熟矣或更大錢或放私鑄或龜或貝或皮或刀或禁埋藏或禁銷毁或禁器用或禁滯積皆可以救一時之弊也然而或損或益者蓋法有行不行之謂也臣不敢遠徵古證竊見元和已來初有公取器用禁銅之令次有交易錢帛兼行之法近有積錢不得過數之限每更守尹則必有用錢不得加除之牓然而銅器備列於公私錢帛不兼於賣鬻積錢不出於牆垣欺濫偏行於井市亦未聞鞭一夫黜一吏賜一告訐壞一蓄藏豈法不便於時耶蓋行之不至也陛下誠能採古今救弊之方施賞罰必行之令則聖祖神宗之法制何限前賢後智之議論何窮豈特愚臣盜竊古人之見自稱革弊之術哉元稹錢貨議宋范㤗諫市民銅鑄錢曰治國若烹小鮮拯敝莫若務本未有民貧而國富本不足而末有餘者也故囊漏貯中識者不吝反裘負薪存毛實難自仁貴等覆師喪氣故虜得跳梁山谷又師行必藉馬力不數十萬不足與虜爭臣請天下自王公及齊人挂籍之口人稅百錢又弛天下馬禁使民得乗一大馬不為數限官籍勿使得隱不三年人間畜馬可五十萬即詔州縣以所稅口錢市之若王師大舉一朝可用且虜以騎為疆若一切使人乗之則市取其良以益中國使得漸耗虜兵之盛國家之利也高宗善之魏元忠愚以為今日之取於民者除江西歲運實京倉者外凡北方之賦無問粟麥黍豆之類隨年所有皆用為糧一以時價為準原額輸粟者估以時直如粟直六百文豆直三百則以二石准一石焉他皆倣此大學衍義補請於遼東宣府大同極邊之處各立一常平司不必專設官惟於户部屬遣官一二員歲往其處涖其事每歲於收成之候不問是何種穀遇其收穫之時即發官錢收糴貯之於倉穀不必一種惟其賤而收之官不必定價隨其時而予之其可久留者儲之以實邊城其不可久者隨時以給廪食之人凡諸穀一以粟為則如粟直八百豆直四百則支一石者以二石與之他皆准此然後計邊倉之所有豫行應邊運儲州縣俾其依價收錢以輸於邊如此不獨可以足邊郡而亦可以寛内郡矣同上三代以前世無不耕之民人無不給之家後世田不井授人不皆農耕者少而食者多天下之人食力者什三四而資糴以食者什七八矣農民無遠慮一有收熟視米穀如糞土變穀以為錢又變錢以為服食日用之需曾未幾時隨即罄盡不幸而有荒年則伐桑􅀥賣子女流離失所草芽木皮無不食者天下之民莫不皆然而淮北山東為甚臣願朝廷舉李悝平糴之法於此二處各立一常平司每司注户部屬官三員量地大小借與官錢為本每歲親臨所分屬縣驗其所種之穀麥熟㡬分粟熟幾分與夫大小豆之類皆定分數申達户部因種類之豐荒隨時價之多少收糴在官其所收者不分是何米穀逐月驗其地之在收市之所售粟少則發粟麥少則發麥諸穀俱不收然後盡發之若易朽腐者又在臨時斟酌隨處立倉通融般運分散量時取值凡貨物可用者皆售之不必專取銀與錢也其所得貨物可資國用者具數送官其餘聽從隨時變賣以為糴本同上若官中許於逐處預借和糴價錢並管在農司斟酌擘劃或以充合造耕稼之具或以為買糴糧種之資便須逐事計錢明收貫伯於東作之日貸於逐人於西成之時取其償直據官中合要斛斗依逐處時估分文折納入倉分明係帳且在農司收管遂旋牒報三司看三司如要收支即隨處差人交割仍㸃勘預借錢數准折勾銷有剰則計數潤官有欠則農司催促此亦應用之良䇿有速成之要期陳靖勸課今年秋稅和市草一千萬束便令人户送入城輸納每束兼車脚與折錢二十五文既利貧人兼濟公用希顔奉宣進止宜依者伏以制事之體所貴有常順人之情尤重改作革而能當尚恐未孚動且失宜曷繇無擾臣等又勘度支京兆比來雇車估價及所載多少大率每一車載一百二束每一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里遠者向二百里設令逺近相補通以百里為程則雇車載草百束悉依官司常估猶用錢三千五百文即是一束之草唯計搬運已當三十有五文買草本價又更半之而度支曾不計量自我作古輕以胸臆斟酌限為二十五文謂之加徵則法度廢隳謂之和市則名實乖反倘可其奏人何以觀豈如官自置塲要便收市欲少市則平其估以節費欲多市則優其價以招人買賣既和貧富俱便有餘者趨加饒易售之利不足者免轉求貴賃之資望委京兆尹幹當别和市草五百萬束以充貯備其所和市並隨要便官自置塲每塲置錢旋付價直時估之外仍稍優饒交易往來一依市利勿令官吏催遣道路遮邀但不抑人自當趨利其市草價直並於年支留府錢數内以給用不盡者充每市滿十萬束一度聞奏便以府司郵遞車牛並更雇脚相添轉徙塲所搬載送付苑中輸納如䝉聖恩允許臣即依此宣行陸贄折稅市草事狀嘗因經筵侍坐言散青苖錢不便自後朝廷更遣使者四十餘人分行天下以提舉勾當常平廣惠倉相度差役農田水利為名其實專使之散青苖錢臣竊自疑智識淺短不足以知天下變通之務又疑因臣之言激怒建畫之臣使行之更力繇是閉口不敢復言今行之纔數月中外鼎沸皆以散青苖錢為不便然後臣乃敢發口復言彼言青苖錢不便者大率但知所遣使者或年少位卑倚勢作威陵轢州縣騷擾百姓止論今日之害耳臣所憂者乃在十年之後非今日也夫民之所以有貧富者繇其材性智愚不同富者智識差長憂深思遠寧勞筋苦骨惡衣菲食終不肯取債於人故其家常有贏餘而不至狼狽也貧者啙窳偷生不為遠慮一醉日富無復贏餘急則取債於人債不能償至於鬻妻賣子凍餒填溝壑而不知自悔也是以富者常借貸貧民以自饒而貧者常假貸富民以自存雖苦樂不均然猶彼此相資以保其生今縣官乃自出息錢以春秋貸民民之富者皆不願取貧者乃欲得之提舉官欲以多散為功故不問民之貧富各隨户等抑配與之富者與債仍多貧者與債差少多者至十五緡少者不減千錢州縣官吏恐以逋欠為負又令貧富相兼共為保甲仍以富者為之魁首貧者得錢隨手皆盡將來粟麥小有不登二稅且不能輸况於息錢固不能償吏督之急則散而之四方富者不去則獨償數家所負力竭不逮則官必為之倚閣春債未畢秋債復來歴年䆮深債負益重或值凶年則流轉死亡幸而豐稔則州縣之吏併催積年所負之債是使百姓無有豐凶長無蘇息之期也貧者既盡富者亦貧臣恐十年之外富者無幾何矣富者既盡若不幸國家有邊隅之警興師動衆凡粟帛軍需之費將從誰取之臣不知今者天下所散青苖錢凡幾千萬緡若民力既竭加以水旱之災州縣之吏果有仁心愛民者安得不為之請於朝廷乞因郊赦而除之朝廷自祖宗以來以仁政養民豈可視其流亡轉死而必責其所負其勢不得不從請者之言也然則官錢幾千萬緡已放散而不返矣官錢既放散而百姓又困竭但使閭胥里長於收督之際有乞取之資此可以謂之善計乎且常平倉者乃三代聖王之遺法非獨李悝耿壽昌能為之也穀賤不傷農穀貴不傷民民頼其食而官收其利法之善者無過於此比來所以隳廢者繇官吏不得人非法之失也今聞條例司盡以常平倉錢為青苖錢又以其穀換轉運司錢是欲盡壞常平專行青苖也國家每遇凶年供軍倉自不能足用固無羨餘以濟饑民所頼者止有常平倉錢穀耳今一旦盡作青苖錢散之向去若有豐年將以何錢平糴若有㐫年將以何穀賙贍乎臣竊聞先帝常出内藏庫錢一百萬緡助天下常平倉作糴本前日天下常平倉錢穀共約一千餘萬貫石今無故盡散之他日若思常平之法復欲收聚何時得及此數乎臣以謂散青苖錢之害猶小而壞常平倉之害猶大也今陛下令薛向於江淮為貿易以三百萬緡畀之又散青苗錢數千萬緡其餘五十萬三十萬者固不足數爾臣言罷制置三司條例司及追還諸路提舉勾當常平廣惠倉使者其官員並送審官院與合入差遣青苖錢已散者令州縣候豐熟日催收本錢更不取利未散者毋得更散其常平倉錢穀依舊封樁令提㸃刑獄司管當則太平之業依然復故矣司馬光乞罷條例司常平使者大凡生於天地之間而五材之用為急五材者金木水火土也水火不資於作為金木自産於山澤唯土爰播植非力不成衣食之源皆出於此故可以勉人功定賦入者唯布麻繒纊與百穀焉先王懼物之貴賤失平而人之交易難准又立泉貨之法以節輕重之宜歛散弛張必繇於是蓋御財之大柄為國之利權守之在官不以任下然則穀帛者人之所為也錢貨者官之所為也人之所為者故租稅取焉官之所為者故賦歛捨焉此又事理著明者也是以國朝著令稽古作程所取於人不踰其分租出穀庸出絹調雜出繒纊布麻非此族也不在賦法列聖遺典粲然可徵曷常有禁人鑄錢而以錢為賦者也今之兩稅獨異舊章違任土之通方效筭緡之末法不稽事理不揆人功但估資産為差便以錢穀定稅臨時折徵雜物每歲色目頗殊惟計求得之利宜靡論供辦之難易所徵非所業所業非所徵遂或增價以買其所無減價以賣其所有一增一減耗損以多且百姓所營惟在耕織人力之作為有限物價之貴賤無恒而乃定稅計錢折錢納物是將有限之産以奉無恒之輸納物賤則供稅之所出漸多多則人力不給納物貴則收稅之所入漸少少則國用不充公私二途常不兼濟以此為法未之前聞往者初定兩稅之時百姓納絹一疋折錢三千二三百文大率萬錢為絹三疋價既稍貴數則不多及乎頒給軍装計數而不計價此所謂稅入少而國用不充者也近者百姓納絹一疋折錢千五六百文大率萬錢為絹六疋價既轉賤數則漸加向之蠶織不殊而所輸尚欲過倍此所謂供稅多而人力不給者也今欲不甚改法而粗救災害者在乎約循典制而以時變損益之臣謂宜令所司勘㑹諸州府初納兩稅年絹布定估比類當今時價加賤減貴酌取其中總計合稅之錢折為布帛之數仍依庸調舊制各隨鄉土所宜某州某年定出稅布若干端某州某年定出稅絹若干疋其有絁綿雜貨亦隨所出定名勿更計錢以為稅數其計錢為數者獨月俸資課而已制祿惟不計錢故三代以食人衆寡為差兩漢以石數多少為秩蓋以錢者官府之權貨祿者吏屬之常資以常狥權則豐約之度不得恒於家以權為常則輕重之柄不得專於國故先王制祿以食而平貨以錢然後國有權而家有節矣况今餽餉方廣倉儲未豐盡復古規或慮不足若但據羣官月俸之等隨百役資課之差各依錢數少多折為布帛定數某官月給俸絹若干疋某役月給資布若干端所給色目精粗有司明立條例便為恒制更不計錢物甚賤而官之所給不加物甚貴而私之所禀不減官司有准何利如之古之聖人所以取山澤之蘊材作泉布之實貨國專其利而不與人共之者蓋為此也物賤繇乎錢少少則重重則加鑄而散之使輕物貴繇乎錢多多則輕輕則作法而歛之使重是乃物之貴賤繫於錢之多少錢之多少在於官中盈縮官失其守反求於人人不得鑄錢而限令供稅是使貧者破産而假資於富有之室富者蓄貨而竊行於輕重之權下困齊人上虧利柄今之所病諒在於斯誠宜廣即山殖貨之功峻用銅為器之禁茍制持得所則錢不乏矣有糶鹽以入其直有𣙜酒以納其資茍消息合宜則錢可收矣錢可收固可以歛輕為重錢不乏固可以散重為輕弛張在官何所不可今既總收極甚之數定為兩稅矣所定别獻之類復在數外矣間緣軍用不給已甞加徵矣近屬折納價錢則又多獲矣比於大厯極甚之數殆將再益其倍焉復幸年穀屢豐兵車少息而用常不足其故何哉蓋以事逐情生費從事廣物有劑而用無節夫安得不乏乎茍能黜其情約其用非但可以布帛為稅雖更減其稅亦可也茍務逞其情侈其用非但行今重稅之不足雖更加其稅亦不足也陸贄請不計錢數狀臣所謂周制有從官借本賈者亦不以求民之利但令變所貸錢輸國服即以為息也此所謂王道也而鄭康成釋云以其於國服事之稅為息也於國事受園㕓之田而貸萬泉者則朞出息五百臣謂周禮園㕓二十而稅一近郊十一遠郊二十而三甸稍縣都皆無過十二惟漆林之征二十而五漆林自然所生非人力所作故稅重康成乃約此法謂從官貸錢若受園㕓之地貸萬錢者出息五百公彦因而疏解謂近郊十一者萬錢期出息一千遠郊二十而三者萬錢期出息一千五百甸稍縣都之民萬錢期出息二千臣謂如此則雖漆林之所取貸萬錢息二千五百也然當時未必如此今放青苗錢凡春貸十千半年之内便令納利二千秋再放十千至歲終又令納利二千則是貸萬錢者不問遠近之地歲令出息四千也周禮至遠之地出息二千今青苖取息尚過周禮一倍則制置司言比周禮取息立定分數已不為多亦是欺罔聖慈且謂天下之人皆不能辨也且古今異制貴於便時周禮所載有不可施於今者其事非一若謂泉府一職今可施行則上所言以官錢買在市不售及民間積滯之貨俟民急求則依元買價與之民有祭祀喪紀就官中借物限旬日三月還官而不取其利制置司何不將此周公太平已試之法盡申明而行之豈可獨舉注疏貸錢取息之一事以詆天下之公言哉韓琦論市易天下以錢為患二十年矣百物皆所以為貨而錢并輕其權錢有輕重大小又自以相制而資其所不及至三錢並行則相制之術盡矣而猶不足至於造楮以權之凡今之所謂錢者反聽命於楮楮行而錢益少此今之同患而不能救者也夫率意而戲造猥以補一時之闕而遂貽後日之憂大都市肆四方所集不復有金錢之用盡以楮相貿易擔囊而趨勝一夫之力輙為錢數百萬行旅之至於都者皆輕出他貨以售楮天下隂相折閱不可勝計故凡今之弊豈惟使錢益少而他貨亦并之矣設法以消天下之利孰甚於此興利之臣茍欲必行知模刻之易而不知其為盡錢之難十年之後四方之錢亦藏而不用矣將交執空劵皇皇焉而無從得此豈非天下之大憂乎夫見其有而因謂之有見其無而因謂之無者此常人不識爾所貴於智者推其有無之所自來不反手而可以除其患且今之所謂錢乏者豈誠乏耶上無以為用耶下無以為市耶是不然也天下之所以竭誠而獻者有二議有防錢之禁有羡錢之術夫南出於楚北出於燕中又自毁於器用盜鑄者雖殽雜而能增之為器者日損之而莫知也此其禁患於不宻也是誠可宻也若夫羨錢之術則鼓鑄而已矣雖然盡鼓鑄所得何足以羨天下之錢且天地之産東南之銅或暫息而未復雖有咸陽孔僅之巧何以致之噫不知夫造楮之弊驅天下之錢内積於府庫外藏於富室而欲以禁錢鼓鑄益之耶且錢之所以上下尊之其權盡重於百物者為其能通百物之用也積而不發則無異於一物銅性融液月鑠歲化此其朘天下之寳亦已多矣夫徒知錢之不可以不積而不知其障固而不流徒知積之不可以不多而不知其已聚者之不散役楮於外以代其勞而天下有坐鎮莫移之錢此豈智者之所為哉豈其思慮之有未及哉故臣以謂推其有無之所自來不反手而可以除其患者也雖然壅天下之錢非上下之所欲也用楮之勢至於此也賫行者有千倍之輕兌鬻者有什一之獲則楮在而錢亡楮尊而錢賤者固其勢也貴莫如珠金賤莫如泥沙至錢而平矣先王之用幣也錢居其一而後世之用錢也他幣至於皆廢誠以為輕重之適也故夫天下之貨未有可輕於錢者也一朝而輕千倍曾不為後日之計者何也此臣之所謂弊極而當反者也天下之事本無竒畫為竒畫者小人之自便以干其君者也不可聽也雖然臣又有疑焉計今日之錢自上而下者有兵之料有吏之俸自下而上者州縣倚鹽酒雜貨之入而民之賣易以輸送者大抵皆金錢也故雖設虚劵以隂納天下之錢而猶未至於盡藏而不用方今之事比於前世則錢既已多矣而猶患其少者何也古之盛世錢未嘗不貴物未嘗不賤漢宣帝時穀至石五錢所以立常平之法唐太宗新去隋亂而至富強米斗十錢以上為率何者治安則物蕃物蕃則民不求而皆足是故錢無所用往者東南為稻米之區石之中價財三四百耳歲常出以供京師而資其錢今其中米價已倍之矣不幸有水旱不可預計惟極南之交廣與素曠之荆襄米斗乃或止百錢為率耳然大要天下百物皆貴而錢賤𤓰匏果蓏魚鱉牛彘凡山澤之所産無不盡取非其有不足也而何以至此且以漢唐之賦祿較之於吾宋其用錢之增為若干以承平之賦祿較之於今日其用錢之增又若干東南之賦貢較承平之所入者其錢之增又若干昔何為而有餘今何為而不足然則今日之患錢多而物少錢賤而物貴也明矣天下惟中民之家衣食或不待錢而粗具何者其農力之所得者足以取也而天下之不為中民者十六是故常割中民以奉之故錢貨紛紛於市而物不能多出於地夫持空錢以制物猶不可而况於持空劵以制錢乎然則天子與大臣當憂其本而已矣葉適理財中論錢幣清河客李蕚年二十為郡人乞師于顔眞卿曰公首唱大義河北諸郡恃公以為長城今清河公之西隣國家平日聚江淮河内錢帛于彼以贍北軍今有布三百餘萬匹帛八十餘萬匹錢三十餘萬緡糧三十餘萬斛昔討黙啜甲兵皆追于庫今有五十餘萬事户七萬口十餘萬竊計財足以三平原之富兵足以倍平原之強公誠資以士卒撫而有之以二郡為腹心則餘如四肢無不隨所使矣經濟李德裕劾奏智興為壇泗州募願度者人輸錢三千則不復勘詰普加髠落自淮而右户三丁男必一丁剔髠規影徭賦所度無筭臣閱度江者日數百蘇常齊民十固八九若不加禁遏則前至誕月江淮失丁男六十萬不為細變左編司空馬說趙王曰文信侯相秦臣事之為尚書習秦事今大王使守小官習趙事請為大王設秦趙之戰而親觀其孰勝趙孰與秦大曰不如民孰與之衆曰不如金錢粟孰與之富曰弗如國孰與之治曰不如相孰與之賢曰不如將孰與之武曰不如律令孰與之明曰不如經濟貢禹上書曰臣為諫大夫俸銀月九千二百廩食太官及為光祿大夫俸錢月萬二千祿賜愈多家日以富蓋寛饒為司𨽻俸錢月數千半以給吏民為耳目言事者或者往往疑以謂俸入不及今之簿尉而能儉以足用如此僕謂漢之士風固雖近古漢之錢物固雖艱得不應僅得數千或謂家以日富蓋俸錢之外又有祿米及其他頒賚之屬據史漢百官臘及春有賜漢之諫大夫秩比八百石月得八九十斛光祿大夫秩比二千石月得百斛司𨽻二千石月得百二十斛二公俸錢之外每月所得祿米如是又能儉以用度所以為有餘也漢人誠實可喜如此非如後人以有為無以多為寡務以欺人因而考之漢制三公號為萬石謂一歲共食萬斛然考漢制三公俸月三百五十斛以歲計之四千餘斛耳成帝時益大司馬大司空俸注丞相大司馬俸錢月六萬御史大夫俸錢月四萬延平間定制中二千石月俸錢九千米七十斛眞二千石錢六千五百米六十五斛比二千石錢五千米三十四斛其視前漢米減三之二錢減大半當時士夫亦罕以俸薄為言者唐初祿制正一品米七百石錢九千八百正二品米五百石錢八千正三品米四百石錢七千大率如此自艱難以來增置使額大厯中權臣月俸有至九千貫刺史無大小皆千貫其視兩漢不啻數倍而兩漢職田無聞唐一品十二頃二品十頃以下皆有差唐之俸祿多於兩漢如此當時詞人見於歌詩如元微之在政府與妻詩曰今日俸錢過十萬與君朝暮復營齋通政司馬詩曰月儲三萬養教閒白樂天詩曰典較在秘書一馬兩僕夫俸錢萬六千月給亦有餘孟郊詩曰贑人年六十每月請三千見於詩者往往如此僕謂唐人俸祿守佐以上有不待言簿尉下僚未免為薄觀孟郊所謂每月請三千之說可以類推矣然考唐九品月得五十七石使果得此亦足用度而郊以吟詩廢務上官差官以攝其職分其半祿酸寒之狀可想而知觀此語亦可以發一笑也而下僚俸祿所得雖不等要無鮮薄之嘆夫國家設祿本以養亷而所得不足以育妻孥且動遲數年之次責其亷隅得乎故漢人增俸多增於下寮如宣帝益吏俸百石以下俸十五光武增百官俸其千石以上減於西京舊制矣百石以下加於舊秩蓋知此也野客叢書錢通卷二十七
