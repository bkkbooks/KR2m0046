body:
  text: 錢通卷九明胡我琨撰四之用語曰流水不腐泉之貴于行也度支積散不歸于要則皆腐即有金如土何禆焉請言用法運行與天地同流大利出焉而不尸若有神焉潛通于泉府而我適麗夫用之名如此又何能轉相餽遺自尸其低昂之權乎故用曰四流行髙祖始詔天下用錢十九年公鑄粗備文曰太和五銖詔京師諸鎮皆通行之在所遣錢工備爐冶民有欲鑄聽就鑄之銅必精煉無所和雜食貨志肅宗初京師及諸州鎮或鑄或否或有止用古錢不行新鑄致商貨不通貿遷頗隔尚書令任城王澄上言太和五銖乃大魏之通貨不朽之常模寧可專貨于京邑不行于天下請並下諸方州鎮其太和及新鑄五銖辨古錢内外全好者不限大小悉聽行之食貨志洪遵曰開元錢唐髙祖始鑄其後髙宗乾封肅宗乾元以至大厯建中咸通各因其年以名錢然行之不久惟開元錢唐三百年冶鑄相繼故流行至今甚多舊志乾和後聚銅錢城内用鉛城外用銅禁其出入犯者抵死俸禄非特恩不給銅錢漢史梁初惟京師及三吳荆郢江襄梁益用錢其餘州郡則雜以穀帛交易交廣之域則全以金銀為貨食貨志文宗病幣輕錢重詔方鎮縱錢穀交易時雖禁私造詔從其請置交子務於益州銅錢一十三路行使開封府界京東路京西路河北路淮南路兩浙路福建路江南東路江南西路荆湖南路荆湖北路廣南東路廣南西路銅鐵錢兩路行使陜府西路河東路鐵錢四路行使成都府梓州路䕫州路孝宗隆興元年詔官印㑹子以隆興尚書户部官印㑹子之印為文更造五百文㑹又造二百三百文㑹五年置江州㑹子務乾道二年因左司諌陳祐言㑹子之敝出内庫及南庫銀一百萬兩收之三年正月度支郎中唐琢言自紹興三十一年至乾道元年七月共印過㑹子二千八百餘萬道止乾道二年十一月十四日以前共支取過一千五百六十餘萬道除在官司樁管循環外其在民間者有九百八十萬道自十一月十四日以後措置收換截至三年五月六日共繳過一百一十八萬九千餘貫尚有八百餘萬貫未收大約毎月收過換不過六七十萬縁諸路綱運依近指揮並要十分見錢州縣不許民户輸納㑹子是致在外㑹子徃徃商賈低價收買輻凑行在所以六務支取擁并詔給降度牒及諸州助教帖各五千道付𣙜貨務召人全以㑹子入納候出賣将盡申取朝廷節續給降務欲盡收㑹子也六月户部曾懐言㑹子除收還外尚有四百九十萬貫在民間乞存留行使十二月以民間㑹子有破損者别造五百萬換給他日又詔損㑹貫百錢數可照者並作上供錢解發鉅室以低價收者坐罪四年以取到舊㑹毁抹截一付㑹子局重造三年立為一界界以一千萬貫為額遂界造新換舊差户部尚書曾懐同共措置鑄提領措置㑹子庫印依左藏庫推賞其將帶經過務場不得收税蔣芾奏曰此日用㑹子收囘金銀若㑹子稍多又出錢銀收之陳俊卿奏曰歛散抑揚權之在上可以無弊其年四月一日興工印造至歲終可造一千萬貫措置收換舊㑹毎道收縻費錢二十足零百半之應舊㑹破損但貫百字存印文可驗者即與兑換内有假偽將辨驗人吏送所司其監官取朝廷指揮毎驗出一貫偽㑹追究元收兑㑹子人錢三貫與辨驗人如官吏用心訖事無假偽具姓名推賞自十二月一日始置局收換至明年三月十日終盡絶更不行用淳熙三年詔第三界四界各展限三年令都茶塲㑹子庫將第四界銅板接續印造㑹子二百萬赴南庫樁管當時户部歲入一千二百萬其半為㑹子而南庫以金銀換改者四百萬流行於外者纔二百萬耳范成大攬轡録載金本無錢悉用中國舊錢又不欲留錢於河南放中國楮幣於汴京置局造官會謂之交鈔擬見錢行使而隂收銅錢悉運而北過河即用錢不用鈔鈔文大略曰南京交鈔所凖户部符尚書省批降檢會昨奏南京置局印造一貫至三貫例交鈔許人納錢給鈔河南路官私作見錢流轉若赴庫支取即時給付毎貫輸工墨錢一十五文候七年納換别給以七十為陌偽造者斬賞錢三百千前後有户部官當令史官交鈔庫使副書押四圍畫龍鶴有飾文獻通考右石湖乾道間充乏使入金道汴京有交鈔所載其所見如此其時中國亦以幣權錢然東南之地有㑹子又有川引淮交湖㑹而鼓鑄之所亦復不一所以常困錢幣多而賤秤提無策而彼則惟以交錢行之河南以中國舊錢行之河北似反簡易也元祐間頴濵使遼回奏事亦言北界别無錢幣惟用中國錢云先是京師百物有行官司所須俱以貴辨下逮貧民浮販類有陪折吕嘉問請約諸行利入厚薄令納錢以賦吏禄與免行户祗應而禁中賣買百貨並下雜買務仍置市司估物低昻凡内外官司欲占物價則取辦焉至是乃行之㑹編髙后二年行八銖錢即秦半兩錢也漢初患其重更鑄榆莢人患太甚故復行此六年行五分錢即榆莢武帝建元元年行三銖錢五年罷三銖錢行半兩錢明帝太始初惟禁鵞眼綖環其餘皆通用復禁民鑄官署亦廢工尋又普斷惟古錢原闕十四年十二月鹽鐵使李若初奏諸道州府以近日泉貨數少繒帛價輕禁止見錢不令出界致使課利有缺商賈不通請指揮見錢任其徃來勿使禁止從之後唐同光二年勑令京師及諸道於市行使錢内檢㸃雜惡鉛錫並宜禁斷沿江州縣毎有州船到岸嚴加覺察不許將襍鉛錫惡錢徃來換易好錢如有私載並行收納天成元年中書門下奏訪聞諸道州府所買賣銅器價貴多是銷鎔見錢以邀厚利宜遍告曉如元舊破損銅器及碎銅即許鑄造銅器生銅器毎斤價定二百熟銅器毎斤四百如違省價買賣之人依盗鑄錢律文科斷又敕諸道州府約勒見錢素有條制若全禁斷實匪通規宜令三京諸道州府城門所出見錢如五百以上不得放出俱㑹編太祖時取唐朝飛錢故事許民入錢京師於諸州便換其後定外地閑慢州乃許指射自此之後京師用度益多諸州錢皆輸送其轉易當給以錢者或移用他物宋史六年詔司農丞許子中徃淮西措置鐵錢子中言舒蘄黄州皆産鐵合置監且鑄折二錢詔户部支凑二十萬貫為本又詔發運司管四監子中所管三監毎歲各認三十萬貫其大小鐵錢令兩淮通行宋史開元六年春正月禁惡錢勑錢重二銖四分以上乃得行歛人間惡錢鎔之更鑄如式宋璟請出太府錢二萬緡以平價買百姓不售之物可充官用庶使良錢流布人間其後敕太府及府縣出粟十萬石糶之以歛人間惡錢送少府銷毁通鑑十一載春二月以粟帛庫錢易惡錢先是江淮多惡錢貴戚大商徃徃以良錢一易惡錢五載入長安市井不勝其弊故李林甫奏請禁之官為易取期一月不輸官者罪之於是商賈不以為便遮楊國忠馬自言國忠為言於上乃更命非鉛錫所鑄及穿穴者皆聽用之敕小錢一當十其重輪者當三十三品錢行浸久屬歲荒米斗至錢七千人相食京兆捕私鑄者數月間榜死者八百餘人不能禁乃敕開元錢與乾元小錢皆當十其重輪者當三十唐𤣥宗勑大小錢皆當一民始安之㑹編𤣥宗開元初宰相宋璟請禁惡錢行二銖四絫錢毁舊錢不可用者江淮有官鑪錢偏鑪錢稜錢時錢遣監察御史蕭隠之使江淮括惡錢隱之嚴急煩擾怨嗟盈路坐貶官璟又請糶十萬斛收惡錢少府毁之安帝元興中桓𤣥輔政議欲廢錢用榖帛朝議以為不可迺止臣僚言泉廣二舶司及西南二宗司遣州回易悉載金錢四司既自犯法郡縣巡尉其能誰何至淮楚屯兵月費五十萬見緡居其半南北貿易緡錢之入易境者不知其幾於是沿邊皆用鐵錢矣所以淮南舊鑄銅錢乾道初詔兩淮京西悉用鐵錢荆門𨽻湖北以地接襄峴亦用鐵錢而淮西鼓鑄鐵錢未辦議者欲取之蜀事既行叅政洪适以為不便上然之但即蜀中取十五萬緡行之廬和而已宋史文彦博知永興軍或言陜西鐵錢不便乞一切廢之朝廷雖不從人多知之爭以鐵錢買物賣者不肯受長安民多閉肆僚屬請禁之彦博曰如是此愈使惑擾也乃召絲絹行人出其家縑帛數百匹使賣之納其直盡以鐵錢勿以銅錢也若是則知鐵錢不廢市肆安記聞録開寳元年舊禁銅錢無出化外乃聞江邊縱弛不復檢察自今五貫以下者抵罪有差五貫以上其罪死長編開寳六年禁銅錢不得入蕃界及越江海至化外嘉祐四年詔聞陜西民間多濫鑄大錢以至市易不通其以見行當三大鐵錢並當小鐵錢之二先是議者欲變大鐵錢當一集賢校理陸詵言民間貴小銅錢而賤大鐵錢他日一當三猶輕之今與小錢均直則大錢必廢請以一當二則公私所損無幾而商賈可以通行兼盗鑄計其物直無嬴則必自止詔行之自是盗鑄乃止長編紹興二十五年直秘閣兩浙轉運副使鍾世明乞四川諸路應繫大鐵錢並依各州路作二文使用官司不得括責拘收從之蜀自漢以來用銅錢至公孫述據蜀始更造鐵錢歴代仍用銅錢孟氏廣政初復鑄鐵錢互用乾德三年平蜀後吕餘慶鎮蜀日首與沈義倫奏乞㨂出銅錢計綱發充上供其川界止行用鐵錢後以為非便淳化間乃令兩川銅鐵錢兼先是益卭嘉眉等州皆鑄鐵錢五十餘萬緡後因李順之􅅍罷鑄久之民間闕錢始用私行交子因而弊端百出景德三年張詠言毎銅錢一小鐵錢十相兼用陳初承梁喪􅅍之後鐵錢不行始梁末又有兩柱錢及鵞眼錢於是人雜用其價同但兩柱重而鵞眼輕私家多鎔錢又間以錫錢兼以粟帛為貨髙宗論交子之弊曰如沈該稱提之説但官中常有百萬緡遇交子減價自買之即無弊矣大學衍義補王安石嘉祐四年以陜西民間多盗鑄大錢於是以見行當三大錢折小銅錢二謂之折二錢神宗熙寧四年皮公弼在陜西嘗建言陜西見行當二大銅錢頃歲西邊用兵始鑄當十錢後兵罷多盗鑄乃以當三猶私鑄乃減當二行之至今銅費相當民無冐利盗鑄衰息請以舊銅鉛盡鑄當二錢從之其後折二錢遂行天下熙寧九年上批都下錢法自祖宗以來未嘗有改其新行折二錢不須取索比較利害宜直指揮京師並畿内並罷先是薛向鑄折二錢於陜西其後許彦又置于廣南以償銅價既而有言折二錢民或不肯折用又諸路繼有如此者故始詔令府界不用後章惇乞并府界用之上曰府界既用即當令京師亦用之至是有言民以折二錢不售訴於開封而後被决者又言有訴三司者以故上批欲罷之及中書訪問開封府三司皆言無是事乃再以進呈上又云但恐經久富民藏小錢莫出爾安石曰大錢亦無多富民豈肯藏小錢不出藏小錢不出於富民亦有何利矣上又曰恐四夷聞中國行兩等錢以為貧窘乃傷國體如何安石曰錢有二品自周已然何係貧富且自古興王唐太宗周太宗時極貧然何足為恥臣初不欲鑄折二錢今乃極論者葢朝廷舉動四方所瞻稍有罅隙即為奸人窺伺愚弄將不能立國是又何以能安天下國家也上乃令復行之然兩宫訖不欲用折二錢故折二錢未嘗進入禁中詔别印二百三百五百一貫交子三百萬止於兩淮州縣行使其日前舊㑹聽對換應入納買賣並以交子見錢中半如徃來不便詔給交子㑹子各二十萬付鎮江建康府𣙜貨務使淮人之過江江南人之度淮者皆得對換循環使用然自紹興末年以前銅錢禁用於淮而易以鐵錢㑹子既用於淮而易以交子於是商賈不行淮民以困右司諌陳良祐言莫若如舊從民便鐵錢已散銅錢已收且令兼行以鐵錢二當銅錢一交子可以盡罷無疑也上曰朕亦知其不可行只為武鋒一軍在彼良祐又奏交子不便詔兩淮郡守漕臣各條其利害乃謂所降交子數多而銅錢并㑹子又不過江是致民旅未便詔銅錢并㑹子依舊過江行使其民間交子許作見錢納官應在官交子目下盡數赴行在左藏庫交納後又詔銅錢并㑹子依舊過江行使又詔江南州郡民間行使淮交者從便至嘉定十五年增印及三百萬其數日増價亦日損稱提無其術也宋史慶厯中陜西河東皆用鐵錢後小鐵錢獨行於河東而陜西許用鐵錢及大鐵錢以一折二然小鐵錢凡四十萬緡積在同華二州熙寧詔賜河東以鐵償之永興路安撫吳中復請以錢四十貫缺薄惡錢一斤以所買惡錢悉改鑄大錢秦鳳轉運使熊本言今雖以錢四十得偽錢一斤及銅錢千易當二千其實鐵錢一斤才當斤鐵耳錢千錢為鐵六斤鑄為錢二千而以銅錢千易之官失多矣又錢多一年改鑄未得竟也且民賣千錢得二百五十折二大鐵才易其半又禁其通行大錢時方災傷民所有錢四亡矣㑹編初行㑹子户部侍郎錢端禮被㫖造㑹子儲見錢于城内外流轉其合發官錢並許兑㑹子輸左藏庫通行於兩浙及諸州宋史光宗紹熙二年詔帥漕司賑糶收破缺鐵錢及私錢明年又降度牒二道換私銕錢臣僚言江北公行以銅錢一准銕錢四禁之當時銅錢之在江北者自乾道以來悉以銕錢收換或以㑹子一貫換錢一貫省其銅錢解赴行在及建康鎮江沿江州軍闗津去處委官撿察又於江之南北各置官庫以銅銕錢交換凡沿江私度及極邊徑路嚴禁透漏宋史前漢食貨志曰太公為周立九府圜法退又行之于齊至管仲相桓公通輕重之權遂顯伯名蘇冕唐㑹要曰㑹昌六年二月勑縁諸道鼓鑄佛像鐘磬等新錢已有次第須令舊錢流布起今年十月以後公私行用並取新錢其舊錢權停度支貞元七年冬司農卿李謨免官初司農當供三宫冬菜二千車以度支給車直稍錢又阻雨菜敗謨以度支為辭上責其不先聞故免之先是謨奏司農菜不足請京兆府市之尹薛珏萬年令韋彤乃禁人私賣上命奪珏俸一月彤俸三月唐書唐致仕官非有特勑例不給俸國初循用唐制至真宗乃始詔致仕官特給一半料錢石林燕語度支奏歲入之數錢九百二十五萬緡内五百五十萬緡租税八十二萬餘緡𣙜酤二百七十八萬餘緡鹽利㑹編自乾德中諸州支度經費外凡金帛悉送闕下於是利歸公上而條禁文簿漸為精宻吏不得售其姦太宗尤留意財用淳化初詔凖漢制上計之法每歲三司具見管金銀錢帛軍儲等簿以聞每歲天下緡錢總入至一萬五千八十五萬一百而出亦相近矣至是丁謂着令計録以獻因條經費及吉凶大體已徃者以備參較優詔奬之宋史自復𣙜法兵民輦運不勝其苦並邊務誘人入中芻粟皆為虚估騰踊至數倍大耗京師錢幣太常博士范祥闗中人也熟其利害常謂兩地之利甚博而不能少助邊計者公私侵漁之害也儻一變法歲可省度支緡錢數十百萬乃畫䇿以獻遂命制置其事使推行之論者爭言其非是遣户部使包拯馳視還言其便論者猶籍籍驛召祥至與三司雜議皆是祥所建詔從之田况請久任祥以專其事乃擢祥為轉運使於是舊禁鹽地一切通商聽鹽入蜀罷九州軍入中芻粟令入實錢償以鹽授以要劵即池驗劵按數而出盡弛兵民輦運之役以商所入緡錢糴粟輸並邊九州軍而悉留𣙜貨物錢幣以實中都由是黠商貪賈無所僥倖闗内之民得安其業公私便之㑹編初陜西轉運使李參以部内多戍兵而糧儲不足令民自隱度麥粟之贏先貸以錢俟熟還官號青苗錢經數年廩有餘糧至是條例司請以諸路常平廣惠倉錢穀依陜西青苗錢例民願預借者給之令出息二分随夏秋税輸納願輸錢者從其便如遇災傷許展至豐熟日納非惟足以待凶荒之患民既受貸則兼并之家不得乘新陳不接以邀倍息又常平廣惠之物收藏積滯必待年儉物貴然後出糶所及者不過城市㳺手之人今通一路有無貴發賤歛以廣蓄積平物價使農人有以赴時趨事而兼並不得乘其急凡此皆以為民而公家無所利其入是亦先王散惠興利以為耕歛補助之意也欲量諸路錢穀多寡分遣官提舉每州選通判幕職官一員典幹轉移出納仍先自河北京東淮南三路施行俟有緒推之諸路詔曰可乃出内庫緡錢百萬糴河北常平粟而常平廣惠倉之法遂變為青苗矣宋史初詔監司各定所部助役錢數利州路轉運使李瑜欲定四十萬鮮于侁時為判官爭之曰利州民貧地瘠半此可矣瑜不從遂各為奏時諸路役書皆未就帝是侁議諭司農曽布使頒以為式因黜瑜而擢侁副使兼提舉常平㑹編天下吏人素無常禄惟以受賕為生徃徃致富者熙寧三年始制天下吏禄而設重法以絶請托之弊是歲京師諸司歲支吏禄錢三千八百三十四貫二百五十四歲歲増廣至熙寧八年歲三十七萬一千五百三十三貫一百七十八自後増損不常皆不過此數京師舊有禄者及天下吏禄皆不預此數夢溪筆談舊唐制官職三班奉職月俸錢七百驛羊肉半斤祥符中有人為詩題所在驛舍間曰三班奉職實堪悲卑賤孤寒即可知七百料錢何日富半斤羊肉幾時肥朝廷聞之曰如此何以責㢘隅遂増今俸同上建炎中平江造戰船略計其費四百料八艣戰船長八丈為錢一千百五十九貫四艣海鶻船長四丈五尺為錢三百二十九貫老學菴筆記凡自河以北州軍縣寨一百八十有七城主客之民七十萬五千有七百户官吏在職者一千二百餘員廂禁軍馬義勇民兵四十七萬七千人騎歲支糧草錢帛二千四百四十五萬而非常之用不與焉歐陽文忠公論河北州軍財産用度一錢以上皆籍於三司有敢擅用謂之自盗而所謂公使錢多者不過數千緡百須在焉而監司又伺其出入而繩之以法至於用間則曰官給茶綵夫百餅之茶數束之綵其不足以易人之死也明矣蘇子由集初楊復泰借度支賣麯之利一年以贍軍而不復歸至是崔𦙍欲抑宦官罷之令酤者自造而月輸錢度支并近鎮亦禁之李茂貞惜其利表乞入朝論奏韓全誨請許之茂貞至京師全誨深與相結𦙍始懼益厚朱全忠而與茂貞為仇敵矣五季史命官考三司簿籍商量經久廢置之宜凡歲費皆著為定式帝嘗患増置官司費財王安石謂置官司所以省費帝曰古者什一而税今取財百端安石謂古非特什一而已安石又欲盡禄天下之吏帝未之許而三司上新増吏禄歲至緡錢百十一萬有竒主新法者皆謂吏禄既厚則人知自重不敢冐法可以省刑然良吏實寡賕取如故徃徃陷重辟議者不以為善至是詔三司帳司㑹計是歲天下財用出入之數以聞法益宻矣㑹編吳炌為宣撫副使專治戰守於財計不問盈虚一切以軍旅趣辦於趙開數以饋餉不繼訴於朝開亦自劾老憊求去朝廷為之變辭乃以席益為制置大使位宣撫副使上州軍兵馬並𨽻大使司邊防重事仍令宣撫司處置益至四川頗侵用軍期錢開復訴于朝又數増錢引而軍計猶不給朝廷以開益不協乃召開赴行在而以李迨代之自金人犯陜蜀開職饋餉軍用無乏其後計臣屢易於開經畫無敢變更然茶鹽榷酤竒零絹布之征遂為蜀常賦則開作俑之責不能逃焉益尋以母䘮亦去宋史詔加太學餐錢寛科塲恩例從賈道之請也同上唐時一品月俸八千後以防閣庶僕俸銀雜用以月給之總稱月俸為錢三萬一千比以今制俸薪直堂算之數亦相倣然唐之時猶有職田禄米一品歲七百石此為優耳及至大厯以後權臣月俸有至九十萬者刺史亦皆十萬則不啻倍蓰矣筆麈開元二十四年始定百官月俸一品月三十千二品月二十四千遞至九品月一千九百有竒大厯十二年加京官俸三公宰相每月各一百二十貫文中書門下侍郎月各一百貫文遞至雜職月各一貫九百餘文一貫當是一千開元之制與今略相倣大厯則溢三倍矣同上唐世俸錢自㑹昌以後不復增减三師二百萬三公一百六十萬侍中一百五十萬中書令兩省侍郎左右僕射一百四十萬尚書御史大夫一百萬節度使三十萬葢計一歲而言之也一萬當為十緡二百萬則二千緡矣至北漢劉崇以大原一道正位建國宰相月俸止百緡節度使止三十緡較之唐末已為大减矣迺今一統之盛宰相月俸猶不能半此則近代之俸可謂至薄也肅宗末年史朝義兵分出宋州淮運於是阻絶租庸鹽鐵泝漢江而上河南尹劉晏為户部侍郎兼勾當度支轉運鹽鐵鑄錢使江淮粟帛繇襄漢越商於以輸京師及代宗出陜州闗中空窘於是盛轉輸以給用廣德二年廢勾當度支使以劉晏顓領東都河南淮西江南東西轉運租庸鑄錢鹽鐵轉輸至上都度支所領諸道租庸觀察使凡漕事亦皆决於晏晏即鹽利顧傭分吏督之随江汴河渭所宜故時轉運船繇潤州陸運至揚子斗米費錢十九晏命囊米而載以舟减錢十五繇揚州距河隂斗米費錢百二十晏為歇艎支江船二千艘每船受千斛十船為綱每綱三百人篙工五十自揚州遣將部送至河隂上三門號上門填闕船米斗减錢九十調巴蜀襄漢麻枲竹篠為綯挽舟以朽索腐材代薪物無棄者未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積河口渭船之運入太倉歲轉粟百一十萬石無升斗溺者輕貨自揚子至汴州每䭾費錢二千二百減九百歲省十餘萬緡唐志李絳奏振武天德左右良田可萬頃請擇能吏開置營田可以省費足食上從之絳命度支使盧坦經度用度四年之間開田四千八百頃收穀四千餘萬斛歲省度支錢二十餘萬緡邊防頼之牛僧孺聞李德裕代己乃以軍府事交付副使張鷺即時入朝時揚州藏錢帛八十萬貫匹及德裕至鎮奏領得一十四萬仍半為張鷺支用訖僧孺上章訟其事詔德裕重撿括果如僧孺之數德裕稱初到鎮疾病為吏隱欺請罰詔釋之補闕王績拾遺令狐綯等連章論德裕妄奏錢帛以傾僧孺上竟不問仁宗時西事日擾括畿内京東西淮南馬詔樞宻同宰臣議邊事出内藏緡錢八十萬陜西糴軍儲訪知邊事者釋宼所至州縣罪及夏税時禁越職言事富弼因論日食謂應天變莫若通下情帝嘉納之於是盡除其禁許中外臣庶上封章言朝政得失經濟編漢時錢極重而幣輕穀價甚賤時至斛五錢故嘉言是時外戚貲千萬者少正使有千萬亦是今一萬貫中下户皆有之漢律丞相大司馬大將軍月俸六萬乃今六十貫御史大夫四萬而大將軍米月三百五十斛下至佐史秩百石猶八斛有竒其賜臣下黄金每百斤二百斤少亦三十斤雖燕王劉澤以諸侯賜田生金亦二百斤梁孝王死有金四十餘萬斤幣輕故米賤金多近世患國用不足以為錢少故夾錫當十等交具卒未嘗有補葢錢之多寡係幣之輕重不在鼓鑄廣狹也如魏文侯相李悝言一夫治田百畝畝收粟一石半為粟百五十石一夫五口人月食一石半百畝之入以其十五石為税九十石為食餘四十五石錢三十計錢千三百五十而社閭嘗新春秋之祠只用錢二百而其餘錢以為五口之衣衣人率用錢三百五人終歲用千五百今只餘千五十不足四百五十則固不嫌錢之少也然正使幣輕亦何至是葢日用猶不滿一錢不知何以為生綱目斷給散郭威取滑州庫物以勞將士且諭之曰聞侯令公已督諸軍自南來吾欲全汝曹功名不若奉行前詔吾死不恨皆曰國家負公公不負國家所以萬人争奮如報私讐侯益輩何能為乎王竣狥於衆曰我得公處分克京城聽旬日剽掠衆皆踴躍漢主聞威至河上悔懼私謂竇貞固曰屬者亦大草草李業等謂傾府庫以賜諸軍乃賜禁軍人二十緡下軍半之將士在北者給其家仍使通家信以誘之威至封丘人情恟懼太后泣曰不用李濤之言宜其亡也㑹編帝召羣臣㑹議北地太守皇甫嵩以為宜解黨禁益出中藏錢西園廐馬以班軍士同上晉詔徴褚裒輔政尚書劉遐説之曰㑹稽王令德雅望足下宜以大政授之裒乃固辭歸藩昱清虚寡欲尤善𤣥言常以劉惔王濛韓伯為談客郗超謝萬為掾屬超鑒之孫也少卓犖不覊父愔簡黙冲退而嗇於財積錢至數千萬常開庫任超所取超散施親故一日都盡萬安之弟也清曠秀邁亦有時名同上侍御史吳燧等論故蜀帥余玠聚歛罔利七罪玠死其子如孫盡竊帑庾之積以歸詔簿録玠家財以犒師振邊如孫認錢三千萬徴之累年始足宋史馬援在河西有穀數萬斛乃嘆曰凡殖財者貴以施也否則守錢虜耳華嶠後漢書莽白太后宜衣繒損膳以示天下莽亦素食上書願出錢百萬獻田三十頃助給貧民公卿皆效慕焉㑹編李吉甫以為汝州扞蔽東都而河陽宿兵本以制魏博今田𢎞正歸順則河陽為内鎮不應屯重兵以示猜阻以重𦙍兼汝州刺史使徙鎮之加𢎞正簡挍右僕射賜其軍錢二十萬緡𢎞正曰吾未若移河陽軍之為善也同上初郭崇韜率蜀中富民輸犒賞錢五百萬緡晝夜督責有自殺者給軍之餘猶二百萬緡通鑑民饑者四十六萬户死者甚衆詔户月給米六斗以没入朱清張瑄財産賑之時浙東宣慰同知托歡徹爾議行勸貸之令歛富民錢百五十萬以二十五萬屬寧海縣簿胡長孺藏之長孺察其有乾没意悉散於民既而果索其錢長孺抱成案進曰錢在是托歡徹爾雖怒不敢問元史元和四年上嘉魏謨諫諍詔訪其故居則質賣已更數姓析為九家矣上出内庫錢二百萬贖之以還其家禁其質賣雍録宋制凡上軍遣戍皆本司整比軍頭司引對便殿給以裝錢代還亦入見犒以飲食㨂㧞精鋭升補之或退其疲老者凡大祀有賞給每歲寒食端午冬至各有特支戍邊每季又加給銀鞋環慶縁邊艱於釁給者又有薪水錢其役兵勞苦者或季給錢或川廣代還者别給裝錢川廣之補卒或給時服錢屢凡出外率有口糧大學衍義補田錫又言于太宗曰將帥行恩信䘏士卒必豐財貨方得士心昔趙奢為將所得王之賞賜盡與軍吏又李牧為將軍市之租皆用享士卒魏尚守雲中其軍市租盡以給士卒出私養錢享賓客軍吏是以匈奴不近雲中之塞今國家所命將雖古今異宜凡有給賜今則誰敢效古散家財賞士卒哉若以年年供億輓運老師費財曷若厚給將帥使之賞用也大學衍義補制州郡俸禄無有定准多随土所出有父母祖父母年登七十者給見錢郡縣田禄以芒種為斷芒種以前去官一年俸禄盡歸前人以後者歸後人宋制也大學衍義補吳國雖貧寡人節飲食用積金錢修兵革聚糧食夜以繼日三十餘年矣凡皆為此願諸王勉之能斬捕大將者賜金五千斤封萬户列將三千斤封五千户裨將二千斤封二千户二千石千斤封千户皆為列侯其以軍若城邑降者卒萬人邑萬户如得大將人户五千如得列將人户三千如得裨將人户千如得二千石其小吏皆以差次受爵金它賜封皆倍軍法其有故爵邑者更益勿因願諸王明以令士大夫不敢欺也寡人金錢在天下者徃徃而有非必取于吳諸王日夜用之不能盡有當賜者告寡人寡人且徃遺之史記靈帝以黄巾日盛召羣臣㑹議北地太守皇甫嵩以為宜解黨禁益出中藏錢西園廐馬以班軍士中常侍吕彊曰黨固久積人情怨憤若不赦宥與角合謀為變滋大請先誅左右貪濁大赦黨人料簡牧守能否則盗無不平矣帝懼而從之大學衍義補穆宗之立神䇿軍士人賜錢五十千宰相議以太厚難繼乃下詔稱宿衛之勤誠宜厚賞屬頻年旱歉御府空虚邊兵尚未給衣霑䘏期於均濟神䇿軍士人賜絹十匹錢十千畿内諸鎮又减五千仍出内庫綾二百萬匹付度支充邊軍春衣時人善之經濟編蔡京罷城命舒亶代之以勦絶羣徭為期西收湟州鄯廊取牂牁夜郎地擢童貫領節度使其後楊戩藍從熈譚􅍬梁師成皆踵之建澶鄭曹拱州為四輔各屯兵二萬而用其姻昵宋喬年胡師文為郡守禁卒扞掫月給錢五百驟増十倍以固結之威福在手中外莫敢議左編衛尉廖以布三千匹城門校尉防以錢二百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義杜鄴論丁傅錢通卷九
