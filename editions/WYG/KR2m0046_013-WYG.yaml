body:
  text: 錢通卷十三明胡我琨撰六之行振損益之良鑄上與下皆乘其位而奠其行以好行之王行曰鍚國行曰濟民行曰義事行曰捐西方之聖以待行施曰檀惟行無常輕重眂焉出其愽濟善經而贊之以善恫行之枋也故行曰六錫賚宋神宗賜王襄敏幼子壓驚金犀錢果五車韻瑞貞元四年九月二日勑今方隅無事蒸庶小康其正月晦日三月三日九月九日宜任文武百僚選勝地追賞為樂仍各賜錢以充宴會舊唐書咸通九年同昌公主下降賜錢五百貫仍罄内庫寳貨以寔其宅更賜金麥銀粟數斛堂設連珠之帳幘珍珠以成也却寒之簾類玳瑁斑有􅂵色云寒鳥骨所為也則末知何出杜陽雜編山濤為吏部郞文帝與書曰足下蒞事明雅邁時念多所乏今致錢二十萬絲百斤穀二百斛晉書賀循字彦先元帝以循為太常而㪚騎常侍如故循以元卿舊不加官惟拜太常而已中宗踐阼下令曰循氷清玉潔行為俗表加以位處上卿居身服物葢身而已屋裁庇風雨孤常造其廬特以為賜以六尺床席褥并錢二十萬以表至德中興書郭况光武郭皇后弟也遷大鴻臚帝數幸其第會公卿諸侯親家飲燕賞賜金錢縑帛豐盛莫比京師號况家為金穴後后紀賜宰相李愚絹百疋錢百緡鋪陳物一十三件時愚病上令中使宣問愚所居寢室蕭然四壁卧敝氊而已中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜後唐史黄香為郞召詣安福殿賜錢三萬黄白葛各一端東觀漢記宋南譙王劉義宣鎭荆州府吏蔡鉄善卜宣射得一白鼠置函中乃召鉄使卜之鉄兆成笑曰兑色之鼠背明户彎弧射之絶左股鼠孕三雄兩雌若不見信剖腹而立知公乃使剖鼠腹皆如鉄言即賜錢一萬述異記通鑑曰貳師所過小國聞宛破皆使其子弟從入貢獻因為質焉軍還封廣利等二人為侯為九卿者三人二千石百餘人奮行者官過其望以謫過行皆黜其勞士卒賜直四萬錢會編漢武帝蘇武還既至京師詔武奉一太牢謁武帝園廟拜為典屬國秩中二千石賜錢三百萬公田二頃宅一區通鑑韓歆好直言無隐帝每不能容歆于上前證嵗將飢凶指天畫地言甚剛切故坐免歸田里帝猶不釋復遣使宣詔責之歆及子嬰皆自殺歆素有重名死非其罪衆多不厭帝乃追賜錢穀以成禮塟之會編明徳皇后帝既為太后所養專以馬氏為外家故賈貴人不登極位親族無受寵榮者及太后崩但加貴人黄赤綬安車一駟宫人二百雜帛黄金錢二千萬而已同上詔以楊震二子為郞贈錢百萬以禮改塟塟日有大鳥高丈餘集震喪前郡以狀上帝感震忠直詔復以中牢具祠之通鑑王𢎞明敏有思致而輕率褊隘好折辱人雖貴顯不營財利及卒家無餘業宋主聞之特賜錢百萬米千斛會編蕭衍納東昏余妃頗妨政事范雲為言未從雲與王茂同入見雲曰昔沛公入闗婦女無所幸此范增惡其志大也今公始定建康海内相望風聲奈何襲亂亡之迹以女徳為累乎茂起拜曰雲言是也公必以天下為念不宜留此衍黙然雲即請余氏以賚茂衍許之賜雲茂錢各百萬會編記室參軍封裕諫罷苑囿以給新民皝乃下令悉從其言仍賜裕錢五萬宣示内外欲陳過失者勿有所諱唐初令百官于春月旬休選勝行樂自宰相至員外郞凡十二筵各賜錢五千緡或御花蕚樓邀其歸騎留飲迭使起舞盡而去楊行宻大會諸將謂副使李承嗣曰始吾欲先趣壽州副使云不如先向清口師古敗從周自走今果如所料賞之錢萬緡翰林學士李昉知貢舉有進士徐士廉訴昉用情取舍帝乃擇終場下第并已舉者親御講武殿給紙筆别試得進士諸科百二十五人皆賜及第且賜錢二十萬以張宴會責昉為太常少卿殿試遂為永制帝謂近臣曰昔科名多為勢家所取朕親臨試盡革其弊矣曹彬歸自江南舟中惟圖籍衣衾而已閤門進榜子云奉敕差徃江南勾當公事回時人嘉其不伐及還帝謂曰本授卿使相然劉繼恩未下姑少待之乃賜彬錢五十萬彬退曰人生何必使相好官不過多得錢耳俱同上時盧多遜專政羣臣章奏必先白多遜然後敢通又必於閣門署狀云不敢妄陳利便希望恩榮田錫遺書多遜乞免署狀多遜不悅出錫為河北南路轉運副使錫因入辭直進封事言朝廷大體者四帝覽疏優詔褒答賜錢五十萬或謂今宜少晦以逺讒忌錫曰事君之誠惟恐不竭矧天植其性豈以一賞可奪邪通鑑咸平四年張齊賢言种放隐居三十年孝行純至可勵風俗簡朴退静無謝古人帝遣召之放不起齊賢復以為言詔褒美復召之乃詣京師對於崇政殿即日授左司諫直昭文館放固譲不許賜緋衣銀魚尾帶象簡昭慶坊第宅一區加帷帳什物銀器五百兩錢三十萬賜詩寵之時召對焉會編帝幸曲阜縣謁孔子廟酌獻再拜幸叔梁紇堂近臣分奠七十二弟子遂幸孔林加謚孔子曰𤣥聖文宣王祭以太牢賜錢三十萬帛三百匹追封父叔梁紇齊國公母顔氏魯國太夫人妻开官氏鄆國夫人四十六世孫聖祐奉禮郞主祀事又追謚齊太公望為昭烈武成王立廟于青州追謚周文公旦為文憲王立廟于曲阜同上吕端諸子多不同處舊第以質于人帝聞之出内庫錢贖還之令其聚居端長子蕃言負人息錢甚多帝别賜内庫金帛俾償之蕃弟荀與西京差遣仍令内侍省置簿為掌僦課給其家詔樞察院察其妄費王旦曰陛下推恩舊臣終始委曲至矣通鑑皇子受益后宫李氏所生也初皇子生適知開封府周起方奏事帝喜賜金錢會編帝出見衛士有敝衣者駐馬問之對曰戍守邊鎮餘十五年以故貧耳帝曰此輩久勞于外留守未嘗以聞非朕親見何繇知之自今有類此者必言于朕因命賜之錢帛宋史宰執每嵗有内侍省例賜新火冰之類將命者曰快行家皆以􅀻錢一千贈之元豐元年除日神宗禁中忽得吳道子畫鍾馗像因使鏤板賜二府吳冲卿時為相欲贈以常例王禹玉曰上前未有特賜此出異恩當稍增之乃贈五千其後御藥院遂為故事明年除日復賜冲卿例復授五千冲卿因戲同列曰一馗足矣衆皆大笑宣和間一二大臣恩幸既殊將命之人有飲食果寔而得五十千者日或至一再賜也石林燕語狄武襄既平嶺南仁宗欲以為樞宻使平章事龎莊敏公曰太祖遣曹彬平江南止賜錢二十萬其重慎名器如此今青功不及彬若用為平章事富貴已極後安肯為陛下用力使後有冦盜青更立功陛下以何官賞之乃以青為䕶國軍節度諸子皆優官厚賜金帛澠水燕談錄張伯玉皇祐間為侍御史時陳恭公當國伯玉首言天下未治未得眞相故也繇是忤恭公仁宗時眷恭公厚不得已出伯玉知太平州然亦惜其去宻使小黄門諭㫖勞之曰聞卿貧無慮朕當為卿治裝翼日中㫖三司賜錢五萬恭公猶執以為無例上曰吾業已許之矣卒賜之祖宗愛惜財用如此又見所以奬勵言官之意也石林燕語郭子儀與李光弼齊名而得人心過之其嵗入官俸無慮二十四萬緡宅居親仁里四分之一中通永巷家人三千出入不知其前後賜良田美器及名園甲館不勝紀唐書列傳前世錢未有草書者淳化中太宗皇帝始以宸翰為之既成以賜近臣崇寧大觀御書錢葢襲故事也王元之責商于有詩云謫官無俸突無煙惟擁琴書盡日眠還有一般勝趙壹囊中猶貯御書錢侯鯖錄熙寧五年詔賜新及第進士錢三千緡諸科七百緡為期集費進士諸科舊用甲次高下率錢貧者或稱貸于人過于浮費至是始賜之後以為例清波雜志蒙古主大會諸王于烏爾伯格圗始定嵗錫錢幣之數元史詔諸路出師以禦蒙古大出内府銀幣犒師前後出緡錢七千七百萬銀帛各一百六萬兩匹宋史明帝館陶公主為子求郞不許而賜錢百萬張武為郞中令受金錢覺文帝更𤼵金錢賜之以愧其心田𢎞正字安道遣裴度宣慰賜其軍錢百五十萬緡𢎞正奉表陳謝且賜今名國朝太祖開寳元年召隨州留守王全斌授武寧軍節度初全斌以伐蜀私取財物貶秩至是太祖謂之曰朕以金陵未下常慮平吳諸將恣行貪暴今江南既平還卿旄鉞又别出器幣緡錢數萬賜之寳訓宋瀛國公德祐二年正月寳應縣民折薪中有天太下趙四字獻之制置使李廷芝賞之以錢五千初樞宻請建武學于武成王廟從之遂賜食本錢萬緡宋史淳化元年令刑部定置詳覆官六員專閱天下所上案牘勿復公遣鞫獄吏置御史臺推勘官二十人並以京朝官充若諸州有大獄則乘傳就鞫獄辭日上必臨遣諭㫖曰無滋蔓無留滯或賜以裝錢還必召見問以所推事狀著為定令時楚王鎔幼冲而燕軍冦北鄙方選將間有勇士陳立劉幹自投軍門願以五百人嘗冦必靣縳戎首王壯而許之翌日二夫率師而出夜擊燕壘燕人駭走大振㨗音立死于鬭幹獨凱唱而還王悅賜上廐馬數匹金帛稱是俄為閹人所譛曰此皆陳立之功非劉幹之效王母何夫人不聽即賜錦衣銀帶加錢二十萬擢為中堅尉耳目記曹彬平江南太祖謂之曰朕欲以卿為使相然今敵尚多卿為使相安肯復為朕盡死力耶賜錢二十萬緡而已自警編戊𤣥宗夢入井有一兵士着緋褌背負而出明日搜訪見一掌闗着緋褌便引見上問汝昨夜作何夢對曰從井中背負日出登天上覩其形貌與夢相似乃問汝欲官乎答曰臣不解作官宦家貧遂賜錢五百千定命錄唐屈突通為兵部尚書從秦王平薛仁杲時賊珍寳山積諸將争取之通獨無所取帝聞之曰清以奉國名定不虚特賚金錢六百兩綵十段山堂肆考燕語唐致仕官非有特敕例不給俸宋初循用唐制至真宗始于致仕官特給一半料錢葢以示優賢養老之意當時詔曰始呈材而盡力終吿老而乞骸賢哉雖嘆于東門邈矣遂辭于北闕用尊耆德特示殊恩同上建章宫後閤重櫟中有物出焉其狀似麋帝徃臨視問羣臣莫有知者詔東方朔視之朔曰臣知之願賜美酒梁飯大飡臣臣乃言詔曰可已飡又曰某所有公田魚池蒲葦數項陛下以賜臣臣朔乃言詔曰可于是言曰所謂騶牙者也逺方當來歸義而騶牙先見其齒先後若一齊等無牙故謂之騶牙其後一嵗所匈奴渾邪王果將十萬衆來降漢乃復賜朔錢財甚多董宣知雒陽至格殺主家僮光武召宣令拜謝宣不從令人按頸赤不倒賜錢三十萬呼為强項令古時將相大臣祿賜甚厚與今時相去遼絶如漢時將相封矦皆有國土而人主賜予動至千萬即如賜黄金百斤將相之常也以百斤計之為黄金千六百兩直白金數千矣如唐時宰相食料一月三千緡一緡為千錢當直三千金矣古之上將三公其富與今親王等視一品秩祿何啻十百亦其時物力充溢公私給足所以與今不同也筆麈漢臣賞賜如官儀所載臘賜大將軍三公各錢二十萬特進矦十五萬卿十萬校尉五萬尚書三萬侍中大夫各一萬虎賁羽林郞二人共三千千石六百石各一千此舊制也章帝寛仁賞賜羣臣過於制度則又不止於此矣長慶元年王承元移鎭以錢百萬緡賞鎮州將士劉總辭鎮以錢百萬緡賞幽州將士百萬緡當為銀百萬兩也唐之濫費亦太甚矣然使在今日以二鎮費二百萬金安所措給第以前改月俸准之當是十萬耳唐自中葉以後軍士驕横賞賚無紀穆宗即位神䇿軍士人賜錢五十千敬宗即位力不能繼神䇿軍士人賜絹十疋錢十千畿内軍士又减五千李逢吉之䇿也稍能裁時人善之然較之徃代已為濫矣宋時每遇南郊慶禮大賚六軍至以費用浩煩久虚大禮此亦五代積習所致也俱同上縣東南六十里有吳吕岱墓按傳岱海陵人仕吳為交州刺史降高源鬱林桂陽諸賊封都鄉侯在任厯年不餉家妻子困乏吳主聞之譲羣臣曰吕岱出身萬里為國勤事家門内困而孤不早知其責安在于是加賜錢米布絹揚州府志勝高智慧等作亂江南以行軍總􅃹從楊素擊之萬嵗率衆二千自東陽别道而進踰嶺越海攻陷溪洞不可勝數前後七百餘戰轉鬭千餘里寂無聲聞者十旬萬嵗以水陸阻絶信使不通乃置書竹筒中浮之于水汲者得之以言于素素大悦上其事高祖嗟嘆賜其家錢十萬還拜左領軍將軍百將兵法列傳初罕开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質趙充國以為亡罪乃遣歸吿種豪大兵誅有罪者明白自别母取并滅天子吿諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招䧏罕开及刼畧者解㪚虜謀微極乃擊之同上始交趾願出兵助討智髙余靖言其可信具萬人糧于邕欽待之詔以緡錢三萬賜交趾為兵費許賊平厚賞之同上謝𤣥與琰伊等以精鋭八千渉渡淝水石軍拒張蚝小退𤣥琰仍進决戰淝水南堅中流矢臨陣斬融堅衆奔潰自相蹈籍投水死者不可勝計淝水為之不流餘衆棄甲宵遁聞風聲鶴唳皆以為王師已至草行露宿重以飢凍死者十七八詔遣殿中將軍慰勞進號前將軍賜錢百萬綵千疋同上顯宗始立為皇太子選求明經乃擢桓榮弟子豫章何湯為虎賁中郞將以尚書授太子世祖從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令說尚書甚善之拜為議即賜錢十萬廣平鉅鹿樂成王車騎朴素無金銀之飾帝以白太后太后即賜錢各五百萬于是内外從化被服如一元和三年賜䇿罷以二千石奉終其身加賜錢五十萬公宅一區後數年卒時年八十餘詔賜秘器衣衾錢布第五倫傳帝既受符命大建玉清昭應宫羣下莫敢言者曾陳五害以諫舊用郞中官判大理寺帝欲重之特命曾且謂曾曰獄重典也今以屈卿曾頓首謝仍賜錢三十萬翰林學士趙槩等十餘人言復經為人師不宣使佐州縣留為直講稍選殿中丞卒賜錢十萬孫復傳蔡彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約拜日賜錢百萬馬三匹衣被刀劒下至居室什物大小無不悉備左編宋嘉泰元年金泰和元年春二月臨安大火四日乃滅焚燒民居五萬二千餘家自渡江以來都城大災未有如是嵗者帝下詔罪已避殿减膳出内府錢十六萬米六萬餘斛分賜被火之家宋史賈復與五校戰于真定大破之復創甚光武大驚曰今方隅尚有未服者汝為使相品位極矣肯復力戰耶且徐徐更為我取太原因賜錢五十萬大學衍義補乾德五年王全斌等平蜀還有罪責降全斌為崇義留後開寳末車駕幸洛陽郊祀召全斌侍祠以為武寧軍節度謂之曰朕以江左未平慮征南諸將不遵紀律故抑卿數年為朕立法今已克金陵還卿節鉞仍賜銀器萬兩帛萬匹錢千萬同上韋臯治蜀二十一年數出師凡破吐蕃四十八萬禽殺節度都督城主籠官千五百斬首五萬餘級獲牛羊二十五萬收器械六百三十萬其功烈為西南劇善撫士卒雖昏嫁皆厚資之婿給錦衣女給銀塗衣賜各萬錢死喪者稱是左編吕䝉正字聖功河南人太平興國二年擢進士第一通判昇州陛辭有㫖民事有不便者許騎置以聞賜錢二十萬同上鄭冲抗表致仕晉武帝詔賜安車駟馬第一區錢百萬絹五百匹牀帷簟褥置舍人六人官騎二十人以世子徽為㪚騎常侍使常優游官省祿賜所供䇿命儀制一如舊典而有加焉同上嘉祐中唐守趙尚寛言土曠可闢民市可招而州不可廢得漢邵信臣故陂渠遺跡而修復之假牛犁種食以誘耕者勸課勞來嵗餘流民自歸及淮南湖北之民至者二千餘户引水溉田幾數萬頃三司使包拯亦以為言遂留再任治平中嵗滿當去英宗嘉其勤且倚以興輯特進一官賜錢二十萬復留再任大學衍義補蠲濟三月减天下口賦錢劉氏曰自髙帝始立口賦法人六十三至昭帝减口賦錢什三于是又减民賦益輕漢世惠民之政可謂侈矣會編二年春正月赦减民筭三十劉氏曰自漢初始為筭賦人百二十其後又有口錢口錢嘗再减矣而筭賦仍舊帝于是减其四分之一至成帝又减筭四十民力益寛矣元友直句檢諸道税外物悉輸户部遂為定制嵗輸百餘萬緡斛民不堪命諸道多自訴于上上意悟乃詔已在官者輸京師未入者悉以與民明年已後悉免于是東南之民復安其業平叔又奏徵逺年逋欠江州刺史李渤上言度支徵當州貞元三年逃欠户錢四千餘緡當州今嵗旱災田損十九陛下奈何于大旱中徵三十六年前逋負詔悉免之唐罷麴稅罷􅅕稅麴錢城中官造麴减舊半價鄉村聽百姓自造民甚便之劉知逺即位自言未忍改晉國又惡開運之名乃更稱天福十二年詔諸道契丹括率錢帛者皆罷之晉臣為使者令詣行在契丹所在誅之俱同上帝云人知取之為取而不知予之為取若稍與展免俟家給人足稅歛自然易辦于是蠲廬光二州上供錢米汀漳二州稅處州三縣被水民家紬絹鄂州舊額絹各一年又蠲四川積貸常平息錢十三萬緡京西路請佃田租及州縣場務稅錢宋史旺扎勒圗巴延氏至元二十八年為右丞相革僧格弊政請自中統初積年逋負錢粟悉蠲之民賴其惠卒謚忠憲同上適有富人出錢五百萬葺佛殿請于萃老萃老徐曰汝輩所以施錢者何也衆曰願得佛耳萃老曰佛殿未甚壞又無露坐者孰若與其錢為獄囚償官遂使數百人釋枷鎻之苦其為福豈不多乎富人不得已諾之即日輸官囹圄遂空厚德錄趙宣孟見骫桑之下有餓人下車為之食與錢百而遂去之唐免三司逋負二百萬緡胡氏曰明宗不事華侈故除省耗絶進奉今又蠲逋負近二百萬緡一人寡欲受賜者不知其幾何人矣會編鄭𢎞為縣嗇夫民有弟斥兄錢者未還之嫂領詣𢎞賣中單為叔還錢兄聞之慚遣婦賫錢還𢎞𢎞不受會稽典錄郄公大聚歛有錢數千萬嘉賔意甚不同常朝旦問訊郄家法子弟不坐因倚語移時遂及財貨事郄公曰汝正當欲得吾錢耳乃開庫一日令任意用郄公始正謂損數百萬許嘉賔遂一日乞與親友周旋畧盡郄公聞之驚怪不能己巳世說新語淳祐七年創慈幼局應遺棄小兒民間有願収養者官為僱貧婦就局乳視官給錢米如令紹興十三年詔下錢塘仁和二縣踏逐近城寺院充安濟坊籍定老幼貧乏不能自存者及乞食之人每人日支米一升錢十文小兒半之冬大寒禁中出錢十萬貫以賜貧民范公祖禹言朝廷自嘉祐已前諸路皆有廣惠倉以救恤孤貧京師有東西福田院以収養老幼廢疾至嘉祐十年增置城南北福田院共為四院此乃古之遺法也然每院止以三百人為額則京師之衆孤窮者不止千二百人每遇大冬盛寒然後降㫖救恤則民已凍餒死損者衆矣臣以為宜于四福院增葢官屋以處貧民不限人數委左右廂提舉使臣預設方畧救濟不必專散以錢計其存活死損以為殿最其天下廣惠倉乞更舉行令官吏用心賑恤須要寔惠及貧民上開納焉家傳唐衛次公河東人為陜虢觀察使蠲横租錢嵗三十萬山堂肆考唐王仲舒為江西觀察使初江西𣙜酒禁民私釀民甚苦之仲舒奏罷酤錢九十萬同上䕫州推司揚旬處心正直積累隂功每效周箎行太上感應篇十種利益每冬十一月初二日為始收六十以上十五以下乞丏貧人入本家養濟院每日給米一升錢十五文至來年十一月初三日已滿一千令其自便求趂女使長大不計身錢量給衣資聽其適人奉行靈騐紀錢通卷十三
