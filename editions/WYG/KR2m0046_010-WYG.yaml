body:
  text: 錢通卷十明胡我琨撰權積鄭司農謂以其所買之國所出為息也假令其國出絲絮則以絲絮償出絺葛則以絺葛償言謂以其於國服事之税為息也於國事受園㕓之田而貸萬泉者則朞出息五百通考元帝時都内錢四十萬萬水衡錢一十五萬萬少府錢十八萬萬言其多也以今計之纔八百三十萬貫爾不足以當𣙜貨務盛時一歲之入漢書王嘉傳凡州縣産茶及茶山外要路皆估其直什税一從鹽鐵使張滂之請也滂又奏税錢别貯俟有水旱代民田税自是歲收錢四十萬緡未嘗以救水旱也滂又奏姦人銷錢為銅器以求贏請悉禁銅器銅山聽人間采無得私賣㑹編先是舟運江淮之米至東都含嘉倉僦車陸運三百里至陜率兩斛用十錢耀卿以江淮舟運悉輸江隂倉更用舟運至含嘉倉及太原倉自太原倉入請輸闗中凡三歲運米七百萬斛省僦車錢三千萬緡或説耀卿獻之耀卿曰此公家嬴縮之利耳奈何以市寵乎悉奏以為市糴錢同上莽立五均司市錢府官令民各以所業為貢𣙜酒酤國師公劉秀言周有泉府之官收不售與欲得莽遂於長安及洛陽邯鄲臨淄宛成都立五均司市錢府官司市常以四時仲月定物上中下之價各為其司平民賣物不售者均官考驗得實用其本價取之物貴過平一錢則以平價賣與民賤減平者聽民自相與市又民有乏欲賒貸者錢府與之每月百錢收息三錢取諸金銀連錫鳥獸魚鼈畜收桑􅁞織紡績補縫工匠醫巫卜祝方技商賈皆各自占所為於其所之縣官除其本計其利十分之而以其一為貢敢不自占自占不以實者盡没入所采取而作縣官一歲羲和魯匡復奏請𣙜酒酤從之通鑑制司欲盡收舊引又於紹興惠民二監歲鑄共三十萬貫其料並同當三錢時議者恐其利厚而盗鑄滋多而總所方患引直日低雖盗鑄不禁葢欲錢輕則引重也宋史嘉定初毎緡止直鐵錢四百以下咸乃出金錢度牒一千三百萬收回半界期以歲終不用然四川諸州去總所逺者千數百里限期已逼受給之取吏復為姦於是商賈不行民皆嗟怨一引之直僅售百錢制司乃掲榜除收兑一千三百萬引外三界依舊通行又繳總所際金銀就成都置塲收兑民心稍定自後引直五百鐵錢有竒若闗外用銅錢引直百七十錢而已宋朝鼓鑄饒池江州建康府四監歲鑄銅錢百三十四萬緡充上供饒州永平監四十六萬五千江州廣寧監二十四萬池州永豐監三十四萬五千建康豐國監二十四萬四百衡舒嚴鄂韶梧州六監歲鑄百五十六萬緡充逐路支用衡州咸寧監二十萬舒州同安監十萬嚴州神泉監十五萬鄂州寳采監十萬韶州永通監八十三萬梧州元豐監十八萬建炎兵革州縣困敝鼓鑄皆廢紹興初并廣寧監於䖍州并永豐監於饒州歲鑄纔及八萬緡以銅鐵鉛錫之入不及於舊而官吏廪稍工作之費視前日自若也每鑄錢一千率用本錢二千四百文時范汝為作亂權罷建州鼓鑄二年後鑄十二萬緡泉司應副銅錫六十五萬餘斤隆興改元夏符離之役王師入城㸃府庫有金一千二百兩銀二萬兩絹一萬二千疋錢二萬五十貫米豆共六萬餘石布袋十七萬條見符離記李德裕請置備邊庫令户部歲入錢帛十二萬緡匹度支鹽鐵歲入錢帛十三萬緡匹明年减其三之一凡諸道所在運助軍財貨皆入焉以度支郎中判之俱㑹編張浚鋭意興復委任不疑於是大變酒法即舊撲買坊塲所置隔槽設官主之麯與釀俱官悉自買聽釀户各以米赴官塲自釀斛輸錢三十頭子錢二十二其釀之多寡惟錢是視不限數也又於秦州置錢引務興州鼓鑄銅錢官賣銀絹聽民以錢引或銅錢買之凡民錢當入官者並聽用引折納官支出亦如之民以為便宋史江禄為武寧都頗有資産積錢為壁壁為之倒銅物皆鳴人戲之曰所謂銅山西傾洛鍾東應者也梁書武帝宏錢百萬一聚黄榜標之千萬一聚掛一紫標三十餘間帝少子作錢愚論譏之廢帝時延朗用事綰幾宻而專信巫祝之説遂階敬瑭之禍已晉兵起惶惑計無復之但飽食髙枕而已及兵入延朗以一騎走南山過其家指而嘆曰吾積錢三十萬於此不知何人取之遂為追兵所殺五代史列傳帝造萬金堂於西園引司農金錢繒帛牣積堂中復藏寄小黄門常侍家錢各數千萬又買田起第於河間㑹編以劉晏為户部侍郎充度支鑄錢鹽鐵等使張安世以父子封侯詔都内别藏張氏無名錢以百萬數詔以發運使薛向領均輸平凖專行於六路賜内藏錢五百萬緡上供米三百萬石時議者慮其為擾多言非便帝不聽薛向既董其事乃請改制官屬從之蘇轍言今先設官置使簿書廩禄為費已厚非良不售非賄不行是官買之價比民必貴及其賣也弊復如前此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多矣帝方惑於王安石不納其言然均輸之法亦迄不能就㑹編秦敗豪􅇐之士爭取金五惟任氏子獨為倉窖貯粟後糓食萬錢於是金玉寳貨盡歸任氏獨異志祖宗内帑歲收新錢一百五萬而每年退却六十萬三年一郊又支一百萬赴三司是内帑每年纔得十一萬六千餘緡而左藏得九十三萬三千餘緡也今歲額止十五萬而𨽻封樁者半内藏者半左藏咸無焉又自國家置市舟舶于浙于閩于廣舶商徃來錢寳所由以泄是以自臨安出門有禁下江有禁入海有禁凡舶船之方發也官必㸃視及遣廵捕官監送放洋然商人先期以小舟載錢離岸及官司之㸃巡捕之送一為虚文於是許火内人告以其物貨之半充賞又或已裝發則舶回日亦許告首盡以囘貨充賞沿海州軍以銅錢入海船者有罰淳熙五年五月詔番商往來夾帶銅錢五百文随離岸五里外依出界法通考裴延齡建言左藏天下歲入不貲耗登不可校請列别舎以檢盈虚於是以天下宿負八百萬緡折為負庫抽貫三百萬緡為賸庫様物三十萬緡為季庫帛以素出以色入者為月庫帝皆可之唐書隋臺省府寺及諸州皆置公廨錢收息取給工部尚書蘇孝慈以為官司出舉興生煩擾百姓敗損風俗請皆禁止給地以營農於是始詔公卿以下皆給職田毋得治生與民爭利㑹編韓𢎞始入朝上待之甚厚𢎞獻馬三千絹五千雜繒三萬金銀器千而汴之庫廐尚有錢百餘萬緡絹百餘萬匹馬七千匹糧三百萬斛同上漢興七十餘年之間國家無事廪庾皆滿而庫府餘貨財京師之錢累百萬貫朽而不可挍德宗患宫中用度不足李泌言天子不私求財請歲供宫中錢百萬緡願勿受貢獻及罷宣索從之及元友直運淮南錢帛二十萬至泌悉輸之大盈庫然上猶數有宣索仍敕諸道勿使宰相知泌聞之惆悵而不敢言衍義補徽宗建中靖國元年尚書省言預買錢多人户願請比歲例増給詔諸路提舉司假本司剩利錢同漕司來歲市紬絹許綱赴京同上唐杜中立遷司農卿初度支將六宫飱錢移于司農毎季一出付吏大吏盡舉所給于人權其子錢以給之既不以時以致黄門來督責謾罵中立取錢納帑舍率五百一出吏不得為奸遂以為法山堂肆考和糴宋歲漕以廣軍儲寔京邑河北河東陜西三路及内郡又自糴買以息邊民飛輓之勞其名不一建隆初河北連歲大稔命使置塲増價市糴自是率以為常咸平中嘗出内府綾羅錦綺計直緡錢百八十萬銀三十萬兩付河北轉運使糴粟實邊繼而詔凡邊州積穀可給三歲則止大中祥符初三路歲豐仍令増糴廣蓄靡限常數後又時出内庫緡錢或數十萬或百萬别遣官經畫市糴中等户以下免之初河東既下减其租賦有司言其地沃民勤頗多積穀請每歲和市随常賦輸送其直多折色給之京東西陜西河北缺兵食州縣括民家所積糧市之謂之推置取上户版籍酌所輸租而均糴之謂之對糴皆非常制麟府州以轉餉道逺遣常叅官就置塲和糴河北又募商人輸芻粟於邊以要劵取鹽及緡錢香藥寳貨於京師或東南州軍陜西則受鹽於兩池謂之入中陜西糴穀又歲預給青苗錢天聖以來罷不復給然發内藏金帛以助糴者不可勝數寳元中出内庫珠直緡錢三十萬付三司售之取其直以助邊費歐陽修奉使河東還言河東禁並邊地不許人耕而私糴北界粟麥為兵儲最為大患遂詔岢嵐火山軍閒田並邊壕十里外者聽人耕然竟無益邊備歲糴如故大抵入中利厚而商賈趨之罷三路入中悉以見錢和糴縣官之費省矣熈寧五年詔以銀絹各二十萬賜河東經略安撫司聽人賒買收本息封椿備邊自是三路封樁所給甚廣七年以岷州入中者寡令三司具東南及西鹽鐵法經久通行利病以聞知熈州王韶建議以沿邊和糴以一分見緡九分西鈔别約價募入中者凡邊部入中有闕則多出焉其或饒益誘之以紓用度是歲河東並邊大稔詔都轉運使李師中與劉庠廣糴積五年之蓄復命輔臣議更與陜西並塞芻糧之法令轉運司増舊糴三分以所糴羡為賞罰仍遣吏按視而陜西和糴或以錢茶銀紬絹糴于弓箭手八年河東察訪使李承之言太原路二税外有和糴糧草官雖量予錢布而所得細微民無所濟遇歲凶不蠲最為弊法繼而知太原韓絳復請和糴於元數省三分罷支錢布詔委陳安石元豐元年安石奏河東十三州一税以石計凡三十九萬二千有餘而和糴數八十三萬四千有餘所以歲凶仍輸者以税輕軍儲不可闕故也舊支錢布相半數既竒零以鈔貿易略不收半公家實費百姓乃得虚名欲自今罷支糴錢歲以其錢令並邊州郡和市封樁即歲灾以填所蠲數年豐則三歲一免其輸朝廷以為然始詔河東歲給和糴錢八萬餘緡並罷以其錢付漕司如安石議因用安石為河東轉運使其後經略使吕惠卿復請别議立法除河外三州理為邊郡宜免餘十一州可槩均糴下有司議以歲和糴見數十分之裁其二用八分為額随户邑髙下裁定毋更給錢歲灾同秋税蠲放以轉運司應給錢補之灾不及五分聽以久例支移遂易和糴之名為助軍糧草宣和中罷畿内和糴自熙寧以來和糴入中之外又有坐倉博糴結糴俵糴兑糴寄糴括糴勸糴均糴等名其曰坐倉熈寧二年令諸軍餘糧願糴入官者計價支錢復儲其米於倉王珪奏曰外郡用錢四十可致斗米於京師今京師乏錢反用錢百坐倉糴斗米此極非計司馬光曰坐倉之法葢因小郡乏米而庫有餘錢故反就軍人糴米以給次月之糧一時急計耳今京師有七年之儲而府庫無錢更糴軍人之米使積久陳腐其為利害非臣所知不從明年又慮元價錢神龍衛及諸司毎石等第増錢收糴仍聽行於河北東陜西諸路元符以後有低價抑糴之弊詔禁止之其曰博糴熙寧七年詔河北轉運提舉司置塲以常平及省倉歲用餘糧减直聽民以絲綿綾絹増價博買俟秋成博糴崇寧五年又詔陜西錢重物輕委轉運使措置以銀絹絲紬之類博糴斛斗以平物價其曰結糴熈寧八年劉佐體量川茶因便結糴熈河路軍儲得七萬餘石詔運給焉未幾商人王震言結糴多散官或浮浪之人有經年方輸者措置熙河財用孫逈奏總管王君萬負熈河兩川結糴錢十四萬六百三十餘緡銀三百餘兩乃遣蔡確馳徃本路劾之君萬及髙遵皆坐借結糴違法市易降黜有差崇寧初蔡京行於陜西盡括民財以充數五年以星變講修闕政罪陜西河東結糴對糴其曰俵糴熈寧八年令中書計運米百萬石費約三十七萬緡帝怪其多王安石因言俵糴非特省六七十萬緡歲漕之費且河北入中之價權之在我遇斗斛貴徃糴即百姓米無所糴自然價損非惟寔邊亦免傷農乃詔歲以末鹽鈔錢在京粳米六十萬貫石付都提舉市易司貿易度民田入多寡豫給錢物秋成於澶州北京及縁邊入米麥粟封樁即物價踴權止入中聽糴使司免用須歲豐補償紹聖三年吕大忠之言召農民相保豫貸官錢之半循税限催科餘錢至夏秋用時價随所輒貼納崇寧中蔡京令坊郭鄉村以等第給錢俟收以時價入粟邊郡弓箭手青唐蕃部皆然用俵多寡為官吏賞罸其曰兑糴熈寧九年詔淮南常平司於麥熟州郡及時兑糴元祐二年嘗以麥熟下諸路廣糴詔後價若與本相當即許變轉免糴其曰寄糴元豐二年糴便糧草王子淵論綱舟利害因言商人入中歲小不登必邀厚價故曰設内郡寄糴之法以權輕重七年詔河北瀛定二州所糴數以鉅萬而散於諸郡寄糴恐緩急不相及不若致商人自運李南公王子淵俱言寄糴行已久且近都倉緩急運致非難於是寄糴卒不罷其曰括糴元符元年涇原經略使上疏請並邊糴買豫榜諭民毋得與公家爭糴即官儲有之括索羸糧之家量存其所用盡糴入官其曰勸糴均糴政和元年童貫宣撫陜西議行之鄜延經略使疏即言勸糴非可以久行均糴先入其斛斗乃給其直於有斛斗之家未有害也坊郭之人素無斛斗必須外糴轉有煩費疏奏坐貶五年言者謂均糴法嚴然已糴而不償其直或不度州縣之力敷數過多有一户糴數百石者乃詔諸路毋輒均糴既而州縣以和糴為名低裁其價轉運司程督愈峻科率倍於均糴詔約止之宣和四年荆湖南北均糴以家業為差勸糴之法其後寖及於新邊鄯郭州積石軍蕃部患之自熙寧以來王韶開熙河章惇營溪洞沈起劉彞啟交阯之隙韓存寳林廣窮乞弟之役費用科調益繁陜西宿兵既多元豐四年六路大舉西討帝先慮科役擾民令趙卨廉問頗得其事又以糧餉麤惡欲械斬河東涇原漕臣以勵其餘卒以師興役衆鮮克辦給又李稷為鄜延漕臣督運詔許斬知州以下乏軍興者民若摺運多散走所殺至數千人道斃者不在焉於是文彦博奏言闗陜人户昨經調發不遺餘力死亡之餘疲瘵已甚為今之計正當勞來將士安撫百姓全其瘡痍使得蘇息明年優詔嘉答初西師無功議者慮朝廷再舉自是帝大感悟申飭邊臣固境息兵闗中以蘇哲宗即位諸老大臣維持初政益務綏静邊郡類無調發第令諸路廣糴以備蓄積及詔陜西麟府州計五歲之糧而已紹聖初乃詔河北鎮定瀛州糴十年之儲餘州七年其後陜西諸路又連歲興師及進築鄯湟等州費資糧不可勝計元符三年涇原經畧使章楶諌曰伏見興師以來陜西府倉廪儲蓄内外一空前後資貸内藏金帛不知其幾千萬數即今所在糧草盡乏漕臣計無所出文移指空而已今者正休兵息民清心省事之時唯深察臣言裁决斯事若更詢主議大臣􅀼恐專務興師上誤聖聽主議大臣指章惇也時内藏空乏陜西諸路以軍賞銀絹數寡請給於内藏庫詔以絹五十萬予之帝謂近臣曰内庫絹才百萬已去其半矣蔡京用事復為拓土勸徽宗招納青唐用王厚經置費錢億萬用大兵凡再始克之而湟州戍兵歲費錢一千二十四萬九千餘緡五年熈河蘭湟運使洪中孚言本道青稞畝收五石粒當大麥之三異時人糧給精米馬料給青稞率皆八折不惟人馬之食自足而價亦相當今邊臣不燭事情精米青稞與造米大麥一例抵斗給散即公有一分之耗私有一分之贏㑹計一路歲費斛斗一百八十萬雜色五十萬外青稞一百三十萬抵斗歲費二十六萬石三十緡計七百八十萬帝乃命九折明年復令計斗給散竟罷九折又於陜西建四都倉平夏城曰裕財鎮戎軍曰裕軍通陜砦曰裕民西安州曰裕邊自夏人叛命諸路皆謀進築陜以西保甲皆運糧後童貫又自將兵築靖夏制戎伏羌等城一討深入凡六七年至宣和末饋餉空乏鄜延至不能支旬月時邊臣爭務開邊䕫峽嶺南不毛之地草創郡邑調取於民費出於縣官最後有燕山之役雄霸等州倉廪皆竭兵士飢忿有擲瓦石撃守貳刃將官者燕山郭藥師所將常勝一軍計口給錢廪月費米三十萬石錢一百萬緡河北之民力不能給於是免夫之議興初黄河歲調夫修築埽岸其不即役者輸免夫錢熈豐間淮南科黄河夫錢十千富户有及六十夫者劉誼葢嘗論之及元祐中吕大防等主回河之議力役既大因配夫出錢大觀中修滑州漁池埽始盡令輸錢及是王黼建議乃下詔曰大兵之後非假諸路民力其克有濟諭民國事所當竭力天下並輸免夫錢夫二十千淮浙江湖嶺蜀夫三十千凡得一千七百餘萬緡河北羣盗因是大起南渡三邊饋餉糴事所不容已紹興間於浙江湖南博糴多者給官告少者給度牒或以鈔引類多不售而吏繼為奸人情大擾於是减其價以誘積粟之家初不拘於官編之户凡降金銀錢帛而州縣阻節不即還者官吏並徒二年廣東轉運判官周綱糴米十五萬石無擾及無陳腐撫州等臣劉汝翼餉兵不匱及勸誘賑糶流離皆轉一官七年以饒州之糴石取耗四斗罪其郡守自是和糴者計剰科罪十三年荆湖歲稔米斗六七錢乃就糴以寛江浙之民孝宗乾道三年秋江浙淮閩淫雨詔州縣以本錢坐倉收糴母强配於民四年糴本給㑹子及錢銀石錢二貫五百文寳慶三年監察御史汪剛中言和糴之弊其來非一日矣欲得其要而革之非禁科抑不得夫禁科抑莫如増米價㫖從之紹定元年錫銀㑹度牒於湖廣總所令和糴米七十萬石餉軍五年臣僚言若將民間合輸緡錢使輸斛斗免令賤糴輸錢在農人亦甚有利此廣糴之良法也從之開慶元年沿江制置司招糴米五十萬石湖南安撫司糴米五十萬石兩浙轉運司五十萬石淮浙發運司二百萬石江東提舉司三十萬石江西轉運司五十萬石湖南轉運司二十萬石太平州一十萬石淮安州三十萬石髙郵軍五十萬石漣水軍一十萬石廬州一十萬石並視時以一色㑹子發下收糴以供軍餉宋志和糴熈寧二年薛向為江淮等路發運使始募客舟與官舟分運互相撿察舊弊仍去歲漕常數既足募商舟運至京師者又二十六萬餘石而未已請充明年歲計之數三司使吳充言宜自明年減江淮漕米二百萬石今發運司易輕貨二百萬緡計五年所得無慮緡錢千萬轉儲三路平糴備邊王安石謂驟變米二百萬石米必陡賤驟致輕貨二百萬貫貨必陡貴當令發運司度米貴州郡折錢變為輕貨儲之河東陜西要便州軍用常平法糶糴為便詔如安石議宋志漕法淳熈五年閏六月臣僚言蜀中錢引已增在四千五百餘萬増而不已必至於不可行乞立定額毋得増添從之宋史大賈張陟負五坊息錢上命坊使楊朝汶收其家簿閲貸錢雖已償悉鈎止根引數十百人列箠挺脇不承又獲盧大夫逋劵捕盧坦家客責償久乃悟盧羣券坦子上訴朝汶讕語錢入禁中何可得度極言中人暴横時方討鄆帝曰姑議東軍此細事我自處辦度曰兵事不理止山東中人横暴將亂都下帝不悦徐乃悟孝武皇帝元狩六年太倉之粟紅腐而不可食都内之錢貫朽而不可挍經濟編舊例從江淮諸道運米一百一十萬石至河隂來年請停八十萬石運三十萬石舊例從河隂運米七十萬石至太原倉來年請停五十萬石運二十萬石舊例從太原倉運米四十萬石至東渭橋來年請停二十萬石運二十萬石其江淮所停運米八十萬石請委轉運使於漕水州縣毎斗八十價出糶計以糙米與細米分數相接之外毎斗猶減時價五十文以救貧乏計得錢六十四萬貫文節級所減運脚計得六十九萬貫都合得錢一百三十三萬貫數内請支二十萬貫付京兆府令於京城内及東渭橋開塲和糴米二十萬石每斗與錢一百文計加時估價三十已上用利農人其米便送東渭橋及太原倉收貯充填毎年轉漕四十萬石之數並足餘尚有錢一百一十三萬貫文以供邊鎮和糴臣已令度支巡院勘問諸軍州米時價兼與當管長吏商量令利見墾之田約定所糴之數得鳳翔涇隴邠寧慶鄜坊舟延夏綏銀靈鹽振武等道良原長武平凉等城報除度支旋糴供軍之外别擬儲備者計可糴得粟一百三十五萬石其臨邊州縣各於當處時價之外更加一倍其次毎十分加七分又其次毎十分加五分通計一百三十五萬石當錢一百二萬六千貫文猶合剰錢十萬四千貫留充來年和糴所餘江淮糴米及減運米脚錢請並委轉運使便折市綾絹絁綿四色即作船搬送上都邊地早寒歛藏向畢若待此錢送到即恐收糴過時請且貸户部别庫物充用本色續到便令折填其所貸户部别庫物亦取綾絹絁綿四色並依平估價務利農人仍取度支官畜及車均融搬送請各委當道節度及當城兵馬使與監軍中使并度支和糴巡院官同受領便計㑹和糴各量人户墾田多少先付價直立限納粟不願糶者亦勿强徴其有納米者毎米六升折粟一斗應所糴得米粟亦委此三官同檢覆分於當管城堡之内揀擇髙燥牢固倉窖等收納封閉仍以貯備軍糧為名非縁城守絶糧及承别勑處分並不得輒有支用待收糴畢其所糴數並收貯處所聞奏並報中書門下總計貯備粟一百三十五萬石是十一萬二千五百人一年之糧來嵗若遇順成又可更致百餘萬石唐陸贄請儲蓄軍糧狀漢制大司農卿一人掌諸錢穀金帛諸貨幣郡國四時上月旦見錢穀簿其逋未畢各具别之邊郡諸官請調度者皆為報給損多益寡丞一人主帑藏史記殷本紀曰帝辛厚賦税以實鹿臺之錢價值㑹稽老叟云右軍之後持一風字硯大尺餘色正赤用之不減端石云右軍所用石揚休以錢三萬得之硯譜龍焙泉即御泉也北苑造貢茶社前芽細如針用御水研造毎片計工直錢四萬分試其色如乳乃最精也天中記東方朔曰豐鎬之間號為土膏其價畝一金杜篤曰厥土之膏畝價一金費鳳碑曰祖業良田畝值一金按漢金一斤為錢十千是知漢田毎畝十千與今大率相似僕觀三十年前有司留意徴理所在多為良田大家爭售至倍其直而邇年以來有司狃於姑息所在習頑為風舉向來膏腴之土捐半直以求售世態為之一變甚可歎也野客叢書穆宗即位京師鬻賣金銀十兩亦墊一兩糴米鹽百錢墊七八京兆尹柳公綽以嚴法禁止之尋以所在用錢墊陌不一詔從俗所宜内外給用毎緡墊八十唐史寧王方集賓客粥馬牙人麴神奴者詣呈二馬焉寧王即於中堂閲試座客視之不相上下寧王顧謂神奴曰其價幾何牙人先指曰此一千緡次指曰此五百緡寧王欣然如言付錢賓客莫測其價之懸殊即令鞭轡馳驅徃復數囘笑謂座客曰辨其優劣否皆曰不知寧王乃顧千緡者曰此馬緩急百返蹄下不起纎埃復顧五百緡者曰此馬徃來十過蹄下頗生塵埃以此等第其價之髙下焉坐客乃服集異記平原郡貢螗蟹採於河間界毎年生貢斲氷火照縣老犬肉蟹覺犬肉即浮因取之一枚直百錢以氊密束於驛馬上馳之至京酉陽雜爼上復問李泌以復府兵之䇿對曰今歲卒戍京西者十七萬人計歲食粟二百四萬斛今粟斗直錢百五十為錢三百六萬緡國家比遭饑亂經費不充就使有錢亦無粟可糴未暇議復府兵也唐史盧坦到官值歲饑穀日増價或請抑之坦曰宣歙穀少仰食四方若價賤則商船不來益困矣既而米斗二百商旅輻輳民頼以生㑹編漢法聘后用黄金二萬觔為錢二萬萬而寳貨法凡黄金一觔直錢萬朱提銀八兩為一流直錢一千五百八十餘銀一流直錢千朱提縣出善銀音殊時當時黄金一兩才六百銀一兩才二百東坡常怪今之黄金不若昔之多豈今之糜之者衆宜其少而價貴也泊宅編前漢食貨志曰漢興接秦之敝民失其業大饑米石五千人相食髙祖令民就食蜀漢又按髙祖紀二年闗中大饑米斛萬錢人相食令就食蜀漢皆一時事所書米價不同恐稍先後亦未可知王莽末黄金一觔易粟一斛晉愍帝時米斗二金是一斗粟易錢二十緡一石粟為錢二百緡也後漢末董卓之亂百姓流離穀石至五十萬唐潼闗失守魯炅所守郡中米斗五十千是一石穀為錢五百緡也梁侯景食石頭常平粟盡米一斗七八萬錢是一石米為錢七八百緡也自古米貴未有如是之甚者漢明帝永平間粟斛三十正與唐太宗米斗三錢之價同東魏元象間穀斛九錢趙充國傳金城湟中穀斛八錢漢宣紀穀石五錢自古米賤又未有如是之甚也等一石穀耳賤而至於五錢貴而至於七八百緡無乃太縣絶乎㑹編京下劉光禄養好鵞劉後軍從京師還鎮尋陽以一隻鵞為後軍别純蒼色頸長四尺許頭似龍此一隻鵞可堪五萬俗説神宗熈寧元年三月英州因雷震一山梓樹盡枯而為龍腦價為之賤至京師一兩纔直錢一千四百宋史劉攽曰罷酤占租賣酒錢自是一事以律占租者謂令民賣酒以所得利占而輸其租矣占不以實則論如律也税即賣酒之税賣酒升四錢所以限民不得厚利耳丘濬曰按前此𣙜酒自釀以賣也至是以賢良文學言罷𣙜酤官然猶聽民自釀以賣而官定其價毎升四錢度其所賣之多寡以定其税此即胡氏所謂使民自為之而量取其利者也大學衍義補唐有老人遇老嫗持舊裀以半千售之有波斯國人見之曰此是氷􅁞所織暑月置之座傍滿坐皆涼酬以千萬錢波斯胡人至扶風逆旅見方石在主人門外盤桓數日主人問其故胡云我欲石𢷬帛因以錢二千求買主人得錢甚悦以石與之胡載石出封外剖得徑寸珠一枚廣輿記楊用修云柳宗元鞭賈云市之鬻鞭者人問之其價五千必曰五萬復以五十則伏而笑之以五百則小怒五千則大怒必至五萬而後可此雖寓言亦必因當時鞭價而立説也又顧况有露青竹鞭歌鮮于仲通正當年章仇兼瓊在蜀川約束蜀兒采馬鞭聨灰煮蠟光爛然章仇兼瓊持上天忽見揚州北邸前祗有人還千一錢葢言其物貴而價賤也然一鞭之直何至五萬而千一之錢猶以為少當時好尚如此代醉録華亭市有一物如水桶而無底非金石竹木所製無有識者一日有海船老商以三百緡買之或問何物商曰此至寳也名為海井凡航海必須以淡水自随今但以大器貯海水置此井于水中汲之皆甘泉矣癸辛雜志漢初鑄筴錢匹馬至百金自天子不能具􅀈駟而將相或乘牛車大學衍義補唐試舉子將入塲嗜利者爭賣健毫圓鋒其價十倍號定名毫筆工毎賣一枝則録姓名俟其榮㨗則詣門求阿堵俗呼謝筆山堂肆考唐王義方初科御史置一第愛庭中青銅樹復召主人曰此佳樹得無欠償乎又與之錢四千同上宋慶厯中廣州有蕃商死珍珠没官上命取珠出禁中錢易之以賜張貴妃鳴道集房光庭嘗送親故之葬出鼎門際晚且饑㑹鬻糕餅者與同行數人食之素不持錢無以酬值鬻者逼之光庭命就我取直鬻者不從光庭曰與爾官衘我右臺御史也可随取值時人賞其放逸太平廣記句容縣佐史能啖鱠至數十斤恒食不飽縣令聞其善啖乃出百斤史快食至盡因覺氣悶久之吐出一物狀如麻鞋底縣令命洗出安鱠所鱠悉成水累問醫人術士莫能名之令小吏持徃揚州賣之髙舉其價冀有識者其人至揚州四五日有胡求買初起一千累増至三百貫胡輙還之初無酬酢人謂胡曰是句容縣令家物君必買之當相随去胡因随至句容縣令問此是何物胡云此是銷魚之精亦能銷人腹中塊疾人有患者以一片如指端繩繋之置病所其塊即銷我本國太子少患此病父求愈病者賞之千金君若見賣當獲大利令竟賣半與之廣異記太宗曰吾所欲得蘭亭可與我將去後用玉匣貯之藏於昭陵今趙模等所榻者一本尚直錢數萬法書要録仇中尉願以三百素絹易公清夜圖周封憚其迫脇遽以圖授之明日果齎絹至後方知詐偽乃是一豪士求江淮大監院時王淮判鹽鐵酷好書畫謂此人曰為予訪得此圖當遂公所請因為計取耳及王家事起復流一粉舖家郭侍郎承嘏閽者以錢三百市得郭公卒又流傳至令狐家宣宗嘗問相國有何名畫相國具以圖對後進入内名畫記則天時西國獻青泥珠一枚類拇指微青后不知貴以施西明寺僧布金剛額中後有胡僧于珠下諦視僧因問欲買珠耶胡曰若見賣當致重價僧初索千貫漸至萬貫胡悉不醻遂定至十萬貫賣之胡得珠納腿肉中還西國僧奏聞則天勑求此僧數日得之于腿中取出問市此何用曰西國有青泥泊多珍寳但苦泥深不可得以此珠投之泥皆成水則天因寳持之廣異記計然曰夫糴錢二十則病農病農則草不辟糴錢九十則病末病末則財不出夫糴錢上不過八十則農末俱利越絶書大蘇與楊元素書聞任郎中子欲賣荆湖莊子值六十萬先只要若干蘇全集唐史粟二百四萬斛斗米百五十錢計二百四萬斛為錢三百六萬緡以此數榷之斛是五斗緡是千錢也其時斗米直百五十錢斗粟八十以為至賤其錢亦輕矣筆麈孝靈末百司湎酒酒千文一斗常侍張讓子奉為太醫令與人飲輒去衣露形為樂典論餽遺王璿嘗送錢三萬餉袁淑一宿復遣追取言使人謬誤欲以戲淑淑致書曰聞之前志七年之中一與一奪義士猶或非之况宻邇旬次何其裒益之亟也􅀼恐二三諸侯何以觀之宋書范公掌雎陽有孫秀才索游上謁贈錢一千明年復謁問何為汲汲道路孫戚然曰老母無養公為補學職月得三千因篤學春秋明年即解去後十年太山下有孫明復先生以春秋教授名重京師即昔日秀才也公嘆曰貧累大矣茍因循索米至老雖才如明復猶將汨没而不見也春氣録霍光妻遺淳于衍蒲桃錦二十四匹散花綾二十五匹綾出鉅鹿陳寳光家寳光妻傳其法霍顯召入其第使作之機用一百二十鑷六十日成一匹匹直萬錢又與走珠一琲緑綾百端錢百萬黄金百兩為起第宅奴婢不可勝數衍猶怨曰吾為爾成何功而報我若是哉西京雜記梁吕僧珍生子宋季雅徃賀署函曰錢一千閽人少之不為通强之乃進僧珍疑其故親自發乃金錢唐陸扆自翰林拜相故事自三省得相有光署錢留為宴資學士院未始有扆光院錢五十萬以榮近司唐劉元章為國子祭酒建言羣臣輸光學錢自宰相方鎮刺史各有差光禄勲杜林與馬援鄉里親厚援南方還時林馬適死援遣子持一匹馬送林曰朋友有車馬之饋數月林遣子奉書曰將軍内施九族外有賓客望恩者多林父子食禄禄出常有盈今奉錢五萬援受之謂兒曰當以此為法林所以勝我者也顔延之在潯陽與潛情欵後為始安郡經過潯陽日造潛飲臨去留錢二萬潛悉令送至酒家鴻書趙王使人微随張儀奉以車馬金錢張儀傳錢通卷十
