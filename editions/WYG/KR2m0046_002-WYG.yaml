body:
  text: 錢通卷二明胡我琨撰正朔一統二今山西無礦可開無錢可鑄以鹽法則盡通矣以屯田則盡闢矣以耕作則盡力矣而財用之詘乏日甚臣謂除節省外無策焉靳學顏疏臣又見近世之言理財者曰財無從生也惟有節費而已臣以前代生財之法較之今日尚缺一大政焉臣舉此一大政何謂其無從生哉而錢法是已臣聞人之所繇生衣食為大王者利用厚生必先乎此此出于天時地利人力相待而共成三才之用者也有此三才即有此布帛五榖増虧相乘有無相貿而非有水旱之災兵革之奪癘疫之妨以一歲之功而供一年之日用自周也今天下之民愁居懾處不勝其束濕之慘司計者日夜憂煩遑遑以匱乏為慮者豈布帛五榖不足之謂哉謂銀兩不足耳夫銀者寒之不可衣饑之不可食又非衣食之所自出也不過貿遷以通衣食之用爾而銅錢亦貿遷以通用與銀異質而同神者猶雲南不用錢而用海巴三者不同而致用則一焉今獨奈何用銀而廢錢惟時天下之用錢者曽不什一而錢法一政久矣其不舉矣錢益廢則銀益獨行銀獨行則豪右之藏益深而銀益貴銀貴則貨益賤而折色之辦益難而豪右者又乘其賤而收之時其貴而糶之銀之積在豪右者愈厚而銀之行於天下者愈少再踰數年臣不知其又何如也則錢法不行之故爾計者又欲開礦夫礦不可開開葢無益也一禁而不可弛弛則亂矣臣試根極錢說而司計者擇焉臣聞錢者泉也如水之行地中不得一日廢者一日廢則有枯槁之虞從成周而漢唐宋以來見之史籍一一可覩未有用銀廢錢如今日之甚者也而用錢之多鑄錢之盛者尤莫如宋故宋太祖欲集錢至五百萬而贖山後諸郡于遼靖康中趙良嗣奉使歲加稅銀一百萬于金其平時賂契丹寧夏也歲幣率有常額其外國亦用錢可知又宋之饒州處州江寧等處皆有鼓鑄之地今江南人家嘗有發地得窖錢者則無南北皆用錢可知其餘書文所嘗言幾百萬無慮鉅萬累鉅萬之說率多以錢計臣亦不暇枚舉今去宋不逺故所用錢多宋之物夫用錢則民生日裕鑄錢則國用益饒此裁成輔相之業惟人主得為之故曰聖人之大寶曰位因位而制權因權而制用故又曰錢者權也人主操富貴之權以役使奔走乎天下故一代之興則制之一主之立則制之改元則制之軍國不足則制之此經國足用之一大政也奈何廢而不舉臣竊聞江南富室有積銀至數十萬兩者今皇上天府之積亦不過百萬兩以上若使銀獨行而錢遂廢焉是不過數十里富室之積足相擬矣皇上試一舉其權而振之則彼富室者智勇豪俊者將奔走于吾權之不暇彼敢冐萬死而盜鑄吾一文者哉故曰權也權者立之乎無形而達之乎無窮用之則天下舉有求於我而有餘不用則日擾擾焉以求之於天下而不足為驗甚明也且夫富貴其權一也皇上今出數寸之符移片紙之檄以匹夫而拜將相焉又能使同姓王異姓侯焉于公帑未有損也此馭貴之權若是乎其易也若乃今日與人以千金焉明日與人以萬金焉曾不踰年而太倉告匱矣夫何馭富之權若是乎其不侔與誠以有其權而不用與無權等爾昔漢文帝之寵鄧通也曰吾能富之賜以蜀山之銅而鄧氏之錢滿天下夫鄧氏之錢滿天下則天下之貨萃於鄧氏明矣呉王濞擅鑄山之利而輙稱兵漢廷與之抗亦不過竊漢廷之權明矣夫以竊一日之權尚足以得民而抗漢况以萬乘而自振其權可勝用哉今之為計者謂錢法之難有二一曰利不酬本所費多而所得鮮矣臣愚以為此取效于旦夕計本利於出入葢民間之筭非天府之筭也夫天府之筭以山海之産為材以億兆之力為工以脩潔英達之士為役果何本而何利哉此所謂本猶不免用銀之說爾臣所謂本葢無形之權是已何則鑄錢之須一曰銅料一曰炭一曰轉致一曰人工夫此四者在民間計之銀一分而得錢四分誠十不酬五矣自臣愚計之皆可不用銀而取辦者誠將天下出産銅料之處贖軍徒以下之罪而定其則以收銅于西山産煤之窯以法司有罪之人而准其罪以納炭其運銅則通水路者附以官民之舟如臨清帶甎之例通陸路者資以驛遞之力而給之官庫之錢其運炭則請出府庫見貯之錢或于京城或于近縣或于營軍如係官身則量給以工食如係民户則平給以脚價如是而患無材與夫轉致之難臣不信也至于人工取之見役而皆足則又不煩銀兩而可辦也臣不知工部及寶源局原額匠役若於見今坐食與否耶即以營軍九萬人論之抽用其一二千人足矣而謂妨訓練耶今京城之内鍜金刺綉聲技力作之徒與夫靠衙門而衣食者孰非營軍奚啻一二千也而未嘗患其妨凡此皆不用銀而可以成務固無本利之足較矣其二曰民不願行强之恐物情之沸騰也臣愚以為歴代無不用之至稱為錢神我先朝又用之祗見其利不聞其病正德嘉靖以前猶盛行之葢五六百而值一兩今七八十歲人固多尚可一召而訊也獨至于今屢行而屢廢甫行而輙輟焉何哉臣竊詳之錢比鈔異于小民無不利也獨所不便者姦豪耳一曰盜不便一曰官為姦弊不便一曰商賈持挾不便一曰豪家葢藏不便此數不便者與小民無與也臣竊聞往時但一行錢法則輙張告示戒厰衛不光之于賣菜之傭則責之以荷擔之役愚而相煽既閉匿觀望之不免而姦豪右族依托城社者又從旁簧鼓之以濟其不便之私一日而下令二日而閉匿不三四日而中沮矣務大計者宜若是其易動哉臣聞施恩澤者自無告始行法令者自貴近始豈惟貴近自朝廷始可也請自今以後追紙贖者除折榖外而責之以納錢上事例者除二分納銀外而一分以納錢存留户口則兼收錢榖商稅課程則純用收錢此謂自朝廷始又因而賜予之費宗室之祿百官之俸則銀錢兼支又因而驛遞應付雇夫雇馬則惟錢是用又因而軍旅之餉則分其主客量其逺近或以代布花或以充折色此謂自貴近始矣此數者有出有入而民間無底滯之患誠以上下交㑹血脉流通故也輕歛輕散官府有餘積之藏誠以正賦之銀既以無减于常額而一切之費又取辦于一權故也此權不可行之于天下以啟盜權之釁請于寶源局或西倉專設侍郎或即用左右侍郎一員督于上以十三司員外或主事分理十三省事于下以科道各一員監之銅料工材各有攸掌各省歛散一照分司先之以區畫條議計定而行而又輕重適均無駭于俗仍以唐宋以來舊錢兼之或上有施于下或下有納于上著之以必行之令遲之以歲月之效久之而本末兼利公私循環可以輟鼓鑄之勞而罷工作之使臣愚不揣竊謂千慮一得也昔我祖宗初制鈔時下令甚嚴有以金銀貨物交易者輙没給告者然不徒責之也後又令各處稅糧課程贓罰俱准折收鈔則聖意淵微可測矣此固血脉流通之意所謂泉也而法以佐之所謂權也夫帝王以元氣為槖鑰以造化為錘鑪而風行神運不言所利乃至與齊民賈竪筭本利較銖錙臣愚非所望也同上廼若通民財用者葢今民之困窮極矣錢法通行于民最便今不但南方未有行者即輦轂之下且阻格焉臣等伏思官以錢為稅則民未有不以錢為用者其在京須要責令崇文門查照舊法以錢為稅外凡各衙門納官用皆須額定半銀半錢又必通行南北用錢地方凡係存留本處納官官用銀兩並額定半銀半錢若素不行錢地方限文書到日聽撫按官議處有能倡率錢法通行者許撫按特薦量陞奬勵倘官有阻撓並令在京巡城御史及内外巡按科道等官叅奏但錢之為用每銀一分只額限換用嘉靖通寶六文其前代舊錢一視往時貴賤用七分之一庶錢不過賤民皆樂用嚴立諭禁不許故違有故違者當即重治更宜申重鑄錢之令兩京工部添設鑄錢仍乞行令各省撫按轉行布政司各特設鑄錢一局委官造鑄歲鑄若干存留該處府庫歲終奏報所鑄之錢例鑄用大明通寶四字以便通用嚴行天下每銀一分亦只用六文夫錢法通則民困可蘇民困蘇則國用可裕曰通民財用者葢如此魏時亮疏臣愚以為水利為田而興則財力亦必計田而出凡有田之家不拘官民每田一畆科錢一文每田一頃科錢百文至田萬頃科錢百萬文以浙西諸郡軍民田不啻千萬頃所出之錢可以類推而知也若然則不但積少成多抑且輕重易舉寔為經久之計吳巖疏國初竈丁辦鹽每引四百斤給工本鈔二貫五百文葢洪武年間鈔一貫值錢千文故竈丁得寔利如是而冐禁賣私鹽可絞死也今鈔一貫不易粟二斗禁絶竈丁勿賣私鹽是逼之饑以死也此後來法行之弊非初年之失也霍韜今若立法使鈔一貫值錢千文竈丁為寔利則額鹽一大引給工本鈔二貫五百文餘鹽一小引亦給工本鈔二貫五百文各塲餘鹽盡屬之官私挾私賣即處絞勿贖則兩淮正鹽七十萬引餘鹽三百萬引舉可召商開中或如永樂時例一引輸邊粟二斗五升可也或如成化時例一引折銀四錢可也同上一茶引繇内茶引一道納銅錢一千文照茶一百斤茶繇一道納銅錢六百文照茶六十斤見行事例每引繇一道納鈔一貫中夾紙一張王制茶法疏臣惟今天下號稱多事矣吏治日頺用人急焉而選法不善人將不得所用國用日匱理財急焉而錢法不善國將不得所利則今日吏部大選之抽籖南京工部鑄錢之增爐誠不可不議處者臣請為我皇上言之我國家以官人之柄付之吏部葢責以别材賢𢎞化理也從未聞以選除大典憑之籖者自請託盛行而前吏部始議用籖以矯其私意誠公也豈知籖一設則反為籖所束南與北或相左矣人與地不相宜矣甚且選後而告改者紛紛矣夫南北不宜害猶在一人也人地不宜不害及郡邑乎害若此奈何猶拘拘然株守一籖也故籖之當革不但如往時或簡籖或換籖為士人所閧鬭即如銓曹責在知人止縁籖在而任抽之縱有月旦之明何所用焉則器使之謂何而臣所謂選法之久敝者以此我皇上酌鑄山之政付之工部葢責以裕貨財前民用也從未聞以鑄錢一事頓增多爐者自水衡告詘而南工部始議增爐以濟其用意誠善也豈知爐一增則反為爐所困今據告爐増至六百座矣銀七分五釐易錢百文矣甚且商賈畏行錢不敢入京矣夫多爐多利爐可加增也今爐多錢滯官民不交病乎壅閼若此奈何猶泄泄然不為之所也故爐之當减不但如近日錢止行之京不行之外為都人之大蠧即如工本之費不貲秪縁錢多而賤出之遂致利不償費國何益焉則持籌之謂何而臣所謂錢法之大壅者以此夫邇來鑽刺成風臣方欲以白簡杜邪徑豈以抽籖革弊反欲去之以潰其防倉庫如掃臣恨不得以多方濟燃眉豈以増爐利用反欲减之以掣其肘良有見於吏部原號為銓衡必遴選羣材如衡之錙銖不爽而後可若徒用籖而不用衡使人謂銓部為籖部是之謂有選而無法臣竊為人材惜之葢用籖以示公道孰若去籖而使公明之并用也故採之輿論咸以為革籖便財貨原謂之貨泉必錢法流通如泉之流行不滯而後可若行錢而不類泉使人視制錢如棄錢是之謂有錢而無法臣竊為耗費惜之葢多鑄以開財源孰若少鑄而使源流之無壅也故稽之民情咸以為减爐便雖然臣有說焉朝廷原自有大體在主官爵者當求得人以報主恩自不當守陋規以廢職掌况秉心誠公即請託何敢至前而區區藉三寸之竹以謝人真同兒戲理財自有大道在司錢榖者當求長便以充公儲不當持一端以為完計况稽察誠嚴即節省亦且無筭而區區守數百之爐以坐困何濟時艱是又在當事者勉圖之耳以上二事臣有激於𠂻久矣且錢法通塞又該臣等每季具奏故不避嫌怨謹據事直陳如此知兩部之有識者當必有同心焉伏乞皇上勅下吏工二部再加查議吏部之籖南京工部之爐應否一革一减苐革宜速革臣無容喋喋矣减雖徐减然亦宜設法能令處處行錢而後為得策總之俟兩部題覆請自聖裁庶人材各適于用而吏治日隆錢法不至於壅而帑藏可裕其於用人理財未必無小補矣萬厯年李雲鵠疏臣惟財用在民而利權之操縱則在上而不在民利權在上而奔走以導利則在民而不在上自古有一代之興必有一代之錢有一代之錢自供一代之用其間設法調停俾疏通而不滯者固自有道也仰惟陛下因錢法之難行不靳再三申飭言官之所建白部臣之所議覆不啻詳矣其在于今乃有未盡行者南京係都㑹之區行未數月竟停壅而不達南京如此其在外府州縣可知矣毋怪乎噪攘者之紛紛也進言者以為私鑄之混官鑄也即今私鑄者且獲重遣矣以為新錢之濫惡也而舊鑄之堅厚者自在也一槩不行其故難知矣臣愚以為有二端焉價值之不歸一也督責之太驟也何謂價值之不歸一也發錢之初議有成價毎銀一分或錢八文或十文行未幾八文者或改為十文矣十文者或改為十二三文矣匹夫持尺寸布粟入市易錢不至盈百既而以錢易他物則其價又若干倍然矣自匹夫而上其積錢愈多則其虧本愈甚至積于無用能令不悔其始之受新錢耶欲望其行之久也難矣此其故皆起於市井壟斷之徒設計竒贏陰為轉移而致然耳伏乞敇下吏部轉行撫按衙門將各處官錢鑄合式之錢立為一定不移之價刋刻成數頒示中外毋致先貴而後賤毋致日異而月不同而市井壟斷之徒嚴為體訪懲一警百若是而錢不行者未之有也何謂督責之太驟也鑄錢一出則官府急急焉速為示諭某項給錢某項納錢某項不許收錢某項不許並用有不若令者刑罰且隨之愚民轉相淆惑以為今日之使新錢非正直也乃官府以法驅之也他日官府一弛錢將焉用也此其所以展轉趨而錢日壅也夫以銀易銅以銅鑄錢錢即銀也何至以刑威迫而使之重自疑畏也伏乞敇下該部轉行撫按衙門諭令各府州縣將新鑄萬厯之錢與我朝列聖寶號之錢相兼行使不致舍彼而取此不致遺舊以專新從容導引以期民之信從若是而錢有不行者未之有也再照財者民之命也人情者聖王之田也大學論理財而本之絜矩要之使民各得分願也曽見雲南巡撫饒仁侃奏雲南一省自來不知錢法夷人行使不通乞要照舊以安民俗奉聖㫖雲南地方既不用錢不必鑄造其見在庫藏着貴州差人該省搬取以資兵餉價銀免解還欽此仰見陛下行錢之令原無成心未嘗用此以苦民也五方風氣異宜膠于故常而駭于新制恐不但雲南一省為然也伏乞敇下該部轉行撫按衙門再加查核如原係行錢地方上𦂳着寔舉行務在設法疏通倘有積習已久不便行使者不妨明白開奏以便裁奪毋得隠忍遲回以釀厲階此寔用法之深仁而亦順治之大權也統惟陛下留神俯賜施行萬厯年唐裔疏鈔關本色歸内庫以備錫子雖舊制也然自𢎞治以來鈔之不與錢並使也非一日矣今本折雖輪征而賞鈔無實惠查得隆慶元年曽改折三年以濟邊儲陛下今必欲照常解本色于内庫似非所以救時之急臣愚以為賞賜即無鈔人不為怨而停征本色且可以助國儲去無益以資有備户部之請折鈔關者宜從也萬厯年譚希恩疏天之生財原以流布于民間故錢者泉也布也取通融之義也乃皇上殘地脉而取之𣙜關津以竭之日積月累二十餘年于兹矣寶玩黄白之物充牣山堆於宫中雖假名鼎建猶未見有絲毫之給發也頃廷臣以邊儲缺乏每勸皇上以頒發内帑而皇上撲滿之藏愈固也萬厯時張邦俊疏臣等竊惟錢者天地間不涸之源不竭之府此昔人所以取泉與布之意也然錢之用欲流布于民間而錢之權不可令操之于民間也乃留都之錢法則太阿倒持而自下操之矣此其故葢難言之皆繇數年以來司鼓鑄之柄者惟知為朝廷守帑藏不知為朝廷收利權南中縉紳父老講及破格廣鑄以禁私錢輙稱錢糧未奉明㫖不敢輕發而不虞今日私錢之弊濫觴一至此極也若不及今挽囬則其禍更有不可言者然私錢不禁則官錢必不可行官鑄不廣則私錢又不可遽撤幸南京吏部侍郎署工部事史繼偕都察院僉都御史丁賓應天府府尹今陞通政使陸長庚為國為民之心雅出同調相討究錢法之利弊而應天府例該鑄錢措置工本千餘金鑄錢五十爐每爐三萬出示五城錢行經紀領賣私錢與官錢不得同價而市井無頼棍徒輙倡言物價騰湧乘機搶掠舉國若狂如鎮淮清橋等地方處處有之搶攘之時正大京兆偶爾經過跟隨控訴略無退避大京兆不得已乃借蔣都司家取牌出示曉諭而衆猶徘徊觀望擁聚不散頼僉都丁御史傳呼中軍曉以禍福聲言擒捕始駭然解散矣夫問私錢盛行之故則以官錢之未廣鑄也問官錢不廣之故則以皇上吝一俞允之㫖而司帑者以事干錢糧恐文法之議其後也孟子曰上無道揆也下無法守也朝不信道工不信度其今日之謂乎懇祈皇上思利權之不可不收念私鑄之不可不嚴除搶掠亂民臣等已嚴加緝拏候㫖處分外仍將部覆御史王萬祚疏通錢法一疏亟下南京工部並㑹同各衙門酌議應動錢糧急為廣鑄一面候㫖一面増爐此勢如饑渴事在燃眉而萬不得已之權宜也更望天語叮嚀申諭内外守備及五城兵馬務使民間貿易出入俱要眞正制錢其外來溷雜及私鑄假錢等項令其銷燬為銅不許仍復攙行以滋騰湧行使假錢者坐以私鑄之律溷用低雜减等枷號問罪巡緝員役告捕得獲如律加賞縱容賄脫罪與犯同將閭閻沾寔惠而無復巷議之萌矣都民幸甚臣等幸甚臣等無任惶悚待命之至萬厯年張邦俊疏所過河道有司以意起稅節節宻如佈網官稅一番衙門勒騙一番至於土人渉河索買河之錢過路索買路之錢越山索買山之錢及至盤運到關從前横雜使費不啻什倍于正課矣萬厯年傅宗臯疏臣聞錢之藏曰泉流曰布謂如水之流行于地民非此不生活也古有五金惟錢最便乃聖王握三才之柄捄五行之災以左右萬民莊山厯山之鑄贍民無饘賣子者九府圜法流通四海太公曰知通塞之權是謂政之大端矣管子曰與奪貧富皆在君上使人戴君如日月親君如父母用此道也生殖衆則國富人安桑麻寡則人貧國危權制之術寔在乎錢鍵其多門利出一孔可致時雍豈止于富國强兵哉管子固通達國體者葢天行之豐歉難定而銅無荒年物産惟金銀難得而銅猶易辦藉母生子以子代母民貧國貧猶依此為命司馬芝謂不獨豐國也且省刑眞國家一大政非僅僅取充大庭之賞幣為大官給餼廩了簿書而已金陵固古行錢之地也太祖草昧即開鑄應天府後乃置工部局萬厯二十年以前猶六十爐已而添置四十爐又五十爐二十九年加置一百爐三十年户部府軍倉附鑄加二百五十爐應天府比例復置一百爐夫十年之間而添爐如此其多者則豈不因地廣人衆四方凑集且外郡仰資錢乏日費浩流行逺愈鑄而愈恐其不多哉三十四年以來法在人亡司官見殊厭謂煩雜加以水災銅商不前奏請停爐奉㫖裁减鑄者百二十鑪分為兩畨一循一環或每月一鑄或一季再鑄而民間私鑄之錢出矣父老士民咸言四五年前官錢充裕不見私錢雖稍稍互雜民猶惴恐今則都城内外充斥街市行使為常恬不知怪詢詰其繇則官錢之價貴私錢之價賤入市買物止論文數畧無差别民性好利誰肯舍賤趨貴惟官錢停閣人不肯買勢不得不與私錢俱賤而外郡州縣止知官錢為遵制尚獲高價即户工撘放盡出外易城中不能留而私錢乘我之虛伺民之急盤踞布散民方以為德莫之能禦矣每爐原設工匠七名停棄不用者約三千餘人止知鑄錢别無他技口食無資勢不得不投匿近地江南富豪任俠之家以其財為招慕呉鄧之風修陶計之術歸者如市其錢體薄文闇多雜以低料工力小斤兩輕每千費本銀五錢而賣至八錢以上取利立倍厚賞重酬嗜利釘盟甘為死黨官錢盡化為私錢我寔驅之曷足怪焉姦數不勝死罪下積輙經題禁奉有明㫖五城御史非不日督兵馬司官搜捕經年無獲城外水關巡司運所責令宻緝擒拏興販搬運私錢者姦徒陽分陰合走死地如騖神出鬼沒閉藏甚巧國門之外終日盤驗祛篋發囊則又貪官悍卒摩牙奮爪反攫行客强有力者財神布置或假為京官太學行李或指為外省公文摃解躱閃萬態守卒明知暗賄故脫即防之何能盡防也止有禁民間不得使用私錢舖行經紀不許易換如此而已執經紀而責之曰爾何以販私錢曰我非販也得之某貿遷化居肆中者也執肆商而責之曰爾何以販私錢曰我非販也以零星賣物聚而成多易銀作本舖舖皆然如此則家可論户可罪也臣巡視南北二城業與各御史科臣部臣于去冬㑹同示禁而許以私錢作銅就工部領價民無慮者經紀不敢賣錢市門晝閉問之曰我非欲自絶生意也賣私錢則積之無用之地止可充黄銅且犯禁賣官錢則終日倚市門不得一文安用掉臂與人嘵嘵為于是百物之價轉騰湧饑者不得食寒者不得衣貧民大困百工技藝不得通工易事與私錢則工人有難色索官錢則主人謝無有其任負推輓奔走勞苦力作之人以手足為口急于得食者詣茶飯肆爐頭賣漿市胡餅之家皆恡不肯與于是牧圉仆于驢擔夫呵于路擁司空之輿控都院之馬藉令下讐上上必欲勝下不斃其性命則有散之四方而已王道在順人情仁政先哀㷀獨無論激變即無辜之衆寔藉我撫循以生而忍于斃之逐之哉何也官錢乏故也令人持三五金入市換工部制錢必俟數日凑數家猶不能充彼貧民又奚望焉語曰民可百日無貨不可一日有饑勢不得不聽從民便惟是賣官錢者舊價毎千易銀一兩命復其舊待工部廣鑄制錢充盛之日私錢盡行革去夫高官錢之價者所以鼓之樂售苐私錢仍在而未去是益策之使買私錢耳昔楚王更鑄大錢民盡去其業有司言市亂孫叔敖頓令復如舊而市定楚錢更小為大總屬官錢自為興輟非若今日犯法之錢漢臣所稱人主操柄不可與民共之者也惜貧民之命長姦人之膽巨猾亡命陰笑我為懦如國威何說者欲令民多用銀然小民止知有錢且各省用銀之處猶欲使之行錢今反易其俗而强人太難亦不通之甚矣又欲以城内所鑄止留城内之用戒守門者毋得出然錢法本欲其通行不留而奈何壅之禁私錢之入則可禁官錢之出則不可故為今之計莫若廣鑄官錢我祖宗立局曰寶源水之源出于天地錢之源出于朝廷惟可以利名故人主寶之稱寶者謂其權重宜一而不分操而不置可先自棄為人所竊乎稱源者謂其流長宜廣而毋隘濬而毋塞可先自蹙導人為梗乎源泉混混不舍晝夜大可瀦為江河湖海小可分為溪澗井坎隨汲隨得飲者充量藉令民不得水焦渴之極勢不遑擇甚至飲草木汁血溺污穢者亦不得已而然凡有慈憫之民知必迎西江汲東海之不暇况泉源伊邇而非遙上流洪洞而暫淤其疏闢開廣以救之耶抑絶其他飲而立視其死耶留都錢法何以異此伏乞敇下該部查照萬厯四年二十九年厯行諸例將存留銀兩量再添復舊爐勤鑄不輟應天府仍將現停百爐一同鼓鑄按尺籍名姓追呼舊匠各還舊役若㨂選不堪用者遞發本縣歸農收管囬照則匠悉歸于公而私鑄之黨散矣法行自上始今留都文武百官日食蔬菜皆以銀易錢散買差役所易之錢即街市現行錢也此官府不免用私錢而况民乎今宜令各衙門經厯司官以大小員屬每計俸薪之半自備工本解工部鑄錢則官免市于民制錢從上行下而私鑄之勢孤矣部府體尊堂廡與閭右濶隔除撘放外錢何繇得到民間然撘放幾何莫若推痛癢相關之誼通嫂溺手援之權工部所鑄錢發五城兵馬司應天府所鑄錢發上江兩縣應卯經紀原係在官之人先納銀于官每官錢一千時價一兩姑與一百之利使之樂趨五城兩縣以銀解部府還原借存留鑄本毫釐無缺銀到錢發隨發隨鑄或數季或一年如此則官錢布滿洋溢經紀有不領官錢而獨買私錢者乎百姓有不行使官錢而反用私錢者乎上得執而刑之其誰敢犯在禁者理直氣雄無秦越人肥瘠相視之嫌在下者䝉福獲利安享長便亦無去福求禍之理官民兩便祈盡變民間為官錢而此例即止刑法不煩私錢之跡屏矣每鑄錢一千文筭買紅銅黄銅罐炭匠雇等費本銀不過七錢七分而直銀一兩若用一兩本則可得四錢之利也繇此推之鑄萬兩則利四千鑄百萬兩則利四十萬鑄愈多而餘利愈無窮本銀即還故處餘利别置簿籍可以備築城浚河之用可以佐常平賑濟之用見今九邊無糧餉取此有餘灌輸于彼如前年遼左故事何為不可古稱軍國用不足則制之厯代智哲之臣言其利者非一夫鑄而可以杜私錢猶不可不多鑄也况裕國而濟民為利甚鉅奈何可置而弗圖哉然鑄之大患在于無銅年前有商七人今或亡或逃存者二人而已究銅之所難得則凶年物貴盤運為艱關津重疊抽稅不一及至都城則户部索其稅工部索其銅衙門之使費滋擾借貸之賠累難堪鞭策囚繫勉强支應今欲甦其困以示招徠莫若户部銅商改𨽻工部或收其本色作稅而于稅外别買低昻悉照當時給直或將其稅銀特免而較數歲為常豐凶無二價但責完銅商不苦于煩費官不苦于權分此不可不議也蕪湖關控扼大江為陪京門户私鑄姦豪盤聚其處每銅商船至則羣擁邀截高價强買佯作倭鉛㸃造黄銅器玩而寔則轉輸深僻之處競鑄私錢今宜盡驅其人遍毁其爐令就内城錢局軍厰近處或㸃綴黄銅或發賣紅銅使川貴之銅悉萃聚于鍾阜石城之内毋令散逸為豪右資此不可不議也又大明律錢法一欵私錢坐絞古錢兼用其㫖總歸之便民若乃器用則民間除軍器鏡子寺院鐃鈸外餘應廢棄者皆輸之官私相賣買者有罪葢收下之銅而歸之上即賈生所云銅不布下則上權不分之意也今百姓鎔冶鏤刻作無用之器極神工之巧華靡僭擬秦鍾漢鼎商彛堯罇皆可偽鑄一爐千金破産無悔拐騙傷俗不若申飭律禁一切收之官府量給銅價凑鑄銅錢即縉紳世家土瓷木石器具儉樸日用甚適豈必用銅唐劉秩謂銅之為物以為兵則不如鐵為器則不如漆即禁之無害禁則銅之費不廣而價日賤并可挽俗此不可不議也銅既易足工冶具火齊得贏利可以坐取不此之務而務礦稅何為哉三十五年南工之題停爐减鑄也事下北部議覆今讀其疏内述科臣郝敬所題修舉錢法以開財源無征科之擾收自然之利已經户部㑹酌每銀一兩有利四錢該南京亦務在審勢揆時較前度後俾為經久可行無致倐而議减又倐而議增止議减爐不議私鑄則姦民反操利柄而國家不得收圜通之利等因彼時葢已料今日之及此矣目今揆時審勢私錢既不可留官錢又不易得情法業已交窮標本自應並治譬之人身然必元氣盛旺而後邪氣自消未有反耗其元氣謂可以消之者又譬之家然必丁衆强寔而後外盜可禦未有自戕其衆謂可以禦之者較之前而多鑄之時其財足人恱都人士追思之狀如彼度之後而减鑄以來其窮苦伶仃令人啼怨之狀如此則又安得守拘攣之見昧大通之觀以區區撘支之錢塞熈熈待哺之望但未奉明㫖則部臣府尹無從遵行乞蚤敇一日則都民蚤䝉一日之賜獲免罪戾而臣等亦逃于鰥曠矣况留京災荒相繼黎元菜色未復今二麥未成苗秧未種滁陽池河之間四山頂上蝗蝻忽生延袤數百里所過聲如風雨一望無際田夫村婦且捕且泣片時盈石麥穗成虛細秧如剪臣詣營擇賞見屯軍四月無糧枵腹荷戈又罹此災此誠堯湯水旱無麋鬻子宜鑄莊歴之時也可漠然而不為備耶江洋都市盜賊公行又豈堪私鑄為逋逃藪漢大夫言流放人民倚仗豪家藏大澤深山將成姦偽大業今應安寧國無為池太常鎮諸處種種皆是以重崖絶嶮逶迤深谷為巢穴以三江太湖浮天浸雲之境為堂奥有告發者操巡衙門令未及下而耳目偵探星馳電驟先聲預匿或投械于水中或掩窖于石底或赭林木而禽舉或火蘆渚而魚逝間獲脅從人器相離遽難坐死迨州縣提解則亡命代死千百其身元惡大憝罔可蹤跡矣計惟府州縣官宻邇其地閑躡之于不識不知之時而宻擒之于倐出倐没之頃得虞詡龔遂其人者則姦黨自無所遁亦惟嚴㫖特勑守令有功紀錄寛縱者無論受賄與否皆以奉職無狀論白簡從事三尺具在然後沿江一帶有司不敢視以為戲也同心恊力然後此軰可得而滅夫廣鑄官錢所以惠貧民而為絶私錢之本嚴懲私鑄所以鋤亂民而維行官錢之法一以寔國計一以振國威財藏於不匱之府令行如流水之源起太公管敬仲而借箸焉計諒無踰是伏望聖明垂意詳覽下部查議如果臣言非迂轉行南工部應天府逐欵再加斟酌舉行臣無任戰慄俟命之至萬厯年王萬祚疏臣竊念之屢據在京耆民吳汝極邵文德等呈稱願復舊爐收囬鑄匠處給資本工部仍前鑄造每本銀一萬兩歲可得利銀五千兩不等倘所處工本愈饒所得餘利更厚用之修築浦城足壯萬年根本以之接濟民用足杜私鑄源流等情屢經臣等審准在卷以待部堂㑹議不意邇來官錢愈涸私鑄日横本年九月初二日猝有搶奪之變該臣堂官操江僉都御史丁賓題奉聖㫖錢法乃國用所關如何姦民私鑄輙敢公行且違禁搶掠好生玩法着嚴行究治其官錢仍計議廣鑄以濟急用丁賔着照舊供職該部院知道欽此又該南京内守備等衙門並題奉㫖設法廣鑄隨該部院大臣遵奉惟謹㑹同九卿科道計議户兵工三部各措帑銀三萬兩操江衙門餉銀一萬兩共銀十萬兩聽從工部督鑄分司支領廣鑄官錢以濟民用其私錢盡行諭禁民間遵依都不行用止嗷嗷待濟于官錢不殊渴旱之望泉霖也臣想工部督鑄分司當此上下交責之㑹鑄本充盈之日雖欲執迷偏聽曲辭故推亦無如上虚明㫖下拂民望何矣因是以該司錢法事宜揆之分司共督寶源局府軍倉織染所三處原額六百爐後併為三百爐今當盡復舊數每月除一次常鑄外以一次廣鑄可用本銀一萬兩積至十箇月而本銀十萬兩鑄完一次便可得餘利銀三萬六千三百六十三兩零若鑄完三次共可得餘利銀一十萬九千九十兩零此自户工則例載在書冊記之若文思院撘鑄餘利又不啻是孰非國家圜府自然之利奈之何違衆而坐失之但此利議歸工部為工部錢法之所不載若此利還歸部院為部院歲支之所不及臣愚以為從民之請度户兵工三帑匱之專留此項餘利凑足浦口城岸分築之費將見部帑無勞于過損城岸各底于堅完其便一十萬金刀之利歲歲通流民間始自京城旁及外郡所在無徵貴徵賤之擾而錢法永定其便二貲本縱饒于前餘利不减于舊司臣日夜鼓槖而箇文不嫌于染指其便三有此三便而司臣督鑄謂宜虚心殫力循例而圖之毋煩人言之喋喋矣惟是買銅之法舊多權子母于銅商如閃爍之故智不可狥也添鑄之規反至開竇穴于鑄局而潛藏之宿弊不可仍也若以商情宜恤何不明開時價以平之如以買銅宜多何不兼用官買以導之考之前此督鑄亦嘗議而行之著有成例雖經户部應天府撘鑄不聞移令自行買銅奈何目今計議廣鑄而重以買銅之說故為牴牾不渉于臨事推諉之嫌乎哉臣為是惓惓亟望于司臣之督鑄者然尤有說焉臣聞之大臣以任人為明庶臣以任事為忠若大臣任得其人將躬不煩而事集于以阜民衛國隨所指裕如矣如浦口城岸分建户兵工三部慎簡材品不二心之臣任之而毋聽其避免虞其不相為屬也歲以京營巡視科道臣稽察其功次事完為之奏報優敘有不恊心併力壯國家根本之重地者否也如時下設法廣鑄工部另簡廉明有幹局一二臣畀之而勿狃于恒格虞其不能自明也循用九庫巡視科道臣驗記其出入城完併為移行奏敘有不赤心白意收國家泉貨之大柄者否也苐事經叅驗乃合謀惟善斷乃成聞之當斷不斷反底于敗語亦有之需者事之賊也目今南京部院大臣方將有事城工而適丁錢法計議廣鑄之㑹因以其餘利禆補續估錢糧其前此題允銀數預先支取付之定委司官封識貯庫聽從刻日鳩匠辦料興工先行具本題報庶幾事一舉而兼得謀兩利而俱存不然錯過今冬又將明春水漲親估覆請更待何時煌煌明㫖豈將諉之道旁舍耶萬厯年傅宗臯疏按壬午賦役冊官房僅五十餘間歲賃鈔未及二百今所徵鈔貫葢寔數也苐鈔有本折銀錢相兼遂致解納之費嘉靖六年明詔凡錢鈔折收銀兩宇内莫不奉行浦中折鈔之錢竟未能革豈非留都宻邇難以禁中貴之欲乎江浦志洪武間用寶鈔與古錢兼行其後鈔廢雜用累朝通寶并開元錢嘉靖以來止用開元滁和六合所行肉好皆有周郭浦次之浦子口又次之江南則輕小甚矣雖母權子而行時有壅格之患今通用萬厯制錢於地方甚便惟嚴禁私鑄而不使濫惡相欺何患錢法之壅乎同上丘濬曰自宋人為交㑹而金元承之以為鈔所謂鈔者所費之直不過三五錢而以售人千錢之物嗚呼直而至於千錢其體非大則精必非一日之功所成也乃以方尺之楮直三五錢者而售之可不可乎民初受其欺繼而畏其威不得已而黽勉從之行之既乆天定人勝終莫之行非徒不得千錢之息併與其所費三五錢之本而失之且因之以失人心虧國用而致亂亡之禍如元人者可鑒也已然則鈔法終不可行哉曰何不可行執其可行不可行之兩端而用其中斯可行矣何者上古之世以珠玉為上幣黄金為中幣刀布為下幣中古之世周立圜法兼以黄金布帛二者為言雖以王莽亦作金銀龜貝錢布之品後世專用銅楮二者為幣而不凖以金銀是以用之者無權而行之既久不能以無弊故其立法之始未嘗不善然皆以不善終之古今一律也本朝制銅錢寶鈔相兼行使百年于兹未之改也然行之既久意外弊生錢之弊在于偽鈔之弊在于多革偽錢之策臣既陳於前矣所以通行鈔法者臣請稽古三幣之法以銀為上幣鈔為中幣錢為下幣以中下二幣為公私通行之具而一凖上幣以權之焉葢自國初以來有銀禁恐其或閈錢鈔也而錢之用不出於閩廣宣德正統以後錢始用于西北自天順成化以來鈔之用亦微矣必欲如寶鈔屬鏹之形每一貫准錢一千銀一兩以復初製之舊非用嚴刑不可也然嚴刑非聖世所宜有也竊以為今日制用之法莫若以銀與錢鈔相權而行毎銀一分易錢十文新製之鈔毎貫易錢十文四角完全未中折者每貫易錢五文中折者三文昏爛而有一貫字者一文通詔天下以為定制而嚴立擅自加减之罪雖物生有豐歉貨殖有貴賤而銀與錢鈔交易之數一定而永不易既定此制之後錢多則出錢以收鈔銀之用非十兩以上禁不許以交易銀之成色以火試白者為凖寶鈔銅錢通行上下而一權之以銀足國使民之法葢亦庶幾焉皇明經濟錄丘濬曰按近時馬政亦有科錢買馬之令然所得者未必良而給之于軍遇有倒死陪償如故而西北之邊苦之尤甚請自今以後朝廷酌為中制定為馬價馬之價公私交易皆不許過二十緡違者馬與價俱入官牙行之人坐以違制罪大學衍義補國初竈丁辦鹽每引四百斤給工本鈔二貫五百文葢洪武年間鈔一貫值錢千文故竈丁得實利如是而冒禁賣私鹽絞死可也今鈔一貫不易粟二升乃禁絶竈丁勿賣私鹽是逼之餓以死也此後來行法之弊非初年之失也左編丘濬曰臣請敕所司嚴加禁約於凡民間造麴器具悉令折毁與凡為之傭作者一切勒以歸農有犯以與私鹽偽錢同科如此則一年之間亦可存麥百餘萬石以資民食同上張孚嘉渭南人嘉靖丁未進士歴官副使有清名將卒謂子孫曰世人生但識幾字死則有一部遺文生但餘㡬錢死即有一篇志文吾恥之否德不足辱明公筆自題姓名官位家世歲月紀諸石爾葢先達有行之者子孫必遵吾言不則為不孝湧幢小品以下詞話洪武時倪元鎮賣田宅得錢數百緡㑹張伯雨至念其貧且老悉推與之不留一緡每乘扁舟飄然於五湖三泖間以下雜記劉伯温題陸放翁賣花叟詩云君不見㑹稽山陰賣花叟賣花得錢即買酒後承平久張洪修撰每為人作一文僅得五百錢呉慥洪武間官四川還家一日見瞿宗吉自誦其詩云薄宦蕭然作逺遊行囊那得一錢留孟光不比蘇秦婦肯笑歸來只敝裘馬浩瀾著花影集花影者月下燈前無中生有以為假則眞謂為實猶渉虚也其落花滿庭芳云分明似身輕飛燕扶下避風臺當初珍重意金錢競買玉砌新栽更翠屏遮䕶羯鼓催開李西涯曰白髪華燈一夜春江南江北兩窮鱗飛騰有地歸塵土訶䕶無錢役鬼神物以泡名終合盡家隨身在更何貧清詩素壁猶堪玩休羡揚州鶴上人王存敬曰七賢言志一燈前次到迂夫獨莞然食祿十年官再徙不曽留得買書錢唐伯虎言志詩云不煉金丹不坐禪不為商賈不耕田閒來就寫青山賣不使人間造業錢正德年江東有太守某者禱紫姑仙以决疑仙姑降筆曰幾樹甘棠種未成使君何事苦經營雷霆怒擊氷山碎只恐錢神也不靈成化中日食九食之既一太白入南斗彗見西北長三丈三閱月乃沒彗見軒轅星孛台斗孛天田入太微襄陽雨黒黍山陰雨血京師雨錢山東黑氣亘天晝晦長樂山突起各一錢通卷二
