body:
  text: 錢通卷二十八明胡我琨撰詞話王符潛夫論曰富貴皆背親捐舊喪其本心朽貫千萬而不忍賜人一錢積粟腐倉不忍貸人一升陸扆撰光院例榜於院臺云費調金鼎能視草之煩勞擁出碧幢釋援毫之覊束固人臣之極摯亦翰院之榮華至於察風俗於一方賞貨泉於三使其為盛也抑又次焉各請出錢用光玉署今之士大夫又有專務科罰者公吏有過則令罰直若干人户論訴理曲合與斷罪迺以修造為名各罰錢入官若干不知此錢果歸何地耶晝簾緒論史宏肇遣先鋒將馬誨擊契丹斬首千餘級崇美等不敢進引而南宏肇遣誨追擊破之崇美等退保懐州劉智遠以行德為河陽節度使契丹主聞之歎曰我有三失宜天下之叛我也諸道括錢一失也令上國人打草穀二失也不蚤遣諸節度使還鎮三失也五代史或謂天下何時太平岳飛曰文臣不愛錢武臣不惜死天下太平矣宋史李紓侍郎好諧戲又服用華鮮嘗朝囘以同列入坊門有負販者呵不避李罵曰頭錢價奴兵輙衝官長負者顧而言曰八錢價措大漫作威風紓樂採異語使僕者誘之至家為設酒饌徐問八錢之義負者答曰只是衣短七耳同列以為破的紓甚慙下人呼舉不正故云短也因話錄漢法官至二千石月得米一百二十斛俸錢萬二千古之升斗小今之升斗大量酒之升斗小量穀之升斗大昔人飲酒有數石不亂者班固論一夫百畆所收之粟人食月一石五斗古之人亦今之人也豈有一人能飲數石而食五升米乎無是理也前史稱漢文帝節儉身衣弋綈集上書囊為殿帷所幸慎夫人衣不曵地此三事以人主行之可謂陋矣然賜鄧通以十數鉅萬又以銅山與之此又何也泊宅編古今之語大都相同但其字各别耳古所謂阿堵者迺今所謂兀底也王衍口不言錢家人欲試之以錢遶床不能行因曰去阿堵物謂口不言去却錢但云去却兀底爾如傳神寫照正在阿堵中蓋當時以手指眼謂在兀底中爾後人遂以錢為阿堵物眼為阿堵中皆非是蓋此兩堵同一意也然去有兩音一邱據反乃去來之去世常從此音非也當作口舉反韻略云撒也然此義亦非也蘇武掘鼠所去草實而食之乃鼠所藏者也蓋衍之意以為此錢不當置於此當屏藏之於他處也嬾真子煇家舊藏歴代錢譜十卷迺紹聖間李孝美所著蓋唐人顧烜張台先有篹說孝美重修也周秦後錢之品様具著於帙是特見於形似爾親黨洪子予收古錢幣數十百種自虞夏以降一無遺者每出示坐客道所以然皆有依據大抵古錢輪郭皆重厚叩之有聲雖王莽小錢名徑六分重一銖然亦不致輕薄豈上古鼓鑄但求精緻初不計銅工耶洪死常叩其子云悉舉入棺矣或言其家慮為勢力者攘取故為之辭清波雜志元豐間龎懋賢元英為主家郎嘗著文昌雜錄内一條以不知得一順天錢鑄於何代為言書成後又言近得今朝士王儀家有錢氏錢譜乃史思明所鑄初以得一非長祚之兆乃改順天又於洪氏見二錢文皆漢𨽻徑寸四分以一當開元通寳之百而李譜復云思明銷洛佛銅所鑄賊平無所用復以鑄佛今所餘伊洛間甚多視錢之譜為詳以是知誠有益於未聞好事者儻裒諸家所譜更攷近世圜法沿革萃為一帙板行於世不亦善乎清波雜錄齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓死于首陽之下民到于今稱之楊子雲作法言蜀之富人載錢五十萬求書名其間子雲不可李仲元鄭子真不持錢子雲書之至今與日月爭光余觀韓退之送窮文歴述窮鬼之害至末乃云吾立子名百世不磨是到底却得窮鬼力夷齊李鄭亦所謂得窮鬼力者也鶴林玉露士大夫若愛一文不直一文陳簡齋詩云從來有名士不用無名錢楊伯子嘗為予言士大夫清亷便是七分人了蓋公忠仁明皆自此生伯子誠齋冡嗣號東山先生清節高文趾美克肖其帥畨禺將受代有俸錢七千緡盡以代下户輸租有詩云兩年枉了鬢霜華照管南人没一些七百萬緡都不要脂膏留放小民家又别石門詩云石門得得泊歸舟江水依依别故侯擬把片香投贈汝這回欲帶忘來休蓋昔吳隱之守五羊不市南物歸舟有香一片舉而投諸石門江中用此事也其帥三山不請供給錢以忤豪貴劾去作詩貽先君曰與世長多忤持身轉覺孤夤緣新齒舌收拾老頭顱我已訶瀧吏君誰誦子虚同歸燈火讀家裏石渠書時先君與之同入閩故也陳膚仲作玉壺氷朱絲絃二詩送之清波雜錄黄魯直戲作貴耳賤目謎云驢耳對軒軒爭酬價十千眈眈兩虎視不值一文錢侯鯖錄筮易以蓍古法也近世以錢擲爻欲其簡便要不能盡卜筮之道自昔以錢之有字者為陰無字者為陽故兩背為折二畫也兩字為單一畫也朱文公以錢之有字者為靣無字者為背凡物靣屬陽背皆屬陰反舊法而用之故建安諸學者悉主其說或謂古者鑄金為貝曰刀曰泉其陰或紀國號如鏡陰之有欵識也一以為陰一以為陽未知孰是儲華谷祛疑說篹男兒重義氣何用錢刀為又男兒欲相知何用錢刀為卓文君白頭吟思陵神輿就祖道祭陳設窮極工巧百官奠哭紙錢差小官家不喜諫官以為俗用紙錢乃釋氏使人以超度其親者恐非聖主所宜以奉賔天也今上抵於地曰邵堯夫何如人而祭先亦用紙錢豈生人處世如汝能日不用一錢否乎楓窓小牘銅為錢則人愛為印則人畏為足爐潄盆則翁媼皆役之非性有美惡置之者何如耳於我何加損焉西堂日記嗚呼士知修内不欺諸已外不欺諸人可謂修已矣嗚呼士誠有立耶上不怨於天下不怍於地中不負於神可謂士君子矣凡惟知修至於可立而不欺不愧者其僃如此雖天地神明我斯天地神明已豈又卹䘏於諸餘哉世衰道隱士心險惑稔匿自危則區區於禍福以壮其毒聞古之用幣以禮神祇後之罪士為多則假之以請禱禳祈假之不已則翻楮代焉而弗支是故罪者滿世而莫救其非肅肅鄧州惟道之繇識獨超於衆謬行不狥於時流孰巫祝之足因而禧祥之茍求蓋清修之不媿則萬福之來酬是何楮錢之不然而名位之優優嗚呼豈弟君子求福不囘誰其嗣之宋有人猗不燒楮鏹頌青錢文之美者比青銅錢唐張鷟文詞猶青錢萬選萬中珠璣藪泉志聞有泉文近於道者可以廣見又有妄作三皇幣及禹時幣不可為信卍此字人謂萬字乃出古錢不見此書終不知也故引入以待好事者學古編漢日五銖建姬年九府流天龍帶泉寳地馬列金溝趙壹囊初定何曾箸欲收金門應入論玉井冀來求李嶠往日用錢捉私鑄今許鈆錫和青銅刻泥為之最易得好惡不合長相䝉杜詩半輪殘月掩塵埃依稀猶有開元字想得青光未破時買盡人間不平事毗陵女子年十六詠破錢沈存中筆談趙壹傳文籍雖滿腹不如一囊錢周徐謙歌不羨一囊錢惟重心􅁭㑹銅錢之氣望之如青雲無勞磁石之火金貨猥臻非遊玉疊之川銅山可見舒王濟之埓猶覺有餘假劉實之繩穿而不盡榮光獨照自均若木負恩知重竊譬蓬莱簡文謝賜講解錢啓重彼八銖珍斯九法赤仄成采出自水衡之錢紺文委貫忽積銅扇之裏長充放生用濟宏識發宏誓願等供無邊怖鴿獲安窮魚永樂前人謝賜放生錢啓問吉已通請期有日賢夫之譽多愧張耳非壻之才偶同王粲曲降隆慈俯垂珍錫禽贄獲舉纁幣有資劉孝威謝賜婚錢啓名稱榆莢非投飲馬之橋價重圜泉寧棄呪雞之野始出王門忽光私室青鳬委質笑夷甫之不言赤仄垂緡重河間之能數張正見謝賜錢啓貫藏文馬如燒安息之銀帶挿通犀似獵雲南之獸北郭騷之長貧是所甘愜南宫敬之載寳殊非念望花開四照惟見其榮鼇戴三山深知其重庾信謝犀帶金錢啓重非半兩輕異五銖子母相權饑寒頓解細看銅郭徐憶牙籌雖云神有魯褒便恐癖如和嶠李商隱謝聘錢啓白馬從軍青鳬受聘磨文難滅較貫知多陸賈方驗於火花郭况莫矜於金穴前人訪蜀郡之卜人懸之莫竭遇河間之姹女數且難窮未草檄以愈風不執鞭而獲富前人多若鑿山積如别藏丙科擢第未全染於桂香盛府從知却自驚于銅臭前人鄭元曰金銅無荒年因物貴大鑄泉以饒民大學衍義補邱濬曰虞夏商之幣金為三品或黄金或白銀或赤銅或錢或布或刀或龜貝至周圜法金惟用其黄者然猶有刀布之屬秦一天下之幣為二止用黄金并以赤金為錢耳其他皆不用同上周匡物字幾本漳州人唐元和十二年及第初周以家貧徒歩應舉落魄風塵懷刺不偶路經錢塘江乏僦船之資久不得濟乃於公舘題詩云萬里茫茫天塹遥秦皇底事不安橋錢塘江口無錢過又阻西陵兩信潮郡牧出見之乃罪津吏至今天下津渡尚傳此詩諷誦舟子不敢取舉選人錢自此始閩川名士傳李豫亨曰貨殖傳云貪賈三之亷賈五之誠哉是言也昔范文正公有隣嫗晉謁苦貧甚公問汝何生理嫗對曰鬻糕曰日鬻幾斗曰日二斗所入幾何曰日入錢四十文曰汝今日蒸四斗而止徵二斗之入何如嫗如其言糕肥而價省人不之他所而之嫗不半歲大饒富今之逐什一之利者慎勿規近利哉代醉錄太宗時同年數軰取名似姓者為句云馬子山騎山子馬馬給事字子山穆王八駿馬有山子之名久之人對曰錢衡水盜水衡錢錢某為衡水令人謝之曰正欲作對實非有盜也吴人自相呼為獃子每歲除夕穉兒繞街呼呌云賣癡獃千貫賣汝癡萬貫賣汝獃見賣儘多送要賒從我來或曰用兵之法殺人如殺草使錢如使水余曰軍無賞士不往軍無財士不來使錢如使水可也乃若殺人如殺草則非至論王欽若曰陛下聞博乎博者輸錢欲盡所有出之謂之孤注陛下㓂凖之孤注也斯亦危矣綱目司馬溫公編通鑑時手藁蹟嘗見數幅如人名字各分代類寫書未成或言溫公利餐錢故遲遲耳公聞之遂急結未了故五代多繁冗說海負錢必償㝠道也然或為神而償或更為人而償甚則為畜而償何其異與豈負債之人善惡不同抑所以負之故亦異也蜀人羅冲具車馬衣糧勸嚴君平之任君平曰我有餘君不足奈何以不足奉有餘冲曰吾家萬金子無儋石之儲何謂有餘曰吾嘗宿子家見子晝夜汲汲無有足時我賣卜不下床而錢數百埃塵厚寸無所用之豈非我有餘乎陜西曾有議欲罷鑄錢者以謂官中費一貫鑄得一貫為無利伊川曰此便是公家之利利多費省私鑄者衆費多利薄盜鑄者息權歸公上非利而何蔡語錄左相日興費萬錢飲如長鯨吸百川銜杯樂聖稱避賢飲中八仙歌王審知治城城有錢文惡之命剗去而其文愈明又有謡曰風吹楊葉鼓山下不得錢來兵不罷青箱雜記劉生魯風投謁所知為典謁所阻吟曰萬卷書生劉魯風烟波萬里謁文翁無錢乞與韓知客名紙毛生不為通摭言巢許蔑四海商賈爭一錢古樂府宋饒竦熈寧中舉進士不第以詩投王荆公曰又還垂翅下青霄歸指臨川去路遥二畝荒田俱賣郤要錢凖備納青苗山堂肆考宋沈希顔嘉祐間知雩都縣公宇後妖禽夜啼希顔書其本云此處離朝路幾千為官不取一文錢平生弗養無情鳥遮莫妖禽夜哭天詰旦禽去治縣三年災沴不生百廢具舉同上焦仲卿妻詩齎錢三百萬皆用青絲穿魏陳思王聖皇篇主上增顧念皇母懷苦辛何以為贈賜傾府竭寳珍文錢百億萬采帛若烟雲到漑為建安太守任昉寄詩求二叚錦曰鐵錢兩當一百易代名實為惠當及時無待冷秋日唐王勣詩不應長賣卜須得杖頭錢南市津頭有船賣無錢即買繫籬傍杜子美誰料平生臂鷹手挑燈自送佛前錢司空圖江總新入姬人應令曰數錢拾翠爭佳麗拂紅㸃黛何相似蕭子範代美人篇朝酤成都酒暮數河間錢庾信和張侍中述懐漢陽錢遂盡長安米空索蔡澤傳太史公曰韓子稱長䄂善舞多錢善賈韓非子也瓦瓏贊瓦瓏鑛殻建瓴狀如渾沌錢文外眉而内渠眉為高為眉渠為疏為渠此魁六海鈴也海物異名記張平子四愁詩美人贈我金錯刀何以報之英瓊瑤范鎮送羅勝卿同年提舉玉局觀詩疋馬西歸去知君得意偏人情重鄉里官職更神仙曉後無衙喏旬頭有俸錢何須駕白鶴辛苦上青天四川名勝志爍一鼎之銅以灌一錢之形不能成一鼎明矣今謂大人天神故其跡巨巨跡之人一鼎之爍銅也姜原之身一錢之形也王充論衡五百青蚨兩家缺赤洪厓打白洪厓丁渭詩錢之名號若形若文字若隱語若象物若改年蓋自葛天軒轅非有熊氏也尊盧氏曰幣始以至於今所呼曰板兒棍兒而猶未知所終也殆百紙不可了猶瑣者漢武新莽隋唐間志也諺云財壓當行勢壓奴僮語若墮駔儈然與貨殖篇什則下之百則役之及子輿氏所稱小役大弱役強皆天也㫖何殊哉終身為魚而求避濕無之也徐渭顔公二十萬盡付酒家錢興發每取之聊向酒中仙清風明月不用一錢買李白賣油翁弄巧取錢置胡盧乃反臂於肩上取油注錢口如線注畢而錢四邊不濕愚今考經國之制為居家之法隨資産之多寡制用度之豐儉合用萬錢者用萬錢不謂之侈合用百錢者用百錢不謂之吝是取中可久之制也梭山家制宋廣平之抑郝靈荃賞非售功之道也張益州之斬一錢吏非刑罪之道也世方以為美談矣筆麈嗇夫私賦民錢市衣進父而吳祐原之人有盜隣麥進母而孔融賞之奴竊食祭先而韓卓免之庾人盜秔米食母而特爾格貸之觀過知仁也雖然賞則過矣偶記野老來看客河魚不取錢十字句千一錄錢通卷二十八
