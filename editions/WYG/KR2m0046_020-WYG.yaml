body:
  text: 錢通卷二十明胡我琨撰怪誕南方有蟲名􅀈蠋如蟬而狀稍大其味辛美可食每生子必依草葉大如蠶子人將子歸其母亦飛來不以近逺雖潜取其母必知處殺其母塗錢子塗貫用錢則自還搜神記漢武帝昇望月臺時暝望南端有三靑鴨羣飛俄而止于臺下帝悦之至夕鴨宿于臺端日色已暗帝求海肺之膏以為燈焉取靈􅀈布為纒火光甚㣲而光色無幽不入青鴨化為三小童皆着青綺文繻各握鯨文大錢五枚置帝几前身止影動因名輕影錢洞𠖇記吉水七里市有王羊者以屠宰為活端平年間有相識常早獨行出未至王居二三里稍荒涼相𫝊有祟其人心偶疑畏忽有人呼之同行曰吾倦與爾更迭駞負如何其人曰善我先駞爾至某處爾又駞我至某處及至某處天㣲白髣髴見其手上有毛摩之果毛也其人求下不許遂駞之不置將近王居謹執其手置于地迺一羊也其人解絛繫之執至王居扣門語王曰吾負官錢僅有一羊欲賣四千如何王提羊估度曰止直三千其人曰但吾欲急用幸以見錢酬我王提三千授之其人并留絛繫羊語王曰羊稍躅躑謹固勿失遂攜錢之邑及歸過王惟絛存焉人遂名為王羊云異聞總錄右龜兹國王阿主兒者有神異力能降伏毒龍時賈人買市人金銀寳貨至夜中錢並化為炭境内數百家皆失金寳西陽襍俎荆之清一曰溝水宛一曰穴口傍義興十二年有兒羣浴此水忽然㟁側有錢出如流沙因竟取之手滿置地隨復去乃衣􅁭結之然後各有所得流錢中有銅車以銅牛牽之勢甚迅速諸童奔逐掣得車一脚徑可五寸許猪鼻轂有六幅通體青色轂内黄鋭狀如常運于時沈敬一作敞守南陽求得車脚錢行時貫草輒便停破竟不知所終往諾臯記貞觀中岑文本下朝多于山亭避暑日午時寐初忽覺有叩山亭院門者藥豎報云上清童子元寳特此叅奉文本性慕髙道束帶命入乃年二十已下道士儀質爽邁衣服纎異冠淺青圓角冠衣淺青圓帔履衣服輕細如霧非齊紈魯縞之比文本與語乃曰僕上清童子自漢朝而果成本生于吳已得不凝滯之道遂為吳王進入見漢帝有事擁遏教化不得者無不相問僕嘗與方圓行下皆得美暢繇是自文武二帝迄至哀帝皆相眷王莽作亂方出外方所在皆沭人憐愛自漢成帝遂厭人間乃尸解或秦或楚不常厥居聞公好道故此相曉耳文本詰以漢魏宋齊梁間君王社稷之事了了如目覩因言史𫝊間屈者虚者亦甚多文本曰吾人冠帔何制度之異對曰夫道在于方圓之中僕外服圓而心方正相時儀也又問曰衣服皆輕細何土所出對曰此是上清五銖服又問曰比聞六銖者天人衣何五銖之異對曰尤細者則五銖也談論不覺日晩文本乃别出門而忽不見文本知是異人乃每下朝即令伺之到則談論移時後令人偕送詣其所止出山亭門東行數步于院墻下瞥然不見文本命工力掘之三尺至一古墓墓中了無餘物惟得古錢一枚文本悟上清童子是銅名元寳錢之文也外圓心方錢之狀也青衣銅衣也五銖服亦錢之文也文本雖知之而錢帛日盛至中書令十餘年忽失古錢所在文本遂薨博異志唐貞元中揚州坊市間有一丐者不知所從來自稱姓胡名媚兒所為怪異旬日後觀者雲集其所丐求日獲千萬一旦懷中出一琉璃瓶子可受半升表裏烘明如不隔物遂置于席上初謂觀者曰有人施與滿此瓶子則足矣瓶口剛如葦管大有人與之百錢投之琤然有聲則見瓶間大如粟粒衆皆異之復有人與之千錢投之如前又有與萬錢者亦如之俄有好事者與之十萬二十萬皆如之或有以驢馬入之瓶中見驢馬皆如蠅大動行如故幻異志南陽定宗伯夜行忽逄一鬼鬼問伯為誰伯欺之曰我亦鬼也遂為侶向宛行勌因相擔問鬼曰鬼何畏曰鬼惟不喜唾耳欲至宛便擔鬼著頭上詣宛市鬼化為羊伯恐其變遂唾之因賣得錢千五百買者將還繫之明旦見繩在時人語曰定宗伯賣鬼得錢千五百捜神記廣陵有賈人以栢木造牀几什器百餘事製作甚精其費已二十萬徃建康鬻之晩至𤓰步遇風泊山下頃之有巨舟其中空唯篙工三人乗之亦泊于側賈人疑其為盜也將伺夜而刼我乃相與登岸入深林避之俄而風雨雷電䝉覆舟所㟁上則星月了然食頃雨止雲散見巨舟稍稍前去乃敢歸舟中所載栢木什器都不復見餘物皆在巨舟猶在東岸有人呼曰爾無恨當還爾價賈人所載既失復歸廣陵至家已有人送錢三十萬置之而去問其人即泊𤓰步之明日也米元章知無為軍喜神怪每雨暘致禱則設宴席於城隍祠東向坐神像之側舉酒若相獻酬往往獲應每得時新茶菓之屬輒分以饋神令典客聲喏𫝊言以致之間有得緡錢於香案之側若神以勞送者嘗晨興呼譙門鼔吏問夜來三更不聞鼔聲吏惶恐言中夜有巨白蛇纒遶其鼓故不敢近米頷之叱吏去不復問故郡人皆疑其蟒精至今父老猶𫝊道之暌車志晉海西太和中㑹稽山隂縣起倉鑿地得兩大船滿中錢錢皆輪文大形時日向暮鑿者馳以告官官夜遣防守甚嚴至明失錢所在惟有船存視其狀悉有錢處宋書五行志軒轅先生居羅浮山唐宣宗召入禁中以桐竹葉滿手挼成錢令狐澄大中遺事軒轅先生取榆莢肉於袖良久寫之皆為小錢遂治飲之晞陽子賔仙𫝊成都髙僧誦法華經有功忽一山僕至寺言先生來晨請師誦經在藥市奉候至則煙嵐中横一跨溪山閣乃其居也僕曰先生請師且誦經誦至寳塔品先生野服杖藜嘿揖􅋹香聽罷遂入不復出齋以藤盤竹箸秫飯一盂把菊數甌食訖施襯一鍰僕送出路口中途問僕曰先生何姓曰姓孫曰何名僕于僧掌中書思邈二字僧大駭欲再往僕遽失之視襯資乃金錢一百皆良金也中五六金一半尚欽湘山野錄壬子嵗林城雙塂有囘風卷錢經市而過市人隨攫其錢以衣襟貯之歸視與錢無異而十亡七八徐鉉稽神錄壽春人曹真出行野外忽見坡下有數千錢自逺而來飛聲如鈴真逐之入一小穴以手掬之可得數十而已同上宣和間朝廷收復燕雲科増郡縣免夫錢海州懷仁縣有楊秀才妻劉氏獨與子居而家饒于財乃以十萬緡代下户之輸縣令欣然輦運庫藏為空翌日視之庫中之錢復滿每緡首有青麻二字觀者異之或曰聞青州有麻十萬家豈非神運其錢至此耶劉氏宻令往青州踪跡之果有麻氏失錢劉氏請歸錢于麻麻以為天授辭焉劉氏乃悉散施之其後家益富云春渚紀聞五代表象先子正辭積錢盈室室中嘗有聲如牛以為奸勸其散以禳之正辭曰吾聞物之有聲者求其類耳宜益以錢聞者以為笑本傳宋之末姑蘇賣餅王家撿所鬻錢得𠖇幣焉因怪之每粥餅必識其人與其錢久之乃一婦人也跡其婦至一塜而滅遂自之官啓塜見婦人卧柩中有小兒坐其側閒居錄益州之西雲南之東有神祠尅山石為室下有奉神祠者自稱黄公因言此神張良所受黄石公之靈也清淨不宰殺有祈禱者持一百錢一雙筆一丸墨置石室中前請乞先聞石室中有聲須㬰問來者何欲既言便具語吉凶不見其形至今如此捜神記寳厯二年亳州言出聖水飲之者愈疾李徳裕奏曰臣訪聞此水本因妖僧誑惑狡計丐錢數月以來江南之人奔走塞路每二三十家都顧一人取水擬取之時疾者斷食葷血既飲之後又二七日蔬飱危疾之人俟之愈疾其水㪷價三貫而取者益之他水沿路轉以市人老疾飲之多至危篤昨㸃兩浙福建百姓渡江者日三五十人臣于􅀢山渡已加捉搦若不絶其根本終恐無益黎甿舊唐馬湘字自然有道術嘗于江南刺史馬植坐上能以徧身摸出青銅錢投井中呼之即出沈玢續仙𫝊唐穆宗時禁中花開夜有蛺蝶數萬飛集花間宫人以羅巾撲之無獲上令張網空中得數百遲明視之乃庫中金錢也故詩曰何處金錢與玉錢化為蝴蝶夜翩翩後人榆莢稱錢謂似錢耳然亦有本盧縣東有金榆山昔朗法師令弟子至此採榆莢詣瑕丘市易化為金錢酉陽襍俎周奉常歴城人談其鄉前輩有王敇者少得道術王化時鄉人有自京師歸者道逢輿馬騶從鼔吹趨避之王從輿中遙識曰某人也人曰是公耶王曰某被召不得辭寄語吾子有書數卷藏某處可取視能讀讀之不能讀即棄去無留也比至其家問則知王以是日化子如言取書視之皆白紙遂棄去王居官貧嘗呼子慰之曰吾有他藏今令汝見因指地一處令掘至四五尺見白金一窖急掩之又指一處掘有錢纍纍曰此吾所積遺爾者姑種樹識之王即化子從樹下掘地索銀錢無有也䦚然錄最宣城郡當塗民劉成李暉以巨舫載魚蟹鬻于吳越間唐天寳十三年春皆自新安江載往丹陽郡行至下查浦㑹天暮泊舟時李暉往浦㟁村舎中獨劉成在江上忽聞舫中有連呼阿彌陀佛者聲甚厲驚而視之見一大魚自舫中振鬛摇首人聲而呼佛號俄而舫中萬魚俱跳躍呼佛成大恐盡投羣魚江中有頃暉至成以告暉怒其妖妄唾罵良久成無以白即以衣資酬其直餘百錢易荻草十餘束致于岸明日遷舫中忽重不可舉視之得緡十五千題云歸汝魚直成奇之是日于𤓰洲飯僧併以施焉問羊集唐開元時東京士人以遷歴不給南遊江淮客遊憊甚徘徊揚州久之同亭有謝二者矜其失意謂曰毋自苦欲北歸當有三百錢相奉及别曰我家在魏王池東至池叩大柳樹付家人書便取錢也士人如其言忽見朱門白壁有婢引入見姥果付錢三百千及出家已見錢在㟁悉是官家排斗錢而色小壞士人疑其怪因以告官河南尹奏其事皆云魏王池中有一黿窟恐是有敕使擊射之募崑崙數十人悉持刀鎗入窟得大小數十頭其一大如連牀皆殺之得錢帛數千事後五年士人選江南尉至揚州市忽見謝二怒曰于君不薄何乃相負老姥家人皆遭非命君之故也言訖而去士人𤼵行百餘里遇風一家盡沒問羊集唐咸通庚寅嵗洛師大飢穀價騰貴民有殍于溝塍者至蠶月桑多為蟲食葉一片直一鍰新安縣慈村民黄公直有桑數十株特茂盛䕃翳與妻謀曰歉儉若此家無見儲竭力此蠶未知得失莫若棄蠶貨葉可獲錢十萬蓄一月糧則接麥矣豈不勝餒死乎妻曰善乃攜鍤坎地卷蠶數箔瘞焉明日凌晨荷桑詣市鬻之得三千文市彘肩及餅餌以歸至徽安門門吏見囊中殷血灑地詰之答曰適賣桑得錢市彘肉及餅餌貯囊無他也請吏捜之𤼵囊惟有人左臂若新支解者羣吏乃縳送居守居守命付河南府尹王公凝鞫之具欵實不殺人特請簡驗尹判差所屬監往就檢既至村先責鄰保狀皆稱黄公直埋蠶别無惡跡乃與村衆及公直同𤼵坑中惟有箔裹一死人而缺其左臂取得臂附之宛然符合詣府白尹尹曰黄公直雖無殺人之事且有坑蠶之咎法或可恕情在難容蠶者天地靈蟲綿帛之本故加剿絶與殺人不殊當寘嚴刑以絶凶醜遂命于市杖殺之使驗死者則復為腐蠶矣建中初有人牽馬訪馬醫稱馬患脚以二十鐶求治其馬毛色骨相馬醫未嘗見笑曰君馬大似韓幹所畫者真馬中固無也因請馬主遶市門一匝馬醫隨之忽值韓幹幹亦驚曰真是吾設色者乃知隨意所匠必𠖇㑹所肖也遂摩挲馬若蹶因損前足幹心異之至舍視其所畫馬本脚有一㸃黒缺方知是畫通靈矣馬醫所獲錢用歴數主乃變泥錢酉陽襍俎北齊武成時安陽縣有黄家者住古城南其先累世巨富有巫師占君家財物欲出好自防守其家每夜使人分守夜有一隊人盡着黄衣乗馬從北門出一隊白衣人乗馬從西門出一隊青衣人乗馬從東園門出悉借問趙虞家此去近逺當時並忘去後醒覺撫心懊悔不可復追所出黄白青者皆金銀錢貨廣五行記王氏紀聞唐先天中有田父牧牛嵩山而失其牛求之不得忽見山穴開錢盈其中田父入穴負十千而歸再往迷失道逢一人謂曰汝牛值幾何曰十千人曰汝牛為山神所得已償爾價何為復尋言訖忽不見田父悟乃歸漢光武建武二年西河鮮于冀為清河太守作公廨未就而亡後守趙髙計功用二百萬五官黄秉功曹劉適言四百萬錢于是冀乃鬼見白日道從入府與及秉等對共計挍定為適秉所割匿冀乃書表自理其畧史異宋髙宗紹興初朱勝非出守江州過梁山龍入其舟纔長數寸赤背綠腹白尾黒爪甲目有光行都垜橋旌忠廟三蛇出沒庭廡大者盈尺方鱗金色首脊有金錢遇霽或變數百十蕉卉間廟徙而蛇孽亦絶同上葛仙翁𫝊翁取十錢使人一一投井中翁于井上以器呼錢錢從井中起一一飛入翁器中兖州王鑑性剛鷙無所憚常凌侮鬼神開元中乗醉往莊行十里已來㑹日暮長林下見一婦人問鑑所往請寄一襆而忽不見乃開襆視之皆紙錢枯骨之類靈異錄李淳風常奏曰北斗七星當化為人明日至西市飲酒宜令候取太宗從之乃使人往候有婆羅門僧七人入自金光門至西市酒肆登樓命取酒一石持碗飲之須㬰酒盡復添一石使者登樓宣敇曰今請師等至宫胡僧相顧而笑曰此李淳小兒言我也飲畢下樓囘顧已失初僧飲酒未入其直及收具于坐下得錢二千國史異篹晉元帝時有老母每旦擎一器茗往市鬻之市人競買自旦至暮其器不減所得錢散路傍孤貧人或異之執而繫之於獄夜擎所賣茗器自牖飛去廣陵耆舊傳韋恕女及笄未嫁六合縣園叟張老求婚恕難曰今日納錢五百緡則可許諾頃之錢至既娶負钁穢地自若續仙傳董卓宅在永和里掘地輙得金玉寳翫後魏邢巒掘得丹砂及錢銘曰董太師之物後夢董見索巒恡不還經年無病而卒河南府志勝明崇儼有竒術唐髙宗召見盛夏思雪頃取以進云取于隂山又憶𤓰索百錢頃以𤓰獻曰得之緱氏老人間召問老人云失一𤓰得百錢續仙𫝊宋襄陽鄧城縣有巫師能用妖術敗酒家所醸凡開酒坊者皆畏奉之每嵗春秋必遍詣諸坊求丐年計合十餘家率各與錢二十千則嵗内酒平善巫亦藉此自給無飢乏之慮一嵗因他事頗窘用又詣一富室有所求曰君家最富贍力足以賑我願勿限常數主人拒之甚峻曰年年餉君二千錢其來甚久安得輙増寧敗我酒一錢不可得巫嘻笑而退出駐近店遣僕囘買酒一升盛以小缶取其汚攪雜攜往林麓禹步誦咒環繞數匝瘞之地乃去適有道士過見之識其為妖而不知事所起巫還店甚喜俄道士亦繼來少憇訪酒家見舉肆遑遑憂窘問其故曰為一巫所困今酒甕成列盡作糞臭懼源源不已欲徃尋跡哀求之道士曰吾亦見此人不須往求吾有術能療但已壞者不可救耳即焚香作法半日許臭止又言凡為此法以敗五穀者若用糞穢罪甚大君家宜齋戒當奉為拜章上愬其家方忿恚迫切趣營醮筵道士伏庭下踰數刻始起曰玉帝有敕百日内加彼以業疾轉因錄陶穀字秀實唐彥謙遜避石晉諱改陶自號金鑾否人少時夢數吏云奉符換眼吏附耳求錢十萬安第一眼五萬安第二眼穀不應吏乃安第三眼既覺眼色深碧道士陳紫楊相之曰貴人骨氣可惜一雙鬼眼竟不至大位堯山堂外紀壺公者不知其姓名也今世所有召軍符召鬼神治病玉府符凡二十餘卷皆出自公故總名壺公符時汝南費長房為市掾忽見公從逺方來賣藥口不二價治病皆愈日收錢數萬便施與市中貧乏飢凍者唯留三五十常懸一空壺于屋上日入後公跳入壺中人莫能見惟長房樓上見之神仙𫝊熈寧中有班中一大挍姓李忘其名嘗監牧馬于陳留雍丘之間野中有叢祠俗𫝊以為周襄王公主墓李因取紙錢就墓拜焚之紙錢不化因忽昏仆地不知人久之甦謂其徒曰屬公主召我又歎曰乃爾富貴因不復語雖問亦不答牧事已歸家即與其妻異寢後寢疾元豐中忽一日顧左右取衣冠甚急又云備馬云當從駕其父問從何駕也答曰皇太后駕也既被衣冠良久遂卒乃慈聖太后崩日也張太史明道雜紀時變唐昭宗天復元年帝在鳯翔為梁軍所圍逾年城中薪食俱盡自冬涉春雨雪不止民凍餓死者日以千數米斗直錢七千至燒人屎煑尸而食父自食其子人有爭其肉者曰此吾子也汝安得而食之人肉斤直錢百狗肉斤直錢五百天子于宫中設小磨遣宫人自屑豆麥以供御遂與梁和史異漢獻帝興平元年大旱自四月至七月帝避正殿請雨遣使者洗囚徒原輕繫是嵗穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積同上唐徳宗貞元元年春大飢東都河南河北米斗千錢死者相枕同上唐僖宗光啓二年二月荆襄大飢米斗三千錢人相食三年揚州大飢米斗萬錢同上第五琦為相又鑄重輪乾元錢一當五十與三品錢並行法既屢易物價騰踊斗米直七千餓死者滿道同上宋髙宗建炎元年汴京大飢米升錢三百一䑕直數百錢人食水藻椿葉道殣骼無餘胔史異寧宗嘉定二年春兩淮荆襄建康府大飢米斗錢數千人食草木淮民刲道殣食盡𤼵瘞胔繼之人相搤噬流于揚州者數千家渡江者聚建康殍死者八九十人同上嘉定八年夏五月大燠草木枯稿百泉皆竭行都斛水百錢江淮杯水數十錢渇死者甚衆同上臣聞熈寧中蘇杭等州莩死者凡八十萬邇者年飢更倍熈寧乞賜上供錢應副大蘇奏議唐開元後米斗錢七千食貨志晉雍梁州疫大旱隕霜殺秋稼闗中飢米斛萬錢詔骨肉相賣者不禁㑹編闗中米斗百錢運山東江淮穀輸京師牛死什八九羣臣多請幸東都韋后家本不樂東遷使巫覡以不利東行説上後有言者上怒曰豈有逐糧天子耶乃止唐史獻帝在長安穀貴豆一斛二十餘萬後漢書漢興平元年穀一斛直錢五十萬長安中人相食帝令侍御史侯汶出大倉米豆為貧人作糜飢死者如故帝取米豆各五升于御前作糜得二皿乃杖汶五十于是悉得全濟㑹編宋東方諸郡部連嵗旱飢米一升錢數百建康亦至百餘錢飢死者十六七是嵗宋境内凡有州二十二郡二百七十四縣千二百九十九户九十四萬有奇同上侯景初至建康謂朝夕可㧞號令嚴整士卒不敢侵暴及屢攻不克人心離沮又軍中乏食乃縱士卒掠奪民米及金帛子女是後米一升直七八萬錢人相食餓死者什五六六朝史東都米斗三千人餓死者什二三同上東都霖雨洛水溢溺民居千餘家闗中先水後旱蝗繼以疾疫米斗四百兩京間死者相枕于路人相食永淳元年闗中飢饉米斗三百永泰元年旱米斗千錢秋七月京畿飢米斗千錢三月河北旱米斗千錢以上俱㑹編女真河東陜西大飢斗米錢數千流莩滿野金史十月曹操至東阿是嵗穀一斛五十餘萬錢人相食隋煬帝謀討髙麗詔山東置府令養馬以供軍役又𤼵民夫運米塞下耕稼失時穀價踴貴斗米直數百錢太學衍義補頻年蝗旱今山東河北斗米千錢燕山之價倍之咸平黄龍之價又兩倍之人皆相食數至盜起識者謂天之亡金其在兹乎虞允文論拒馬法侯景食石頭常平倉既盡便掠居人爾後米升七八萬錢人相食左編史思明遣李歸仁將兵萬三千壁滏陽未進而王師圍已固築城濬隍三周决安陽水灌城城中棧而處糧盡易口以食米斗錢七萬餘一䑕錢數千屑松飼馬隤墻取麥秸濯糞取芻城中欲降不得賊更以太清代乾祐將于是思明有衆十三萬三分其軍趨鄴同上昭義髙潯攻華州王重榮與并力克之朱玟以涇岐麟夏兵八萬營興平黄巢亦遣王璠營黒水攻戰未能勝鄭畋將竇攻夜率士燔都門殺邏士賊震懼於是畿民柵山谷自保不得耕米斗錢三十千屑樹皮以食官軍皆執山柵百姓鬻于賊以為糧人獲數十萬錢同上哀牢王柳貌率其民五萬餘户内附以其地置哀牢博南二縣本紀曰是時天下安平人無徭役比嵗登稔百姓殷富粟斛三十錢牛羊被野漢史髙歡命諸州濵河皆置倉積穀以相轉漕供軍旋備飢饉又于傍海煑鹽軍國粗贍又以諸州調絹不依舊式民甚苦之奏令悉以四十尺為匹至是東方連嵗大稔穀斛至九錢山東民稍復蘇息矣㑹編南梁髙帝天監四年冬大有年米斛三十錢六朝史貞觀元年闗中飢是嵗天下大稔流散者咸歸鄉里米斗不過三四錢唐史洛中粟米斗兩錢半秔米斗十一錢隋開皇中户八百七十萬今三百八十萬㑹編唐元和冬天下大稔米斗有直二錢者同上錢通卷二十
