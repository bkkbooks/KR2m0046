body:
  text: 錢通卷二十三明胡我琨撰十二之文王者為錢頒其制必以其文其文既式世且閏焉是故擬之以章其原也畫之以詳其用也規之以謩其才之良也諮之以則其旬布之徳也紛其辯以象以箴其異也詡之以録其節與操之侔也錢或弊錢制不失職歸之文文而詔其人欲其上心不侈而下循其分也故文曰十二詔誥孝武太元三年詔曰錢國之重藏小人貪利銷壞無已監司當以為意廣州夷人寳貴銅鼔而州境素不出銅聞官司賈人皆貪比輪錢斤兩差重以入廣州貨與夷人鑄韛作鼓其重為禁制得者科罪㑹編開元二十二年三月二十一日勅布帛不可以尺寸為交易菽粟不可以抄勺貿有無古之為錢以通貨幣頃雖官鑄所入無幾約工計本勞費又多公私之間給用不贍永言其弊豈無變通往者漢文之時已有放鑄之令雖見非于賈誼亦無廢于賢君古往今來時移事異亦欲不禁私鑄其理如何公卿百僚詳議可否唐史其年十月六日勅貨幣兼通將以利用而布帛為本錢刀是末賤本貴末為弊則深法教之間宜有變革自今以後所有莊宅口馬交易並先用絹布綾羅絲綿等其餘市買至一千以上亦令錢物兼用違者科罪二十六年于宣潤等州置錢監同上十年六月勅今後天下鑄造買賣銅器並不須禁止其器物約每斤價直不過一百六十文委所在長吏及廵院同勾當訪察如有銷錢為銅者以盜鑄錢罪論唐史先是三年詔應天下商賈先蓄見錢者委所在長吏令收市貨物官中不得輙有程限通逼商人任其貨易以求便利周嵗之後此法徧行朕當别立新規設蓄錢之禁所以先有告示許其方員意在他時行法不貸綱目二年勅買賣人所使見錢舊有條議每陌八十文近訪聞在京及諸道市肆人戸皆將短陌轉換長錢今後凡有買賣並須使八十陌錢如有輙將短錢興販仰所在收捉禁治同上晉天福三年詔曰國家所資泉貨為重銷蠧則甚添鑄無聞宜令三京諸道州府無問公私應有銅者並許鑄錢仍以天福元寳為文左環讀之每一錢重二銖四絫十錢重一兩仍禁將鉛鐵雜鑄諸道應有久廢銅冶許百姓取便開錬永逺為主官中不取鍊利除鑄錢外不得接便别鑄銅器通鑑其年十二月勅先許鑄錢切慮逐處缺銅難依先定銖兩宜令天下公私應有銅欲鑄錢者取便酌量輕重鑄造不得入鉛鐵及缺落不堪久逺流行同上四年勅以天下公私鑄錢雜以鉛錫缺小違條今後祇官鑄造私下禁舊法同上十一年詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王猶多民疾之令諸侯王通侯常以十月朝獻及郡各以口數率人嵗六十三錢以給獻費漢口戸大有年上謂侍臣曰朕有二喜一懼比年豐稔斗粟三錢一喜也北敵久服邉鄙無虞二喜也治安則驕侈易生驕侈則危亡立至此一懼也㑹編詔京東西河北東陜西江南淮南兩浙皆立常平倉計戸多寡量留上供錢嵗夏秋視市價賤貴量減増糴糶三年以上不糶即回充粮廩易以新粟其後荆湖川陜廣南悉置焉宋史詔天下常平倉多所移用而不足以支凶年其令内藏庫三司共出緡錢一百萬下諸路助糴之綱目詔曰朝四暮三衆狙皆喜名寔未虧而喜怒為用頃聞外間多用九陌錢陌減則物貴陌足則物賤非物有貴賤乃心有顛倒至于逺方日更滋甚徒亂王制無益民財自今可通用足陌錢令書行後百日為期若猶有犯男子謫運女子質作並同梁史元狩六年詔曰日者以幣輕多姦農傷而末衆又禁兼并之塗故改幣以約之漢武帝紀熈寧五年詔曰天下商旅物貨至京多為兼并之家所困宜出内藏庫錢帛選官于京師置市易務大學衍義補平帝詔天下女徒已論歸家顧山錢月三百漢平帝紀二年春正月詔禁誘人子弟析家産舉息錢壞墳域宋史上謂侍臣曰卿輩勿以毁佛為疑夫佛以善道化人茍志于善斯奉佛矣彼銅像者豈所謂佛耶且吾聞佛志在利人雖頭目猶捨以布施若朕身可以濟民亦非所惜也世宗至正十年詔曰世祖頒行中統交鈔以錢為文厥後造至元寳鈔以一當五名曰子母相權而錢實未用歴嵗滋久鈔法偏虚物價騰踊民用匱乏其以中統交鈔一貫文省權銅錢一千文惟至元寳鈔二貫仍鑄至正通寳錢與歴代銅錢並用以實鈔法大學衍義補孫權赤烏九年詔曰謝宏往日陳鑄大錢云以廣貨故聴之今聞民意不便其省息之鑄為器物勿復出也江表𫝊奏對景王將鑄大錢單穆公曰不可古者天災降戾于是乎量資幣權輕重以賑救民民患輕則為作重幣以行之于是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重于是乎有子權母而行大小利之今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取于民民不給將有逺志是離民也且夫有備未至而設之有至而後救之是不相入也可先而不備謂之急可後而先之謂之召災且絶民用以實王府猶塞川原而為潢汙也其竭也無日矣若民離而財匱災至而備亡王其若之何王弗聴賈山上書諫以為錢者無用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也其後復禁鑄錢秘書郎楊偘奏曰臣頃在雍州表陳聴人與官並鑄五銖錢使人樂為而俗弊得改㫖下尚書八座不許以今況昔為理不殊求取臣前表經御披析偘乃隨宜剖說帝從之乃鑄五銖錢御史中尉高恭之又奏曰四民之業錢貨為本救弊改鑄王政所先自頃以來私錢薄濫官司糾繩掛網非一在今銅價八十一文得銅一斤私造薄錢斤餘二百既示之以深利又隨之以重刑得罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沈此乃因循有漸科防不切朝廷失之彼復何罪昔漢文以五分錢小改鑄四銖至孝武復改三銖為半兩此皆由小易大以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成七十六文銅價至賤五十有餘其中人工食料錫炭鉛沙縱復私營不能自潤直置無利應自息心況復嚴刑廣設以臣測之必當錢貨永通公私獲允後遂用王偘計鑄起自九月至三年正月而止官欲知貴賤乃出藏絹分遣使人于三市賣之絹匹止錢二百而私市者猶三百利之所在盜鑄彌衆巧偽既多輕重非一四方州鎮用各不同時鑄錢都督長史髙謙之上表求鑄三銖錢曰盖錢貨之立本以通有無便交易故錢之輕重時代不同太公為周置九府圜法至景王時更鑄大錢秦兼海内錢為重半兩漢興以秦錢重改鑄莢錢至孝文五年復為四銖孝武時悉復銷壊更鑄三銖至元狩中變為五銖又造赤仄以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖至明帝復立孫權江左鑄大錢一當五百權赤烏五年復鑄大錢一當千輕重大小莫不隨時而變況今冦難未除州郡淪没人物凋零軍國用少則鑄小錢可以富益抑何損于政何妨于人也且政興不以錢大政衰不以錢小惟貴公私得所政化無虧既行之于古亦宜效之于今矣臣今請鑄以濟交乏五銖之錢任使並用行之無損國得其益詔將從之事未就㑹卒㑹編周武太后復稅天下僧尼作大像靡費巨億李嶠上疏曰造像錢見有一十七萬餘緡若將散施人與一千得濟一十七萬餘戸拯饑寒之弊省勞役之勤人神胥恱功徳無窮御史張廷珪建疏曰以時政論之則宜先邉境蓄府庫養人力以釋教論之則宜救苦厄滅諸相崇無為願察臣之愚行佛之意太后為之罷役召見賞慰之中書舍人李義諫曰江南鄉人採捕為業魚鱉之利黎元所資江湖生育無限府庫供支易殫與其拯物莫若憂人且鬻生之徒惟利斯視錢刀日至網罟平滋施之一朝行之百倍未若回救贖之錢物减貧無之徭賦活國愛人其福勝彼俱同上上在道民有獻瓜者上欲以散試官授之陸䞇奏曰爵位恒宜惜慎不可輕用獻瓜果者賜之錢帛可也唐史李泌他日又言于上曰臣之上章非私于滉乃為朝廷計也上曰如何對曰今天下旱蝗闗中米斗千錢倉廪耗竭而江東豐稔願陛下早下臣章以解衆惑面諭韓臯使之歸覲令滉速運粮儲此朝廷大計也上即下泌章令臯歸覲上雖以李吉甫故罷裴垍學士然寵信彌厚故未幾復擢為相嘗謂之曰以太宗𤣥宗猶藉輔佐以成其理況如朕不及先聖萬倍者乎垍亦竭誠輔佐上嘗問垍為理之要何先對曰先正其心舊制民稅分上供送使留州三品建中初定兩稅時貨重錢輕是後貨輕錢重民所出已倍其初其留州送使者所在又降省估就寔估以重歛於民垍奏請一用省估其觀察使先稅所理州以自給不足然後稅屬州繇是江淮稍蘇俱同上帝謂石守信等曰人生如白駒過隙所以好富貴者不過欲多積金錢厚自娱樂使子孫無貧乏耳卿等何不釋去兵權出守大藩擇好田宅市之為子孫立永逺不可動之業多置歌兒舞女日夕飲酒相歡以終天年朕自與卿等約為婚姻君臣之間兩無猜疑上下相安不亦善乎守信等皆謝曰陛下念臣等至此所謂生死而骨肉也明日皆稱疾乞罷典兵帝從之宋史李昉初與盧多遜善及遜屢譛昉人或以告昉曰盧與我厚不當爾帝嘗語及多遜事昉頗為解釋帝曰多遜居嘗毁卿不直一錢昉始悟帝由是益重之遂與宋琪並相通鑑陳恕久領三司帝初即位嘗命條具中外錢穀恕久不進屢詔趣之恕久對曰陛下富于春秋若知府庫充實恐生侈心是以不敢進也帝嘉之㑹編一日㑹朝㓂準先退帝目送之王欽若因進曰陛下敬準為其有社稷功也帝曰然欽若曰澶淵之役陛下不以為恥而謂凖有社稷功何也帝愕然曰何故欽若曰城下之盟春秋恥之澶淵之舉以萬乗之貴而為城下盟何恥如之帝愀然不恱欽若曰陛下聞博乎博者輸錢欲盡罄所有出之謂之孤注陛下冦凖之孤注也斯亦危矣繇是帝顧凖寢衰竟罷為刑部尚書出知陜州宋史王安石曰今中書支百錢以上物及轉補二三吏人皆奏得㫖乃行至於制置三司條例何為不可李師中在秦持重總大體王韶請築渭涇上下兩城屯兵以脇武勝軍撫納洮河諸部下師中議師中以為不便詔師中罷帥事韶又言渭源至秦州良田不耕者萬頃願置市易司頗籠商賈之利取其贏以治田乞假官錢為本詔秦鳳經畧司以川交子易物貨給之命韶領市易事師中言韶所指田乃逺邉弓箭手地耳又將移市易司于古渭恐秦州自此益多事所得不補所亡俱同上青苗法立帝請勿收息王安石不從李常上疏曰條例司始建已致中外之議至于均輸青苗歛散取息傅㑹經義人且大駭何異王莽猥析周官片言以流毒天下安石見之遣所親宻諭意常不為止又言州縣散常平錢實不出本勒民出息帝詰安石安石請令常具官吏主名常以非諫官體不奉詔遂落職通判滑州通鑑初楊繪言提舉常平張靚等科配助役錢一戸多者至三百千乞小裁損以安民心不聴同上王雱言今天下甲胄弓弩以千萬計而無一堅利者莫若更制其法歛數州之所作而聚以為一若今錢監之比擇知工事之臣使典其職且募良工為匠師帝頗采雱說置軍器監總内外軍器之政以吕惠卿判監事宋史自去秋七月不雨至夏四月帝知麥苗枯槁五種不入民無生意憂形于色欲罷法度之不善者王安石曰水旱常數堯湯所不免不足貽聖慮但當修人事以應之帝曰此豈細事朕所以恐懼者正為人事之未修耳今取免行錢太重人情咨怨自近臣以至后族無不言其害者馮京曰臣亦聞之安石曰士大夫不逞者以京為歸故京獨聞此言臣未之聞也翰林學士韓維言陛下損膳避殿乃舉行故事恐不足以應變當痛自責已廣求直言帝即命維草詔行之初光州司法㕘軍鄭俠為安石所奬拔感其知己思欲盡忠及秩滿入京安石問以所聞俠曰青苗免役保甲市易數事與邉鄙用兵在俠心不能無區區也安石不答退不復見久之監安上門㑹嵗飢征歛苛急東北流民每風沙霾曀扶擕塞道羸疾愁苦身無完衣或茹木實草根至身被鎖械而負瓦掲木賣以償官累累不絶廼繪所見為圖奏疏詣閣門不納遂假稱宻急發馬逓上之銀䑓司且云旱繇安石所致去安石十日不雨即乞斬臣宣徳門外以正欺君之罪疏奏帝反覆觀圖長吁數四袖以入内是夕寢不能寐翌日遂命開封體放免行錢三司察市易司農發常平倉三衞具熈河所用兵諸路上民物流散之故青苗免役權息追呼方田保甲並罷凡十有八事民間讙呼相賀是日果大雨逺近沾洽先是吕嘉問提舉市易連以羡課受賞帝聞其擾民以語王安石對曰嘉問奉法在公以是媒怨帝曰免行錢所收細瑣市易鬻及果實氷炭太傷國體安石力辨至譏帝為叢脞不知帝王大畧帝曰即如是士大夫何故以為不便安石請言者姓名令嘉問條析及帝以旱故命韓維孫永集市人問之減坐賈錢千萬安石遂持嘉問條析奏曰朝廷所許民輸錢免行者盖人情安于樂業厭于追擾若一切罷去則無人祇承又吏胥禄廩薄勢不得不求于民非重法莫禁以薄廪申重法則法有時而屈今取于民鮮而吏知自重此臣等推行之本意也議者廼欲除去是殆不然民未嘗不畏吏方其以行役觸罪雖欲出錢亦不可得今吏之禄可謂厚矣然未及昔日取民所得之半也時李憲乞再舉伐夏帝以訪輔臣王珪對曰向所患者用不足朝廷今捐錢鈔五百萬緡以供軍食有餘矣安禮曰鈔不可取必變而為錢錢又變為芻粟今距出征之期才兩月安能集事帝曰李憲以為已有備卿等獨無意乎俱同上初盧世榮言天下嵗課鈔九十萬餘以臣經畫之不取于民可増三百萬事未行而中外已非議臣請與臺院面議上前行之帝曰不必如此卿但言之世榮又言自王文統後鈔法虚弊已久宜括銅鑄錢并製綺劵與鈔參行泉杭二州宜立市舶轉運司給民錢令商販諸畨官取其息七民取其三各路雖設常平倉名存實廢宜取權豪所擅鐵冶鑄器鬻之以其息儲粟平糶則可均物價而獲厚利民間酒課太輕宜官給鈔行古𣙜酤法仍禁民私酤米一石取鈔十貫可得二十倍元史罷行至大銀鈔銅錢帝以至大銀鈔輕重失宜至大至元銅錢新舊恣用行之未久為弊滋甚詔並罷之楊多爾濟曰法有便否不當視立法之人為廢置銅錢與楮幣相權而用古之道也何可廢耶言雖不用時論是之同上元世祖時盧世榮既入中書即日奉詔理鈔法之弊自謂其生財有法用其法當賦倍増而民不擾翰林學士董文用謂曰此錢取于右丞家耶將取之民耶取于右丞家則吾不知若取于民則有說矣牧羊者嵗嘗兩剪其毛今牧人日剪以獻主者固恱其得毛之多然羊無以避寒熱既死且盡毛又可得乎民財有限右丞將盡取之得無有日剪其毛之患乎世榮不能對御史中丞崔彧亦極言世榮不可相帝大怒下彧吏欲致之法尋罷之經濟類編有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問師丹丹對言可改章下有司議皆以為行錢以來久難卒變易師丹𫝊任城王澄上言不行之錢律有明式指為鵞眼綖環剪鑿更無餘禁計河南諸州今所行者悉非制限河北既無新錢復禁舊者專以單絲之帛疎縷之布以濟有無徒成杼軸之勞不免饑寒之苦錢之為用貫繦相屬不假度量平均簡易濟世之宜謂之深允乞下諸州鎮新舊諸錢内外全好並得通行其鷄眼環鑿及盜鑄巧偽不如法者據律罪之詔從之然河北少錢民猶用物交易錢不入市㑹編貞元九年正月張滂奏諸州府公私諸色鑄造銅器雜物等伏以國家錢少損失多門興販之徒潜將銅錢一千為銅六斤造為器物則斤直六百餘有利既厚銷鑄遂多江淮之間錢實滋耗伏請准從前敕文除鑄鏡外一切禁斷諸道鹽鐵使包佶奏江淮百姓近日市肆交易錢交下粗惡揀擇納官者三分纔有二分餘並鉛錫銅盪不敷斤兩致使絹價騰貴惡錢漸多訪聞諸州山野地窖皆有私錢轉相貨易姦宄漸深今後委本道觀察使明立賞罰切加禁斷左僕射蔡京奏據陜西轉運副使許天啓申送到新鑄銅錢鐵錢樣已降指揮銅錢于嵗終須管鑄三十萬貫鐵錢鑄二百萬貫自來鑄錢張官置吏招刺軍兵所費不少而軍兵之役最為辛苦官得至薄率三錢得一錢之利盖是久失擘畫今陜西河中府等處民間私鑄最多召募私鑄人令赴官充鑄錢工匠廣為營屋許其一家之人在營居止不必限其出入官給以物料盡其一家人力鼓鑄計其工直率十分中支若干分數充其工價又可收私鑄人在官盖昔人招天下亡命即山鑄錢之意欲令許天啓相度疾速准此施行仍與舊來軍士相兼鼔鑄今來所鑄銅錢除陜西四川河東係鐵錢地方更不得行使外諸路并凖折十行用其錢惟令陜西鐵錢地方鑄造却于銅錢地方行使貴絶私鑄之患如有私鑄並以一文計小錢十科罪又陜西銅錢至重每一錢當鐵錢三或四令夾錫鑄造樣製精好欲一錢當銅錢二文令許天啓相度依此施行從之劉摯為王安石所器拜監察御史裏行始就職奏言陛下有勸農之志今變而為煩擾陛下有均役之意今倚以為聚歛天下有喜于敢為有樂于無事彼以此為流俗此以彼為亂常此風浸成漢唐黨禍必起矣因陳率錢助役十害宋史建議之臣頗謂民兵可復而正兵可銷誠以今之禁兵率以中等校之每人嵗用錢糧衣賜計直五十緡千人則嵗費五萬緡至于民兵則非有廩給唯是給之土田或只將見今有地人戸稍寛其租稅省其力役以正兵千人之費足以得民兵數萬人然今之正兵亦不可驟行減放但當即罷招填益講民兵府衞之法使財力不屈而戰守有備以之强國捍邉實萬世之利也吕公著上英宗奏竊聞今建康規畫有司似不能盡體聖意道塗之言皆云欲創建宫室備列百司規傚京師臣愚竊以為未然此行幸非遷都也何遽如是哉夫工大則費廣費廣則民勞此理勢之自然幾月以來争𫝊江東之民有家業錢一千而取三十者田一畝而出方甎一片者一邑而率甎灰土木之費以二十萬計者置窰燒甎而望青斫木者甚有至于取平江府朱勔家之巧石以備玩設雖未必皆實然方陛下恢復之初愛民恤下之意如撫赤子惡衣菲食之念自比匹夫此聲豈宜聞于外乎葉夢得奏古者足國裕民惟食與貨所謂貨者今之錢幣是也今之所謂錢者皆盈室以藏之列屋以居之積而不洩滯而不流至于百姓三軍之用則惟破楮券爾一旦緩急破楮劵可用乎楊萬里上孝宗奏臣嘗計之竹木取于山塼灰取于陶工役取于軍費可省半不過糜三十萬緡耳萬二千人更休日役六千人用工不過百萬半年可成臣區區之愚欲望聖慈斷自宸衷給降行在㑹子三十萬道擇將帥之材者委之工役材料則責之戎司錢穀出入則付之總司事干州縣者則屬之帥司使之互察而協濟自今以始預辦竹木塼灰應用之物一一備足來嵗十月鳩工次年三月可以訖事凡樓櫓雉堞髙下濶狹與夫防守之具悉如襄陽之制庶幾可以堅久蔡戡修城奏夫理國之道舉本業而抑末利是以先帝禁人二業錮商賈不得宦為吏此所以抑并兼長廉恥也今富商大賈多放錢貨中家子弟為之保役趨走與臣僕等勤收稅與封君比入是以衆人慕效不耕而食至乃多通侈靡以滛耳目今可令諸商賈自相糾告若非身力所得皆以藏畀告者如此則専役一已不敢以貨與人事寡力弱必歸功田畝田畝修則穀入多而地力盡饒矣桓譚竊聞衞尉廖以布三千匹城門校尉防以錢二百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢以不聞陛下情欲厚之亦宜所以安之第五倫一臣以濫守藩方聊知稼穡見當州界承前多是荒涼戸小民貧程遙路僻量其境土五縣中四縣居山驗彼人家三分内二分是客昨來差配甚覺艱辛伏縁在此直至莫州來往四千餘里或是無丁有稅須至雇人般糧每㪷雇召之資賤者不下五百元配二萬石數約破十萬貫錢直如本戸自行費用無多所較乃是二萬家之貧戸出此十萬貫之見緡所以典桑賣牛十間六七其間兼有鬻男女者亦有棄性命者趙普魏博自十餘年不知朝化賞罰法令都不及之一朝以六州之地歸于朝廷刳河朔之腹心傾悖亂之巢穴不大賞賜出其所望軍心不感事勢難知請特賜一百五十萬錢帛昔竇融當光武削平天下河西是未討之間懐後代之誅為避禍之計尚此崇奬福留子孫田興習舊無即日之憂不順得鄰道之助而天生忠義志懐霜雪舉六州之地兩河之贍惜一百五十萬貫錢物不收此一道人心錢帛用了更來機㑹一失難復假如舉五十萬衆攻取六州一年而尅豈不稱賀而計費三百萬其事畢當賞賚又在此外今度所賜未及一半而顧兹小費失于大計深可惜也李絳武帝時竟陵王子良上表曰頃錢貴物賤殆欲兼倍凡在觸類莫不如兹稼穡艱劬斛直數十機杼勤苦匹纔三百所以然者實亦有由人間錢多剪鑿鮮復完者公家所受必須圓大以兩代一困于無所鞭捶質繫益致無聊六朝是時盛興安國佛祠幸臣吐突承璀請立石紀聖徳焉營構華廣欲使絳為之頌將遺錢千萬絳上言陛下蕩積習之弊四海延頸望徳音忽自立碑示人以不廣易稱大人與天地合德謂非文字所能盡若令可述是陛下美有分限堯舜至文武皆不𫝊其事惟秦始刻嶧山揚暴誅伐廵幸之勞失道之君不足為法今安國有碑若叙逰觀即非治要述崇飾又非政宜請罷之帝怒李絳伏奏愈切帝悟曰㣲絳我不自知命百牛倒石李絳孝明熈平初尚書令任城王澄上言切尋太和之錢孝文留心創制後與五銖並行此乃不刋之式臣切聞之君子行禮不求變俗因其所宜順而致用太和五銖雖利京邑邑之肆所不入徐揚之市土貨既殊貿鬻亦異便於荆郢之邦者則礙於兖徐之域致使貧人有重困之切王道貽隔化之訟臣之愚意謂今之太和與新鑄五銖及諸古錢方俗所便用者雖有小大之異並得通行貴賤之差自依鄉價庶貨環海内公私無壅其不行之錢及盜鑄毀大為小偽不如法者據律罪之詔曰錢已行久今東南有事且可依舊澄又奏太和五銖乃大魏之通貨不朽之常模寧可專貨於京邑不行於天下但今戎馬在郊江疆未一東南之州依舊為便至於京北京邑域内州鎮未用錢處行之則不足為難塞之則有乖通典何者布帛不可尺寸而裂五穀則有負擔之難錢之為用貫繦相屬不假斗斛之器不勞秤尺之平濟代之宜便益於此請並下諸方鎮其太和及新鑄并古錢内外全好者不限大小悉聴行之鵞眼環鑿依律而禁河南州鎮先用錢者既聴依舊不在斷限惟太和五銖二錢得用公造新者其餘雜種一用古錢生新之類普同禁約諸方錢通用京師其聴依舊使與太和錢及新造五銖並行若盜鑄錢者罪當重憲詔從之㑹編熊津都督劉仁軌上曰自顯慶五年以來度海者官不記録死者無人誰何州縣發兵壯而富者行錢免弱而貧者被發即行又初發時惟令備一年資装今已二年未有還期自非有所更張厚加慰勞明賞重罰以起士心恐師衆疲勞立效無日上深納其言同上朱熹疏云臣聞虞允文之為相也盡取版曹嵗入窠名之必可指擬者號為嵗終羨餘之數而輸之内帑顧以其有名無實積累掛欠空載簿籍不可以催理者掇還版曹其為說曰内帑之積將以備他日用兵進取不時之須而版曹目今經費已自不失嵗入之數聴其言誠甘且美矣然自是以來二十餘年内帑嵗入不知幾何而認為私貯典以私人宰相不得以式貢均節其出入版曹不得以簿書勾考其存亡其日銷月耗以奉燕私之費者盖不知其幾何矣而曷嘗聞其能用此錢以易敵人之首哉大學衍義補錢通卷二十三
