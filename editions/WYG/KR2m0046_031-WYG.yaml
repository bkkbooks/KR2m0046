body:
  text: 錢通卷三十一明胡我琨撰閏二俗稱四司六局者多不能舉其目古杭夢游録云官府貴家置四司六局各有所掌故筵席排當凡事整齊都下街市亦有之常時人户每遇禮席以錢倩之四司六局皆可致四司者帳設司厨司茶酒司臺盤司也六局者果子局蜜煎局菜蔬局油燭局香藥局排辦局也凡四司六局人祗應慣熟便省賔主一半力輟耕録唐鄭璠在嶺南象江得恠石紺氷而平理彈之有聲輦歸滎陽費錢六十萬宋榮咨道嘗以錢三百萬買虞世南夫子廟初刻碑或談此二事有應聲曰這兩個痴人好一棒打殺何不買百弓上水田九品入流官乎代醉録真宗問唐酒價幾何丁謂對以每升三十上曰何以知謂引杜詩速來相就飲一斗恰有三百青銅錢上喜其對余因看李太白詩有金陵美酒斗十千之句以為李杜同時何故詩中所言酒價頓異客有戲噱者曰太白謂美酒耳老杜不擇飲而醉村店壓茅柴耳坐皆大笑然亦似也詔化基之孫王楙曰郭生次象嘗與僕論唐酒價謂前輩引老杜詩速令相就飲一斗恰有三百青銅錢以此知當時酒價然白樂天與劉夢得沽酒閒飲詩曰共把十千沽一斗相看七十欠三年當劉白之時酒價何太不廉哉僕謂不然十千一斗乃詩人寓言此曹子建樂府中語耳唐人引此甚多如李白詩曰金尊沽酒斗十千王維詩曰新豐美酒斗十千崔輔國詩曰與沽一斗酒恰用十千錢許渾詩曰十千沽酒留君醉權得輿詩曰十千斗酒不知貴陸龜䝉詩曰若得奉君歡十千沽一斗唐人言十千一斗類然一斗三百錢獨見子美所云故引以定當時之價然詩人所言出於一時又未知果否一斗三百别無可據唐食貨志云徳宗建中三年禁民酤以佐軍費置肆釀酒解收直三千此可驗乎又觀楊松玠談藪北齊盧思道嘗云長安酒賤斗價三百杜詩引此亦未可知僕因謂郭曰曾知漢酒價否郭無以應僕謂漢酒價每斗一千郭謂出於何書曰此見典論曰孝靈帝末年百司湎酒一斗直千文此可證也按武帝設𣙜酤官昭帝罷之賣酒升四錢然則漢初斗酒四十錢耳酒價甚微且隨時高下似不必遠引博證偶因前人之説記此以資一笑同上劉伯芻侍郎所居巷有鬻餅者每早過其户必聞謳歌因召之與萬錢令多其本約曰取餅償之後過其户寂不聞歌召問之答曰本領既大心計轉粗不暇唱渭城矣隋唐嘉話蘇五奴妻善歌舞擅名一時人愛慕之且有姿色有邀其妻者五奴輙隨之人欲五奴沉醉多勸之酒五奴曰若肯多與我錢雖吃鎚亦醉不須酒也陳疙瘩亦京師乞兒也每負母乞於市余素喜施以其負母也施倍焉及門無厭門吏云此輩窘於食每負他人嫗詭稱母實非母也余惡其偽絶之後數月向余曰母病危乞一席為藉吞聲泣不能語余亦泣予以錢五百為棺具使人伺之買棺倩一人輿舁埋其母於城南亂塜中竟日哭余悲之明日使人饋食死於墓傍矣葢真母也余悔甚歛而葬之為傷心者累日乃逐門吏瀘南有秦吉了者能人言有夷酋欲以錢三十萬賈焉主人告之曰吉了我貧將賣汝於夷吉了曰我漢禽也不願入夷不食而死叔簡氏曰亡宋諸臣漢衣漢冠北面而臣胡主亦聞吉了之言否突厥遣其柱國康鞘利等送馬千匹詣唐祖為互市許發兵送入關多少隨所欲祖引見康鞘利等甚厚擇其馬之善者止市其半義士請以私錢市其餘祖曰虜饒馬而貪利其來將不已恐汝不能市也吾所以少取者示貧且不以為急故也當為汝貰之不足為汝費學海李允則知雄州一日民有訴為契丹民毆傷而遁者允則不治與傷者錢二千衆以為怯逾月幽州以其事來詰答以無有葢他諜欲以毆人為質騐比得報以為妄乃殺諜錢惟利于用也天下共貴之假此錢之襍聚如土泥之在也必有不盡用者矣夫錢也而不盡當於用豈其外服圓而心方正者足貴乎嘗笑和嶠之錢癖蕭宏之錢愚知錢貴矣而不能貴錢徒積之於無用也何如金錯囊垂罄者用之盡為不没錢之利哉淇筠志感天下之逓相使也則人不愛其力矣曰此鬼道也嘗聞之可以使鬼錢也可以使神者誠也今有忠信之士負戴莫能勝而竭誠于市途以求代吾勞者雖素所知識未必其與樂也惟操百錢以招之則雖盜蹠之任忻忻焉爭為之奔走矣今天下皆可以錢使者不聞其以誠使也故曰鬼道也同上公孫𢎞以元光五年為國士所推尚為賢良國人鄒長倩以其家貧少自資致乃解衣裳以衣之釋所著冠履以與之又贈以撲滿一枚書題遺之曰土粗物也錢重貨也入而不出聚而不散故撲之士有聚歛而不能散者將以撲滿之敗可不戒歟西京雜記張僧繇始作醉僧圖道士每以此嘲僧于是聚錢數十萬貿閻立本作醉道士圖今並傳于代隋唐嘉話太原竇不疑為人有膽勇少而任俠常結伴十數人闘鷄走狗樗蒲一擲數萬皆以意氣相期而太原城東北數里常有道鬼身長二尺每陰雨昬黒後多出人見之或怖而死諸少年言曰能往射道鬼者與錢五千不疑欣然請行迨昬而往衆宻隨之不疑既至魅所鬼正出行不疑逐而射之鬼被箭走乃還諸人笑而迎之因授之財不疑盡以飲焉紀聞祝鷄公者洛陽人也居尸鄉北山下養鷄百餘年鷄千餘頭皆有名字暮棲樹下晝放散之欲取呼名即種别而至賣鷄及子得千餘萬錢輙置去之吳作池養魚後登吳山鷄雀數百常出其旁列仙傳唐魏伶為西市丞養一赤嘴烏每於人衆中乞錢人取一文而銜以送伶處日收數百時人號為魏丞烏朝野僉載金錢花梁時荆州掾屬雙六賭金錢盡以金錢花相足魚𢎞謂得花勝得錢太平廣記𤣥宗至馬嵬驛令高力士縊貴妃於佛堂梨樹之前馬嵬媪得韈一隻過客求而翫之百錢一觀獲錢無數國史補賈人張𢎞者行至華嶽廟前忽昬懵前進不可繫馬於一金荆樹而酣睡馬驚拽出樹根而走寤逐而及之樹根形如獅子毛爪眼耳足尾無不悉具乃于華陰縣求木工修之為一枕獻於廟守廟者常以匱鏁之行人聞者賂守廟者百錢始獲一見聞竒録晉王浚與東嬴公騰合兵敗石超於平棘乗勝進軍鄴中奔潰頴將數千騎奉晉主南奔倉卒無齎中黄門被囊中賫私錢三十詔貸之於道中買飯食以瓦盆至温將謁陵晉主喪履納從者之履下拜流涕張方迎晉主還宮奔散者稍還百官粗備唐天寶末術士錢知㣲嘗至洛居天津橋賣卜云一卦帛十疋歴旬人皆不請之一日有貴公子意其必異命取帛如數卜焉卦成知㣲曰予筮可期一生君何戲焉其人曰卜事甚切先生豈誤乎錢請為韻曰兩頭㸃土中心虛懸人足踏䟦不肯下錢其人本意賣天津橋酉陽襍爼董昌求為越王朝廷未許昌不悦曰朝廷欲負我矣我累年貢獻無筭而惜越王邪有謟之者曰王為越王曷若為越帝於是吏民獻謡讖符瑞者無筭其始賞以錢數百緡既而獻者甚多减至三五百錢昌曰讖云免子上金牀此謂我也我生太嵗在卯明年復在卯二月卯日卯時此吾稱帝之秋也學海凡鑄金之狀金與錫黑濁之氣竭黄白次之黄白之氣竭青白次之青白之氣竭青氣次之然後可鑄之山堂肆考唐李師道上私錢六百萬為魏徵孫贖故第白居易言徵任宰相太宗用殿材成其正寢後嗣不能守陛下猶宜以賢者子孫贖而賜之師道人臣不宜掠美帝從之蘇仙公名耽桂陽人也漢文帝時得道先生嘗與母共食母曰食無鮓他日可往市買先生以筯挿飯中携錢而去斯須鮓至母曰何處買來對曰便縣市也母曰便縣去此百二十里汝欺我也欲杖之先生跪曰買鮓時見舅在市與我語云明日來此請待舅至以驗虛實明曉舅果到如先生言鎮將姓丁是江西廉使劉公親隨一年後得替歸府劉公已薨忽一旦於北市棚下見伊風子夫妻唱望江南詞乞錢既相見甚喜便叙舊事執丁手上酒樓三人共飲數斗丁大醉而睡伊風子遂索筆題酒樓壁云此生生在此生先何事從𤣥不復𤣥已在淮南雞犬後而今便到玉皇前題畢夫妻連臂高唱而出城其丁將於酒樓上醉醒懐内得紫金一十兩仙傳拾遺唐韓文公愈有疎從子侄自江淮來年甚少吏部令學院中伴子弟不近詩書唯與小臧賭愽或廐中醉卧五日三日或出宿於外吏部懼而勗之因問所長云善卓錢試令為之植一鐵條尺餘百步内卓三百六十錢一一穿之無差失者又於五十步内雙鈎草天下太平字㸃畫極工吏部甚竒之同上陳子昂蜀射洪人十年居京師不為人知時東市子賣胡琴者其價百萬日有豪貴傳視無辨者子昂突出於衆謂左右可輦千緡市之衆咸驚問何用答曰余善此樂有好事者曰可得一聞乎答曰余居宣陽里指其第處并具有酒明日專候榮顧且各邀聞名者齊赴乃幸遇也來晨集者凡百餘人皆當時重譽之士子昂大張讌席具珍羞食畢起捧胡琴當前語曰蜀人陳子昂有文百軸馳走京轂碌碌塵土不為人所知此樂賤工之役豈愚留心哉遂舉而破之舁文軸兩案遍贈㑹者㑹既散一日之内聲華溢都時武攸宜為建安王辟為記室後拜拾遺獨異志張鷟為河陽縣尉日有一客驢韁斷并鞍失三日訪不獲告縣鷟推勘急夜放驢出而藏其鞍可直五千錢鷟曰此可知也令將却籠頭放之驢向舊餧處鷟令摉其家其鞍於草積下得之朝野僉載李相國揆以進士調集在京師聞宣平坊王生善易筮往問之王生每以五百文决一􅈰而來者雲集自辰及酉有空反者揆持一縑晨往生為之開卦曰君非文章之選乎當得河南道一尉揆負才華不宜為此變色而去前定記唐隴西李知禮所居宅北見一大坑其中有諸槍矟攅植不可得過見其兄女并婢齎箱箱内有錢絹及别置一器飲食在坑東北知禮心中謂此婢及姪女遊戲意甚怪之回首北望即見一鬼挺劍直進知禮惶懼委身投坑即得蘇也自初死至於重生凡經六日後問家中乃是侄女持紙錢絹及飯饌為奠禮當時所視乃是銅錢絲絹也㝠報記楊正見常謂其師曰得食靈藥即日便合登仙所以遲廻者幼年之時見父母㨂税錢輸官有明淨圓好者竊藏二錢翫之以此為隱藏官錢過罰居人間更一年耳集仙録時中元日番禺人多陳設珍異於佛廟集百戲於開元寺崔煒因窺之見乞食老嫗因蹶而覆人之酒甕當壚者毆之計其直僅一緡耳煒憐之脱衣為償其所直嫗不謝而去異日又來告煒曰謝子為脱吾難吾善灸贅疣今有越井岡艾少許奉子每遇疣贅只一炷耳不獨愈苦兼獲美艷煒笑而受之嫗倐不見後數日因遊海光寺遇老僧贅于耳煒因出艾試灸之而如其説僧感甚謂煒曰貧道無以奉酬此山下有任翁者藏鏹巨萬亦有斯疾請為書導之任翁一聞喜躍禮請甚謹煒因出艾一爇而愈任翁告煒曰謝君子痊我所若有錢十萬奉子幸從容無草草而去煒因畱彼煒善絲竹聞主人堂前彈琴聲詰家童對曰主人之愛女也固請其琴彈之女潜聽而有意焉傳竒賀知章西京宣平坊有宅對門有小板門常見一老人乘驢出入其間積五六年視老人顔色衣服如故亦不見家屬詢問閭巷皆云是西市賣錢貫王老更無他業察其非凡也常因暇日造之因與往來漸加禮敬言論漸宻遂云善黄白之術原化記宼萊公貶死於雷詔還塟雒陽過公安民皆迎祭哭其䘮斬竹挿地以掛紙錢焚之尋復生筍成林名臣傳晏元獻公為館職時天下無事侍從文館士大夫各為燕集以至市樓酒肆往往皆供帳為遊息之地公是時貧甚不能出惟家居與昆弟講習一日選東宮官忽自中批除晏殊執政莫諭所因次日進覆上諭曰近聞館閣臣寮無不嬉遊玩賞彌日繼夕惟殊杜門與兄弟讀書如此謹厚正可為東宮官公既受命得對上面諭除授之意公語言質野對曰臣非不樂燕遊者直以貧無可為之具臣若有錢亦須往但無錢不能出耳上益嘉其誠實自警編江陵有郭士郎者資産甚殷江淮河朔間悉有賈客有一賈者在京都久無音信郭氏子自往訪之既相遇盡獲所有僅五六萬緡生躭悦􅈣花迷於飲愽用過大半是時唐季朝政多邪生乃輸數百萬于鬻爵者門以白丁易得横州刺史遂決還鄉時渚宮新罹王仙芝㓂盜舊居都無舍宇訪獨母與一二奴婢處于數間茅舍之下囊槖蕩空旦夕以紉針為業生之行李猶有二三千緡乃傭舟與母赴秩過長沙入湘江次忽大風舟沉生與一稍工拽舟登㟁僅以獲免其餘婢僕生計悉漂於怒浪投於僧室母氏以驚殞生遂寓居永郡孤且貧遂與往來舟船執梢以求衣食永州市人呼為捉稍郭使君南楚新聞建中初有河北軍將姓夏者彎弓數百斤常於毬塲中累錢十餘走馬以擊毬杖擊之一擊一錢飛起六七尺其妙如此如意年中洛州人趙𤣥景病卒五日而蘇云見一僧與木長尺餘教曰人有病者汝以此木拄之即愈𤣥景得見機上尺乃是僧所與者試將療病拄之立差則天聞之追入内宮人病拄之即愈放出救百姓數月以後得錢七百餘貫後漸無驗遂絶王陶字樂道拜觀文殿學士微時苦貧其友姜愚一日大雪念陶奉母寒餒荷一鍤剗雪行二十里訪之陶母子凍坐愚亟出解所衣錦裘貭錢買酒肉薪炭與陶大飲食又捐數百千為之娶陶既貴尹洛愚老而䘮明自徽州新鄉往謁之陶對之邈然但出尊酒而已愚大失望歸而病死舜為父母淘井將銀錢安灌中與父母史記譙郡有功曹􅔠天統初濟南來府君出除譙郡時功曹清河崔公恕弱冠有令德于時春夏積旱送别者千餘人至此􅔠上衆渴甚思水升直萬錢矣來公有思水色恕獨見一青鳥于􅔠山乍飛乍止怪而就焉鳥起見一石方五六寸以鞭撥之清泉湧出酉陽雜俎王貭字子野通判蘇州州守黄宗旦少貭常因争事宗旦曰少年乃與丈人抗耶貭曰事有當争職也卒不為屈宗旦得盜鑄錢者百餘人下獄治退告貭曰吾以術鈎致得之喜見于色貭曰以術鈎人寘之死而又喜仁者之政固如是乎宗旦慙沮為薄其罪程顥字伯淳調鄠上元主簿鄠民有借兄宅居者發地得瘞錢兄之子訴曰父所藏顥問幾何年曰四十年彼借居幾時曰二十年矣遣吏取十千視之謂訴者曰今官所鑄錢不五六年即遍天下此皆未藏前數十年所鑄何也其人不能答伊喇鄂爾多一名巴沁初為博州防禦使有農民避賊入保郡城以錢三十千寄之鄰家賊平索之鄰人諱不與訴於縣縣官以無􅆻驗却之乃訴于州鄂爾多陽怒械繫之捕其隣人關以三木詰之曰汝鄰乙坐刼殺人指汝同盜鄰人大懼始自陳有欺錢之隙乃責歸所隱錢而釋之郡人駭服有士鬻産於外得錢數百緡懼川途之難齎也祈所知納於公藏而持牒以歸世所謂便換者寘之衣囊一日醉指囊示人曰莫輕此囊大有好物盜在側聞之其夜殺而取其囊意其有金也既開無獲投牒于水盜為吏所捕得其狀樞機之發豈容易哉此所謂不宻而致害也因話録原武鄭公戩天聖中舉進士嘗與同輩賭彩選一坐盡負獨戩贏數百緡青箱雜記宋王恭簡公巖叟知開封賈人曹讀以物産貿易萬緡市儈稽遲逾年止輸其半一日讀聞户外有錢聲償錢俱足甚怪之詢其由乃曰王公今日知府事矣公治開封不用精神智力如在無事小郡而老奸自然畏慄山堂肆考唐穆宗長慶元年成德兵馬使王庭湊殺節度使田𢎞正起復𢎞正子布為魏博節度使討之布與妻子及賔客決曰吾不還矣悉屏旌節導從而行未至魏州三十里被髪徒跣號哭而入居于堊室月俸千緡一無所取賣田産得錢十餘萬以頒士卒舊將老者兄事之後布為魏博將史憲誠鼓煽其功不成遂刺心而死同上唐大厯間有僧號鄒和尚不知所從來跨白驢登繖山結茅以居湏鹽米薪菜之屬即書寸紙繫錢緡遣驢負至市區人知為鄒也取平直掛物于鞍縱驢歸一日驢犯山下黄氏者蔗苖黄請償於鄒鄒曰汝未知因蔗糖為霜利當十倍吾語汝塞責可乎試之果信自是流傳其法王灼譜慶元元年五月湖州南門外一婦人顔色潔白着皂弓鞋踽踽獨行呼賃小艇欲從何山路往易村登舟未幾即偃卧自取葦蓆蔽其上舟纔一葉展輾款謦必相聞而寂然無聲舟人訝焉舉席視之乃見小烏蛇可長尺許凡數千條蟠繞成聚驚懼汗流復覆之凡行六七十里始抵㟁步扣舷警之奮而起則儼然人形與初來時不少異腰間取錢二百償顧直舟人不敢受道其故婦笑曰切勿洩言我從城中來此行蛇瘟一箇月後則歸矣夷堅志漢鄭𢎞為靈文鄉嗇夫行官涼洛未至宿一埭埭名沈釀於埭逢故舊友人四顧荒郊村落絶遠酤酒無處情抱不伸乃以錢投水中依口而飲飲酣暢皆得大醉因更為沈釀川明旦乃分首而去類林漁陽之亂六宮星散永新為一士人所得韋青避地廣陵日夜憑闌於上河之上忽聞舟中奏水調者曰此永新歌也乃登舟與永新對泣久之青始亦晦其事後士人卒與其母之京師竟殁於風塵及卒謂其母曰阿母錢樹子倒矣樂府雜録舜耕歴山歲不熟舜糶其父詣糴每還錢與米問之子也因相抱泣拭其父目尋自明堯聞而妻之類林宋曹翰太祖時名將也太宗朝貶汝州有中使至翰泣謂曰衆口乏食貧不能活以袱封故衣一包願質錢十千中使回奏之太宗開視乃一畫障題曰下江南圖帝惻然憐之乃召還山堂肆考宋朱壽昌知閬州州大姓雍子良屢殺人挾財勢得不死至是又殺人乃賂里民代出就吏獄具壽昌覺其奸引至詰之曰聞子良與汝錢十萬許納汝女為婦且婿汝子故汝代其命有之乎囚色動則又擿之曰汝且死彼書劵抑以女為婢指錢為雇直又不壻汝子將奈何囚悟涕泣覆面曰囚幾誤死遂以寔對壽昌立取子良正諸法同上承平舊纂舉進士不第者有供酒食之費謂之買春錢同上宋俞澹字清老曉音律荆公喜之一日見公云吾欲為浮屠無錢買祠部公欣然為買祠部約日祝髮過期寂無聞公問其然澹徐曰吾思僧亦不易為祠部已送酒家還債矣公大笑孫嵩字賓碩任俠好義趙歧為唐衡所捕逃之北海著絮巾布袴常於市中販胡餅賓碩入市觀見歧疑其非常人也因問之曰自有餅耶販之耶歧曰販之賓碩曰買幾錢賣幾錢歧曰買三十賣亦三十賓碩曰視處士之望非似賣餅者乃載之歸後仕至太僕賓碩亦仕至豫州刺史女几者陳市上酒婦也作酒常美仙人過其家飲酒即以素書五卷貭酒錢几開視之乃仙方養性長生之術也女仙傳韓魏公以使相出鎮相州因祀宣尼宿於齋館夜有偷兒入其室褰帷挺刃顧謂公曰不能自濟故來求公公曰几上器具可值百千盡以與汝偷兒曰非謂此也願得公首以獻西人公即引頸偷兒投刃稽顙曰以公徳量過人故來試公然几上之物已荷公賜願公無泄也公曰諾明日於宅庫如其數取償之終不語於人朝野遺記天下有九福京師錢福眼福屏帷福吳越口福洛陽花福蜀川藥福秦隴鞍馬福燕趙衣裳福美女福珍珠船取救荒之餘得錢數萬貫粮數萬石復請於朝得百僧度牒以募役者堤成植芙蓉其上望之如雲錦杭人名之曰蘇公堤焉鴻書宋南渡諸將韓世忠封蘄王楊沂中封和王張俊封循王俱享富貴之極而俊復善治生遂挾多貲其罷兵而歸歲收租米六十萬斛紹興間内宴有優人作善天文者云世間貴官人必應星象我悉能窺之法當用渾儀設玉衡若對其人窺之見星而不見其人玉衡不能卒辨用銅錢一文亦可乃令窺秦師垣曰相星也韓蘄王曰將星也張循王曰不見其星衆皆駭復令窺之曰中不見星惟見張郡王在錢眼内坐殿上大笑臨安志禄山犯闕上西幸太真死及東歸尋梅妃所在不可得上悲謂兵火之後流落他處詔有得之官二秩錢百萬搜訪不知所在上又命方士飛神御氣潜經天地亦不可得亘史外紀市人方某鬻陶器於儀真壩上山東客以貨交常時取辦麄者方庋高處有官陶數聯嘉靖回青料也每聨索錢二千貫山東客求一視方憚不許曰非爾售者視何為哉客即出錢滿二千貫接器入手捽於地顧方曰奚足辱我遂揮手去意揚揚自矜方以為辱已亟追而坐諸堂悉出其器視之曰同否曰同因推而碎於地語客曰嚮者聲一吷爾不若此有餘韻也客靡然而退同上直何山之東者錢山其下有錢山漾又五里為衡山左傳襄公三年楚子伐吳克鳩兹至于衡山即此湖州府志勝龍川别志云慶厯中閣門使張亢知高陽關契丹方遣信使僥求諸事㳂邊皆驚亢每遣諜者厚以金帛無所吝惜閒處便坐有弟子行首入曰願屏人白事亢慢罵久之其人曰所白機事也不肯去亢為屏人廼曰閣使錢如糞土何故亢曰何與汝事曰閣使所與非其人也如我廼可與耳直𨽻名勝志貞元中有僧曰少康者乞食睦州城中每得錢即誘小兒念佛號一聲與以一錢因於高峰建道塲集衆念佛衆咸見佛出康口中坐化之夕有光照焉龍山山色為之變白云嚴州府志勝定光多寶塔在法雲寺之西唐黄滔記云天祐元年瑯琊王公造為先公司空先秦國太夫人元昆故司空薦祉于幽陰塔之制塹地深五丈初塹及二丈時忽有榮光起於穿中駭而視之有寶珠如拳承以金錢璀璨奪目故有定光之名甃磚為心搆木其外俗呼柴塔福州府志勝冶官西世人謂之鼓鐘城城之左右猶有遺銅及錢城西阜下有大泉西流注澗與教水合山海經曰鼓鐘之下帝臺之所以觴百神也山西名勝志塜記云晉王昏墓在縣南之樓﨑山墓甎螭形魚文貫以桞或為錢狀旁有文云晉永和十二年台州府志勝羅源山在縣西南二十五里横陽江流其下受西南諸鄉之水滙為順溪東流過周奥又東南流注逕口江入海又五里有鳯山臨江綿亘數里舊名錢倉以其石罅中有錢流出故云温州府志勝按瀏水在縣北五里又二里曰羅洋山即大富山也羅洋水出焉又十里曰溈水戍溈水入焉又十五里曰板石湖又二十里曰澇塘河又十里曰銅官渚舊傳是楚鑄錢處長沙府志勝宋元豐間樵者見五色禽翔集山上政和元年建迎釐觀於山麓宣和間有道士王文卿來遊每出鄉市遇兒童則戲索一錢畫雷於其掌令握固行數步開掌則雷聲霹靂謂之賣雷公邵武府志勝顔延之送淵明二萬錢悉付酒家稍就取飲本傳齊俗尚烏紗巾家家踊貴其一家特榜其門曰本家每頂只賣八百文小説艾子漢唐後法民有口賦計口輸錢即今之丁銀至於租税之類皆以榖帛綢絹等物輸之於官不盡取錢也今别租銀差役皆納銀錢於官不准本色民間以榖綿絹布賤賣取銀其費倍稱如有司肯從民便除起運錢糧折色上納其餘存留錢糧及銀差工食許以榖布等物隨有上納納時必賤少過數月其價已長民間無賤賣之累官府有羨餘之積亦賦役中之平準也惜其以避忌之心踵因循之政無能開其端耳筆麈本朝惟白金與錢黄金不用為幣雲南用海巴即古之貝也同上唐時禁京城匄者分置病坊於諸寺以廪之亦謂之悲田院即今蠟燭幡竿二寺也從古都㑹之地乞丐遊食者衆故唐宋以來皆有悲田之設苐不知當時有司奉行何如若今蠟燭幡竿二寺所養貧人不及萬分之一呌號凍餒充滿天街至於不可聽聞則二寺之設亦何為公卿大老有載錢自隨車馬所過輒散以予之每逢呵殿羅列道旁小民相傳以為美談此所謂惠而不知為政也身為公卿海隅一夫咸使得所闕廷之下流離呌號是誰所致而乞與一錢以為私惠若巷里婦人之為者豈惟不知職掌亦非所以壯國容矣筆麈零陵先賢傳曰鄭産字景載泉陵人也為白土嗇夫漢末多事國用不足産子一歲輙出口錢民多不舉子産廼勑民勿得殺子口錢當自代出産言其郡縣為表上言錢得除更名白土為更生鄉也水經漢明帝永平十二年議治汴渠上乃引樂浪人王景問理水形便景陳利害應對敏㨗帝甚善之乃賜山海經河渠書禹貢圖及以錢帛同上地皇二年王莾夢銅人泣惡之念銅人銘有皇帝初兼天下文使尚方工􅒢滅所夢銅人膺文後董卓毁其九為錢其在者三魏明帝欲徙之洛陽重不可勝至霸水西亭之漢晉春秋曰或言金狄泣故留之石虎取置鄴宮符堅又徙之長安毁二為錢同上漳水又北逕祭陌西戰國之世俗巫為河伯取婦祭於此陌魏文侯時西門豹為鄴令約諸三老曰為河伯取婦卒來告知吾欲送女皆曰諾至時三老廷掾賦斂百姓取錢百萬巫覡行里中有好女者呪當為河伯婦以錢三萬聘女沭浴脂粉如嫁粧豹往㑹之三老巫掾與民咸集赴觀巫嫗年七十從十女弟子豹呼婦視之以為非妙令巫嫗入報河伯投巫於河中有頃曰何久也又令三弟子及三老入白並投於河豹磬折曰三老不來奈何復欲使廷掾豪長趣之皆叩頭流血乞不為河伯取婦淫祀雖斷地留祭陌之稱焉俱同上𤣥妙觀在府治東北唐曰開元宮宋為天慶觀有何中立者本淮陽書生一旦荷簑來寓觀中佯狂妄談久而皆驗卧草中以其垢穢晨起必溲於吳江吳江至郡四十五里而往返不數刻觀中諸黄冠以殿宇摧毁白之何何因求疏軸云來日自有施者至期果有朝使來徵何以疏軸授使曰我不能入覲以此累使者上聞益竒之遂出内帑緡錢數萬以答其意蘇州府志勝石林詩話云姑蘇州學之南積水瀰數頃傍有小山高下曲折相望盖錢氏時廣陵王所作既積土山因以其地瀦水今瑞光寺即其宅而此其别圃也慶厯間蘇子美謫廢以四十千得之為居旁水作亭曰滄浪歐陽文忠公詩所謂清風明月本無價可惜秪賣四萬錢者也同上夷堅丁志云武寧縣有復唐村乾道己丑一日白晝大雷雨牧童見電光中龍鬬良久震霆數聲二龍奔解一物如車輪自半空墜入田中衆童競取之其光漸㣲大僅若鳬卵圓明如珠富人余氏易以數十錢映空而視中有形如好女南昌府志勝棊子灣在縣西北二十里有石如棊子若取之者以紙錢抛山下取勿揀選取畢視之黑白適均廣東名勝志本志云州西資聖院金錢井每月明輒有金錢影浮水上又云州治内有玉環井形如玉環因名四川名勝志東原上有紅崖冶其地産銅舊有錢官又三十五里之洛源監亦錢官也陜西名勝志香泥洞在真源聖祖殿前後有大楓泉出樹中投錢取水洗目能去翳安慶府志勝古義泉相傳諸葛武侯所鑿侯慮城中無水乃接筒引水後守亡藝以𣙜水取錢待制王龜齡乃罷之四川名勝志其貿易用貝滇載記曰貝者􅚔也方言也一貝曰莊四莊曰手四手曰苖五苖曰索九索當白金一錢按古者貨貝而寶龜至周而有泉秦乃廢具行泉王莾時大貝四十八分以上二枚為朋直二百十六牝貝三寸六分以上一朋值五十公貝二寸四分以上一朋直三十小貝寸二分以上一朋直十不盈寸二分不得朋每枚直錢三貨殖傳云貝五種大貝牝貝公貝小貝不成貝雲南所用小貝之尤細者郭景純贊曰先民有作龜貝為貨貴以文采賈以小大簡易則資犯而不過葢用泉則有㨂選之弊貝則枚數而已南中猶有太古之遺風歟雲南總叙容齋隨筆云淳化間嘉州士人辛怡顯使南詔至姚州其節度使趙公美以書來迎云當境有瀘水昔諸葛武侯戒曰非貢獻征討不得渡此水若必欲過湏致祭然後登舟今遣本部軍將賫金龍二條金錢三十文並設酒脯請先祭享而後渡焉四川名勝志卓王孫宅在州南五里基方十里耕者往往得銅錢按史記卓氏之先趙人秦破趙遷卓氏夫妻推輦而出曰吾聞岷山之下沃野下有蹲鴟乃求遠遷致之臨卭華陽國志臨卭有古石山出石礦大如蒜子火燒合之成流支鐵甚剛因置鐵官有鐵祖廟漢文帝以銅鐵賜宦者鄧通通假民卓王孫歲取千匠故王孫貨累巨萬億鄧通錢亦盡天下寰宇記鐵山鑄錢即此山也同上記略云予得三巖于榛莾間其一呀然雲際天光内通如月半破一似巨龜殻側倚巖下一窪中隆前卑後昻狀如覆鼎上有陰壑刀布藏焉樵者百方力不能到下有磐石螺蚌附之疑古海漸於此因名三海巖又有無名氏碑記云刀布懸岩非人力取廣東名勝志夢溪在朱方門外吳興沈括嘗夢至一處小山山下有水夢中樂之後守宣城有道人曰無外者為括言京口山川之勝且云郡人有地求售括以錢三十萬得之元祐初道京口過所買之地即夢中所遊處嘆曰吾緣在是矣遂築室居焉因以夢名其溪名勝志錢石山在縣東北六十里湘州記云山狀四方如臺巨石三面壁立上有碎石如錢廣東名勝志㸃蒼山脚挿入洱河其最深長者惟城東一支與喜州一支也南支之神其形金魚戴金錢北支之神其形玉螺二物見必有禎祥大理府志勝宋郡守余授朱纓堂記蠻商越駔氊裘椎髻交錯于闤闠中寰宇記蕃部蠻夷混雜之地元無市肆每漢人與番人愽易不使見錢漢用綢絹茶布番部用紅椒鹽馬之類四川名勝志宋時七月十五日村郭設㑹寺僧盡赴惟留智儼一人已而胥村人來寺强之同行至舟中見捕蝦者從買一斗索水噉之無遺謂漁者曰齋回還汝錢登㟁前行至齋家因不得上座令席一飯而無襯錢還見漁者索錢儼曰還汝蝦復索水飲隨吐活蝦盈斗還之松江府志勝鑄錢巖在南城縣東五十里覺海寺一望間其岩在平石之際横廣數丈中有石座高數尺上豐下殺宛如佛龕石背有小竇僅廣三尺斜袤深下以瓦石擲之如撞石鍾移時方息里老云昔巖中多破壞古錢因以為名建昌府志廬陵縣坊廓鄉永和市中有山曰金鳯池曰金錢觀曰清都蘇子瞻自儋耳來游留書清都臺三字其上時與黄魯直戲擲金錢於池池中開花如金錢至今猶盛吉安府志勝郁離子曰法有二有古今之通禁有一代之私禁古今之通禁其不可赦者也惡逆殺傷之類也一代之私禁其可赦者也茶鹽錢幣之類也千一録凡鑄造審其模範計其銅鐵而鎔之金牌信符鑄之内府凡鑄錢當十當五當三折二小錢凡五等鼓鑄於京師進於内府而頒之諸省亦如之吾學編載酒堂蘇東坡有詩并序云儋人黎子雲兄弟居城東南偶與使君張中同訪之居臨大池水木幽茂坐客欲為醵錢作屋余欣然許之名其屋曰載酒堂廣東名勝志洞元觀有紹興中道士孫野仙服石元丹遂斷榖時食酒菓而已乞錢即買酒既醉即擲餘錢與丐者四川名勝志昔王子瑶華陰人自云王喬之裔以晉永嘉中自玉笥來泰和即黄茅岡築壇醮籙感白鶴翔舞事聞賜名白鶴觀給錢千緡買田贍之吉安府志勝錢通卷三十一
