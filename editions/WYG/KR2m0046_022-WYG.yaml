body:
  text: 錢通卷二十二明胡我琨撰科斂趙在禮之在宋州也所為不法百姓苦之一旦下制移鎮永興百姓忻然相賀曰此人若去可謂眼中拔釘子何快哉在禮聞之怒欲報拔釘之謗遽上表更求宋州一年時朝廷姑息勲臣詔許之在禮于是命吏籍管内户口不論主客每嵗一千納之于家號曰拔釘錢莫不公行督責有不如約則加之鞭朴雖租賦之不若也是嵗獲錢百萬五代史補魏盜賊日滋征討不息國用耗竭豫征六年租調猶不足乃罷百官酒肉税入市者人一錢百姓嗟怨㑹編宇文融為御史中丞乘驛周流天下事無大小州先牒上勸農使然後申中書省司亦待融指撝然後處決上將大攘四夷急于用度融以嵗終所増緡錢數百萬悉進入宫繇是有寵議者多言煩擾上令百僚議之公卿畏之皆不敢言户部侍郎楊㻛獨抗議以為括客免税不利居人徴籍外田税使百姓困弊所得不補所失未幾出華州刺史同上宇文融性精敏應對辯給以治財賦得幸廣置諸使競為聚斂繇是百官浸失其職而上心益侈百姓苦之在相位謂人曰使吾居數月則海内無事矣信安王褘以軍功有寵融疾之使御史李寅彈之褘聞之先以白上明日寅奏果入上怒融坐貶既而國用不足上復思之㑹有飛狀告融贓賄隠沒官錢事坐流嚴州道卒然是後言財利以取貴仕者皆祖之同上王守恩貪鄙専事聚斂喪車非輸錢不得出城下抒厠行乞之人不免課率或縱麾下令盜人財有富室娶婦守恩與俳優數人往為賀客得銀數鋌而返郭威自河中還過洛陽守恩肩輿出迎威怒不見即以頭子命白文珂代守恩守恩猶坐客次吏白新留守己視事于府矣守恩狼狽而歸見家屬已逐出府矣朝廷不之問同上孔謙貸民錢使以錢估償絲屢檄州縣督之知汴州盧質言梁趙岩為租庸使舉貸誅斂結怨于人今陛下革故鼎新為人除害而有司未改其所為是趙巖復生也不報同上王曦召泉州刺史王繼業還賜死殺其子于泉州自是宗族勲舊相識被誅人不自保曦淫侈無度資用不給謀于國計使陳匡範匡範請日進萬金曦悦匡範増筭商賈數倍未幾不能足貨諸省務錢以足之恐事覺憂悸而卒以黄紹頗代之紹頗請令欲仕者輸錢以資望髙下及户口多寡定其直自百緡至千緡從之同上時睦冦初平帝亦悔于用兵王黼獨言曰中國與遼雖為兄弟之邦然百餘年間彼之所以開邊慢我者多矣且兼弱攻昧武之善經也今而不取燕雲女真即强中原故地將不復為我有帝遂決意治兵黼于三省置經撫房專治邊事不闗樞密括天下丁夫計口出筭得錢六千二百萬緡以充用宋史初收經制錢先是命陳遘經制江淮七路遘創議取經制錢至是收之同上命陳遘經制七路治于杭州以供餽餉遘以財用不給創義度公私出納量増其贏號經制錢遂為東南七路之害同上三班院所領使臣八十餘人涖事于外其罷而在院者常數百人每嵗乾元節醵錢飯僧進香合以祝聖夀謂之香錢判院官常利其餘以為餐錢郡牧司領内外坊監使副判官比他司俸入最優又嵗收糞墼錢頗多以充公用歸田錄今之民間所納夏秋二税葢唐大中間取一年諸色科斂最重者定為二税則諸色科斂已在其間後唐天成三年七月十三日敕三京鄴都諸道州府鄉村人户自今年七月後于夏秋田苖上每畆納麴錢五文足陌一任造麴酒貨賣則是再増酒麴錢矣又置坊户以三年為限限滿必増錢實封投狀百日限滿折封給價髙人上户増價攘奪洎其久也課髙難辦又創立户酒之説將一坊酒額盡均苖頭上舊坊户既有醖具上户亦有力造酒酤賣五等下户自令出錢數且零細家至户到貽害良農自合浙東湖北皆有斯解悉緣達官慕愛民之虚名忘久逺之利病為無窮之害予向在漢東偶有此為舉力爭得免故書以告來者雲麓漫抄孔謙欲聚斂以求媚凡赦文所蠲者謙復徴之每有詔令人皆不信百姓愁怨郭崇韜頗受饋遺所親諫之崇韜曰吾祿賜巨萬豈藉外財但以偽梁之季賄賂成風今河南藩鎮皆梁之舊臣主上之仇讐也若拒其意能無懼乎吾特為國家藏之私室耳及將祀南郊崇韜獻錢十萬緡先是宦官勸唐主分天下財賦為内外府州縣上供者入外府充經費方鎮貢獻者入内府充宴賜于是外府常虚竭無餘而内府山積及是乏勞軍錢崇韜言于唐主曰臣已傾家所有以助大禮願陛下亦出内府之財以賜有司唐主黙然久之曰晉陽自有儲積可令租庸輦取于是軍士皆怨恨有離心矣㑹編國朝以來京都雖有國子監為講學之地然生徒不上三十人率䝉稚未能成學者遇秋試詔下則四方多士競投牒于學干試求薦罷則引去無肯留者初試補監生但無大謬無不收采生員得牒以歸則自稱廣文館進士監出一牒生員輸緡二千餘目為光監利為公廨之用直講置員但躐為資地希遷榮耳儒林公議張譲趙忠説帝斂天下田畆十錢以修宫室鑄銅人樂安太守陸康上疏諫曰昔魯宣公税畆而蝝災自生哀公増賦而孔門非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈無王之法哉大凡未敕下已前每日期集兩度詣主司之門三日後主司堅辭即止同年初到集所國司所繇先叅狀元後更叅衆郎君訖俄有小勾當中庭唱曰諸郎君就坐雙東隻西其亂者罰不少又出抽名紙錢每人十貫文鋪底錢每人三十貫文摭言唐殷侑徙天平節度使以餉軍有贏當上送官乃裁經費嵗月錢十五萬緡粟五萬石歸有司御史大夫温造劾侑擅斂民為無名之獻詔以庾承宣代之山堂肆考賄賂太尉劉虞讓位于羊續靈帝時為三公者皆輸東園禮錢千萬而續不輸以此不登三公鄭愔為吏部掌銓選務貪賄有選人以百錢系鞋帶愔問之答曰當今之選非錢不行面議而愔不耻革韋説奏事唐主前禮貌不盡恭百官俸錢皆折估而革父子獨受實錢説以孫為子奏官受選人賂除近官中旨以蕭希甫為諫議大夫革説覆奏希甫恨之上疏言革説不忠前朝并誣革他罪制罷革説擢希甫為散騎常侍㑹編夏四月令吏民入錢穀得拜官賜爵有差通鑑曰從三公之請也同上時三公往往因常侍阿保入錢西園而得之段穎張温等雖有功勤名譽然亦先輸貨財崔烈本冀州名士至是因傅母入錢五百萬故得為司徒而聲譽頓衰同上淮南節度使王播以錢十萬緡賂王守澄求領鹽鐵諫議大夫獨孤朗等數人請開延英論之上問前廷爭者不在中耶即日除劉栖楚諫議大夫而竟以播兼鹽鐵轉運使同上上左右受王鍔厚賂多稱譽之上命鍔兼平章事李藩固執以為不可權徳輿曰宰相非序進之官今鍔既無忠勲朝廷又非不得已何為遽以此名假之上乃止鍔有吏才工于完聚范希朝以河東全軍出屯河北耗散甚衆鍔到鎮之初兵不滿三萬人馬不過六百匹嵗餘兵至五萬人馬有五千匹器械精利倉庫充實又進家財二十萬緡上復加鍔平章事李絳諫曰鍔在太原雖頗著績然今因獻家財而命之若後世何乃止同上陳少游為吏强敏而好賄善結豪貴以是得進除桂管觀察使惡其道逺多瘴癘宦官董秀掌樞密少游請嵗獻五萬緡又納賄于元載子仲武内外引薦遂改宣歙同上唐張延賞將判度支知一大獄頗有寃曲每甚扼腕及判使召獄吏嚴誡之且曰此獄已久旬日須了明旦視事案上有一小帖子曰錢三萬貫乞不問此獄公大怒更懼之明日復見一帖子來曰錢五萬貫公益怒令兩日須畢明日案上復見帖子曰錢十萬貫公遂止不問子弟承間偵之公曰錢至十萬貫通神矣無不可囘之事吾恐及禍不得不受也楊釗者貴妃從祖兄也鮮于仲通常資給之仲通頗讀書有才智章仇兼瓊引為采訪吏使委以心腹嘗從容謂仲通曰今吾獨上所厚苟無内援李林甫必見厄聞楊妃新得幸子能為我結之吾無患矣仲通言釗本末釗儀觀甚偉言辭敏給瓊見之大悦即辟為推官使獻春綵于京師贐蜀貨值萬緡釗大悦過望至長安見諸妹分以遺之曰此章仇公所贈也于是諸楊譽兼瓊得出入禁中㑹編冐濫賀子敬聲為太僕驕奢不奉法擅用北軍錢𤼵覺下獄漢史涇州奏吐蕃入寇距州三十里告急求救以梁守謙為神䇿行營都監并𤼵八鎮全軍救之邠寧兵以神䇿受賞厚皆愠曰人給五十緡而不識戰鬭者彼何人耶常額衣資不得而前冐白刅者此何人耶洶洶不止節度使李光顔親為開陳大義然後軍士感悦而行將至涇州吐蕃懼而退㑹編蜀孟昶廣政三年上元觀燈露臺舞娼李艷娘有姿色召入宫賜其家錢十萬蜀史檮杌和凝罷加樞密使馮玉同平章事事無大小悉以委之晉主自陽城之捷謂天下無虞驕侈益甚多造器玩廣宫室作織錦樓以織地衣用功數百期年乃成又賞賜優伶無度桑維翰諫曰向者陛下親禦胡冦戰士重傷者賞不過帛數端今優人一譚一笑稱㫖往往賜束帛萬錢錦袍銀帶彼戰士見之能不觖望士卒解體陛下誰與衛社稷乎不聽馮玉每善承迎益有寵有疾在家晉主謂宰相曰自刺史以上俟馮玉出乃得除玉乗勢弄權賂遺輻凑朝政益壞㑹編韓侂胄怒金人欲罪首謀和議遂輟復鋭意用兵乃以趙淳鎮江淮而免張巖巖開督府九月費耗縣官錢三百七十萬緡而無成功宋史上使善相相鄧通當貧饑死文帝于是賜通蜀嚴道銅山得自鑄錢史記何定使諸將各上御犬二犬直縑數十匹􅀈紲直錢一萬以捕兔供厨吳主以為忠賜爵列侯㑹編秦檜以紹興十五年四月丙子朔賜第望僊橋丁丑賜銀絹萬匹兩錢千萬綵千縑程史成都有丐者詐稱落泊衣冠敝服繿縷常巡成都市􅆵見人即展手希一文云失墜文書求官不遂人皆哀之為其言語悲嘶形容顦顇居于蚤遷橋側後有勢家于所居旁起園亭欲廣其池館遂强買之及徙則見兩間大屋皆滿貯散錢計數千萬鄰里莫有知者成都人一㮣呼求事官人為乞措大朝野僉載唐王起改太子少師起治生無撿所得祿賜為童婢所盜貧不能自存帝詔曰益仙韶院錢議者謂與玩臣分給可恥也起賴其入不克遜山堂肆考東漢桓帝時李爕為河南尹時皆以貨賂為官朝廷有詔復横𤼵錢三億萬以實西園爕上書諫止之按此李爕固之子同上它日楊貴妃以譴還銛第比中昃上尚不御食笞怒左右髙力士欲驗帝意乃白以殿中供帳司農酒餼百餘車送妃所帝即以御膳分賜力士知帝㫖是夕請召還下鑰安興坊門馳入妃見帝伏地謝帝釋然撫慰良渥明日諸姨上食樂作驟賜左右不可貲繇是愈見寵賜諸姨錢嵗百萬為脂粉費銛以上柱國門列㦸與錡國忠諸姨五家第舍聨亘擬憲宫禁率一堂費緡千萬見它第有勝者輒壞復造務以瓌侈相誇詡土木工食不息帝所得奇珍及貢獻分賜之使者相銜于道五家如一亘史外紀時諸將擁重兵而無分地光世在鎮江月費至二十萬緡每聞易鎮則設辭不奉詔有急復遷延以避之朝廷無如之何宋史順帝時大臣以兩京馳道狹隘奏毁民田廬廣之已遣使督治葢苖言馳道創自至元初何今日獨以為狹力辨其不可乃止又欲出宿衛士為郡長官俾以飬貧苖曰郡長所以牧民豈養貧之地果不能自存賜之錢可也若任郡守必擇賢而後可議遂寢又欲與角觝者錢萬貫苖曰諸處告饑不蒙賑恤力戯何功獲此重賞乎經濟篇奢侈漢髙制聘皇后儀黄金二百斤馬十二匹夫人黄金五十斤馬四匹晉宋納后皆嘗引以為言而平帝納王莽女有司奏漢故事聘皇后黄金二萬斤為錢二百萬莽深辭受四千萬而以其三千三百萬予十一媵家有詔復益二千三百萬合為三千萬桓帝納梁冀女弟有司奏案漢儀依孝惠帝納后故事金二萬斤視漢髙初制頓増百倍其懸絶如此野客叢譚何劭字敬祖日供口食計二萬錢而兼四方珍味雖三公帝厨之膳不及之也獨異志睿宗于京安福門外作燈輪髙二十丈衣以錦綺飾以金銀燃五萬盞燈望之如花樹宫女千數衣羅綺曵錦繡耀珠翠施香粉一花冠一巾帨皆至萬錢裝束一妓女皆至三百貫鈔簡長安萬年少女婦千餘人衣服花釵婢子亦稱是于燈輪下踏歌三日夜歡樂之極未始有之朝野僉載李徳裕奢侈每食一杯􅃵其費約錢二萬雜珠玉寳貝雄黄硃砂煎汁為之過三煎耶棄其滓獨異志王涯居相位有女適竇氏欲求錢十七萬市一玉釵涯曰于女何惜此妖物也必與禍相隨後數月女自㛰歸告王曰前時玉􅁫在馮外郎妻首飾矣乃馮球也王歎曰馮為郎吏妻之首飾有十七萬其可久乎其善終乎南部新書王武子被責移第北邙下于時人多地貴濟好馬射買地作埒編錢匝地竟埒時人號曰金溝世説新語任愷字元褒既失職乃縱酒躭樂極滋味以自奉養初何劭以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處晉書韋陟逍遥公性奢縱喜飾服馬侍兒閹童列左右常數十侔于王宫主第窮治饌羞擇膏腴地藝穀麥以鳥羽擇米每食視厨中所棄其直猶不減萬錢宴公侯家雖水陸具陳曽不下筯常以五采牒為書記使侍婢主之其裁答授意而已本𫝊王元寳都中巨豪也常以金銀疊為屋壁上以紅泥泥之于宅中置一禮賢堂以沉檀為軒檻以碔砆甃地面以錦文石為柱礎又以銅線穿錢甃于後園花徑中貴其泥雨不滑也四方賔客所至如歸故時人呼為王家富窟天寳遺事時道士皆有俸每一觀給田亦不下數百千頃凡設大齋輙費緡錢數萬貧下之人多買青布幅巾以赴口得一飫餐而襯施錢三百謂之千道㑹且令士庻入聽林靈素講經帝為設幄其側靈素㨿髙座使人于下再拜請問然所言無殊絶者時時雜以滑稽媟語上下為大閧笑莫有君臣之禮復令吏民詣宫授神霄祕籙朝士嗜進者亦靡然趨之焉宋史金主稍習經史慕中國朝著之尊密有遷都意遂下詔求直言而上書者多謂上京僻在一隅不若徙燕以應天地之中與金主意合乃遣左丞相張浩右丞相張通古等調諸路夫匠築燕京宫室城周九里三步其宮室一依汴京制度運一木之費至二十萬牽一車之力至五百人宫殿之飾徧𫝊黄金而後又以五采金屑飛空如落雪一殿之費以億萬計成而復毁務極華麗金史趙韓王治第麻搗錢一千二百餘貫其他可知葢屋皆以板為笪上以方磚甃之然後布瓦至今宅壯塗壁以麻搗土世俗遂謂塗壁麻為麻搗夢溪筆談趙巖自以有功于梁又尚公主聞唐駙馬杜悰位至將相自奉甚豐恥其不及乃占天下良田大宅裒刻商旅其門如市租庸之物半入其私巖一飲食必費萬錢五代史京師上元放燈三夕錢氏納土進錢買兩夜今十七十八兩夜燈因錢氏而添之公主郭淑妃之女上特愛之傾宫中珍玩以為資送賜第窓户皆飾以雜寳井欄藥臼亦以金銀為之賜錢五百萬緡他物稱是㑹編僖宗好鬭鵝數幸六王宅興慶池與諸王鬭鵝一鵝五十萬錢田令孜𫝊唐馬璘家富不貲治第京師侈甚其寢堂無慮費錢二十萬緡及璘卒喪歸都人爭入其第觀之假稱故吏赴弔者日數百徳宗在東宫聞之不喜及即位乃禁第舍不得踰制詔毁璘中寢㑹編梁曹景宗韋叡設錢二十萬官賭之景宗擲得雉叡徐擲得廬遽取一子反之曰異事遂作塞綱目鍾㑹字士季元常子善書有父風稍備筋骨㑹嘗詐為荀朂書就朂母鍾夫人取寳劍㑹兄弟以千萬造宅未移居朂乃濳畫元常形像㑹兄弟入見便大感慟終身不入朂書亦㑹之類也筆陣圖唐王無㝵好博戲善鷹鷂文皇㣲時與無㝵蒱戲爭彩有李陽之宿憾焉帝登極㝵藏匿不出帝令給使將一鷂子于市賣之索錢二十千㝵不之知也酬錢十八貫給使以聞帝曰必王無㝵也遂召至惶懼請罪帝笑而賞之朝野僉載髙陽王雍居止第宅匹于帝宫僮僕六千妓女五百隋珠耀曰羅衣從風日食必數萬錢為限陳留侯李崇謂人曰髙陽一日敵我千日洛陽伽藍記霍定與友生游曲江以千金求人竊貴侯亭榭中蘭花挿㡌兼自持往羅綺叢賣之士女爭買抛擲金錢曲江春宴錄晉王濟𫝊王愷以帝舅奢豪有牛名八百里駮嘗瑩其蹄角濟請以錢十萬與牛對射而賭之濟一𤼵破的因據胡牀叱左右速探牛心來須㬰而至一割便去世説新語唐鄭璠在嶺南象江得怪石輦歸榮陽費錢六十萬宋榮咨道以錢三百萬買虞世南夫子廟初刻碑偶記郭子儀自河中入朝代宗命宰相置酒其第一㑹之費至十萬緡准今銀數當作十萬兩也亦太甚矣筆麈南史宋明帝建湘宫寺在靑溪橋北費極奢侈虞愿曰陛下起此寺皆百姓賣兒帖婦錢佛若有知當極慈悲帝不省應天府志勝長夀三年則天徴天下銅五十餘萬斤鉄一百三十餘萬斤錢二萬七千貫于定鼎門内鑄八稜銅柱髙九十尺徑一丈二尺題曰大周萬國述徳天樞張革命之功貶皇家之徳天樞下置鉄山銅龍負戴獅子麒麟圍繞上有雲葢葢上施盤龍以托火珠珠髙一丈圍三丈金彩熒煌光侔日月武三思為其文朝士獻詩者不可勝紀惟宰相李嶠詩冠絶當時大唐新語鄙吝王戎性嗜利聚錢不知紀極田園水碓周徧天下每自執牙籌曉夜筭計而吝嗇不自奉養人以為膏肓之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悦女覺遽還之懽遂如初從子將婚戎遺以一單衣婚訖輒更責取家有好李恐人得種恒鑚其核子萬有美名少而大肥戎令食糠而肥愈甚晉書列𫝊和嶠字長輿家財産豐富擬于王者然性至吝以是獲譏于世杜預以為嶠有錢癖晉書秦揚安攻晉陽久未下猛引兵助攻為地道使將軍張蚝帥壯士數百潜入城中大呼斬闗納秦兵遂入晉陽評屯潞川猛進兵相與持評為人貪鄙鄣固山泉鬻樵及水積錢帛如丘陵士卒怨憤莫有鬭志猛聞之笑曰評真奴才雖有億兆之衆不足畏况數十萬乎乃遣將軍郭慶帥騎五千夜從間道出評營後燒評輜重火見鄴中暐懼譲評曰府庫之積朕與王共之何憂于貧若國家喪亡王持錢帛欲安所置乎乃命以錢帛散之軍士有周師厚者為荆湖北路提舉常平水利是時初定募役之法師厚書成上于司農其間曰散從官逐月傭錢三貫文如遇差作市買即每月添錢一貫文東軒筆錄太子中舍柴餘慶説其從叔内殿承制肅蔡州日掠房緡五千其憂愁焦煎之貌嘗如負人百千萬債者嘗在病幾死纔開目問其子曰今日費幾錢江鄰幾雜志曹虎為右衛將軍晩節好貨賄吝嗇在雍州得見錢五千萬伎女食醬菜無重殽南齊書漢世有人年老無子家富性鄙嗇聚斂無厭而不自用或人從之求乞者不得已而入内取錢十自堂而出隨步輒減比至于外纔餘半在閉目以授乞者尋復囑曰我傾家贍君慎勿他説復相効而來老人俄死田宅沒官貨財充于内帑矣石晉陳保性極鄙吝每與人奕棋敗輒手亂其局懼所賄金錢不欲償也及卒家無妻兒惟有白金千鋌為他人所有續世説有和長輿者巨萬藏家貫朽反磨鱗次螭縮陳陳腥澁死而有知是謂錢鬼孫權文王鍔累任大鎮財貨成積有舊客諭以積而能散之義後數日復見鍔鍔曰前所見戒誠如公言已大散矣客請問其名鍔曰諸男各與萬貫女婿各與千貫矣國史補逋負劉翺舟行見赴水者詢其故云欠錢六十貫追補無可還公曰錢易得人命難得悉貸錢還之得活春氣錄老子在中國都未有所授知令尹喜命應得道乃停關中老子有客徐甲少賃于老子約日雇百錢計欠甲七百二十萬錢甲見老子出闗遊行速索償不可得迺倩人作辭詣闗令以言老子而為作辭者亦不知甲巳隨老子二百餘年唯計甲所應得直之多計以女嫁甲甲見女美尤善遂通詞于尹喜得辭大驚乃見老子老子問甲曰汝久應死吾昔賃汝為官卑家貧無有使役故以太𤣥清生符與汝所以至今日汝何以言吾吾語汝到安息國固當以黄金計直還汝汝何不能忍乃使甲張口向地其太生真符立出于地丹書文字如新甲成一聚枯骨矣喜知老子神人能復使生甲乃為甲叩頭請命乞為老子出錢還之老子復以符投之甲立更生喜即以錢二百萬與甲遺之而去并執弟子之禮具以長生之事授喜神仙𫝊錢通卷二十二
