body:
  text: 錢通卷十六明胡我琨撰八之節物不可窮受之以節節非濟物之窮出入之則各有量省約者如其量而止君子節於朝小人節於野保世滋大利樂各得其所之善經也如曰纎嗇示守則物富而節之道反窮矣老子寳儉其寳節乎故節曰八裁省李吉甫奏中原宿兵見在八十餘萬商賈僧道不服田畝者什有五六是常以三分勞筋苦骨之人奉七分待衣坐食之輩也今内外官以税錢給俸者不下萬員天下或以一縣之地而為州一鄉之民而為縣者甚衆舊制一品月俸三千緡職田祿米不過千斛艱難以來増制使額厚給俸錢大歴中權臣月至九千緡州無大小刺史皆千緡常衮始立限約李泌稍復増加然有名存職廢或額去俸存閑劇之間厚薄頓異請敇有司詳定省吏員併州縣減入仕之塗定俸給之數於是詔段平仲韋貫之許孟容李絳同詳定省併八百八員諸色流外千七百餘人㑹編高宗紹興三年劉大中宣諭江南歸言泉司官吏之費嵗十三萬緡請省官屬從之先是党項皆詣關以貢馬為名國家約其直酬之加以館穀賜與嵗費五十餘萬緡至是始於緣邊置塲市馬不令詣關㑹編上知後苑作使過太府寺錢六十餘萬詔令非特㫖不得於諸處借支一中官挾周禮進指膳夫内府之類惟王及后不㑹然之遂罷晁氏客話初河隴旣没於吐蕃安西北庭及西域使人在長安者歸路阻絶皆仰給於度支李泌知胡客皆有妻子買田宅安居不欲歸命停其給凡四千人皆詣政府訴之泌曰此皆從來宰相之過豈有外國使者留京師數十年不聽歸乎今當假道回紇各遣歸國不願者當於鴻臚自陳授以職位給俸禄人生當乗時展用豈可終身客死乎於是胡客無一人願歸者泌皆分𨽻神策兩軍禁旅益壯嵗省五十萬緡㑹編内外制凡草制除官自給諌待制以上皆有潤筆物太宗時立潤筆錢數降詔刻石於舍人院每除官則移文督之在院官下至吏人院騶皆分霑元豐中改立官制内外制皆有添給罷潤筆之物夢溪筆譚武宗惡僧尼財産没官銅像鐘磬鑄錢五臺僧多奔幽州張仲武乃封二刀付居庸關曰有遊僧入境則斬之通鑑孔謙復言於郭崇韜曰首座相公事繁第遠簿書留滯宜更圖之豆盧革當以手書便省庫錢數十萬謙以示崇韜革懼奏請崇韜專判租庸崇韜固辭請復用張憲謙彌失望言於革曰錢穀細事魏都根本興唐尹王正言操守有餘智力不足使之居朝廷猶愈於專委方靣也革言於崇韜乃留張憲於東京以正言為租庸使正言昏懦謙利其易制故也尋敇三司並𨽻租庸使㑹編劉崇即位於晉陽仍用乾祐年號謂諸將曰朕以高祖之業一朝墜地今日位號不得已而稱之顧我是何天子汝曹是何節度使耶繇是不建宗廟祭祀如家人禮宰相俸錢月止百緡節度使止二十緡自餘薄有資給而已聞湘隂公死哭曰吾不用忠臣之言以至於此為李驤立祠嵗時祭之同上近内奏修重華宫舊例須關朝廷出錢下臨安府轉運司應辦壽皇曰此間無用錢處所積甚多只用重華庫錢不必關聞南内曁役成更不官差一夫一匠西湖志仁宗每私宴十閣分獻熟食是嵗秋初蛤蜊初至都或以為獻仁宗問曰安得已有此耶其價幾何曰每枚千錢一獻凡二十八枚上不樂曰我常戒爾輩勿為侈靡今一下箸費二十八千吾不堪也遂不食後山談叢齊澣遷潤州刺史州北距𤓰步沙尾紆滙六十里舟多敗溺澣徙漕路繇京口埭治伊婁渠以逹揚子嵗無覆舟減運錢數十萬新塘記有醫工劉集交通禁中上敇鹽鐵補塲官柳仲郢上言醫工術精宜補醫官若委務銅鹽何以課其殿最且塲官賤品非特敇所宜親上遽賜絹遣之他日見仲郢勞之曰􅀸論劉集事甚佳上嘗有疾醫工梁新治之良已自陳求官但一月給錢三百編而已㑹編儉約平陵士孫奮貲至一億七十萬富聞京師而性儉吝从人端辟梁冀掾奮送絹五疋食以乾魚嘗宿客舍顧錢直甚少主曰君惜錢如此欲作士孫景卿耶三輔决錄唐主性節儉常躡蒲履盥頮用鐵盎暑則寢於青菖帷左右使令惟老醜宫人服飾粗畧死國事者雖士卒皆給賞三年分遣使者按行民田以肥瘠定其税民間稱差法自是江淮調兵興役及他賦歛皆以税錢為率至今用之通鑑孫之翰人嘗與一硯直三十千孫曰硯有何異而如此之價也客曰硯以石潤為貴此石呵之則水流孫曰一日呵得一擔水纔直三錢買此何用竟不受夢溪筆談李若谷為長社令日懸百錢於壁用盡即止東坡謫齊安日用不過五十每月朔取錢一千五百斷為三十塊掛屋梁上平旦用盡又挑取一塊即藏去又以竹筒貯用不盡之錢以待賔客云此賈耘老法也又與李公擇書云口腹之欲何窮之有每加節儉亦是惜福延壽之道張無垢云余平生貧困處之亦自有法每日用度不過數十錢亦是足至今不易也有客自來陽來言鄭亨仲日以數十錢懸壁間椒桂葱姜皆約以一二錢曰吾平生貧苦晚年登第稍覺快意便成竒禍今學張子韶法要見舊時虀鹽風味矣甚長久也仇泰然守四明與一幙官極相得一日問及公家日用多少對以十口之家日用千錢泰然曰何用許多曰早具少肉晚菜羮泰然驚曰某為太守居常不敢食肉只是喫菜公為小官乃敢食肉定非亷吏自爾見踈箴譚蘇子由因舊詩序予因卞氏故居改築新宅其㕔事陋甚有柴氏㕔三間求售三百餘萬錢力不能致子遲曰因卞之舊而易其瓦亦可子孫若賢當師公儉予愧其言從之作因舊詩錢通卷十六
