body:
  text: 錢通卷七明胡我琨撰雜品舊譜不知年代右平當錢徑九分重三銖肉郭夷坦當字湮漫或云漢代所鑄右四出錢徑寸一分重三銖六絫面背文皆四出字盡漫昧大泉五十本王莽所鑄初無四出之就又有背文為北斗七星者此錢見竒品右大泉五銖錢顧烜曰七種異錢今世見有張台曰在顧氏所見七種異錢之內大小輕重未聞文皆五銖外建龜茲疏勒亦倣此制諸譜載之甚備獨此未之著滕子濟樞密嗜古嘗獲此錢號曰左右五銖錢計以意因之也右太元貨泉錢李孝美曰此錢徑七分半重四銖其文上曰太下曰元右曰貨左曰泉太元則真書貨泉則小篆形製不至隹右通行貨泉錢洪遵曰余按此錢徑八分半重二銖七絫銅質簡古字含八分體背文穿上有月形右兩銖錢顧烜曰劉氏錢志所載竒異稀有原始未右雙五五銖錢徑八分重二銖四絫五字連綴肉郭右大泉錢右左右五銖錢洪遵曰余按此錢形製窳薄面文曰五銖肉漫好濶僅有輪郭背文亦曰五銖肉郭夷坦倒置其字徑寸重二銖三絫又一品面文曰五銖幕文以五銖字上下之徑七分重二銖四絫余按五銖沿漢迄隋因革不一品目尤夥文四出謂之角錢去肉郭謂之女錢狹小其制謂之稚錢三面無郭謂之白錢有反其文名𫝊形者有輪郭去盡名對文者有上下其字名竒品者以至赤側當兩鵝眼雞目四柱兩柱之類右續銖錢舊譜曰形製頗類五銖而文無好郭其文右曰續左曰銖右兩柱錢洪遵曰余按隋志但云梁末有是二錢初不謂鑄于梁如鵝眼錢乃宋景和中所鑄李孝美俱以為梁錢非也右女錢顧烜曰徑一寸重五銖文曰五銖無輪郭今立師及諸郡縣亦通用焉洪遵曰余按此錢謂之五銖女錢梁武新鑄亦曰女錢蓋梁之前已有女錢矣右稚錢隋書食貨志曰梁初古錢有五銖稚錢顧烜曰徑八分半重四銖文曰五銖源流出於五銖但稍狹小今東境謂為稚錢三吳皆用之小者至徑六分重二銖半世有射雉戲用此錢也右對文錢隋書食貨志曰梁初古錢有五銖對文等號顧烜曰對文錢剪五銖之所成也民利古錢多銅剪鑿取其輪郭所餘甚輕小今世行之其源始未聞也右五朱錢顧烜曰徑七分半重三銖一文曰五朱源出稚錢但稍遷異以銖為朱三吳屬縣行之亦差少張台曰今所見朱字錢自有兩般字狹者有內郭字濶者狀如半兩自徑七分至五分無重三銖半者其輕有至五黍者近華山有人掘得數斗錢皆徑四分好亦二分已上周回皆無錯鑢處其文只有半王字仍未成就此則五朱之漸也洪遵曰余按此錢徑七分重二銖一絫制作簡古銅質純青背文坦平外輪有緣今世尚有之右定平錢隋書食貨志曰梁武帝時百姓或私以古錢文易有定平一百顧烜曰徑六分重一銖半文曰定平一百三吳屬縣行之洪遵曰余按此錢今世尚有之右𫝊形半兩錢字文坦明背面皆無輪郭徑八分重二銖一絫右太平錢顧烜曰太平四文錢三種並徑一寸重四銖源流本一但文字有今古之殊並曰太平百錢其小者至徑七八分重一銖半文字不異舊譜曰錢有三種大篆小篆𨽻書文皆曰太平百錢但字有古今形有大小又有水波文及龜背者見竒品洪遵曰余按此錢又有一種其字含篆𨽻體錢字漫滅徑九分重二銖七絫右兩嗇錢敦素曰此錢重四銖徑一寸三分微有外輪背面無好郭其文篆書右曰兩左曰嗇形質大抵似半兩制作古異源流莫知按豐記鄭𤣥注云八兩為鉛據其輕重非如其文然左邊之字不當為繬但未識耳董逌曰考字書無嗇字又不與篆合按釋真觀書曰割愛辭親披繬剪髮乃知此自梵書中出其以繬為嗇又省文也此錢疑在南梁北齊間洪遵曰余按此錢今世所見者形質夷坦字文著明背面肉好皆無輪郭徑寸二分重四銖三絫嗇字與諸譜不同制度亦小今兩存之右一文錢敦素曰徑寸五分重七銖中穿正圓內外並無輪郭有如半兩之狀一面有字㸃畫甚纎李孝美曰此錢銅色純赤今世甚多流俗號為鎖子錢豈非以錢文類鎖形耶舊譜謂之一文審求其義了不可得然未知何所稽也董逌曰考古文此字為巨泉蓋圜錢也右四曲文錢舊譜曰形製類半兩肉好無輪郭面有四曲文外向有二字右類文字左不可識右永光錢徐氏曰文曰永光右五金錢徐氏曰文曰五金洪遵曰余按此錢徑八分重三銖六絫字文明徹製作甚精右大朝錢李孝美曰此錢徑寸五分重十五銖其文真書曰大朝金合肉好背面皆有周郭或云是外國鑄右天鎮錢李孝美曰此錢徑八分重四銖六黍文曰天鎮福寶背文有一黎字在穿上字體形製與石晉天福錢殊不相侔今世所見至多董逌曰天福石晉年號當時所鑄自有天福鎮寶錢文見晉氏舊史洪遵曰余按此錢面文湮沒存于今甚多董氏以為見之晉史今無其書可考矣右萬嵗錢李孝美曰此錢徑寸二分重十三銖面文繆篆曰皇帝萬嵗背文繆篆曰忠孝𫝊家肉好皆有右大興錢李孝美曰此錢徑八分重四銖面文曰大興平寶復有一丁字在背文穿上洪遵曰余按此錢今世至多背文丁字不常其處或在穿上或在穿下右太千錢洪遵曰余按此錢徑八分重三銖六絫文曰太千通寶倒置通寶字千字疑當作平嵗久漫滅爾背文有一丁字在通字之背製作字體肖大興平寶錢右天感錢洪遵曰余按此錢文曰天感元寶大小二品字畫遒徑頃嵗獲此尋逸之大小輕重莫詳疑外國所鑄右古錢李孝美曰此錢徑寸一分重十銖面有兩字不可識肉好皆有周郭皆夷漫如半兩狀右古文錢徑一寸重四銖五絫背文夷漫面肉坦平微有輪郭頗類圜法右三字錢徑寸一分重三銖三絫面背肉形皆平外無周郭製作簡古字畫夷漫叵辨亦圜法别種也右千字錢李孝美曰此錢徑寸六分重十銖面文右邊有一千字體如遼錢疑其同出而未得依據肉好皆有周郭背文亦如半兩右太興錢董逌曰文曰太興平寶疑五代僭僞之所鑄右黃河錢舊唐書曰元和元年靈武李欒奏黃河岸搨處得天品右天帝錢晉書天文志曰北落師門西北有十星曰天錢右天雨寶錢右咸陽雨錢右漢世頴川雨金五銖錢右王莽時雨五銖錢刀布品右白金三品其一曰重八兩其文龍名曰撰直三千二曰以重差小方之文馬直五百晉灼曰以半斤之重差為三品此重六兩則下品重四兩也三曰復小撱之其文龜直三百師古曰撱圜而長也音他果反張湯𫝊曰山東水旱貧民流徙皆仰給縣官空虛湯承上指請造白金五銖錢籠天下鹽鐡史記索隱曰白金三品其一龍文隱起肉好皆圜又作雲霞之象其二肉好皆方隱起馬形在好之下又有連珠文者其三肉圜好方皆為隱起龜甲文右契刀前漢食貨志曰王莽造契刀其環如大錢身形如刀長二寸文曰契刀五百張晏曰其文左曰契右曰刀無五百字也顧烜曰契刀五百非勒刀為此四字刀上但有契刀二字而直五百張台曰台有此錢但薄于錯刀柄上文曰五百張顧二說並未見有柄者其文鋪成若錯刀之陷金也李孝美曰嘗得此錢其形製正如張台所說但其文鑄成非陷金也且食貨志自云錯刀以黃金錯其文則此非陷金明矣右漢刀前漢食貨志曰王莽以黃金錯其文曰一刀直五千張晏曰刻之作字以黃金填其文上曰一下曰刀張台曰台有此錢如此圖樣李孝美曰此錢今世猶多或有無刀者右十布前漢書食貨志曰王莽鑄大布次布第布壯布中布差布厚布幼布么布小布小布長寸五分重十五銖文曰小布直一百自小布以上各相長一分相重一銖文各為其布名直各加一百上至大布長二寸四分重一兩而直千錢矣是為布貨十品右貨布前漢食貨志曰王莽天鳳元年罷大小錢改作貨布長二寸五分廣一寸首長八分有竒廣八分其圜好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖直貨泉二十五與貨泉見僞品並行張台曰此布如今最多而易得以今尺量之得寸九分顧烜曰莽所作錢布皆用銅淆以連錫右大黃布刀舊譜曰重七銖長二寸三分文曰大黃布刀張台曰此亦王莽所鑄文曰大黃布刀莽自言黃虞之後又改平帝定安大后為黃室主即大黃莽之自稱也意者豈非莽之初謂刀布一物後分為二耶李長美曰按此製作切類貨布但足外差廣銅色稍赤耳食貨志與莽𫝊皆所不載洪遵曰余按此布今世所存尚多右古刀布李孝美曰按先王刀布文字制度書所不載然今世所有古刀異布甚多豈非當時所用者乎舊譜别作品俱列于后右䝉城古刀宣和五年郭僎為亳州䝉城令村人得之田中柄端有方寸一三字倣佛𨽻書背有方孔不透身形如刀文曰貨布五百疑王莽所鑄右長平古刀舊譜曰天寶元年西河郡别駕李幼竒于長平溪澗中所得狀如小刀長二寸四分濶五分柄長二寸濶四分柄端有孔總長四寸七分背面俱有字不可識右沂州銀刀嘉祐雜志曰王公和學士罷沂州得銀刀一有齊太公杏九字九字中闕不相屬刀上又有隱起圜形疑是九府圜法也右長平異布舊譜曰亦幼竒所得也長寸一分下廣九分者長五寸廣五分向上漸濶無好足枝長四分間廣三分面文兩字類科斗書背有三道文不可識右異布舊譜曰長四寸一分上廣寸二分下廣寸五分首長六分廣寸好徑五分足枝長寸二分間廣四分重十二銖狀如貨布面文四字背文兩字不可識李孝美曰按所見古布多矣唯此一品極大而形製特與大黃布刀相似舊譜以謂狀如貨泉有所未盡右異布舊譜曰長二寸六分首廣寸六分內好無輪郭其有亦訛足間正圜面文六字背文一字不可識右異布舊譜曰長二寸四分上廣寸五分下廣寸七分首廣六分足間廣八分重八銖四傍有郭訛然亦無好面文七字縱橫不可識右異布舊譜曰長二寸四分上廣寸五分下廣寸三分首廣六分足間廣五分重八銖無好及肉郭面文六字不可識李孝美曰按此與已上二布文字舊譜皆闕右異布舊譜曰長寸八分肩廣寸下廣寸一分足間廣五分正圜無好及周郭重十二銖面文五字不可識右異布舊譜曰長寸七分肩廣寸足間廣六分有好形製與上布相類面文三字其左邊一字與中心一字亦類上布右邊及中心字而倒正不同亦有無好者右異布二品舊譜曰長短廣狹與上二布相似文字右異布張台曰長寸七分半肩廣八分足間二分有肉郭面文兩字右異布張台曰長寸六分肩廣八分首廣五分足間廣二分重六銖背面然一字面文如日下安乂字又兩畫長短不齊背文如丫傍加𥪡斜畫與上布皆于實鼎尉王鑄處見之右異布張台曰長二寸一分肩廣寸三分首廣九分足枝長六分間廣四分半重二十八銖面文四字有如二字者金邊安瓜者山下安中者兩口相重者背文一字與面文右邊向上者同形質朴厚不曽磨鑢於簡較膳部李涿處見之右異布李孝美曰按此布長短廣狹輕重與上布相類面文六字亦同但倒正相異復無背文耳洪遵曰余按此布自柄端例讀其文曰安陽之吉貨右異布李孝美曰按此布長二寸上廣寸二分下廣寸三分首長七分廣七分足間廣五分正圜背面肉好皆有周郭面文六字亦不可識右異布洪遵曰余按此布長二寸肩廣四分首廣六分半足枝長五分間廣四分半重十三銖八絫正圜背面肉好皆有周郭面文四字右異布洪遵曰余按此布長二寸二分肩廣四分半首廣八分足枝長五分半間廣如之正圜重十六銖七絫面文不可識右藕心錢舊譜曰世有此錢其形四方狀如博綦長二寸面濶三分當四稜皆上下通闕若藕挺中破狀其上有首形如稱槌鼻有孔號為藕心錢右蟻鼻錢舊譜曰此錢其形上狹下廣背平面凸起長七分下濶三分上鋭處可濶一分重十二銖面有文如刻鏤不類字世謂之蟻鼻錢右古銅片舊譜曰咸通八年兖海觀察鄭漢章奏百姓於野內掘得四千九百五十五片詔翰林驗云上有齊歸化三字按其形製及文篆外莫之覩亦古布流也外品右罽賔國錢前漢西域𫝊曰罽賔國以金銀為錢文為騎馬幕為人面張晏曰錢文面作騎馬形漫作人面目也北史西域𫝊曰罽賔國市用錢右烏弋山離國錢前漢西域𫝊曰烏弋山離國錢貨與罽賔同獨文為人頭幕為騎馬右安息國錢史記大宛𫝊曰安息國以銀為錢錢如其王面王死輒更鑄效王面焉前漢西域𫝊曰安息國以銀為錢文為王面幕為夫人面洪遵曰余按外國錢文為王面若夫人面多矣而安息國司馬史但云錢如王面班史以為面文為王幕文為夫人二史所載若此姑以司馬氏之說圖之右大月氐國錢前漢西域𫝊曰安息國以銀為錢文為王面幕為夫人面王死輒更鑄錢大月氐國錢貨與安息同右泥婆羅國錢舊唐書西戎𫝊曰泥婆羅國以銅為錢面文為人背文為馬牛不穿孔右何國錢徐氏曰以銀為之徑寸五釐不開孔面為人面背為草木狀右康國錢徐氏曰以銀為之徑九分不開孔背面皆作人面面文側背文正面文繞以連珠右拔汗國錢徐氏曰以金為之徑七分五釐無文字又一種有三旋文並不開孔右條支國錢樂史太平寰宇記曰條支國市列錢貨其錢獨文為人幕為騎馬右拂䔉國錢神宗國史曰拂䔉國厯代朝貢不至熙寧四年其王滅伊靈改撒始來貢交易為金銀錢無孔面鑿彌佛背國王名右大食國錢廣州記曰生金出大食國彼方出金最多凡諸貨易並使金錢右因墀國錢晉武帝時因墀國獻玉錢形如環洪遵曰余按此錢二書所載皆同李孝美以天夀為夀昌以環為刀環又云出拾遺記豈亥豕之訛耶右和同錢右神功錢右萬年錢右隆平錢舊譜曰日本國錢四品並徑寸重五銖其文𨽻書一曰和同開珍二曰神功開珍三曰萬年通寶四曰隆平永寶其國延厯中鑄右乾文錢國朝㑹要云太平興國九年日本國僧奝然等浮海而至云其國用銅錢文曰乾文寶右屋䭾國錢徐氏曰徑七分厚薄肉好不異中夏敦素曰字若梵書不可復識右疏勒國錢右龜茲國錢徐氏曰龜茲疏勒國即五銖也大九分一面文敦素曰按二國獨用者昔西凉張軌用之此二國地接凉境豈非張氏之遺制乎樂史太平寰宇記曰龜茲國賦稅准地徴租無田者則稅銀錢洪遵曰余按二書所載則龜茲用錢審矣徐氏五銖之說未知何據耶右吐蕃國錢敦素曰此錢徑寸重五銖肉好精巧不減中國以銅為之皆胡字不可識背文如開元錢有甲文詢于衆人謂之胡錢徐氏曰按屋䭾與此相類但挍三分之小耳張台曰按言胡錢者非了絶大抵西北諸國通曰相近有吐蕃使來即將此錢去是吐蕃錢即非止屋䭾與胡也右倭國錢贊寧𫝊載曰倭國在東海中正朔一同中夏年號天慶天厯其國用錢文曰延喜通寶右梵字錢洪遵曰余按此錢徑八分重三銖六絫銅色純赤文不可辨大抵類屋䭾吐蕃錢右契丹國天贊錢五代史四夷附録曰契丹主按巴堅即位名年曰天贊洪遵曰余按此錢徑九分重三銖六絫文曰天贊通寶右應厯錢董逌曰北朝錢文曰應厯重寶趙至忠契丹雜記曰僞穆宗德光之子改元應厯右重熙錢趙至忠契丹雜記曰聖宗卒少子宗真立改元景福一年又改重熙洪遵曰余按此錢徑九分重三銖文曰重熙通寶右清寧錢陳昉契丹須知曰契丹主洪基改元清寧洪遵曰余按此錢徑九分重三銖文曰清寧通寶右大康錢徐兢髙麗圖經曰契丹咸雍十年改大康至十年改元大安洪遵曰余按此錢有二品並徑九分重二銖四絫以大康通寶大康元寶為文右大安錢李季興東北諸蕃樞要曰契丹主天祐年號大安洪遵曰余按此錢徑八分重二銖八絫文曰大安元寶今世多有右夀昌錢李季興東北諸蕃樞要曰契丹主天祐年號夀昌洪遵曰余按此錢徑九分重二銖四絫文曰夀昌右乾統錢北遼通書曰天祚即位夀昌七年改為乾統洪遵曰余按此錢徑寸重三銖二絫文曰乾統元寶右天慶錢李季興東北諸蕃樞要云契丹主天祚年號天慶洪遵曰余按此錢徑九分重二銖四絫文曰天慶元寶自天贊錢以下九品皆契丹年號計當時所鑄考之契丹雜紀曰景宗朝置鑄錢院年額五百貫則契丹鑄錢舊矣右千秋錢李孝美曰此錢徑三分文曰千秋萬嵗今甚易得蓋常歲北使入貢人多博易得耳董逌曰遼國錢蓋近世所為右海東三錢洪遵曰余按雞林類事云髙麗所鑄有通寶重寶之文今世所見凡三種通寶錢有二篆字及真行體重寶篆文製作頗精並徑九分重三銖六絫右三韓錢孫穆雞林類事曰髙麗倣本朝鑄錢以錢交易但其國人與海賈未以為便其錢規模與中國同皆以海東通寶或海東重寶三韓通寶為記右東國錢洪遵曰余按此錢徑寸重二銖四絫文曰東國通寶輪郭渾重字畫明坦計髙麗所鑄右闍婆國梵書錢三朝國史曰闍婆國在南海中其國剪銀葉為錢博易官以粟一斛二斗博金一錢諸蕃風俗云其國以銅銀錫􅀈鍮雜鑄為錢其錢六十四箇為一兩洪遵曰余按此錢甚小而薄面背無梵書無穿孔背形微斂錢質不可辨當是雜鉛錫或銀為之其國一當五十或三十右交趾國黎字錢國朝㑹要云祕書丞朱正臣言前通判廣州竊見蕃商多往交州貿市齎黎字及砂鑞錢至州頗紊中國之法右大秦國錢後漢書西域𫝊曰大秦國一名犁韃國以金銀為錢銀錢十當金錢一隋書食貨志曰後周武時梁益之境雜用古錢交易河西諸郡或用西域金銀之錢官不禁右三佛齊國錢諸蕃風俗云在廣州正南其國用金銀銅錫合鑄為錢右佛泥國錢諸蕃風俗云在廣州東南其國用銅鍮銀雜鑄為錢右東沃沮國錢魏志東夷𫝊曰在髙句麗蓋馬大山之東右新羅國錢右髙昌國錢後周書異域𫝊曰髙昌賦稅計田輸銀錢右波斯國錢右女國錢右大月氐錢通典云大月氐國在大宛西錢貨與安息同右小月氐國錢北史西域𫝊曰小月氐國以金銀錢為貨右中天竺國錢西域記曰天竺之稱舊云身毒其貨用金錢銀錢貝珠小珠四分律曰西方錢有銅錢白鉛錫樹膠皮木金銀銖等錢形亦不同有如王面方圓長短等錢不同字亦隨時處三朝國史曰天竺國舊名身毒市易用銅錢有文漫圓徑如中國之制但空其中心不穿貫耳右于闐國錢右投和國錢唐書南蠻𫝊曰投和在真臘南銀作錢類榆莢盜鑄者截手樂史太平寰宇記曰投和國其市中所貿易皆用銀錢小如榆莢私鑄者截腕右阿耆國錢西域記曰阿耆尼國貨用金銀錢銀小銅錢右屈居勿反支國錢西域記曰屈支國貨用金銀錢小銅錢右覩貨邏國錢西域記曰覩貨邏國貨用金銀等錢模樣異諸國右梵衍那國錢西域記曰梵衍那國貨幣之用同覩貨邏國右迦畢試國錢西域記曰迦畢試國貨用金錢銀錢及小銅錢規矩模樣異於諸國右那揭羅曷國錢右健䭾邏國錢右室邏伐悉底國錢右羯若鞠闍國錢右鉢邏那伽國錢右婆羅痆女㸃反斯國錢右尼波羅國錢西域記曰尼波羅國出赤銅貨用赤銅錢右摩揭陀國錢右伊爛拏鉢代多國錢右橋薩羅國錢右摩突羅國錢右乾陀國錢右杜薄國錢樂史太平寰宇記曰杜薄國出金以金為錢右康居國錢右末祿國錢杜還經行記曰末祿國在惡梅國西南市鄽正平其估銀錢右軒渠國錢樂史太平寰宇記曰軒渠國幣貨略同三童國張騫出關志曰凡諸國幣貨多用蕉越犀象作金幣率象國王之面亦效王后之面若丈夫交易則用國王之面女人交易則用王后之面王死則更鑄右三童國錢樂史太平寰宇記曰三童國作金幣率效國王之面亦效王后之面若丈夫交易則用國王之面婦人用王后之面王死則更鑄右阿鈞康國錢後魏書西域𫝊曰阿鈞康國市用錢為貨右舍衛國錢右層檀國錢神宗國史曰層檀國交易用錢三分其齊金銅相半而銀加一分禁私鑄右裸人國錢義楚釋氏六帖云寄歸𫝊曰裸人國以藤竹器易鐡或用寶貝或用金銀錢右碎葉鐡國錢徐氏曰賔鐡作之形如兩鐶相連枚各圍寸九分聖厯中御史封思業使西域監斬叛突厥阿悉結薄露大足中還雒陽得西域諸國錢此與何國以下六品並是也右驃國錢唐書南蠻𫝊曰驃古朱波也以金銀為錢形如半月號登伽他亦曰足彈陀樊綽雲南志曰驃國用銀錢右巴氏錢右倓錢右賨錢洪遵曰余按巴氏錢以下三品皆夷人部落臣屬中國故輸租受律以其本夷人而後漢總之南蠻故係外國品後右沙州玉錢大中年河西節度使張議談進議談本吐蕃别部以沙州歸國遂以沙州為河西軍拜議談為節度使以統其部落以其本畨部故附外國品末錢通卷七
