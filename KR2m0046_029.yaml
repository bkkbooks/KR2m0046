body:
  text: 錢通卷二十九明胡我琨撰詞話二明帝東巡㤗山到滎陽有烏飛鳴乗輿上虎賁郎王吉射中之作祝辭曰烏烏啞啞引弓射洞左腋陛下壽萬年臣為二千石帝大悅賜錢百萬令亭壁悉畫烏以下俱堯山堂外紀建武中樊曄為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者率不生出獄吏人及羗胡畏之道不拾遺商旅委錢物于道旁曰以付樊父後還其物如故凉州為之語曰遊子常苦貧力子天所富寧見乳虎穴不入冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值漢桓帝時有馬子侯者為人頗癡自謂曉音律黄門樂人更相嗤誚子侯不知名陌上桑反言鳳將雛輙搖頭欣喜多賜左右錢帛無復慙色應璩新詩曰漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽為作陌上桑反言鳳將雛左右偽稱善亦復自摇頭顔延之為劉抑後軍功曹在潯陽與潛情欵後為始安郡經過潯陽日造潛飲臨去留錢二萬潛悉令送至酒家稍就取酒貴賤造之者有酒輙設潛若先醉便語客曰我醉欲眠卿且去沈烱字初明約之後仕梁為吳令宋子仙據吳興逼掌書記王僧辨購得之酬所獲者鉄錢十萬後歸陳武帝以為御史中丞代宗以庻務畢委宰相元載專政益亂國典非良金重寳趦趄左道不得出入于朝廷及常衮為相雖賄賂不行而介僻自專失于分别是時京師語曰常無分别元好錢賢者愚愚者賢李端與韓翃錢起盧綸等文詠唱和馳名都下號大厯十才子郭尚父少子曖尚代宗昇平公主賢明有才思尤喜詩人而端等十人多在曖門下每宴集賦詩公主幃而觀之端中宴詩成曰青春都尉最風流二十功成便拜侯金距闘雞過上苑玉鞭騎馬出長秋薰香荀令偏憐少傅粉何郎不解愁日暮吹簫楊柳陌路人遥指鳳凰樓主大喜命以百縑賞之錢起曰李較書誠有才此篇乃其宿搆願賦一韻正之請以起姓為韻端即裂牋而獻曰方塘似鏡草芊芊初月如鈎未上絃新開金埒教調馬舊錫銅山許鑄錢楊柳入樓吹玉笛芙蓉出水妬花鈿今朝都尉如相許願脫長𥚑學少年端翃等咸稱其妙絶曖出金馬名帛為贈韓晉公斷法師雲晏等五人聚集賭錢因有喧諍云正法何曾執貝空門不積餘財白日既能賭博通宵必醉罇罍强說天堂難到又言地獄長開並付江神收管波中便是象臺元微之先娶韋氏字蕙藂官未達而苦貧繼室河東裴氏字柔之二夫人俱有才思時彦以為嘉偶初韋蕙藂逝不勝其悲為詩悼之曰謝家最小偏憐女嫁與黔婁百事乖顧我無衣搜畫篋凂他沽酒㧞金釵野蔬充膳甘長藿落葉添薪仰古槐今日俸錢過百萬為君營奠復營齋皮日休詠螃蠏呈淛西從事云未遊滄海早知名有骨還從肉上生莫道無心畏雷電海龍王處也横行又題金錢花云隂陽為火地為爐鑄得金錢不用模謾向人前逞顔色不知還解濟貧無王元之責商于有詩云謫官無俸突無烟唯擁琴書盡日眠還有一般勝趙壹囊中猶貯御書錢黄覺嘗送客都門外㑹一道士取所携酒炙呼飲之既而舉杯摭水寫吕字覺始悟其為洞賓也與大錢七其次十又小錢三覺七十餘作詩曰床頭厯日無多子屈指明年七十三至是歲果卒范希文鎮越有户曹孫居中卒其子幼而家甚貧公助以俸錢百緡治巨舟差老衙較送歸作詩一絶戒其吏曰過闗津但以吾詩示之詩云十口相携泛巨川來時煖熱去淒然闗津若要知名姓便是孤兒寡婦船范希文鎮鄱陽日有書生獻詩甚工希文頗優禮之書生自言天下至寒餓者無在某右時盛重歐陽薦福寺碑墨本直千錢希文欲為打千本使售于京師紙墨已具一夕雷擊碎其碑時人為之語曰有客打碑來薦福無人騎鶴上揚州盧秉嘗為江南郡掾於傳舎中題詩云青衫白髪病叅軍旋糶黄粱置酒罇但得有錢留客醉也勝騎馬傍人門王荆公見而稱之力薦于朝不數年登貳卿王禹玉丞相既亡有無名子作詩嘲之云太師因被子孫煎身後無名只有錢喏喏佞翻王介甫竒竒歆殺宋昭宣舒信道有詠苔卜筭子詞曰池臺小雨乾門巷香輪少誰把青錢襯落紅滿地無人掃蘇長公既補外見事有不便者頗託事以諷御史舒亶言軾作為歌詩譏切時事陛下發錢以業貧民則曰杖藜褁飯去匆匆過眼青錢轉手空嬴得兒童好音語一年強半在城中陛下興水利則曰吳兒生長狎濤淵冐利忘生不自憐東海若知明主意應教斥滷變桑田陛下謹鹽禁則曰老翁七十自腰鎌慚愧春山笋蕨甜豈是聞韶解忘味邇來三月食無鹽乃自湖州逮繫御史臺獄詔李定等鞫之王珪復舉軾詠檜詩云根到九泉無曲處世間惟有蟄龍知陛下飛龍御天而軾欲求之地下之蟄龍非不臣而何坡曰王安石有詩天下蒼生望霖雨不知龍在此中蟠我之謂蟄正此龍耳鞫者笑而語塞葢安石猶當國也金人徙欽宗囘燕京一日行至平順州止泊驛舎時以七夕官中于驛作酒肆縱人㑹飲帝于室中窺見一老婦携數女子皆俊目艶麗或歌或舞或吹笛持酒勸客所得錢物酒食率歸老婦稍不及者婦以杖擊之少頃官遣皂衣吏賫酒飲帝老婦不知為帝也亦遣一横笛女子入室中對帝嗚咽吹不成曲帝問女子曰吾與汝為鄉人汝東京誰氏女女顧老婦稍遠乃曰我百王宫魏王女孫也先嫁欽慈太后侄孫京城既破北兵驅至此賣與豪門作婢既又遭主母詬撻轉鬻于此老婦俾在此日夕求酒錢食物若不及即箠楚隨之言訖問帝曰官人亦是東京人想亦擄來此也帝但泣下遣之去詳咏孝純詞㫖其所覩即帝所遇者也然孝純詞賦之尼雅滿席上則是女初屬尼雅滿審矣福州一農家子張生幼時父使持錢三千入山市斧柯遇村人有為逋負所迫欲自經者惻然盡以所賫贈之而親釋其縳因坐石上旁有人不相識問饑渴乎曰然指路隅竹萌令食之堅不可咀徐傾小瓢水于掌以飲之生飲水頓覺精爽非常自此絶粒忽識字能為詩頗言人未來事後祝髪為浮屠住一小院有不逞繫馬于堂上者輙病心疼或教使謝過病良已因丐師言以自警信筆示之曰衆生騎畜生両個不相爭坐的只管坐行者只管行又觀棊詩曰路從平處險人向静中忙何大圭在閩與師熟所遇乃鍾離先生也靖康中陳少陽飲于京師酒樓有倡打坐而歌者陳不之顧乃去倚欄而歌望江南音調清越陳不覺傾聽其詞曰闌干曲紅颺綉簾旌花嬾不禁纖手捻被風吹去意還驚眉黛蹙山青鏗玉板閒引歩虚聲塵世無人知此曲却騎黄鶴上瑤京露冷月華清問詞孰為之曰上清蔡真人也言訖得數錢即下樓去亟使追之已失矣林外詞翰瀟爽談論不覊飲酒無筭在上庠暇日獨遊西湖幽寂處坐小旗亭飲焉外丰姿都雅角巾鶴氅飄飄若神仙置虎皮錢篋數枚藏腰間每出其一命酒家傾之視錢計酒直酒且盡復傾一篋迨暮凡飲數斗不醉而篋中之錢若循環無窮肆中人驚異將去索筆題壁間云藥爐丹竈舊生涯白雲深處是吾家江城戀酒不歸去老却碧桃無限花明日都下喧傳某肆有神仙至飲云于國寳詞云一春常費買花錢日日醉湖邊玉驄慣識西湖路驕嘶過沽酒樓前楊東山帥番禺日長㤗黄子信調新㑹鹽塲東山以其老榜心易之嘗捃摭其簿書子信將拂衣去投以詩有云明知著脚當來誤幾欲抽身不自繇安得有錢了官債任無三徑也歸休東山得詩恨知之之晚姜堯章詩云南山仙人何所食夜夜山中煮白石世人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峰生肺肝徐淵子詩云俸餘擬辦買山錢却買端州古硯磚依舊被渠驅使在買山之事定何年後除直院劉改之答啓云以載鶴之船載書入覲之清標如此移買山之錢買硯平生之雅好可知寳祐間馬裕齋尹臨安不畏貴戚豪強庭無留訟幅王府訟民不入賃房錢民云房漏裕齋判云晴則雞卵鴨卵雨則盆滿鉢滿福王若要房錢直待光祖任滿御史陳伯大奏立士藉似道毅然行之凡應舉及免舉人州縣給厯一道親書年貌世系及所肄業于厯首執以赴舉過省叅對筆跡異同以防偽濫時人有詞云士藉令行條件分明逐一排連問子孫何習父兄何業明經詞賦右具如前最是中間娶妻某氏試問于妻何與焉鄉保舉那當著押開口論錢祖宗立法于前又何必更張萬萬千筭行闗改會限田放糴生民凋瘁膏血俱朘只有士心僅存一脉今又艱難最可憐誰作俑陳堅伯大附勢專權賈似道偶退居湖山有一蜀僧襤䄛徘徊其側賈問之曰汝為何僧對曰某詩僧也賈適見湖中有漁翁遂命賦之僧請韻賈以天字為韻僧應口對曰籃裏無魚欠酒錢酒家門外繫漁船㡬囘欲脫簑衣當又恐明朝是雨天賈喜厚贈之張叔仁詩云打硬修行三十年如今證驗作儒仙人皆屈膝甘為下公獨高聲罵向前此去好憑三寸舌再來不值一文錢趙獻之賀鄭景純啓云丹桂一枝不失舊物青錢萬選無媿古人叚子新家甚貧而世間事皆不以挂口有以錢遺之者必盡送酒家名酒曰黄嬌葢闗中人謂兒女曰阿嬌子新以酒比之故云正大中董國華以公事至把縣自知死期作書與家人及同官又作詩貽把令佐詩畢擲筆于地以扇障靣而逝其詩曰無情真主没錢僧送上城南無事人簡盡傳燈無盡錄更無公案這畨新平州王飛伯鬱以布為囊采當世名卿詩投其中李欽叔題云頴露毛錐秖自賢智如樗腹但求全迂踈差似淵才富羞澁猶無杜老錢落梅風詞天教富莫太奢無多時好天良夜看錢奴硬將心似鐵空辜負錦堂風月短歌吹細笛低聲泛古琴錢刀不相及耕種且須深長門一紙賦何處覔黄金幽居值春兄為俘虜受困辱骨露力疲食不足弟為官吏馬食粟何惜錢刀來我贖隔谷歌可憐白鼻騧相將入酒家無錢但共飲畫地作交蛇高陽樂人歌平陵東松栢桐不知何人刼義公刼義公在高堂下交錢百萬兩走馬兩走馬亦誠難顧見追吏心中惻心中惻血出漉歸告我家賣黄犢右一曲魏晉樂所奏石頭龍尾彎新亭送客渚酤酒不取錢郎能飲幾許白附鳩揚州蒲鍜環百錢兩三叢不能買將還空手攬抱儂襄陽樂當壚擅㫖酒一巵堪十千無勞蜀山鑄扶受一作授采金錢梁元帝長歌行拾遺記曰郭况者光武皇后弟也累金數億錯拾寳以餙臺榭懸明珠于四垂晝視之如星夜望之如日里語曰洛陽多錢郭氏室夜日晝星富無匹洛陽徵五隱東都别二賢雲氣浮函谷星光集潁川霸陵採樵路一作徑成都賣卜錢庾信奉和趙王隱士遼東烽火照甘泉薊北亭障接燕然水凍菖蒲未生節闗寒榆莢不成錢北周趙王招從軍行京兆謡續漢書曰李燮拜京兆詔發西園錢燮上封事遂止不發吏民愛敬乃為此謡我府君道教舉恩如春威如虎剛不吐柔不茹愛如母訓如父華陽國志曰孝桓帝時河南李盛仲和為郡守貪財重賦國人刺之曰狗吠何諠諠有吏來在門披衣出門應府記欲得錢語窮及請期吏怒反見尤旋歩顧家中家中無可與思往往鄰貸鄰人以言遺錢錢何難得令我獨憔悴蜀國剌元淑勢位卑長卿宦情寡二頃且營田三錢聊飲馬吳均詠懐久歸從事麥非留故吏錢栁栽今尚在棠隂君詎憐梁簡文帝罷丹陽郡往與吏民别人生苦多歡樂少意氣敷腴在盛年且願得志數相就牀頭恒有酤酒錢功名竹帛非我事存亡貴賤付皇天鮑昭擬行路難但願樽中九醖滿莫惜牀頭百箇錢直得一作須優游卒一歲何勞辛苦事百年同上錢鏄停置農收積場逆旅整設以通商賈右冬十月貧子語窮兒無錢可把撮耕自不得粟采彼北山葛簞瓢恒自在無用相呵喝應瑗雜詩袁安困積雪邈然不可干阮公見錢入即日棄其官陶淵明詠貧士長風隱細草深堂沒綺錢縈鬱無人贈葳㽔徒可憐沈約詠青苔人生一百年歡笑惟三五何處覔錢刀求為洛陽賈庾信對酒歌楊子雲作法言蜀賈人賫十萬錢願載于書不聽也裴均子以萬緡求韋貫之銘不屑也穆伯長作廟記亳豪士遺五百金求載名不許也南昌富人奉鈔五百求虞伯生銘不從也近世文士賈人進十金即諛墓矣偶記詩曰劉寵清名舉世傳至今遺廟在江邊近來仕路多能者也學先生揀大錢輟耕錄尹正義為澤州都督甚公平後王熊來替曲斷科罪百姓歌曰前得尹佛子後得王癩獺判事驢咬爪喚人牛嚼鉄見錢滿靣喜無鏹從頭喝常逢餓夜乂百姓不敢活朝野僉載今元宵節假即唐人賜酺之遺意也唐制百官於春月旬休選勝以樂自宰相以至員外郎凡十二筵各賜錢五千緡元宗或御花蕚樓邀其歸騎留飲盡歡此雖非三代之法亦太平之象君臣相悅之風也筆麈自知錄善過門云父母殁致敬祭祀所費百錢為一善祭祀筵宴例當殺生不殺而市買見物所費百錢為一善置義塜所費百錢為一善平治道路險阻泥淖所費百錢為一善善遣妾婢一人為十善資發所費百錢為一善白還人賣出男女不取其贖者原銀百錢為一善出財贖男女還人者同論賑濟鰥寡孤獨癱瞽窮民百錢為一善零施積至百錢為一善米麥布幣之類同上計錢數論周給宗族中人同論周給患難中人同論荒年平價糶米所讓價百錢為一善饒免債負百錢為一善利多年久彼人哀求度其難取而饒免者二百錢為一善告官官不為理不得已而饒免者非善死不能殮施與棺木所費百錢為一善刋刻大乗經律論所費百錢為一善二乗及人天因果所費二百錢為一善若受賄者非善印施流通者同論建立三寳寺院庵觀及床坐供器等所費百錢為一善施地與三寳所值百錢為一善護持常住不使費壞者同論建立諸天正神聖賢等廟宇所費二百錢為一善用葷血祭祀者非善施香燭燈油等物供三寳所費百錢為一善為君父乃至法界衆生施食一壇所費百錢為一善登壇施法者一度為三善若受賄者非善為世災難作保禳道塲所費百錢為一善若受賄者非善不義之財不取所值百錢為一善無害于義可取而不取百錢為三善處極貧地而不取百錢為三善借人財物如期而還不過時日者為一善代人完納債負百錢為一善讓地讓産所值百錢為一善勸人出財作種種功德者所出百錢為一善圖名利而募化者非善義不負財物寄託百錢為一善如還金㓜子之類拾遺還主所值百錢為一善人授爐火丹術辭不受者為三十善人受已成丹銀棄不行使者所值百錢為三善借人財物不還百錢為一過倚勢白佔人田地房屋等所值百錢為十過賤價强買百錢為一過廢壞三寳尊像所值百錢為二過廢壞諸天治世正神者同論毁壞三寳殿堂床坐諸供器等所值百錢為一過誘他人使之毁壞者同論見毁壞不諫勸為五過反助成為十過諸天正神聖賢等廟宇所值二百錢為一過葷血淫祠惑世者十過佔三寳地所值百錢為一過佔屋宇者同毁壞出世正法經典所值百錢為二過二乗人夭因果所值百錢為一過取不義之財所值百錢為一過處大富地而取者百錢為二過盜取財物百錢為一過零盜積至百錢為一過瞞官偷稅者同論威取詐取百錢為十過主事受賄而擢人官出人罪百錢為一過受賄而壞人官入人罪百錢為十過借人財物不還百錢為一過負他債願他身死為十過凡秤等小出大入所值百錢為一過募緣營修諸福事而盜用所施入已者百錢為一過寳物十錢為一過因果差移百錢為一過負財物寄託者百錢為一過輕賤五穀天物所值百錢為一過販賣屠刀魚網等物所賣值百錢為一過拾遺不還主所值百錢為一過人授爐火丹術受之為三十過行使丹銀所值百錢為三過賞錢人所習慣則安之如自然不習慣則不能無怨如河決壞民産民不怨決河以壞氏産則怨矣稗編古者國有詔命皆人主所為故漢光武時第五倫為督鑄錢掾見詔書而歎曰此聖主也一見決矣近古則不然同上郭威初出兵過道家問䇿道曰君知博乎威少無頼好蒲博以為道譏之色怫然而怒道曰凡博者錢多則多勝錢少則多敗非其不善博所以敗者勢也今合諸將之兵以攻一城較其多少勝敗可知威意大悟謀以遲久困之左編娑羅語云若想錢而錢來何故不想若愁米而米至人固當愁曉起依舊貧窮夜來徒多煩惱古今贅言世之人設樽爼㑹集賔客雖日費萬錢畧不掛意至于同胞兄弟分門析户視若秦越或因寸土尺地斗粟尺布爭訟不已是誠何心哉同上錢通卷二十九
