body:
  text: 錢通卷一明胡我琨撰正朔一統會朝以歷代之八成九式經錢贊邦用帥圜府之屬而飭鼓鑄之法乃施式于都郡而立其監設其員陳其制榜以木楔曰不用法者國有常刑凡浙豫洛閩黔粵之克充冶者寶泉有局宣課有司入其職于受藏受用之府則頒俸糈于僚寀軍旅去鉛錫贋偽民雖邪而不時而規模自宏逺矣洪武初置寶源局於應天府鑄大中通寶錢與歷代錢兼行以四百為一貫四十為一兩四文為一錢設官專管江西等行省各置貨泉局頒大中通寶大小五等錢設官鑄造令户部及各行省鑄洪武通寶錢其制凡五等當十錢重一兩當五錢重五錢當三當二重皆如其當之數小錢重一錢會典洪武初令所在湖池民舟經涉其河泊之官敢有妄取水面錢者罪不赦洪武二年令凡買賣田宅頭匹赴務投稅除正課外每契本一紙納工本銅錢四十文餘外不許多取同上洪武二年時倭冦劫掠蘇州崇明沿海皆患太倉衛守禦指揮僉事翁德帥官軍捕之遇於海門之上幫擊殺不可勝數生獲數百人得其兵器海舟奏之詔以德有功升本衛指揮副使其官挍賞綺帛白金有差戰溺死者加賜錢布米皇明從信録洪武六年禁民間私鑄銅錢凡私鑄者許作廢銅送官每斤給官錢一百九十文諸稅課內如有私錢亦為更鑄會典洪武七年十月皇太子臨大本堂召東宫贊讀及諸王伴讀凡二十五人立庭下諭之曰爾等離父母去墳墓者三年矣今冬氣向深草木搖落寧不惻然動懷土之情乎吾已為爾請於上宜各旋歸歸即遄至毋久淹為也因出內府錢分賜以為道里費識小録洪武八年令中書省造大明寶鈔取桑穰為鈔料其制方高一尺濶六寸許以青色為質外為龍文花欄橫題其額曰大明通行寶鈔內上兩旁復為篆文八字曰大明寶鈔天下通行中圖鈔貫狀十串則為一貫其下曰户部奏準印造大明寶鈔與銅錢通行使用偽造者斬告捕者賞銀二百五十兩仍給犯人財産若五百文則畫鈔為五串餘如其制而遞減之每鈔一貫折銅錢一千文銀一兩其餘以是為差其等凡六曰一貫五百文四百文三百文二百文一百文每鈔四貫易赤金一兩禁民間不得以金銀物貨交易違者治罪告發者就以其物給賞若有以金銀易鈔者聽凡商稅課錢鈔兼收錢十之三鈔十之七一百文以下則止用銅錢會典洪武八年詔造大明寶鈔時廣開錢局民間皆毁銅器輸官鼓鑄甚勞姦民復盜鑄上以宋有交會法元時亦常造交鈔及中統至元寶鈔易于流轉可以去鼓鑄之害遂詔中書省造之從信録洪武八年初上以西畨産馬其所用泉貨與中國異自更錢幣馬至者少乃命成以羅綺綾帛并巴茶往市之同上洪武十年令各布政司復設寶泉局鑄小錢與鈔兼行會典洪武十五年設殿閣大學士上曰各官係侍從近臣例無所掌印信俱於翰林院到任十八年又命殿閣大學士左右春坊大學士俱為翰林院官本院自學士下至孔目醵錢慶狀元於本院學士上坐及第三人坐前之左講讀坐前之右餘皆傍坐後月三人同答席其第一人出錢倍於第三人皆舊典也識小編洪武十九年八月上覽宋史見太宗改封樁庫為內藏庫顧謂侍臣曰人君以四海為家何有公私之别太宗宋之賢君亦復如此它如漢靈帝之西苑唐德宗之瓊林大盈庫不必深責也宋自乾德開寶以來有司計度支所缺者必藉其數以貸於內藏候課賦有餘則償之凡有司用度乃國家經費何以貸為缺而許貸貸而復償是猶為商賈者自與其家較量出入及內藏既盈乃以牙籖别有名物參驗帳籍晚年出籖示真宗曰善保此足矣貽謀如此何足為訓太宗首開私財之端及其後世困於兵革三司財帛耗竭內藏積而不發間有發緡錢幾十萬以佐軍資便以為能行其所難皆繇太宗不能善始故也從信録洪武二十二年令造小錢一十文至五十文以便民用每生銅一斤鑄一百八十折二錢八十當三錢五十四當五錢三十二當十錢一十六同上洪武二十二年上賜王弼緡錢五萬造第鳳陽鈔二千錠與葺先塋同上洪武二十三年令各司府提調正官監督官攢人等盤點在庫一應錢帛若金銀錢鈔并匹帛零假解赴京庫粗重什物及銅錫鐵器收貯備用不堪瑣碎物件當官燒毁舊破衣服給付孤老仍俱開數目稽考洪武二十三年復定錢制每小錢一文用銅二分其餘四等錢依小錢制遞增凡鈔一貫準錢一千文俱會典洪武二十四年賜長興侯耿炳文緡錢五萬造第鳳陽鈔二千錠與葺先塋黃金四錠白金四十錠鈔一千錠彩假三十表裏優老于家從信録洪武二十七年罷寶鈔行用庫錢令軍民商賈所有銅錢有司收歸官依數換鈔不許行使洪武二十七年令各處城市沒官房屋但係軍官軍人住者不許取賃錢俱會典洪武建文間文武百官俸給皆以米間有以錢鈔兼支者非其常也識小編洪武乙卯年庫錢忽飛一日南臺民家屋皆有錢竪立在瓦上家家各以竹穿其孔中貫之或得一二十文草木子凡錢法設立寶源等局鼓鑄洪武通寶銅錢與大中通寶及歷代銅錢相兼行使折二當三當五當十依數準算民間金銀米麥布帛諸物價錢並依時值聽從民便若阻滯不即行使者杖六十其軍民之家除鏡子軍器及寺觀菴院鐘磬鐃鈸外有應廢銅並聽赴官中賣每斤給價銅錢一百五十文若私相買賣及收匿在家不赴官中賣者各笞四十刑書凡私鑄銅錢者絞匠人同罪為從及知情買使者各減一等告捕者官給賞銀五十兩里長知而不首者杖一百不知者不坐若將時用銅錢剪錯薄小取銅以求利者杖一百同上凡印造寶鈔與洪武大中通寶及厯代銅錢相兼行使其民間買賣諸物及茶鹽商稅諸色課程並聽收受違者杖一百同上建文三年免民賃舍錢吾學編永樂九年令差官於浙江江西廣東福建四布政司鑄永樂通寶錢會典宣德元年公崇廉恥抑奔競别賢否示勸懲一新條教變士習諸生貧不能婚病不能醫死不能喪者節縮餐錢力為贍給督諸生讀書興寢有常燈光達旦書聲不絶恩義浹洽不啻父子吾學編宣德五年上命户部兵部議至是户部郭資兵書張本等言於緣河屯田實為便宜自鳳陽淮安以北及山東河南北直𨽻近河二百里內通舟楫處擇荒田驗丁册令官給以牛仍支官錢收買農器如此則軍民樂於用力但山東近年旱飢流民多復故業官軍亦多有差役宜先遣官往同有司按視田地以俟開墾上從之皇明從信録正統三年公又上疏言飢民流徙就食臣分遣屬吏沿河贍賑每遇過州令出米為粥分給賴存活者一百八十五萬八千五百人勸諭富有力家出米麥榖粟二十五萬七千三百石銀三千六百七十兩錢綿布半之量給被災者五十五萬七千四百七十九家缺農具種子七萬四千三百九十七家亦以官物賑給民流去撫來復業者五千五百九十三家他境流冗安輯者萬六百餘家莊毅公王竑正統四年差給事中并户部主事於各布政司會同按察司直𨽻會同巡按御史盤驗各庫贓罰凡金銀珠翠及紵絲羅假成匹堪中者起解京庫如不成匹及衣服器皿之類準折本處官員俸給其餘銅錢硫黃解工部軍器發附近衛所領用忠宣公黃福景泰元年八月初二日楊善等至敵營額森見善等至甚喜許送上皇還京有平章恩克問有何禮物來迎皇帝善曰太師仁義克順天道敬我君父故送還豈為財物乎此舉萬代瞻仰若將財物來後人説太師愛錢了額森曰都御史説的是恩克説不合理我只圖垂名後世耳皇明從信録景泰二年時帝嘗以銀豆金錢等物撒地令宫人及內侍爭拾為閧笑編修楊守陳賦銀豆謠但未達於上耳從信録景泰四年令民間將銅錢折鈔阻壞鈔法者依律究治會典天順四年令民間除假錢錫錢外凡厯代并洪武永樂宣德銅錢及折二當三依數準使不許挑揀成化元年令各處船料鈔俱錢鈔中半兼收每錢四文折鈔一貫成化元年令京城九門并都稅宣課等司及各處商稅等項課俱錢鈔中半兼收每鈔一貫折收銅錢四文俱同上成化三年令內外課程俱錢鈔中半兼收如該納一貫者止納鈔一貫不在兼收之價商稅課程船料等項鈔一體兼收銅錢該起運或支給者相兼撥付每一貫收錢四文除破碎并錫錢其餘不拘新舊盡數驗收會典成化六年令每鈔一貫折收銅錢二文成化十三年奏準私鑄銅錢為首并匠人依律論罪為從者問罪用一百斤枷枷號一箇月民匠舍餘發附近充軍旗軍調發邊衛食糧差操若販賣行使者亦枷號一箇月照常發落成化十五年令各處户口食鹽門攤等項鈔貫須錢鈔相兼收受買辦物件賞賜節錢等項亦要錢鈔相兼支放各處納户如果本地原無本色帶有輕齎來户收買聽令照時價易換成化十六年奏準各處額徵絲綿折絹户口食鹽鈔錢司府掌印官務嚴加督責各該州縣官監收本處織造絹匹堪中錢鈔責令大户領解委官管押仍先於內混取絹一匹鈔五十貫錢五十文包封印記順附公差人役送部收候比驗仍作正數送納其解到錢鈔絹匹比驗以十分為率如一分不堪者罪坐州縣三分不堪者罪坐本府五分以上不堪者罪坐布政司各經該官吏若委官大户抵換者依律問罪不堪錢鈔絹匹盡數沒官成化十六年奏準京城九門及都稅司宣課司等衙門收錢照律除破碎并偽造錫錢不使外其餘不拘年代逺近但係囫圇錢即便行使不許刁難挑揀阻滯錢法仍出榜禁約及令兩厰并巡城御史等官用心緝訪如有揀錢并偽造之人拏送法司枷號滿日究問成化十七年令京城內外軍民人等買賣交易止許行使歷代及洪武永樂宣德舊錢每錢八文折銀一分八十文折銀一錢不許將新造私錢攙和阻壞錢法如違及販賣并私造之人枷號依律照常發落有能告捕者官為給賞鄰里人等知情不舉者事發連坐仍行南北直𨽻及河南山東等布政司府行錢地方通為禁約成化初贈太保諡忠宣公秉心正大義利介然天下士大夫無論識不識皆知其為君子斥姦闢諛無所顧忌憂國忘家老而彌篤俸賜分贍姻族屬纊之日室無百緡俱同上成化時羅倫慷慨樂善遇事無所回避以犯顔敢諫為先救時行道為急於富貴利達淡如也楊文貞作相時以百官祿薄得受皂𨽻折薪錢自是遂以為例獨倫不受既辭疾歸結茅居於金牛山取給於隴畝不受餽遺日與學者講學垂十年而終皇明從信録成化間翰林陳師召所乘盲馬售錢六百文李西涯以詩諗之有斗酒杜陵堪再醉之句蓋用子美三百青銅語也時刑部李若虛舊屋為積潦所壞數年不售竟得銀四兩西涯亦諗之以詩云詞林馬價知多少即前師召事也同上𢎞治元年令河西務臨清等八處鈔關淮安揚州臨清蘇杭劉家隔正陽鎮各稅課司局與天下户口食鹽俱折收銀兩每鈔一貫折收銀三釐每錢七文折收銀一分解京庫其存留者折支官軍俸糧每銀一兩折鈔七百貫會典𢎞治元年令京城九門宣課都稅司順天等八府并山東河南二布政司户口食鹽全收鈔貫淮安臨清揚州蘇州杭州九江等板閘船料鈔關俱令鈔錢兼收送庫支用𢎞治元年公先後在國學律已率人嚴立規約兩監中故有羡金公盡籍於官均贍僚屬搆書樓東西庋諸經史刻北監廟街湫隘益市地闢其斜側又市廬舍三十餘區居博士助教諸學官諸生貧者贍給死者賻襚皆出羡金不私入一錢文肅公謝鐸𢎞治元年八月擢湖廣按察使楊繼宗為左僉都御史巡撫雲南繼宗山西陽城人為嘉興知府止帶蒼頭一人如旅寓然滿九載老幼遮道留之不忍捨去升浙江按察使憲綱振肅初蕃臬諸司所用取辦于下鎮守之官供給日費萬錢繼宗一切革去之升右僉都御史皇明從信録𢎞治元年九月何喬新題有云國初定律之時鈔重而物輕經今百有餘年鈔輕而物重要將銀每一兩銅錢每一千文各估鈔四十貫揆之時估固為有理但銀錢估鈔行之已久合仍依原估其他一應貨物委有估計失當臣等再行斟酌計議務在輕重得中另行具奏定奪皇明經濟録𢎞治年馬文升題禆益治道有云皇上嗣登寶位賞賚未周而內藏已蕭然矣乞敕户部如何措置使之充盈或造鈔貫或鑄銅錢凡理財之方足國之計無擾於民有益於國者宜從計處具奏定奪同上𢎞治六年令各關照近時則例每鈔一貫折銀三釐每錢七文折銀一分會典𢎞治七年議準今後九江府鈔厰兊收銅錢只折收銀兩𢎞治十三年奏準在京在外稅課司局批驗茶引所但一應稅納錢鈔去處著令客商人等自納若權豪無藉之徒結黨把持攔截生事及將爛鈔低錢搪塞攪擾商稅者問罪枷號三箇月發落同上𢎞治十七年四月章懋疏有云本年五月內據應天府都稅司連申自願折納肉價銅錢行據各班堂長呈稱若如所申委的兩便隨呈南京定奪查得國子監通志每人每日乾魚二兩而本監案卷數十年間止是三日二兩又查得北監有給錢鈔事例亦係折納合從每日二兩之例分給乞酌量中價止令折納此事雖小實亦積弊之不容坐視者也皇明經濟録𢎞治十八年四月初七日臣東陽病起上召至暖閣袖出數十指一本云太常寺欠行户錢鈔昨有旨查洪武等錢緣何市不通使户部查覆未明仍須别為處置務使通行臣健等皆對曰此須自朝廷行起如賞賜折俸之類在下如鹽鈔船鈔亦用舊錢乃可通行且民間私鑄低錢聽其行用本朝通寶乃不得行誠非道理臣遷對曰昨令查正欲通行但私錢不禁則官錢決不能行前年鑄𢎞治錢曾禁私錢不二三日即濫使如故上曰何故如此皆對曰只是有司奉行不至上曰今須嚴禁臣東陽奏曰臣等訪得今所鑄錢徒費工料得不償失亦是有司不肯盡心若止如此雖鑄何益臣遷曰昨令查己未鑄造數目亦是此意上曰然臣健等因奏曰今國帑不充府縣無蓄邊儲空乏行價不償正公私困竭之時鑄錢一事最為緊要其餘者屯田茶馬皆理財之事不可不講也同上𢎞治十八年令兩京內府司鑰等庫及南北直𨽻府州并十三布政司查盤洪武永樂宣德等錢并鑄完𢎞治通寶發與太常寺等衙門買辦等項支領及折與軍衛有司衙門官吏旗軍準作俸糧并柴薪皂𨽻等項之數不許留難刁蹬致誤街市行使仍行內外問刑衙門及稅課司等衙門照例一半收厯代舊錢一半收洪武等錢如無洪武等錢者折舊錢二文以示懲罰在內緝事衙門并巡城御史兵馬司在外巡按官務要嚴加訪察有擅自阻當及私自鑄造并知情買使者照律例施行會典𢎞治年倪嶽陳言有云南京馬快船專備裝載官物之用近年以來差使浩繁駕船夫户艱苦不可名狀如南京例該運黑沙洲蘆柴就𣲖水夫各自砍裝交柴之際索取每柴一束錢一文柴滿千萬則錢亦滿千萬錢不敷者多方刁難人夫逃竄船隻廢壞職此之繇皇明經濟録正德五年題準將新鑄鉛錫薄小低錢倒換皮棍等項各色盡革將洪武永樂洪熙宣德𢎞治通寶及歷代真正大樣舊錢相兼行使會典正德七年令正陽門等七門門官凡日收大小車輛驢騾駝馱錢鈔眼同户部官吏監生照依則例收受即時附簿錢鈔簿籍俱封貯庫不許縱容門軍家人伴當出城羅織商客阻截車輛索取小門茶果起籌等項銅錢正德七年令職官折色俸給以十分為率一分折錢九分關銀及在京九門稅課在外各鈔關并官府買辦估價里中收受錢糧俱收舊鈔與國朝銅錢相兼使用正德年劉大夏疏有云給事中張𢎞至指揮羅永高夀各開欵建言門官不分班次一槩科擾直軍要行定與班次免致混擾本部逐欵議得各門因是近年定與網巾銅錢以致百計需索至有菜疏錢掃帚錢上樓等錢然始猶止於該直官員以後一槩混擾訪得午門等門每三日一直用錢一萬四千五百餘文東華等門每三日一直用錢一萬九百餘文玄武等門每三日一直用錢一萬二千一百餘文東華西華玄武等門又有出車使用比之前門濫取尤多致令軍士月糧直米俱不得用妻子凍餓各官欲令分班意正在此開欵題奉孝宗皇帝聖旨這事件著各該衙門查奏定奪皇明經濟録又李承勳疏有云竊惟皇城內外禁守衛之設非止肅儀衛以壯國威實以嚴關防以消姦宄近來廢弛似為殊甚臣每一巡點一門一鋪官軍見其見在者身無完衣逃亡者每為過半詢察緣由或因網巾錢少不敢過班或以拖欠班錢借貸不到前畨點視如此後畨來點亦然雖其量為責治其弊仍前備求其故蓋因守門人員數多每軍過班三日即退銅錢百文作為網巾之名此外又有聽事掃帚擡桶等錢科索多端軍士辦納不前只得扣除直米兊賣月糧甚至借貸箠楚誅求殆無寧日前項軍士皆無恆産多係傭工手藝為生縱無家口之養歇役三日豈能辦此錢數日朘月削以至貧窮到骨繼以逃亡致使守衛日弛門禁不嚴若不密為計處將來之弊有不可言者矣嘉靖三年令户部出給榜文曉諭京城內外買賣人等今後只用好錢每銀一錢七十文低錢每銀一錢一百四十文著緝事衙門及五城御史緝訪違犯之人發人煙處枷號示衆嘉靖四年令宣課分司收稅每鈔一貫折銀三釐每錢七文折銀一分查照應納課程收送內承運庫以備光祿寺等衙門買辦應用嘉靖六年又議準各監局官吏今後解到錢鈔準兼收洪武永樂等錢遇光祿寺買辦物料行令順天府各鋪行所屬州縣衙門將一應起運户口鹽糧并船料商稅門攤等項兼收洪武永樂宣德𢎞治銅錢進納民間交易一體遵行敢有把持行市不遵行使者以違例罪名枷號示衆俱會典嘉靖六年奏準鑄造嘉靖通寶一千八百八十三萬四百文南京寶源局鑄造二千二百六十六萬八百文每文重一錢三分嘉靖六年五月京師雨錢皇明從信録嘉靖六年秋命議鹽法錢法户部尚書鄒文盛因條鹽法五事曰禁私鹽曰禁占窩曰禁奏討曰明限制曰添刷引錢法二事曰遵錢制曰禁私販上納之同上嘉靖九年五月帝覽羣議曰分祀良是乃建四郊一時營創工值浩繁大司農金錢皆匱嘉靖十二年冬市人劉東山者素陰狡與黨陳大紳偽為疏恫愒鶴齡得且萬金猶時時有所需或不酬乃誣延齡怨望咒詛盜大內金錢通慈慶侍人以變告帝大怒逮詔獄永陵信史嘉靖十四年又題準寶源吉慶二店并福德等五店錢鈔俱中半折銀每鈔一千貫折銀四錢每錢二千文折銀二兩八錢六分每二十兩傾成一錠內寶源吉慶二店按季解部聽候年終類進福德等五店按季解府聽候取用及太常寺光祿寺支用嘉靖十九年題準量發制錢數百萬文給大同鎮官軍折俸嘉靖二十年冬本兵議遣大臣總督薊遼帝特命以胡守中為兵部侍郎及至鎮乾沒帑財伐塞上古松數萬株謂便于哨探而邉騎長驅遂無扞蔽復索富商宿將金錢巡按洪源劾之亦不報至是諸臺諫連疏入帝怒命收訊之永陵信史嘉靖二十三年題準揚州淮安府杭州三處鈔關將船料銀一萬二千兩解送南京工部幫助鑄造制錢嘉靖二十八年議準軍民交易洪武永樂宣德𢎞治嘉靖制錢并歷代銅錢相兼行使敢有私鑄鉛錫假錢并客商解人販賣解納者照例問發嘉靖三十二年議準洪武通寶有當十當五當三當二之制見今堪用者復有一錢七十文一錢一百四十文一錢二百一十文三等任從民便相兼行使嘉靖四十一年題準崇文門宣課分司商稅照舊折收銀兩自本年冬季為始照例每鈔一貫折銀三釐每錢七文折銀一分俱會典嘉靖四十四年五月户部歲發鹽課二萬兩於雲南鼓鑄嘉靖通寶既而錢法阻滯公私交病巡按御史言鑄錢不行繇蓄積未通也而利少費多且行錢準銀不宜泥以定數而收稅折俸皆利於銀宜止勿鑄從之皇明經濟録嘉靖間又令曉諭京城內外行户人等今後除私鑄新破鉛鐵等項首官易買不用外但係囫圇中樣舊錢每一百四十文準銀一錢與洪武永樂等錢隨便行使嘉靖間又令曉諭京城內外商賈及鋪行人等但有收積新錢限一月內盡數赴府縣并各城兵馬司出首具呈户部照銅價給與價銀免其私販之罪例後敢有隱藏不出首者事發比照私鑄銅錢為從者例問罪枷號發遣其大小鋪行仍前盜買販賣一體究治收過新錢即與銷化貯庫聽鑄造大明通寶取用嘉靖又令工部查照永樂宣德年間事例差官於直𨽻并河南閩廣鑄造嘉靖通寶解京貯內府司鑰庫給軍折俸并給光祿寺買辦物料每錢七百文準銀一兩嘉靖間又題準錢法行使悉依歷代年號隨錢高下咸得通行但有銷鎔舊錢及今鑄錢造作銅像銅器等項者比盜鑄律科斷四十三年以私鑄盛行錢法阻滯令內外各衙門嚴加訪治寶源局匠役人等侵料減工致輕小濫惡不堪行使者該部拏送法司從重問罪以後該局鑄造暫行停止户部每年將南京雲南及稅課司解收好錢一千萬文送部轉送司鑰庫以備賞賜之用嘉靖間茶法奏狀今後園户賣茶及茶商興販茶貨告給引繇與夫批驗納課等項務要俱遵引繇條例數內惟買引一事免其納錢嘉靖年茶法奏狀一茶引繇內茶引一道納銅錢一千文照茶一百斤茶繇一道納銅錢六百文照茶六十斤見行事例每引繇一道納鈔一貫中夾紙一張嘉靖年梁材鈔關議令各該鈔關委官主事將經過軍民船隻應納錢鈔自嘉靖八年十一月初一日為始照例每鈔一貫折銀五釐每錢七文折銀一分皇明經濟録嘉靖甲申三月僉事林希元上荒政叢言言救荒有二難曰得人難審户難有三便曰極貧民便賑米次貧民便賑錢稍貧民便賑貸有六急曰垂死貧民急饘粥疾病貧民急醫藥病起貧民急湯米既死貧民急墓瘞遺棄小兒急收養輕重繫囚急寬恤有三權曰借官錢以糶糴興工作以助賑貸牛種以通變從信録隆慶元年令買賣貨物值銀一錢以上者銀錢兼使一錢以下者止許用錢國朝制錢及先代舊錢每八文折銀一分不許任意低昂其崇文門稅錢并太倉收貯南京解錢給與在京各衙門官吏為折俸之用以後按季銀錢兼支崇文門課鈔除該銀三兩以上者收銀其三兩以下者及九門各城房號行户俱令收錢行使隆慶二十年六月山西巡撫靳學顔理財疏云大行鑄錢之法以通融於五榖之外重積貯之令以盈虛於豐歉之門昭陵信史隆慶三年令南京刑部通行各該問刑衙門以後如遇抄沒贓物內除違禁細軟等件遵例解京并歲額錢鈔仍照舊外其餘一應粗重贓物并贖罪銅錢徑解南京户部貯庫會官估計酌量支放明立文卷照刷其見在貯庫贓物盡數查出會估酌處支銷隆慶四年令以新鑄隆慶通寶送户部發太倉庫量放京官折俸會典萬厯四年題準通行天下開鑄制錢與本地方舊錢相兼行使著各撫按官設法經理務在便民毋致勞擾同上萬厯四年題準行雲南布政司督令所屬開局鑄錢遵照新制萬厯通寶與國朝制錢相兼行使以佐海􅚔之用臨清本色鈔一千二百六十萬餘貫錢二千五百二十萬餘文折色船料商稅正餘銀八萬三千八百餘兩許墅本色鈔五百八十六萬餘貫錢一千一百七十三萬餘文折色船料正餘銀三萬九千九百餘兩九江本色鈔二百九十三萬餘貫錢六百八十九萬餘文折色船料正餘銀一萬五千餘兩杭州本色鈔一百九十萬餘貫錢三百八十一萬餘文折色船料商稅正餘銀三萬六千八百餘兩淮安本色鈔三百萬餘貫錢六百萬餘文折色船料正餘銀二萬二千七百餘兩揚州本色鈔一百六十九萬餘貫錢三百三十八萬餘文折色船料正餘銀一萬二千九百餘兩萬厯五年令崇文門收稅除二兩以下者盡數收錢二兩以上者亦銀錢中半上納京城各門稅課五城兵馬司房號等項盡數收錢其文武官員支俸照例銀錢關給外餘各項商人應領料價量擬銀八分錢二分并行支給萬厯六年覆準將嘉靖隆慶萬厯制錢遵照前奉欽依每金背八文準銀一分火漆鏇邉各十文準銀一分洪武等項與前代舊錢各十二文準銀一分相兼行使萬厯六年常州府鈔三萬四千九百八十一貫九百五十五文銅錢六萬九千九百六十四文解南京户部萬厯六年課鈔順天府九門并都稅等司門攤課鈔六十六萬五千一百二十貫銅錢二百四十三萬二千八百五十文崇文門宣課分司商稅大約銀共一萬九千八百一十六兩銅錢一千八百八十七萬七千七百文條稅大約銀一萬五千九百九十六兩船稅銀四千五百一十五兩通州張家灣宣課司商稅大約銀三千零九兩銅錢二百八十八萬七千七百六十文麴一十五萬二千八百斤條稅銀一百五十五兩六錢船稅銀二十二兩七錢常州府稅課等鈔二十四萬二千八百六十六貫八百七十一文銅錢四十八萬五千七百三十九文滁州稅課等鈔五萬三千九百五十六貫三百一十文銅錢五萬三千九百五十八文萬厯七年四月詔停鑄時上方以賞賚缺資命主計鑄大錢進用京師小民多積嘉靖錢訛言止行萬厯新錢不行舊錢人情甚以為不便且取外府之儲以充內庫失舊制矣閣臣力請停鑄上命罷之皇明從信録萬厯八年題準雲南地方既不用錢不必鑄造其在庫錢著貴州差人于該省搬取以充兵餉之用萬厯十年詔各處開局鑄錢地方暫行停止如錢法疏通願仍前鼓鑄者聽從其便俱會典萬厯間又令崇文門稅銀自三兩以下盡數收錢三兩以上銀錢中半兼收萬厯辛亥閣臣疏云竊惟遼東積弱之後有此一捷稍覺生氣而現在之窺伺報復勢正熾盛甚可為慮則夫捐一二萬之金錢以激勸吏士使之感恩用命相率而死敵此亦機之必不容緩者也萬厯時孫一謙溫麻人己丑間為南都官司獄能不以獄為利于囚甚有恩故事重囚米日一升率為獄卒盜去飯以不給又散時強弱不均至有不得食者即訟繫囚初入獄獄卒驅之濕穢地索錢不得錢不與燥地不通飲食而官因以為市一謙知之一切嚴禁手創一稱稱米計飯日以卯巳時持稱按籍以次分給食甚均又時時見囚衣弊為浣濯補葺令完善視輕繫之尤餓者豫囚飯之半囚得不死獄卒無敢橫索一錢者三司獄傳萬厯乙卯戚繼光鎮薊所駐三屯置庫隘稍拓之并及文武廟梵宫道院南山有碧霞景忠諸壇望之縹眇若在雲端有香錢簿取佐軍資公不入一錢皆以飭材具有東湖因濠為險導以資灌溉護以柳堤有魚蝦菱茭之利荷亭采鷁可供遊賞小品錢通卷一
