body:
  text: 錢通卷十二明胡我琨撰經術桓公問管子楚之強國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即為百里之城使人載錢二千萬求鹿於楚人楚人釋其農而田鹿管子告楚人賈曰為致生鹿賜子金百斤什至金千斤管子秦始皇三十七年東遊丹陽至錢塘臨浙江錢塘屬會稽郡西部都尉治防海大塘在縣東一里符郡議曹華信家議立此塘以防海水始開募有能致一斛土者即與錢一千旬月之間來者雲集塘未成而不復取于是載土石皆棄而去塘以之成故改名錢塘焉府志汴州相國寺言佛有汗流節度使劉元佐遽命駕自持金帛以施日中其妻亦至明日復起齋場繇是將吏商賈奔走道路惟恐輸貸不及因令官為簿書以籍所入十日乃閉寺曰佛汗止矣得錢巨萬以贍軍資國史補南俗尚鬼狄武襄出征儂智髙時大兵始出桂管因祝曰勝負無以為據乃取百錢自持之且與神約果大捷則投此期盡錢面左右諫止儻不如意恐沮師武襄不聽萬衆方聳視己而揮手倐一擲則百錢盡紅矣于是舉軍歡呼聲震林野武襄亦大喜顧左右取百釘來即隨錢疏密布地而釘帖之加諸沙籠覆手自封焉伺凱旋當謝神取錢其後砍崑崙關敗智髙平雍管及師還如言取錢與幕府士大夫共視之乃兩面錢也李允則守雄州胸奴不敢南牧朝廷無北顧之憂一日出官庫錢千緡復斂民間錢起浮圖即時飛謗至京師至于監司亦屢有旨削籍真宗悉封付允則然攻者尚喧沸真宗遣中人密諭之允則謂使者曰某非留心釋氏實為邊地起望樓耳蓋是時北鄙方議寢兵罷斥堠允則不欲顯為其備然後謗毁不入畢其所為國老談苑韓琦言三代漢唐以來皆籍民為兵唐置府兵最為近古今之義勇河北幾十五萬河東幾八萬勇悍純實若稍加簡練亦唐之府兵也河東北陜西三路當西北控御之地事當一體今若于陜西諸州刺手背以為義勇甚便乃命徐億等往籍陜西主户三丁之一刺之凡十五萬六千餘人人賜錢二千民情驚擾而紀律疏略不可用知諫院司馬光上疏力諫不聽會編張循王之兄保嘗怨循王不相援引循王曰今以錢十萬緡卒五千付兄要使錢與人流轉不息兄能之乎保默然久之曰不能循王曰宜弟之不敢輕相援引也王嘗春日遊後圃見一老卒卧日中王蹴之曰何慵眠如是卒起聲喏對曰無事可做只得慵眠王曰汝會做甚事對曰諸事薄曉如回易之類亦粗能之王曰汝能回易吾以萬緡付汝何如對曰不足為也王曰付汝五萬對曰亦不足為也王曰汝需幾何對曰不能百萬亦五十萬乃可耳王壯之豫五十萬恣其所為其人乃造巨艦極其華麗市美女能歌舞者樂者百餘人廣收綾錦奇玩珍羞佳果及黃白之器募紫衣吏軒昂間雅若書司客將者十餘輩卒徒百人樂飲逾月忽飄然浮海去逾嵗而歸珠犀香藥之外且得駿馬獲利幾十倍時諸將皆缺馬惟循王得此馬軍容獨壯大喜問其何以致此曰到海外諸國稱大客回易使謁戎王餽以綾錦奇玩為招其貴近珍羞畢陳女樂迭奏其君臣大悅以名馬易美女且為治舟載馬以犀珠香藥易綾錦等物餽遺甚厚是以獲利如此王咨嗟褒賞賜豫優厚問能再往乎對曰此戲也再往則敗矣願仍為退卒老園中鶴林玉露林勳賀州人紹興中登進士第嘗進本政書欲漸復三代井田之法一同之地提封萬井實為九萬頃三分去二為城郭市井官府道路山林川澤與夫磽崅不毛之地定其可耕與為民居者三千四百井實為三萬六百頃一頃之田二夫耕之夫田五十畝餘夫亦如之總二夫之田則為百畝百畝之收平嵗為米五十石上熟之嵗為米百石二夫以之養數口之家蓋裕如矣總八頃之稅為米十有六石錢三貫二百文此之謂什一井復一夫之稅以其人為農正掌勸督耕耨賦稅之事但收十有五夫之稅總計三千四百井之稅為米五萬一千石為錢一萬二千貫會編司南州寶冶之饒佐縣官圜府之用宣勞于外興利在公葛源制請自今以後朝廷酌為中制定為市馬之價公私交易皆不許過二十緡違者馬與價俱入官牙行之人坐以違制罪説者若謂大屨小屨同價孰肯為其大者臣竊謂馬之良乃天所生人力不與焉官府既為定價則民間有馬者不過求多直而皆市之官矣若夫馬之倒死不責之償則彼蔑視其馬而死者愈多若責之償則士卒貧窘何繇得錢臣愚以為待其死而責其償不若先其生而為之備會編商英為政持平改京所鑄當十大錢為當三以平貨泉復轉般倉以罷直達行鹽鈔法以通商旅蠲橫斂以寬民力勸帝節華侈息土木抑僥幸帝頗憚之會編故相晉國公王鐸為丞郎時李駢判度支每年江淮運米至京水陸腳錢斗計七百京國米價每斗四十議欲令江淮不運米但每斗納錢七百鐸曰非計也若于京國糴米必耗京國之食若運米關中自江淮至京兼濟無限貧民也時糴米之制業已行竟無敢沮其議者都下官糴米果大貴未經旬而度支請罷于是乃服鐸之察事矣鐸卒以此大用聞奇録劉允章為國子祭酒建言羣臣輸光學錢修治庠序宰相五萬節度使四萬刺史一萬詔可之山堂肆考唐僖宗乾符中崔安潛為西川節度使到官不詰盜乃出庫錢千五百緡分置三市榜其上曰能告捕一盜賞錢五百緡同侣告捕釋其罪賞同凡人未幾有捕盜至者盜謂之曰汝與我同為盜十七年贓皆平分汝安能捕我我與汝同死耳安潛曰汝既知吾有榜何不捕彼以來則彼應死汝受賞矣既為彼所先死復何辭立命給告者錢斬盜於市於是諸盜益相疑無地容足散逃他境同上喻汝礪以元豐間知閬中縣時青苗法行提舉司斂還錢取粟會支軍糧督趣甚急汝礪以其錢糴糧易鈔而中竟不煩民云四川名勝志凡發府兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉以下皆行不盡則果毅行少則别將行當給馬者官豫其直市之每匹豫錢二萬五千刺史折衝果毅嵗閲不任戰事者鬻之以其錢更市不足則一府共足之唐兵制然州有或衝或僻民之勞逸不均請立為畫一之法亦據此册通以一布政司之民丁計算不分有無役占但見一丁出錢一文或二三文多不過五文通收在官隨其縣分劇易道路逺近定為雇錢則例衝要縣分所收之錢留縣應用有所不足申文關領其迂僻去處量留足用之外具數報官年終類送上司以憑均敷其兩京之間運河之例州縣人民尤為勞苦若本司不足或通行他司有所餘者用以補之初錢引兩料同行才二百五十萬有奇至是添引至四千一百九十餘萬人亦不厭其多價亦不削宣司獲偽引三十萬盜五十人張浚欲從有司議當以死趙開白浚曰相君誤矣使引偽加宣撫使印其上即為真黥其徒使治幣是相君一日獲三十萬之錢而起五十人之死也浚稱善趙開傳臣竊見前日山外之戰諸將多亡殁所部兵衆故不可一槩問罪今不立法制則各務生全豈復以主將亡殁為意若人數不多則軍法可必行請陜西河東諸路部管許置親兵百五十人鈐轄百人招討都監等七十人月加給錢二百其出師臨敵主將亡殁者並斬韓琦請置親兵右編陸贄曰今淮南諸州米每斗當錢一百五十文從淮南轉運至東渭橋每斗船腳又約錢二百文計運米一斗總當錢三百五十文其米既糙且陳尤為京邑所賤今據市司月估每斗只糶得錢三十七文而已耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣右編汲黯隱于田園居數年會更五銖錢民多盜鑄錢楚地尤甚上以為淮陽楚地之郊乃召拜黯為淮陽太守左編創守裴明禮河東人善于理生收人間所棄物積而鬻之以此家産巨萬又於金光門外市不毛地多瓦礫非善價者乃于地際竪標懸以筐中者輒酬以錢十百僅一二中未洽浹地中瓦礫盡矣乃舍諸牧羊者糞既積預聚雜果核具犁牛以耕之嵗餘滋茂連車而鬻所收復致巨萬乃繕甲第周院置蜂房以營蜜廣裁蜀葵雜花果蜂採花逸而蜜豐矣營生之妙觸類多奇不可勝數貞觀中纍遷太常卿御史臺記扶風竇乂年十三諸姑纍朝國戚其伯工部尚書於嘉會坊有廟院張敬立任安州歸安州土出絲履敬立齎十數輛散諸甥姪咸競取之乂獨不取俄而所剩之一輛又稍大乂再拜而受遂于市鬻之得錢半斤密貯之潛于煆爐作二枝小􅓩利其刃五月初長安盛飛榆策乂掃聚得斛餘遂往詣伯所借廟院習業伯父從之乂夜則潛寄褒義寺法安上人院止晝則往廟中以二插開隙地廣五寸深五寸共四十五條皆長二十餘步汲水漬之布榆策于其中尋遇夏雨盡皆滋長比及秋森然已及尺餘千萬餘株矣及明年已長三尺餘乂遂持斧伐其駢者相去過三寸又選其條枝稠直者悉留之所砍下者作圍束之得百餘束遇秋隂霖每束鬻值十餘錢又明年汲水於舊榆溝中至秋榆已有大者如雞卵更選其稠直者以斧去之又得二百餘束此時鬻利數倍矣後五年遂取大者作屋椽僅千餘莖鬻之得三四萬餘錢其端大之材在廟者不啻千餘皆堪作車乘之用此時生涯已有百餘遂買蜀青麻布顧人作小袋子又買內鄉新麻鞋數百輛不離廟中長安諸坊小兒及金吾家小兒等日給餅三枚錢十五文付與袋子一口至冬拾槐子實其內納焉月餘槐子已積兩車矣又令小兒拾破麻鞋每三輛以新麻鞋一輛換之逺近知之送破麻鞋者雲集數日獲千餘輛然後鬻榆材中車輪者此時又得百餘千雇日傭人于宗賢西門水澗洗其破麻鞋曝乾貯廟院中又坊門外買諸堆棄碎瓦子令工人于流水澗洗其泥滓車載積於廟中然後置石觜碓五具銼碓三具西市買油靛數石雇庖人執㸑廣召日傭人令銼其破麻鞋粉其碎瓦以疏布篩之合槐子油靛今役人夜日加功爛搗從臼中熟出命工人併手團握例長三尺已下圓得三寸垜之得萬餘條號為法燭建中初六月京城大雨巷無車輪乂乃取此法燭鬻之每條百文將燃炊㸑與薪功倍又獲無窮之利先是西市稱行之南有十餘畝坳下潛汙之地目曰小海池為旗亭之內衆穢所聚乂遂求買之其主不測乂酬錢三萬既獲之于其中立標懸幡子繞池設六七鋪制造煎餅及糰子召小兒擲瓦礫擊其幡標中者以煎餅糰子啖不逾月兩街小兒競往所擲瓦已滿池矣遂經度造店二十間當其要害日獲利數千店今存焉號為竇家店乾􅍧子魏徵元孫稠貧甚以故第質錢于人平盧節度使李師道請以財贖出之白居易奏言事關激勸宜出朝廷師道何人敢掠斯美望敕有司以官錢贖還之上乃出內庫二千緡贖以賜稠仍禁質賣會編韓國夫人鄭歐陽文忠公修母也為贈崇國公妻崇公舉進士厯泗綿二州推官卒生修甫四嵗貧自力于衣食用朂修于學授之書嘗大雪夜以荻撥地爐寒灰畫字教之書居易泣告修曰而父為吏廉而好施與俸入雖薄嘗不使有餘曰母以是為我纍故其亡也無一錢之積一壠之植以庇而為生吾何恃而能守耶左編神宗臨御之初詔立嵗輸內藏錢帛之額視慶厯上供為數嘗謂輔臣曰太宗時內藏財庫每千計用一牙錢記之凡名物不同所用錢色亦異他人莫能曉匣而置之御閣以參驗帳籍中定數晚年出其錢示真宗曰善保此足矣同上獻納唐主奉表稱唐國主請獻江北四州嵗輸貢物數十萬于是江北悉平得州十四縣六十世宗賜唐主書諭以今當罷兵不必傳位賜錢𢎞俶高保融犒軍帛有差唐主獻銀絹錢茶穀共百萬以犒軍會編陳少遊將兵討李希烈屯盱眙聞朱泚作亂歸廣陵修塹壘繕甲兵韓滉閉關梁禁馬牛出境築石頭城穿井近百所繕館第數十修塢壁起建業抵京峴樓堞相屬以備車駕渡江且自固也鹽鐵使包佶有錢帛八百萬將輸京師少遊悉奪之時南方藩鎮閉境自守惟曹王臯數遣使間道貢獻國朝會要曰大中祥符九年十一月大食國以金錢銀錢各千文入貢因墀國在西域之北晉武帝時獻玉錢千緡其形如環環重十兩上有天壽永吉之字拾遺記北齊文宣帝天保元年正月即位十月廣宗郡獻瑞錢文曰歸于聖帝三國典略張台曰大中十有一年河西節度使張議談進玉錢一枚時不宣下其文字輕重世莫得而聞也舊譜唐大厯中上生日諸道節度使獻金帛器服珍玩駿馬為壽共直緡錢二十四萬常衮上言節度使非能男耕女織必取之于人斂怨求媚不可長也請却之上不聽同上王曦以同平章余廷英為泉州刺史廷英掠人女子事覺曦以屬吏廷英獻買宴錢萬緡曦悅明日召見謂曰宴已買矣皇后貢物安在廷英復獻錢于李后后乃遣歸泉州自是諸州皆别貢后物未幾復召廷英為相宋史蔡京當國始求羡財以供侈費于是以其姻家胡師文為發運使以糴本數百萬緡充貢入為户部侍郎自是繼者效尤時有進獻而本錢竭矣本竭則不能增糴儲積空而輸般之法壞矣同上梁子美初為河北轉運使傾漕計以奉上至損緡錢三百萬市北珠以進繇是諸路漕臣效尤爭進羡餘矣北珠出于女真子美市于遼遼嗜其利虐女真捕海東青以求珠女真深怨之而子美用是顯令狐楚為山陵使不給工人傭直收其錢十五萬為羡餘以獻怨訴盈路故罷之通監韓滉封鄭國二年更封晉是嵗入朝獻羡錢五百餘萬緡詔加度支諸道轉運鹽鐵等使彚苑廢王悰即位以黃金一鎰命近侍逺文昌鑄為臣錢文昌意有所求讖且懼不就乃宿謀于匠者别鑄一以為備翌日以所授鑄之廢王臨視果不就因潛以宿鑄者獻之吳越備史左右軍中尉各獻錢萬緡自淮西用兵以來度支鹽鐵使及四方爭進奉謂之助軍賊平又進賀禮助賞上加號又進賀禮會編唐憲宗元和中宣武節度使韓𢎞入朝上待之甚厚𢎞獻馬三千絹五千雜繒三萬金銀器一千而汴之庫廄尚有錢百餘萬緡絹百餘萬匹馬七千匹糧三百萬斛山堂肆考宋太宗朝賈黃中知升州一日按行府庫見扃鑰甚嚴發之得寶貨數千櫝皆李氏宮闈之物不𨽻于籍黃中悉表上之太宗歎曰府庫之物有籍貪黷者尚冒禁取之况此亡國之餘物乎賜錢二百萬以旌其潔升州即今江寧縣同上以兵部侍郎進同平章事交廣雍南兵舊取嶺北五道米往餉之船多敗沒畋請以嶺南鹽鐡委廣州節度使韋荷嵗煮海取鹽直四十萬緡市虔吉米以贍安南罷荆洪等漕役軍食遂饒後以王師甫為嶺南供軍副使師甫請兼總兵而嵗加獻錢二十萬緡畋曰荷且有功而師甫以利啖朝廷謀奪其兵不可罷之鄭畋傳初興元後國用大屈封物皆三損二舊制堂封嵗三千六百縑後才千二百至是帝使還舊封于是李晟馬燧渾瑊各食實封悉讓送李泌泌不納時方鎮私獻于帝歲凡五十萬緡其後稍損至三十萬帝以用度乏問泌泌請天下供錢嵗百萬給宫中勸不受私獻便宜晉公為三司使真宗問曰朕東封糧草得備否晉公曰有備真宗又曰如何是備晉公曰隨駕兵士大約不過十萬人每日請口食米二升半一日只給支米二千五百石或遇駐蹕處所不過三日只支得米七千五百石何處州縣無七千五百石斛斗又問只與二升半米亦須與他些麵食曰臣欲省司行文告示沿路所經州軍必恐有公用錢州軍及應文武臣僚州縣官僧道百姓有進蒸糊者仰先具州縣官位姓名蒸糊數目申來待憑進呈破係省錢支與一倍價錢回賜仍大駕往東封日進蒸糊回日並許進酒肉又問曰或遇泥雨非次支賜鞋轎錢動要五七萬貫如何有備晉公曰臣亦已有擘畫伏緣隨駕兵士各是披帶稍重到處若遇有支賜錢物如何將行臣欲先令殿前指揮使曹璨問當六軍或遇路中有非次支賜置隨駕便錢一司仍各與頭子支便于兵士住營處或指定州軍便支與各人骨肉請領一則便于兵士請領二則兵士隨駕骨肉在營得便到支錢物因兹甚安人心尋曹璨問諸六軍皆曰隨駕請得何用兼難以將行若聖恩如此皆感戴官家真宗聞甚喜丁晉公偶談先是𢎞羊為治粟都尉領大農盡幹天下鹽鐵乃置大農部丞數十人分主郡國令逺方各以其物如異時商賈所轉販者為賦而相灌輸置平凖於京師都受天下委輸貴即賣之賤即買之欲與富商大賈無所牟大利而萬物不得騰踊至是巡狩所過賞賜用帛百餘萬匹金錢以巨萬計皆取足大農𢎞羊又請令吏得入粟補官及罪人贖罪民不益賦而天下用饒于是賜𢎞羊爵左庶長通鑑劉士寧淫亂殘忍軍中苦之兵馬使李萬榮得衆心會士寧出畋數日不返萬榮召親兵詐之曰敕徵大夫入朝以吾掌留務汝輩人賜錢三十緡衆皆聽命辛讜復自泗州引驍勇四百人迎糧于揚潤賊夾岸攻之轉戰百里乃得出至廣陵舟載鹽米二萬石錢萬三千緡還會編楚鑄鉛鐵錢楚王殷不征商旅繇是四方商旅輻輳湖南地多鉛鐵殷用高郁䇿鑄鉛鐵錢商旅出境無所用之皆易他貨而去故能以境內所餘之物易天下百貨國以富饒湖南民不事桑蠶郁命民輸稅者皆以帛代錢未幾民間機杼大盛丘氏濬曰以鉛為錢始見于此同上置行臺尚書省于汴以張孝純權行臺左丞相呼沙呼為汴京留守李儔副之諸軍悉令歸農聽宫人出嫁得金一百二十餘萬兩銀一千六百餘萬兩米九十餘萬石絹二百七十萬匹錢九千八百七十餘萬緡宋史李從珂之發鳳翔許軍士以入洛人百緡既至閲實府庫金帛不過三萬匹而賞軍之費計用五十萬緡唐主怒三司使王玫請率京城民財以足之日僅得數萬緡唐主謂執政曰軍不可不賞人不可不恤今將奈何執政乃據屋為率無問士庶自居及僦者預借五月僦直從之會編唐賜將士緡錢有差有司百方斂民財僅得六萬唐主怒下軍巡使獄晝夜督責囚繫滿獄貧者至自經赴井而軍士遊市肆皆有驕色市人聚詬之曰汝曹為主力戰立功良苦反使我輩鞭胸杖背出財為賞汝曹猶揚揚自得不愧天地乎是時竭左藏舊物及諸道貢獻乃至太后太妃器服簮珥皆出之才及二十萬緡唐主患之謂學士李專美曰卿名有才不能為我謀此專美謝曰臣駑劣陛下擢任過分然賞軍不給非臣之責也竊思自長興之季賞賚亟行卒以是驕繼以山陵及出師帑藏遂涸雖有無窮之財終不能滿驕卒之心故陛下拱手於危困之中而得天下夫國之存亡不專繫于厚賞亦在修法度立紀綱陛下茍不改覆轍臣恐徒困百姓存亡未可知也今財力盡于此矣宜據所有均給之何必踐初言乎唐主以為然詔禁軍在鳳翔歸命者賜錢七十緡至二十緡在京者各十緡軍士無厭猶怨望為謠言曰除去菩薩扶立生鐵以閔帝仁弱唐主剛嚴有悔心故也通鑑侯叔獻為泛縣有逃田及户絶沒官田最多雖纍經簡估或云定價不均內有一李誠莊方圓十里河貫其中尤為膏腴府佃户百家嵗納租課亦皆奧族矣前已估及一萬五千貫未有人承買者賈魏公當國欲添為二萬貫賣之遂命陳道古銜命計會本縣令佐視田美惡而增損其價道古至泛閲視諸田而議增李田之直叔獻曰李田本以價高故無人承買今又增五千貫何也堅持不可道古雅知叔獻不可欺因以其事語之叔獻嘆曰郎中知此繇本末乎李誠者太祖時為邑酒務專知官以汴水溢不能救護官物遂估所傷物直計五千貫勒誠償之是時朝廷出度支使錢俵民間預買箭桿雕翎弓弩之材未幾李重進叛王師征淮南而預買翎桿未集太祖大怒應欠負官錢者田産並令籍沒誠非預買之人而當時官吏畏懼不敢開折故此田亦在籍沒今誠有子孫見居邑中相國縱未能恤其無辜而以田給之莫若損五千貫俾誠孫買之為便道古大驚曰始實不知但受命而來審如是君言為當而吾亦有以報相國矣即損五千貫而去叔獻乃召誠孫俾買其田孫曰實荷公惠奈甚貧何叔獻曰吾有䇿矣即召見佃百户諭之曰汝輩本皆下户因佃李莊之利今皆建大第髙廩更為豪民今李孫欲買田而患無力若使他買之必遣汝輩矣汝輩必毁宅撤廩離業而去不免流離失職何若醵錢借與誠孫俾得此田而汝輩嘗為佃户不失居業而兩獲所利耶皆拜曰願如公言繇是誠孫卒得此田矣東軒筆談五代以前兵寓於農素習戰鬭一呼即集宋朝兵費最多兵力最弱皆緣官自養兵紹熙中張魏公在川陜奏以王庶帥興元制置利夔二路軍士于興洋金蓬開達諸州令縣選強壯兩丁取一五丁取二户與免物力錢二百五十千五十人為一隊長以知縣為軍正尉為軍副月閲於縣春秋閲于郡不半月有兵二十萬鶴材玉露賜內府錢百萬緡給空名告身千餘道以京西卒三千自衛將佐官屬許自辟置一切以便宜從事宋史蔡忠惠創洛陽橋橫亘江中撰時暌日畫基所向鍥趾所立皆豫移檄江神得其吉告之至鑿石代木激浪以漲舟懸機以弦繂每有危險神則來相趾石所纍蠣輒封之至今泉州人能言而公自作橋記直言丈尺費金錢成數與年月時日首尾不及百字噫若在今日不知許多誇張并及神異夢寐也湧幢小品鍾離意為司徒侯霸府議曹掾詔送三百人到河北遇雪到𢎞農意輒使屬縣令出錢與徒作襦袴光武謂侯霸曰君所使吏仁恕用心乎後漢書宋范旻為淮南轉運使太祖嘗謂之曰朕知卿貧凡所須並借用官錢悉以便宜行事不必一一中覆也每嵗運米百餘萬石以給京師時論許其有心計山堂肆考葵確論括首鼠乖剌隂害司農法出知青州未行改延州至鎮悉以别賜錢為酒命㕓市良家子馳射角勝有軼羣之能者自起酌酒以勞之邊人歡激執弓傅矢唯恐不得進越嵗得徹札超乘者千餘皆補中軍義從威聲雄他府以副總管种諤西討拔銀宥功加龍圖閣學士朝廷出宿衛之師來戍賞賚至再而不及鎮兵括以為衛兵雖重而無嵗不戰者鎮兵也今不均若是且召亂乃藏敕書矯制賜緡錢數萬驛聞詔報之曰此右府頒行之失非卿察事機必擾軍政自是事不暇請者皆得專之左編錢通卷十二
