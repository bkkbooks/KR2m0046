body:
  text: 錢通卷十一明胡我琨撰五之才錢無專職轉移執事掌國之官府郊野之九式克共興福者之術以逆裒益之權而聽其便宜以參奉出納於王之經理而糾其獻以時保鎮則國富國富則民受祉民受祉則家道稱碩矣世謂之才故才曰五裕國李絳奏振武天德左右良田可萬頃請擇能吏開置營田可以省費足食上從之命度支使盧坦經度四年之間開田四千八百頃收榖四千餘萬斛嵗省度支錢二十餘萬緡㑹編初𣙜鹽起於第五琦及劉晏代其任法術精密官無遺利初歲入錢六十萬貫季嵗十倍而人無厭苦大厯末通計一歲征賦所入而鹽醝當天下大半之賦天中記魏明帝世司馬芝等舉朝大議以為用錢非徒豐國亦所以省刑今若更鑄五銖錢則國豐刑省于事為便明帝乃更立五銖錢至晉用之不聞有所改創食貨志崔祖思云劉備取帳鈎鑄銅錢以充國用南北史雋昭烈初攻劉璋與士衆約若事定府庫百物孤無取焉及入成都士庶皆捨干戈赴諸庫藏取寶物軍用不足備憂之西曹掾劉巴曰此易耳但當鑄直百錢平諸物價令吏為官市備從之旬月之間府庫充實零陵先賢傳建中元年九月户部侍郎韓洄上言江淮錢監嵗共鑄錢四萬五千貫輸於京師度工用轉送之費每貫錢二千是本倍利也今商州有紅崖冶出銅益多又有洛源監久費不理請增工鑿山以取銅興洛源故監置十爐鑄之嵗計出錢七萬二千貫度用工轉送之費貫計錢九百則浮本矣其江淮十監請皆停罷從之鶴林玉露杜佑請解鹽鐵舉巽自代自劉晏之後居職者莫能繼之巽掌使一年征課所入類晏之多明年過之又一年加一百八十萬緡㑹編沈存中筆談載兵部員外郎范祥為鈔法今商人就邊郡入錢四貫八百售一鈔至解池請鹽二百斤任其私賣得錢以實塞下省數十郡搬運之勞此今日關中給引之始傳疑録宋紹興中福建漕使王時升到官才一考見上供庫錢三十萬緡欲代納本路拖缺鹽錢上從宰執奏因旌賞之山堂肆考宋漢州刺史安守忠時冦難甫平使事旁午公帑不足守忠出私錢以給用太祖每遣使必戒之曰安守忠在蜀律己以正汝當效其為人同上初張慤為計度都轉運時帝為大元帥募諸道兵勤王慤飛挽踵道建議印給鹽鈔以便商旅不閲旬得緡錢五十萬以佐軍帝即位以為户部尚書至是除同知樞密院事兼提舉户部財用福民趙崇憲知江州民負茶引錢積一十七萬困不能償㑹新劵行視舊價幾倍崇憲歎曰負茶之民愈困矣亟請以新劵一償舊劵二詔從之受賜千餘家春氣録吳中大水詔出米百萬斛緡錢二十萬賑救諫官謂訴災者為妄乞加驗考范祖禹封還其章云國家根本仰給東南今一方赤子呼天赴訴開口仰哺以脫朝夕之急奏災雖小過實政當略不問稍施懲譴後無復敢言者矣同上是歲户部增三萬餘户民既得為永業始敢葺屋植木獲地利數倍或言營地有肥饒者不若鬻之可得錢數十萬緡以資國用周主曰利在於民猶在國也朕用此錢何為唐草澤邵棠上言近遊淮上聞周主恭儉增修德政吾兵新破於潭朗恐其有南征之志宜為之備㑹編韓魏公勤于吏職簿書文檄簡察研核莫不躬親左右或曰公位重年耆艾功名如此朝廷賜守鄉郡以養安幸無親小事公曰已憚煩勞吏民當有受弊者且俸祿日萬錢不事事吾何安哉自警編先是浙民歲輸身丁錢絹紬民生子即棄之稍長即殺之虞公允文聞之惻然訪知江渚有荻場其利甚溥而為勢家及浮屠所私公令有司籍其數以聞請以代輸民之身丁錢絹以緡計者至一十三萬七千有奇以匹計者一十六萬三千有奇免符下日九州之民歡呼鼓舞始知有父子生聚之樂韓魏公以益利路人饑為體量安撫使公至則蠲減稅以募人入粟招募壯者等第刺以為廂禁軍一人充軍數口之家得以全活檄劒門關民流移不欲東者勿禁簡州艱食為甚明道中以災傷嘗勸誘納粟後糶錢十六餘萬歸于常平公曰是錢乃賑濟之餘非官緡也發庫盡以給四等以下户逐貪殘不職吏罷冗役七百六十人為饘粥活飢人一百九十餘萬蜀人曰使者之來更生我也張忠定公詠在成都府嘗夜夢謁紫府真君接語未久吏忽報請到西門黃兼濟承事真君降階接之禮頗隆盡且揖張公坐承事之下詢顧詳欵已有欽嘆之意公翊旦即遣典客詣西門請黃承事者即以所夢告之問平日有何隂德䝉真君厚遇如此且居某之上座耶兼濟云無他長惟每嵗遇禾麥熟時以錢三萬緡收糴入明年禾麥未熟小民艱食之際糶之價值不增升斗亦無高下在我者初無所損而小民得濟所急公曰此承事所以坐某之上也俱同上知制誥韓綜通判天雄軍㑹大水漲金堤民依丘冢者凡數百家水大至綜出令能活一人者豫千錢民爭操舟筏盡救之已而丘冢潰宋汪立信為湖南安撫使供帳之物悉置官庫所積錢連歲代潭民納稅貧無告者豫錢粟病者加藥餌雨雪旱潦軍民皆有給賜務興學校士習為變山堂肆考宋鄭剛中為溫州通判遇事敢為嵗大飢流民甚衆乃出俸勸糶守曰恐實惠不及飢者答曰已有措置乃以萬錢每錢押一字夜出坊巷遇飢者給一錢戒曰勿拭去押字翌日憑錢給米飢者無遺自守以下莫不稱賞同上唐錢徽貶江州刺史郡有牛田錢百萬給刺史宴飲贈餉者徽曰此農耕之備可他用哉命代貧民租入同上胡長孺字汲仲任寧海主簿嵗大祲民相枕死宣尉同知托歡徹爾議行賑荒之令斂富人錢一百五十萬給之至縣以餘錢二十五萬屬長孺藏去乃行旁州長孺察其乾沒意悉散于民閲月再至索其錢長孺抱案進曰錢在是矣托歡徹爾怒曰汝膽如山耶何所受命而敢無忌若此長孺曰民一日不食當有死者誠不及以聞然官書具在可徵也托歡徹爾雖怒不敢問召馴壽春人章帝時為陳留太守有治迹廣鑄刀劒錢物以通民用開封府志勝虞允文仁壽人知太平州舊制民生子必納添丁錢嵗額百萬民貧無以輸官故生子皆溺死允文憐之置蘆荻稅以補添丁錢繇是百姓生子並舉户口日增生生四諦王絲字敦素越之蕭山人景祐初為縣令㑹嵗歉絲每家支錢一千以濟之期以明年夏翰絹一匹邑人大受其惠稱為德政繇此當路薦之蓋是時一縑售價不逾其數爾范希文志昭宗大順二年敕天下州府及在京諸軍或因收虜百姓男女宜給內庫銀絹委兩軍收贖歸還父母其諸州府委本道觀察使取上供錢充贖不得壓良為賤宋程伯淳攝上元縣庫有納雜錢數百千常借以補助民力部使者至則告之曰此錢令自用而不敢私請一切不問使者屢更無不從者左編保安內附鎮壓陜州軍亂逐兵馬使趙令珍大掠庫觀察使李國清不能制拜之而走㑹淮西節度使李正臣入朝過陜上命按之正臣設棘圍令軍士匿名投庫物一日獲萬緡盡以給其從兵㑹編鄜州判官种世衡言延安東北二百里有故寬州請因其廢壘而興之以當冦衝右可固延安之勢左可致河東之粟北可啚綏夏之舊朝廷從之命世衡董其役夏人屢來爭世衡且戰且城然處險無泉議不可守鑿地百五十尺始至石石上辭不可穿世衡命屑石一畚酬百錢卒得泉以濟城成賜名青澗以世衡知城事世衡開營田募商賈通貨財遂成富貴百將兵法列傳西事日擾括畿內京東西淮南馬詔樞密同宰臣議邊事出內藏緡錢八十萬陜西糴軍儲訪知邊事者釋冦所陷州縣罪及夏稅時禁越職言事富弼因論日食謂應天變莫若通下情帝皆納之于是盡除其禁許臣庶極言朝政得失㑹編晉王連嵗出征凡軍府政事一委監軍使張承業承業勸課農桑畜積金穀收市兵馬征租行法不寬貴戚繇是軍城肅清饋餉不乏王或時須錢蒱博及給賜伶人而承業靳之王乃置酒庫中令其子繼岌為承業舞承業以帶馬贈之王指錢積謂曰和歌乏錢宜與一積帶馬未為厚也承業曰郎君纒頭皆出承業俸錢此錢大王所以養戰士也承業不敢以為禮王不悅語侵之承業怒曰僕老敕使爾非為子孫計惜此庫錢所以佐王成霸業也不然王自取用之何問僕為不過財盡人散一無所成爾王怒謂李紹榮索劒承業起挽王衣泣曰僕受先王顧託之命誓為國家誅汴賊若以惜庫物死於王手僕下見先王無愧矣曹太夫人聞之遽令召王王惶恐叩頭謝請承業痛飲以分其過承業不肯王入宫太夫人使人謝承業曰小兒忤特進已笞之矣明日與王俱至承業第謝之未幾承制授承業開府儀同三司右衛上將軍燕國公承業固辭不受但稱唐官終身會編上聞楊志誠作亂召宰相謀之牛僧孺曰范陽自安史以來非國所有劉總暫獻其地朝廷費錢八十萬緡而無絲毫所獲今日志誠得之猶前日載義得之也因而撫之使捍北狄不必計其逆順上從之以載義恭順有功拜太保以志誠為留後同上假熲上言曰東羌降于皇甫規者已二萬落餘寇無幾今張奐躊蹰久不進者當慮外離內合兵往必驚且羌虜人畜疲羸有自亡之勢欲更招降坐制强敵耳臣以為狼子野心難以恩納勢窮雖服兵去復動若以騎五千步萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億如此則可令羣羌破盡胸奴長服內徙郡縣得反本土帝許之熲于是將兵萬餘人齎十五日糧馳騎于傍􅊳而擊之虜衆大潰斬首八千餘級太后賜詔褒美賜錢二十萬以家一人為郎中敕中藏府增助軍費拜熲破羌將軍同上安彥威徙鎮歸德是時河决滑州命彥威塞之彥威出私錢募民治隄五代史田悅反馬燧約衆戰勝則以家資賞至是殫私財賜麾下德宗嘉之詔出度支錢五十萬償其財彚苑詳注北海縣中門中有地隱起若小阜一縣宰乃令平之去數尺土即得小鐡錢散實其下深丈餘乃得一記云此是海眼故鑄錢以鎮壓之又不明敘時候其錢大小如五銖劉崇逺金華子徐羡之字宗文年少時嘗有一人來謂曰我是汝祖羡之拜此人曰汝有貴相而有大厄宜以錢二十八文埋宅四角可以免災過此可位極人臣梁武帝與宫人幸𤣥淵苑見大蛇盤屈于道羣小蛇繞之並黑色宫人曰恐是錢龍帝以錢十萬貫鎮于蛇處以厭之南史熙寧八年夏吳越大旱趙抃知越州前民之未饑為書問屬縣菑所被者幾鄉民能自食者有幾當廩于官者幾人溝防搆築可僦民使治之者幾所庫錢倉粟所發者幾何富人可募出粟者幾家僧道士食之羡粟書于籍者其幾具存使各書以對而謹其備大學衍義補吳正肅公知蔡州盜賊為息京師有告妖賊聚確山者上遣中貴人馳至蔡以名捕者十人使者欲得兵自往取之公曰吾在此雖不敏然聚千人于境內安得不知使信有之今以兵往是趣其為亂也此不過鄉人相聚為佛事以利錢財爾一弓手召之可致也自警編明道末天下蝗旱吳遵路知通州乘民未饑募富者得錢幾萬貫分遣衙挍航海糴米於蘇秀使物價不增又使民採薪芻官為收買以其直糴官米至冬大雪又以元價易薪芻與民官不傷財民且蒙利又建茅屋百間以處流移出俸錢置薦席鹽蔬日與飯參俵有疾者給藥以治之其願歸者具舟續食還之本土是嵗諸郡率多轉死惟通民安堵不知其凶嵗也澠水燕談宋鞠真卿守潤州民有鬭驅者本罪之外别令先驅者出錢以與後應者小人靳利兼不憤輸錢于敵人其後終日紛爭相視無敢先下手者按真卿熙寧中人山堂肆考宋趙挺之通判德州哲宗即位賜士卒緡錢郡守貪耄不以時給卒怒譟入府守趨避挺之坐堂上呼問其狀立發庫錢而治其為首者衆即定同上宋俞獻卿為昭州軍事推官初州積緡錢巨萬獻卿盡用平糴至積穀數萬後大兵至賴以饋軍同上李希烈陷汴州復遣兵數千抵項城縣縣令李侃不知所為妻楊氏曰君縣令也冦至當死力不足死焉職也于是召吏胥百姓于庭楊氏曰縣令民主也然嵗滿則罷去非若吏民墳墓存焉宜相與致死以守忍失其身而為賊黨乎衆皆泣許之乃誓曰以瓦石中賊者與千錢刀矢兵刃中賊者與萬錢得數百人侃率之以登城楊氏親㸑以食之說略宋紹興間郡守上官愔等開諸灘命僧祖日董其役漕司助錢百萬愔復請于朝益以一百五十萬而南溪之險稍平延平府志勝纍政欲修築子城憚重費不敢輕舉九淵審度決計召集義勇優給傭直躬自勸督役者樂趨用力工倍二旬訖築初計者擬費緡錢二十萬至是僅費緡五千而工畢陸九淵傳大觀間會朝廷罷新邊遂請以高峯寨為觀州設知州一人吏額五十人廂禁軍土丁家丁又千餘人嵗費錢一萬二千九百餘貫米八千餘石有奇州無稅租户籍皆仰給鄰都飛挽涉阻險或遇蠻冦設伏隂發毒矢中人輒死昔為富仁監時不聞有警惟是邊吏欲以刺探為功故時時稱警急因以為利遂欲存而不廢也邊吏誑其帥臣乞存平州設知州一人吏額百人禁軍土丁千人嵗費錢一萬七千三百貫米一萬石有奇州無租賦户籍轉運司嵗移桂融象栁之粟以給之左編裒益梁王趙王國之近屬貴重當時裴令公歲請二國租錢數百萬以恤中表之貧者或譏之曰何以乞物行惠裴曰損有餘補不足天之道也世說新語五鳳三年减天下口錢至元平元年减口賦錢禹以為古民亡賦算口錢起武帝征伐四夷重賦于民民産子三嵗則出口錢故民重困至于生子輒殺宜令民七歲去齒乃出口錢年二十乃算天子下其議令民産子七嵗乃出口錢自此始成帝建始元年减天下賦錢算四十真宗大中祥符四年詔除兩浙福建荆南廣南舊輸身丁錢凡四十五萬四百貫元豐二年七月提舉廣西常平劉誼言廣西一路户口二十萬而民出役錢至十九萬緡先用稅錢敷出稅數不足又敷之田米田米不足復算于身丁夫廣西之民身之有丁也既稅以錢又算以米是一身而輸二稅殆前世弊法今既未能蠲除而又益以役錢甚可憫也至于廣東西監司提舉司吏一月之給上同令録下倍攝官乞裁損其數則兩路身丁田米亦可少寬遂詔月給錢遞减二千嵗遂减一千二百餘緡漢史公在諫垣論蜀茶祖宗朝量收稅李把劉佑蒲宗閔取息初輕後益重立法愈峻李稷始議極力掊取民間遂困稷引陸師閔共事額至一百萬貫陸師閔又乞額外以百萬貫為獻成都置都茶場公條陳五害乞放𣙜法令民自作交易但收稅錢不出長引止令所在場務據數抽買博馬茶勿失武備而已言師閔百端凌虐細民除茶遞官吏養兵所費所收錢七八十萬貫蜀人泣血無所控告公講畫纎悉曲折利害昭炳時小吕申公當軸嘆曰只謂蘇子由儒學不知吏事精詳至於如此公論役法尤為詳盡識者韙之欒城遺言庾顗字子嵩有劉興欲伺之而無迹可間後以其性儉家富言于東海王越令就換錢十萬冀因此可乘越于衆坐中問顗顗頽然已醉幘墮几上乃以頭就几穿取徐答云下官家有錢兩千萬隨公所取興於是乃服錢通卷十一
