body:
  text: 錢通卷十四明胡我琨撰捐輸馮唐軍市租盡以給士卒私養錢郭子儀自同州歸代宗詔大臣就宅作軟脚局人出三百千大唐遺記鄭太穆郎中為金州刺史致書于襄陽于司空頔曰太穆㓜孤二百餘口饑凍兩京小郡俸薄尚為衣食之憂溝壑之期斯須至矣伏惟賢公息雷霆之威垂特逹之節賜錢一千貫絹一千匹器物一千事米一千石奴婢各十人且曰分千樹一葉之影即是濃隂减四海數滴之泉便為膏澤于公覽書亦不嗟訝曰鄭使君所需各依來數一半以戎旅之際不全副其本望也又有崔郊秀才者寓居於漢上藴積文藝而物産罄懸亡何與姑婢通每有阮咸之縱其婢端麗饒彼音律之能漢南之最也姑貧鬻婢于連帥連帥受之以類無雙無雙即薛太保愛妾至今圖書觀之給錢四十萬寵盻彌深郊思慕不已即强親府署願一見焉其婢因寒食來從事冡値郊立于桞隂馬上連泣誓若山河崔生贈之以詩曰侯門一入深如海從此蕭郎是路人帥覩之令召崔生及見郊握手曰侯門一入深如海從此蕭郎是路人便是公製作耶四百千小哉何惜一書不早相示遂命婦同歸雲溪友議虞詡為僕射長安以百姓謫罰者輸贖義錢為貧人儲曹州于令儀者市井人也長厚不忤物晚年家頗饒富一夕盗入其家諸子擒之乃隣舍子也令儀曰爾素寡過何苦而為盗耶曰迫于貧耳問其所欲曰得十千足以資衣食如其欲與之旣去復呼之盗大懼語之曰爾貧甚負十千以歸恐為邏者所詰留之至明使去盗大感愧卒為良民灼艾集薛簡肅公奎為蜀以惠愛得名民有老嫗告其子不孝者子訴貧不能養公取俸錢與之曰用此為生以養母子遂相慈孝灼艾集聖宋掇遺徐鉉初自南唐入京市宅以居嵗餘見故主貧甚鉉憐而召之曰得非售宅虧價而致是也余近撰碑獲潤筆二百千可償爾矣其主堅辭不獲亟命左右輦以付之殷七七名天祥又名道筌嘗自稱七七俗多呼之不知何所人亦不測其年夀靣光白若四十許人到處遊行姓名不定曽于涇州賣藥時靈臺蕃漢疫癘俱甚得藥者入口即愈皆謂之神聖得錢郤施于人周寳舊識之于長安續仙傳嚴震鎭山南有一人乞錢三百千去就過活震召子公弼等問之公弼曰此患風耳大人不足應之震怒曰汝必墜吾門只可勸吾力行善事奈何勸吾恡惜金帛且此人不辨向吾乞三百千的非凡也命左右准數與之于是三川之士歸心恐後亦無造次過求者太平廣記柳崇儀開家雄于財好交結樂散施而季父主家多靳不與時趙昌言方在布衣旅游河朔因以謁開開屢請以錢乞趙季父不與開乃夜搆火燒舍季父大駭即出錢三百緡乞趙繇此恣其所施不復吝矣青箱雜記後魏常景為秘書監性清儉衛將軍羊琛等七人各出千錢為買馬山堂肆考義俠于頔在襄陽匡廬符載山人遣書乞買山錢百萬公遂與之仍加紙墨衣服等雲溪友議阮修字宣子居貧四十未有室王敦等歛錢為婚皆名士也時慕之者求入錢而不得普書庾詵嘗乘舟從􅹛中山舍還載米一百五十石有人寄載四十石及至宅寄載者曰君四十斛我一百五十斛詵嘿然不言恣其取足隣人有被執為盗見劾妄疑詵矜之乃以書質錢二萬令門生詐為其親代之酧彼隣人獲免謝詵曰矜天下無辜豈期謝也梁書坡公自儋北歸卜居陽羡士人邵民瞻從學于坡為坡買一宅為緡五百坡傾囊僅能償之卜吉入居旣得日矣夜與邵步月偶至村落聞婦人哭聲極哀坡徙倚聽之與邵推扉而入問嫗何為哀傷至是嫗曰吾有一居相傳百年吾子不肖舉以售人吾今日遷徙百年舊居一旦訣别此吾所以泣也坡亦為之愴然問其故居所在即坡所得者也因再三慰撫謂曰嫗不必深悲當以是居還嫗即命取屋劵對嫗焚之魏元忠男昇娶榮陽鄭遠女昇與節愍太子誅武三思廢韋庶人不克為亂兵所害元忠坐繫獄遠以此乃就元忠求離書今日得離書明日改醮殿中侍御史麻察不平之草狀彈遠曰鄭遠納錢五百萬將女易官旣連婚國相父子崇赫迨元忠下獄遂誘私離今日得書明日改醮若言齊鄭非偶不合結褵旣氷玉交歡而理資同穴下山之夫未遽御輪之聓已周無聞寄死託孤見危授命斯所謂滓穢流品㸃辱衣冠名教所先理資懲革請裁以憲綱禁錮終身遠從此廢弃朝野咸賞察之公直唐新語劉凝之隱居荆州適嵗儉衡陽王餉錢十萬凝之大喜持錢至市門見有飢色者悉分與之俄頃都盡世説新語唐楊汪旣殺張審素審素二子皆幼坐流嶺表尋逃歸手殺汪于都城欲之江外殺與汪同謀者為有司所得議者多言二子穉年孝烈宜加矜宥張九齡亦欲活之裴耀卿李林甫以為壞法不可上然之付汝南府杖殺士民憐之為作哀誄歛錢葬之㑹編韓滉遂入朝過汴時劉𤣥佐久未入朝滉與約為兄弟請拜其母其母喜為置酒酒半滉曰弟何時入朝佐曰久欲入朝力未能辦耳滉乃遺𤣥佐錢二十萬緡備行装留三日大出金帛賞勞一軍為之傾動𤣥佐驚伏遂與曲環俱入朝同上馬東柳仲塗少時縱酒酒肆坐側有書生接語以貧未葬父母將謁魏守王公祐求資以給襄事先生問所費幾何曰得錢二十萬可矣先生曰姑就舍吾為子營之罄其資得白金百兩錢數萬遺之議者以郭代公不能過澠水燕談録胡子遠之父唐安人家饒財常委僕權錢得錢引五千緡皆偽也家人欲訟之胡曰幹僕已死豈忍使其孤對獄耶或謂减其半價子人尚可得二千餘緡胡不可曰終當誤人乃取而火之㤗然不少動心其家暴貴宜哉老學菴筆記郭元振年十六與薛稷趙彦昭同為太學生家嘗送資錢四十萬會有縗服者叩門自言五世未葬願假以治䘮元振舉與之無少吝且不貭名氏稷等皆嘆駭裴寛為尚書罷部西歸汴流中日晚維舟見一人坐樹下衣極敝因命屈之與語大竒之遂為見知曰以君才識必自富貴何貧云也舉􅊑錢帛奴婢貺之客亦不讓語訖上船奴婢偃蹇者鞭撻之公益竒之芝田録康節在洛富公司馬公諸君子二十餘家集錢買宅以贈之焉彚苑孟嘗君相齊食客三千人邑入不足以奉出錢于薛貸錢者多不能與息馮讙乃召諸取錢者曰能與息者來不能與息者亦來能與息者與為期不能與息者取劵而燒之曰孟嘗君貸者為民之無者以為本業也所以求息為無以奉客也今富給者以要期貧者焚劵書以捐之有君如此豈可負之哉孟嘗君傳曽公亮遊京師聞旁舍有泣聲問其故乃云鬻女償官錢以得四十萬父母不忍捨以此泣也公亮乃與錢贖回去彚苑詳註瞿嗣興常熟人隂行其徳氊工王氏大雪凍餓不能起嗣興憫之携錢二十緡潜投窻隙而去歉嵗有窶人來糴粟受其錢五千陽忘曰汝十千耶倍與之粟凡負販者必多償其直家人恠問之嗣興曰彼胼胝手足求升合利吾忍與較耶春氣録韓魏公在政府時以三十萬緡買女妓張氏姿容麗絶劵成忽澘然公問故張曰妾本供職郎郭守義妻也徃嵗官湖南部使者挾私劾以敗官今家計蕭條恐闔室餓死遂没身於人以活守義兒女公惻然遣張持錢還舍且曰敗官果非辜可訴之朝事白汝却歸我守義後辨雪調官淮右張氏來如其約公不使至前遣人謂曰吾居宰相可娶士人妻乎向錢費用已盡取前劵付之仍以二十金助其夫之官張感涕而去同上王荆公知制詔呉夫人為買一妾荆公見之曰汝誰氏曰妾之夫為軍大將部米運失舟家貲盡没猶不足賣妾以償公慨然曰夫人用錢幾何曰九十萬公呼其夫令為夫婦如初盡以錢賜之同上曽魯公布衣時遊京師夜聞旁舍泣聲悲甚詰朝詢之旁舍生欷歔曰頃官某所以事負官錢若干吏督之急鬻女於商得錢四十萬今去有日故悲也公曰謹勿與商人吾欲售之即與四十萬約後三日以女來吾且登舟候水門外至期而徃則公舟無有詢旁舟乃知去已三日矣女後為士人配同上桓宣武少家貧戱大輸債主敦求甚切思自振之方莫知所出陳郡袁躭俊邁多能宣武欲求救于躭躭時居艱恐致疑試以告焉應聲便許略無慊吝遂變服懷布㡌隨温去與債主戱躭素有藝名債主就局曰汝故當不辦作袁彦道邪遂共戱十萬一擲直上百萬數投馬絶呌傍若無人探布㡌擲對人曰汝竟識袁彦道不世説新語温人趙彦霄兄弟二人父母亡後同㸑十二年事兄彦雲惟謹彦雲躭嗜聲色博奕無所不至生業日壞彦霄諫之兄怒遂求析籍不過五年而兄之資産蕩然矣公私逋負尚三千餘緡彦霄因除夕置酒邀兄嫂而告之曰向者初無分㸑意以兄用度不節恐皆蕩盡俱有饑寒之憂故勉從耳今幸我一半尚留不廢亦足以給伏臘兄自今復歸中堂以主家務即取分書投之火管鑰之属悉以付焉因言兄所負錢已措備償之矣兄初有慙色不從見彦霄意甚勤懇遂受之灼艾集范仲淹方貴顯時置負郭常稔之田千畝號曰義田以養濟羣族之人日有食嵗有衣嫁娶凶葬皆有贍擇族之長而賢者主其計而時其出納焉日食人一升嵗衣人一縑嫁女者五十千再嫁者三十千娶婦者三十千再娶者十五千葬者再嫁之數葬㓜者十千論世編范成大知處州松楊民爭役公曉之曰吾聞東陽縣有出錢助役者爾與之鄰獨無愧乎因推廣東陽之制論鄉人視貧富輸金買田擇忠義之家掌其事儲嵗入助當役者命曰義役山堂肆考東漢陳重字景公順帝時在郎署有同舍郎負息錢數十萬債主求廹不已重宻以錢還其主同舍郎後知之將以厚謝重曰非我之為恐是同姓名者終不言惠同上虬髯與一道士方對飲見李靖驚喜召坐環飲十數巡曰樓下櫃中有錢十萬擇一深隱處駐十妹畢某日復㑹我于汾陽橋如期至橋道士虬髯已先在矣亘史外紀宋張彦明善醫凡貧者不受錢或反以錢米與之富者以錢求藥不問多寡必多與藥期於必愈病危篤知不可救亦多與好藥以慰其心終不肯受錢生生四諦宋武帝劉裕小字寄奴彭城縣人裕素貧唯琅琊王謐獨深敬焉裕嘗負刁逵社錢三萬經時無以還被逵執謐宻以已錢代償繇是得釋闞敞字子張平輿人仕郡為五官掾時太守第五常被徵臨發倉卒有俸錢百三十萬留付敞敞埋着堂上遂遭世倉卒道路㫁絶常舉門遭疫妻子皆死常病臨困惟有孤孫年九嵗常謂之曰吾寄故五官掾平輿闞敞錢三十萬氣遂絶後孫年長大步擔至汝南問敞敞見之悲喜與共臨發穿錢百三十萬孤孫曰亡祖臨終言有三十萬耳今乃百三十萬不敢當也敞曰府君病困氣索言繆誤耳即無疑也汝南先賢傳李敏求數年前曾被伊慎諸子求為妹壻時方以修進為已任不即納之至是有人復語敏求敏求欣然不旬遂成婚娶伊氏有五女其四皆已適人敏求妻其小者其兄宰方貨南城一庄得錢一千貫悉將分給五妹為資裝敏求既成婚即時領二百千其姊四人曰某娘最小李郎又貧盍各率十千以助焉由是敏求獲錢二百四十貫無差矣敏求先有别色身名乆不得調其年乃用此錢叅選三年春授鄧州向城尉河東記謝混尚晉陵公主混死詔公主與謝氏絶婚公主悉以混家事委混從子𢎞㣲混仍世宰輔僮僕千人唯有二女年數嵗𢎞㣲為之紀理生業一錢尺帛有文簿九年而宋高祖即位公主降號東鄉君聽還謝氏入門室宇倉廪不異平日田疇墾闢有加於舊東鄉君嘆曰僕射平生重此子可謂知人僕射為不亡矣親舊見者為之流涕是嵗東鄉君卒公私咸謂貲財宜歸二女田宅僮役應属𢎞㣲𢎞㣲一無所取自以私禄葬東鄉君經濟篇檀施陶榖為湘東張仲荀序詩贈常覺云起後唐天成至漢乾祐每黑白月三取八日浴京大衆累嵗費錢可一百三十六萬數計緡千萬矣雖檀施共成寔覺公化導之力也宋高僧傳京輦自黄巢退後脩葺殘毁之處鎭州王家有一兒俗號王酒胡居於上都巨有錢納錢三十萬貫助修朱雀門上又詔重修安國寺畢親降車輦以設大齋乃十撞新鍾捨錢一萬貫命諸大臣各取意擊之上曰有人能捨錢一千貫文者即打一搥齋罷王酒胡半醉入來徑上鍾樓連打一百下便於西市運錢十萬貫入寺玉泉子嚴州建徳縣有崇勝院藏天聖五年内降劄子設道塲云皇太后賜銀三十兩皇太妃施錢二十貫皇后施錢十貫朱淑儀施錢五貫有仁廟飛白御書今皆存葢院有僧嘗際眞廟召見賜衣及香燭故也猶可想見祖宗恭儉之盛予在近初不聞迫代歸始知之不及刻石至今為恨老學菴筆記九月梁主衍捨身於同㤗寺羣臣以錢贖之梁主幸同㤗寺設大會釋御服持法衣行清淨大捨素床瓦器乘小車役私人親為四衆講湼槃經羣臣以錢一億萬奉贖表請還宫三請乃許㑹編莊椿云盗常住一文錢一日一夜長三分七釐利第二日夜利上又長利亦二分七釐筭之來世作牛馬償之牛日還八文馬日還七文所以云作一生之容易為萬刼之艱難若捨一文錢入常住一日一夜長福亦爾擅篇過去刼中有貧夫婦夫得一金錢婦有一明鏡復得一瓶盛滿凈水安錢嬴中以鏡著上夫婦同心布施發願從是九十一刼天上人中恒為夫婦受福快樂値釋迦佛出家得阿羅漢果同上昔有貧女兩錢布施上座親為呪願後感福報為王夫人車載珎寶詣寺布施上座但遣維那呪願夫人怪問上座答言我佛法中惟貴善心夫人先施兩錢善心極勝今施珎寶未免貢高是以我今不為呪願過去刼中比邱置鉢敎化賣薪貧人得錢三文歡喜布施發願而去去五里步步歡喜到門欲入復遙向僧至心頂禮後世為拘留沙國王世世尊貴得銅盆滿貯金錢瀰滿五里若布施時應當至心歡喜施與勿生悔心同上宋臨江軍慧力寺初造輪藏成寺僧限得千錢則轉一匝有營婦䘮夫家極貧念為轉藏以資㝠福累日辛苦收拾随聚隨費終不滿一千廹於貧乏無以自存而此心眷眷不能自已遂擕所聚之錢號泣藏前擲錢於地輪藏自轉闔寺駭異不復限數云轉因録宋奚百三貧民也一日見道者謁舖乞一文錢舖家睚眦不與百三憐之取腰間一錢與之是夕夣道者與之去贅及覺頥贅果落同上昔阿育王宫一婢使見王作福自尅責言王先身時布施如來一掬土故得富貴今日復作將來轉勝我先身罪今日厮下又復貧窮無可修福將來轉賤思已啼哭偶因掃地得一銅錢即施衆僧心生歡喜不久病死託阿育王夫人腹中為女出世端正殊好右手常捲年滿五嵗王抱膝上摩手取開有一金錢隨用隨生須臾之間金錢滿室王恠所以徃問夜奢羅漢答言如女先是王婢掃糞壤中得一銅錢布施衆僧生為王女報應如此同上唐時襄陽將鑄佛像有一老姥至貧營求助施卒不能得姥有一錢則為女時母所賜也寶之十餘年及鑄像時姥持錢發重願投之爐中及破鑪出像姥所施錢着佛胸臆因磨錯去之一夕錢又如故僧徒驚異遂置錢不去張僧繇呉人天監中官右將軍以丹青馳譽於時嘗於金陵安樂寺畫四龍不㸃目睛謂㸃之則驤騰而去人以為誕落墨纔及二龍果雷電破壁徐觀畫已失矣獨二龍未㸃睛者在焉又嘗於天皇寺畫龍不時㸃睛道俗請之捨錢數萬落茟之後雷雨晦㝠忽失龍不知所在宣和畫譜穆宗時李徳裕言初徐徳興為壇泗洲募人為僧以資上福人輸錢三千淮右小民規影徭賦失丁男六十萬不為細變丘濬曰按民之為僧何預於君而小人乃以度僧為資上福殊不知天以好生為徳度民為僧是閼絶天地生生之仁豈天所好哉致一人於死地尚足以感傷天地矧絶萬人之生意其召災又何如哉大學衍義補大觀二年詔大相國寺慧林禪院長老元正坐化並無衣鉢闕葬送之用賜絹三百匹錢三百貫賜寂照之塔仍間度一僧清波雜録周朴唐末詩人寓於閩中僧寺假丈室以居不飲酒茹葷塊然獨處諸僧晨粥卯食朴亦擕巾盂側諸僧下畢飯而退率以為常郡中豪貴設供率施僧錢朴即巡行拱手各丐一錢有以三數錢與者朴止受其一耳得千錢以備茶藥之費將盡復然僧亦未嘗厭也興寜中瓦棺寺初置僧衆設刹會請朝賢士庶宣疏募縁時士大夫莫有過十萬者顧長康獨注百萬長康素貧衆以為大言後寺僧請勾疏長康曰宜備一壁閉户徃來一月餘所畫維摩一軀工畢將欲㸃眸子乃謂僧衆曰第一日觀者請施十萬第二日觀者請施五萬第三日觀者可任其施及開户光照一寺施者塡咽俄而及百萬名畫記將作大匠楊務亷甚有巧思常於泗州市中刻木作僧手執一椀自能行乞椀中滿錢關鍵忽發自然作聲云布施市人競觀欲其作聲施錢日盈數千朝野僉載桃林令韓光祚擕家之官途經華山廟下車謁之入廟門而愛妾暴死令巫請之巫言三郎好汝妾既請且免至縣當取光祚至縣乃宻召金工鑄為觀世音菩薩像五日妾暴卒半日方活云適華山府君備車騎見迎出門有一僧金色遮其前車騎不敢過神曰且留更三日迎之光祚知其故又以錢十千圖菩薩像如期又死有頃乃蘓曰適又見迎乃有二僧在未及登車神曰未可取更三日取之光祚又以千錢召金工令更造像工以錢出縣遇人執猪將烹之工愍焉盡以其錢贖之像未之造也而妾又死俄即蘓曰已免矣適又見迎車騎轉盛二僧守其門不得入有豪猪大如馬衝其騎所向顛仆車騎郤走神傳言曰更勿取之於是散去光祚怪何得有猪拒之金工乃言其故繇是益信内敎紀聞宋鄱陽吏周世亨謝役之後奉祀觀世音甚謹慶元初發願手寫經二百卷施人持誦因循過期遂感疾乃禱菩薩祈救䕶旣小安即以錢三千米一石付造紙江匠使抄經紙江用所得别行作紙入城販鬻周見而責之江以貧告復増畀其直經成周倩一僧摺成册齋戒繕寫方及二十卷正書握筆羣鴉數十鳴噪屋上逐之不退起禱像前迨出視葢一鴉中箭流血衆鴉為㧞之不能得故至悲閔周速誦寶勝如來救苦觀世音二佛以筆指之箭脱自㧞鴉飛入空中周贊嘆之際箭從天井内擲落於佛龕側靈感如此轉因録唐相陸象先呉人其弟得危疾醫治莫効一日有僧問疾及見以水噀之即愈象先出金幣弗受謂曰我靈巖僧他日還呉來過我不復見後為尚書還呉至靈巖問僧無有惟壁間畫像肖焉如言嘯如舊師友驚喜亟拜施錢五十萬宋改靈巖為秀峯禪院姓源珠璣錢通卷十四
