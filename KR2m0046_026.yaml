body:
  text: 錢通卷二十六明胡我琨撰條議賈誼諌曰法使天下公得顧租鑄銅錫為錢敢雜以鉛鐵為他巧者其罪黥然鑄錢之情非殽雜為巧則不可得贏而殽之甚微為利甚厚夫事有召禍而法有起姦今令細民人操造幣之勢各隱屏而鑄作因欲禁其厚利微姦雖黥罪日報其勢不止乃者民抵罪多者一縣百數及吏之所疑榜笞奔走者甚衆夫縣法以誘民使入陷穽孰積於此曩禁鑄錢死罪積下今公鑄錢黥罪積下為法若此上何賴焉又民用錢郡縣不同或用輕錢百加若干時錢重四銖法錢百枚當重一斤十六銖輕則以錢足之若干枚令滿平也或用重錢平稱不受秦錢重半兩漢初鑄莢錢文帝更鑄四銖錢秦錢與莢錢皆當廢而故與四銖並行民以其見廢故用輕錢則百加若干用重錢雖以一當一猶復不受之是以州縣不同也法錢不立吏急而一之乎則大為煩苛則力不能勝縱而弗呵乎則市肆異用錢文大亂茍非其術何鄉而可哉今農事棄捐而采銅者日蕃釋其耒耜冶鎔吹炭姦錢日多五穀不為多善人怵而姦邪願民陷而之刑戮刑戮將甚不祥奈何而忽國如此吏議必曰禁之禁之不得其術其傷必大令禁銅錢則錢必重重則其利深盜鑄如雲而起棄市之罪又不足以禁矣文獻通考元帝時貢禹言鑄錢採銅一歲十萬人不耕民坐盜鑄陷刑者多富人藏錢滿室猶無厭足民心動搖棄本逐末耕者不能半姦邪不可禁原起於錢疾其末者絶其本宜罷採珠玉金銀鑄錢之官毋復以為幣除其販賣租銖之律租銖謂計其所賣物價平其錙銖而收租也租稅祿賜皆以布帛及穀使百姓一意農桑議者以為交易待錢布帛不可尺寸分裂禹議亦寢桓帝時議改鑄大錢劉陶言其不便乃止時有上書言人以貨輕財薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士陶上議曰當今之憂不在於貨在於民飢蓋民可百年無貨不可一朝有飢故食為至急也議者不達農殖之本多言冶鑄之便或欲因緣行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給况一人鑄之萬人奪之乎夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下欲鑄錢齊貨以救其弊此猶養魚沸鼎之中棲烏烈火之上水木本魚鳥之所生也用之不時必致燋爛帝乃止不鑄錢孔琳之議曰洪範八政貨為食次豈不以交易之所資為用之至要者乎若使百姓用力於為錢則是妨為生之業禁之可也今農自務穀工自務器各𨽻其業何嘗致動於錢故聖王制無用之貨以通有用之財既無毁敗之費又省運致之苦此錢所以嗣功龜貝歷代不可廢者也穀帛本充於衣食今分以為貨則致損甚多又勞毁於商販之手耗棄於割裁之用此之謂弊著於目前故鍾繇曰巧偽之人競濕穀以要利制薄絹以充資魏代制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑錢之不用繇於兵亂積久用之于廢有繇而然漢末是也今既用而廢之則百姓頓亡其利今既度天下之穀以周天下之食或倉庫充溢或糧靡斗儲以相資通則貧者仰富致之之道實假於錢一朝斷之便為棄物是有錢無糧之人皆坐而飢困此斷之又立弊也且據今用錢之處不為貧用穀之處不為富又人習來久革之怨惑語曰利不百不易業况又錢便於穀也魏明帝時錢廢用穀四十年矣以不便於人乃舉朝大議精才達政之士莫不以宜復用錢下無異情朝無異論彼尚捨穀帛而用錢足以明穀帛之弊著於已試也愚謂救弊之術無取於廢錢朝議多同琳之議故不行俱同上人間頗盜鑄多剪鑿古錢取銅帝甚患之録尚書江夏王義恭建議以一大錢當兩以防剪鑿議者多同之何尚之議曰夫泉貝之興以估貨為本事在交易豈假多數數少則幣輕數多則物重多少雖異濟用不殊况復以一當兩徒崇虛價夫錢之形大小多品直云大錢則未知其格若止於四銖五銖則文皆古篆既非庸下所識如或漫滅尤難分明公私交亂爭訟必起此最是深疑者也命旨兼慮剪鑿日多以致銷盡鄙意復謂直繇紏察不精致使立制以來發覺者寡今雖有懸金之名竟無酬與之實若申明舊科擒獲即報畏法希賞不日息矣中領軍沈演之以為晉遷江南疆境未廓或土習其風錢不普用今封略開廣聲教遐暨金鏹布洽爰逮邉荒用彌廣而貨彌狹如復競竊剪鑿銷毁滋繁刑雖重禁姦弊方密肆力之氓徒勤不足以供贍誠繇貨貴物賤常調未革愚謂若以大錢當兩則國傳難毁之寶家贏一倍之利不俟加憲巧源自絶上從演之議遂以一錢當兩行之經時公私非便乃罷時言事者多以錢貨減少國用不足欲禁私銅以充官鑄五銖范泰又諫曰夫貨存貿易不在多少昔日之貴今日之賤彼此共之其揆一也但今官人均通則無患不足若使必資廣以收國用者則龜貝之屬自古而行銅之為器在用也博矣鍾律所通者逺機衡所揆者大器有要用則貴賤同資物有適宜則家國共給今毁必資之器而為無施之錢於貨則功不補勞在用則君人俱困較之以實損多益少良繇階根未固意存逺略伏願思可久之道捐欲速之情則嘉謨日陳聖慮可廣會編尚書右丞徐爰議曰貨薄人貧公私俱罄不有革造將大乏宜應遵式古典收銅繕鑄納贖刋刑著在往䇿合宜以銅贖刑隨罪為品詔可之六朝史鑄錢形式薄小輪郭不成就於是人間盜鑄者雲起雜以鉛錫並不牢固又剪鑿古錢以取其銅錢既轉小稍違官式雖重制嚴刑人吏官長坐罪免者相係而盜鑄彌甚百物踊貴人患苦之乃立品格薄小無輪郭者悉加禁斷時議者又以銅轉難得欲鑄二銖錢顔竣曰議者將謂官藏空虛宜更改變天下銅少宜減錢式以救災弊賑國吊人愚以謂不然今鑄二銖恣行新細於官無解於乏而人姦巧大興天下之貨將糜碎至盡空立嚴禁而利源難絶不過一二年間其弊不可復救此其不可一也今鎔鑄獲利不見有頓得一二倍之理縱復得此必待彌年又不可二也人懲大錢之改兼畏近日新禁市井之間必生紛擾富商得志貧人困窮又不可三也况又未見其利而衆弊如此失算當時取誚百代上不聽同上齊高帝建元四年奉朝請孔覬上書曰三吳國之關門比歲被水潦而糴不貴是天下錢少非穀穰賤此不可不察也鑄錢之弊在輕重屢更重錢患難用而難用為無纍輕錢弊盜鑄而盜鑄為禍深人所盜鑄嚴法不禁者繇上鑄錢惜銅愛工也惜銅愛工也者謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其患也自漢鑄五銖錢至宋文帝四百餘年制度有廢興而不變五銖者其輕重可得貨之宜也以為開置錢府方督貢金大興鎔鑄錢重五銖一依漢法府庫以實國用有儲乃量俸祿薄賦稅則家給人足頃盜鑄新錢者皆效作剪鑿不鑄大錢也若官錢已布於人使嚴斷剪鑿小輕破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大利貧良之人塞姦巧之路錢貨既均逺近則一百姓樂業市道無爭衣食滋殖矣時議者以為錢貨轉少宜更廣鑄重其銖兩以防人姦上乃使諸州大市銅會上崩乃止六朝史祕書監崔沔議曰夫國之有錢時所通用若許私鑄人必競為各徇所求小如有利漸忘本業大計斯貧是以賈生之陳七福規於更漢令太公之創九府將以殷貧人况依法則不成違法乃有利謹按漢書文帝雖除盜鑄錢令而不得雜以鉛鐵為他巧者然則雖私鑄不容姦錢錢不容姦則鑄者無利鑄者無利則私鑄自息斯則除之與不除為法正等能謹於法而節其用則令行而詐不起事變而姦不生斯所以稱賢君也今若聽其私鑄嚴斷惡錢官必得人人皆知禁誠則漢政可侔猶恐未若皇唐之舊也今若稅銅折役則官冶可成計估度庸則私錢無利易而可久簡而難誣謹守舊章無越制度且夫錢之為物貴以通貨利不在多何待私鑄然後足用也左監門録事參軍劉秩議曰古者以珠玉為上幣黃金為中幣刀布為下幣管子曰夫三幣握之則非有補於暖也捨之則非有損於飽也先王以守財物以御人事而平天下是以命之曰衡衡者使物一高一下不得有常故與之在君奪之在君以人戴君如日月親君如父母用此術也是謂人主之權令之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢賤則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕繇乎物多物多則作法收之使少少則重重則作法布之使輕輕重之本必繇乎是奈何而假於人其不可二也夫鑄錢不雜以鉛鐵則無利雜以鉛鐵則惡不重禁不足以懲息方今塞其私鑄之路人猶冒死以犯之况啓其源而欲人之從令乎是設陷穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畝者衆去南畝者衆則草萊不墾又鄰於寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁故法令不行人之不理皆繇貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役於富室富室乘之則益盜昔漢文時吳濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以效愚計夫錢重者猶人日滋於前而爐不加於舊又公錢重與銅之價頗等故盜鑄者破重錢以為輕錢禁寬則行禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴之繇在於採用者衆矣夫銅以為兵則不如鐵以為器則不如漆禁之無害陛下何不禁於人則銅無所用銅無所用則銅益賤銅賤則錢之用給矣夫銅不布下則盜鑄者無因而鑄無因而鑄則公錢不破公錢不破則人不犯死刑錢又日增末復利矣是一舉而四美兼也伏惟陛下熟察之唐史判應天府張方平上言臣向者再總邦計見諸爐歲課上下百萬緡天下歲入茶鹽酒稅雜利僅五千萬緡公私流布日用而不息上自社稷百神之祀省御供奉官史廪祿軍師乘馬征戍聘賜凡百用度斯焉取給出納大計備於此矣景德以前天下財利出入茶鹽酒稅歲課一千五百餘萬緡太宗以是料兵閲馬平河東討拓拔歲有事於契丹真宗以是東封岱宗西祀汾睢南幸亳宋未嘗聞加賦於民而調度克集至仁宗朝重熙纍盛生齒繁庶食貨滋殖慶厯以後財利之入乃至三倍於景德之時而國計之費更稱不贍則是本末之源盈虛之數其疏濶不侔久矣陛下憫時事之積弊志在變而通之創立法制凡大措置事以十數要在經國利民崇德而廣業也其中率錢募役一法為天下害實深且舉應天府為例畿內七縣共主客六萬七千有餘户夏秋米麥十五萬二千有零石絹四萬七百有零匹此乃田畝桑功之自出是謂正稅外有沿納諸色名目雜錢十一萬三千有零貫已是因循弊法然雖有錢數實不納錢並係折納穀帛惟屋稅五千餘貫舊納本色見錢大體古今賦役之制自三代至於唐末五代未有輸納之法也今乃歲納役錢七萬五千三百有零貫又散青苗錢八萬三千六百餘貫纍計息錢一萬六千六百有零貫此乃歲輸實錢三千餘貫又弛邊關之禁開賣銅之法外則泄於四夷內則縱行銷毁鼓鑄有限壞散無節錢不可得穀帛益賤凡公私錢幣之發斂其則不逺百官羣吏三軍之俸給夏秋糴買穀帛坑冶場監本價此所以發之者也屋廬正稅茶鹽酒稅之課此所以斂之者也民間貨布之豐寡視官錢所出之多少官錢出少民間已乏則是常賦之外錢將安出自王安石為政始罷銅禁姦民日銷錢為器邉關海舶不復譏錢之出國用日耗又青苗助法皆徵錢民間錢荒故方平極言之宋史御史周尹言臣去冬奉使經繇永興秦鳳路伏見盜鑄錢不少問其本末蓋是錢法用一當二鐵錢易得而民間盜鑄者費少利倍又訪聞得所在官中積聚約有四百萬餘貫民間收藏者猶不在其數緣上件前貨起初元以一當十後來減為折三近歲又作折二已於國家重貨十損其八若更作一文行用即又損一分所以不當輒有奏請昨來朝廷差汪輔之往逐路揀選鐵錢萬數不多今三司指揮更不行用仍行改鑄務監每一日鑄及三千貫一年之內除節假旬假即實有三百日課程約只得九十萬貫以來計三二年間未滿數百萬貫况日課未必及三千貫之數也若改鑄之法或只仍舊作折二錢即民間盜鑄定亦不可止絶臣欲舊作折二鑄錢更不别行改鑄亦不須揀選起自今後只作一文行用則盜鑄者所獲之利不充所費自然無復冒禁作過歲省重辟而農商交易獲衆貨流通之利且約官中所有止就四百萬貫言之若以二為一即猶得二百萬貫之數致力簡省便可得用户部侍郎蘇轍北使還論事宜曰臣竊見北界别無錢幣公私交易並使本朝銅錢沿邉禁錢條法雖極深重而利之所在勢無繇止本朝每歲鑄錢以百萬計而所在常患錢少蓋散入四夷勢當爾也謹按河北河東陜西三路土皆産鐵見今陜西鑄折二鐵錢萬數極多與銅錢並行而民間輕賤鐵錢鐵錢十五僅能比銅錢十而官用鐵錢與銅錢等緣此解鹽鈔法久逺必敗河東雖有小鐵錢然數目極少河北一路則未嘗鼓鑄臣等嘗聞議者謂可於三路並鑄鐵錢而行使之地止於極邉諸州極邉見在銅錢並以鐵錢兌換搬入近裏州郡如此則雖不禁錢出外界而其弊自止矣伏乞下户部令遍問三路提轉安撫司詳講利害如無窒礙乞蚤賜施行惟河東路極邉數郡訪聞每歲秋成必假銅錢於北界人户收糴乞令相度若以紬絹優與折博有無不可此計若行為利不小張商英為相上言當十錢自唐以來為害甚明行之於今猶見窒礙蓋十平錢出門有限有禁故四方客旅物貨交易得錢者必入中求鹽鈔收買官告度牒而餘錢又流布在街市小民間故官司內外交相利養自當十錢行一夫負八十千小車載四百千錢既為輕齎之物則告牒難售鹽鈔非操虛錢而得實價則難行輕重之勢然也今欲權於內庫并密院諸司借支應于封樁金銀物帛并鹽鐵等下令以當十錢盜鑄為濫害法限半年更不行用令民間盡所有於所在州軍送納每十貫官攴金銀物帛四貫文擇其偽鑄者送近便改鑄小平錢存其如樣者俟納錢足十貫作三貫文各撥還元借處然後京城作舊錢禁施行乃可議𣙜貨通商鈔法宋史時連年旱蝗資糧匱竭言事者多請赦懷光李晟上言赦懷光有五不可河中距長安才三百里同州當其衝多兵則未為示信少兵則不足隄防忽驚東偏何以制之一也今赦懷光必以晉絳慈隰還之渾瑊既無所詣康日知又應遷移土宇不安何以奬勵二也陛下連兵一年討除小醜兵力未窮遽赦有罪今西有吐蕃北有回紇南有淮西觀我強弱必起窺覦三也懷光既赦則朔方將士皆應敘勳行賞今府庫方虛賞不滿望是愈激之使叛四也既解河中罷諸道兵賞典不舉怨言必起五也今河中斗米五百芻藁且盡陛下但敕諸道圍守旬時彼必有內潰之變何必養腹心之疾為他日之悔哉馬燧入朝奏曰懷光凶逆猶甚赦之無以令天下願更得一月糧必為陛下平之上許之會編陸贄言於上曰頃立就軍和糴之法以省運制加倍之價以勸農此令初行人皆悅慕而有司競為纎嗇不時斂藏遂使豪家貪吏反操利權賤取於人以俟公私之乏度支物估轉高單城穀價轉貴空申簿帳為指囷倉計其數則億萬有餘考其實則百十不足此謂蓄斂乖宜者也舊制關中歲運東方租米至有斗錢運斗米之言習聞見不達時宜者則以為國之大事不計費損習近利而不防逺患者則以為不若畿內和糴為易臣以為兩家之語互有長短將制國用須權重輕食不足而財有餘則弛財而務實倉廪食有餘而財不足則緩食而嗇用貨泉近歲關輔屢豐公儲委積江淮水潦米貴加倍關輔宜加價以糴而無錢江淮宜減價以糶而無米而運彼所乏益此所餘可謂習聞見而不達時宜矣今江淮米斗直百五十錢運至東渭橋僦直又約二百而市司估糴三十七錢耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣每年江淮運米百一十萬斛至河陰太原留七十萬斛而以四十萬斛輸東渭橋今二倉見米猶有三百二十餘萬斛京兆諸縣斗米不過直錢七十請令來年江淮止運三十萬斛至河陰而河陰太原以次運至京師其江淮所停八十萬斛委轉運使每斗取八十錢於水災州縣糶之以救貧乏計得錢六十四萬緡減僦直六十九萬緡先令戶部以二十萬緡付京兆糴之以補渭橋之闕數斗用百錢以利農人以一百二萬六千緡付邉鎮使糴十萬人六年之糧餘十萬四千緡以充來年和糴之價其江淮米錢僦隨並委轉運使折市綾絹絁綿以輸上都償先貸户部錢詔行其䇿邉備浸充唐史陸贄又奏請均節財賦凡六條其二請兩稅以布帛為額曰穀帛者人之所為錢貨者官之所為也是以國朝著令租出穀庸出絹調出繒纊布曷有禁人鑄錢而以錢為賦者哉今之兩稅獨以錢穀定稅所徵非所業所業非所徵遂或增價以買其所無減價以賣其所有一增一減耗損已多望勘會諸州初行兩稅年絹布定估比類當今時價加賤減貴酌取其中總計合稅之錢折為布帛之數同上史館修撰李翔上疏曰定禍亂者武功也興太平者文德也今陛下既以武功定海內若遂革弊事復舊制用忠正而不疑屏邪佞而不邇改稅法不督錢而納布帛絶進獻寬百姓租賦厚邉兵以制夷狄數訪問待制官以通塞蔽此六者政之根本太平所以興也通鑑中書舍人白居易上言曰朝廷本用田布令報父讐今全師出界數月不進蓋繇此軍纍經優賞兵驕將富莫肯為用况其月費計錢二十八萬緡若更遷延將何供給此猶宜蚤令退軍者也同上帝初即位置計置司議察鹽利害茶法變為貼射而鹽則官自鬻官得利微而民不便解池積鹽為阜其上生木合抱數莫可較於是詔翰林學士盛度等議更其制度上通商五利曰方禁商時伐木造船輦運兵民不勝疲勞今去其弊一利也陸運既差帖額又役車户貧人懼役連歲逋逃今悉罷之二利也船運有沉溺之患綱吏侵盜雜以泥沙硝石其味苦惡疾生重膇今皆得食真鹽三利也錢幣國之貨泉欲使通流富家多藏鏹不出民用益蹙今歲得商人出緡錢以助經費四利也歲減鹽官兵卒畦夫傭作之給五利也於是詔罷二京二十八州軍𣙜法聽商人入錢若金銀於京師𣙜貨務給鈔受鹽於解池而申私販鬻之禁民以為便自是雖商賈流行而歲課耗矣宋史青苗錢行首議者謂周官泉府民之貸者至輸息二十而五國事之財用取具焉孫覺條奏其妄曰成周賖貸特以備民之緩急不可徒與也故以國服為之息然國服之息説者不明鄭康成釋經乃引王莾計贏受息無過歲什一為據不應周公取息重於莾時况國用專取具於泉府則冢宰九賦將安用耶聖世宜講求先王之法不當取疑文虛説以圖治同上蘇軾曰昔陛下又創制置三司條例司使六七少年日夜講求於內使者四十餘輩分行營幹於外以萬乘之主而言利以天子之宰而治財君臣宵旰幾一年矣而富國之功茫如捕風徒聞內帑出數百萬緡祠部度五千人耳以此為術人皆知其難也三蘇文青苖法行陳舜俞不肯奉令上疏深陳其害且自劾曰民間出舉財物取息重止一倍約償緡錢而穀粟布縷魚鹽蔌耰鋤金錡之屬得雜取之朝廷募民貸取有司約中熟為價而必償緡錢欲如私家雜償他物不可得故愚民多至賣田宅質妻孥有識耆老戒其鄉黨子弟未嘗不以貰貸為苦祖宗著令以財物相出舉任從書契官不為理其保全元元之意深逺如此今散為青苖惟恐不盡萬一飢饉薦至必有乘時貴糶者未知將何法以制之官制既放錢取息富室藏鏹坐待鄰里逋欠之時田宅妻孥隨欲而得是豈不為兼并利哉雖分為夏秋二科而秋放之月與夏斂之期等夏放之月與秋斂之期等不過展轉計息以給為納使吾民終身以及世世每歲兩輸息錢無有窮已是别為一賦以敝海內非王道之舉也奏上謫監鹽酒稅宋史先是詔條例司講立役法條例司言使民出錢募人充役即先王致民財以祿庶人在官者之意命吕惠卿曾希相繼草具條貫踰年始成計民之貧富分五等輸錢名免役錢若官户女户寺觀單丁未成丁者亦等第輸錢名助役錢凡斂錢先視州縣應用雇直多少隨户等科取雇直又增取二分以備水旱欠闕謂之免役寬剩錢用其錢募人代役既試用其法於開封府遂推行於諸路既而東明縣民數百紛然詣開封府訴司馬光言上等户自來更互充役有時休息今使歲出錢是常無休息之期下等户及單丁女户從來無役今盡使之出錢是鰥寡孤獨之人俱不免役夫力者民之所生而有穀帛者民可耕桑而得至於錢者縣官之所鑄民之所不得而私為也今有司立法惟錢是求歲豐則民賤糶其穀歲凶則伐桑棗殺牛賣田得錢以輸民何以為生乎此法卒行富室差得自寬貧者困窮日甚矣帝不聽同上王韶倡為緣邉市易之説王安石善之謂與漢平準法同可以制物低昂而均通之遂用草澤魏繼宗議以內藏庫錢帛置市易務於京師凡貨之可市及滯於民而不售者平其價市之願以易官物者聽若欲市於官者則度其田宅或金帛為抵當而貸之錢實期使償半歲輸息十二及歲倍之過期不輸息外每月更加錢百分之一凡諸司配率並仰給焉以户部判官吕嘉問為提舉賜內庫錢百萬緡為本嘉問上建置十三其一欲於律外禁兼并之家輒取利宋史王安石建保甲養馬之法文彥博吳充以為不便安石持論益堅乃詔開封府界諸縣保甲願牧馬者聽仍令以陜西所市馬選給之於是曾布等承詔上其條約凡陜西五路義勇保甲願養馬者户一匹物力高願養二匹者聽皆以監牧見馬給之或官與其直令自市府界毋過三十匹五路毋過五千匹襲逐盜賊外乘越三百里者有禁歲一閲其肥瘠死病者補償在府界者見體量草二百五十束加給者錢布在五路者歲免折變緣納錢三等以上十户為一保四等以下十户為一社以待病斃逋償者保户馬死保户獨償社户馬死社户半償之初行於開封及陜西其後遂遍行諸路同上韓琦言臣觀近年朝廷舉事似不以大敵為恤彼形生疑必謂我有復燕之意故引先發制人之説造為釁端所以致疑其事有七招高麗朝貢一也取吐蕃之地建燕河二也植榆柳於西山以制番騎三也創保甲四也築河北城池五也置都作院頒弓矢新式六也置河北三十七將七也契丹素為敵國因事發疑不得不然臣嘗竊計始為陛下謀者必曰治國之本當先聚財積穀募兵於農則可以鞭笞四夷故散青苖錢為免役法置市易務次第取錢新制日下更改無常而監司督責以刻為明今農怨於畎畝商歎於道路長吏不安其職陛下不盡知也綱目司馬光復言免役之法其害有五上户舊充役固有陪備而得畨休今出錢比舊所差皆土著良民今皆浮浪之人恣為姦欺又農民出錢難於出力凶年則賣莊田牛具以錢納官又提舉司惟務多斂役錢積寬剩以為功此五害也今莫若直降敕命委縣令佐揭簿定差其人不願身供役許擇可任者雇代惟衙前一役最號重難今仍行差法陪備既少當不至破家若猶矜其力難獨任即乞如舊於官户寺觀單丁女户有屋産田莊者隨貧富以差出助役錢尚慮役人利害四方不能齊同乞許監司守令審其可否可則亟行如未究盡縣五日具指畫上之州州一月上轉運司以聞朝廷委執政審定隨一路一州各為之敕務要曲盡宋史吏部尚書偰哲篤迎合丞相意請以鈔一貫文省權銅錢一千文鈔為母而錢為子衆皆唯唯惟國子監祭酒吕思誠曰中統至元自有母子豈有以故紙為母而立銅為子者乎又曰而少日嘗見為一致以虛換實也今歷代與至正錢中統至元鈔交鈔分為五項慮下民藏其實而棄其虛恐不為國家利也偰哲篤曰至元鈔多偽故更之思誠曰至元鈔非偽人為偽耳交鈔若出亦有為偽者矣且至元鈔人猶識之交鈔人未之識偽將滋多况祖宗成憲其可輕改偰哲篤曰錢鈔兼行何如思誠曰錢鈔兼行輕重不倫何者為母何者為子汝不通古今徒以口舌取媚大臣可乎偰哲篤忿曰公有何䇿思誠曰我有三字䇿行不得行不得丞相托克托見思誠之言直頗疑未決御史大夫額森特穆爾曰吕祭酒之言亦有是者但不當於廊廟中大聲厲色耳於是諷御史劾思誠狂妄左遷湖廣行省左丞遂定更鈔之議以中統交鈔一貫省權銅錢一千文惟至元鈔二貫仍鑄至元通寶錢與歷代錢並用以實鈔法至元鈔通行如故令民間通行之未久物價騰湧至逾十倍及兵興所在郡縣皆以物貨相貿易公私所積者皆不行國用繇是大乏元史初陜西軍興移用不足知商州皮仲容始獻議采洛南縣江崖山虢州青水冶青銅置阜民朱陽二監以鑄錢既而陜西都運使張奎知永興軍范雍請鑄大錢與小錢兼行大錢一當小錢十及奎徙河東又鑄大鐵錢亦以一當十以助關中軍費未幾三司奏罷河東鑄鐵錢而陜西復采儀州竹尖嶺黃銅置博濟監鑄大錢朝廷因敕江南鑄大銅錢而江池虢饒州又鑄小鐵錢悉輦致關中數州錢雜行大約小銅錢三可鑄當十大銅錢一以民間盜鑄者衆錢文大亂物價翔踊公私患之於是奎復奏晉澤石三州及威軍日鑄小鐵錢獨留用河東而河東鐵錢既行盜鑄錢者獲利十之六錢輕貨重其患如陜西言者皆以為不便知并州鄭戩請河東鐵錢且以二當銅錢一行一年又以三當一或以五當一翰林學士張方平宋祁御史中丞楊察與三司使葉清臣先上陜西錢議曰關中用大錢本以縣官取利大多致姦人盜鑄其用日輕救弊不先自損其法未易行請以江南議商州大銅錢一當小錢三又言姦人所以不鑄小鐵錢者以鑄大銅錢得利厚而官不必禁若鑄大銅錢無利又將鑄小鐵錢以亂法請以小鐵錢三當銅錢一既而又以河東小鐵錢如陜西亦以三當一且罷官所置罏朝廷皆施用其言是姦人稍無利猶未能絶濫錢也其後詔商州罷鑄青黃銅錢又令陜西大銅錢大鐵錢皆一當二盜鑄乃止然令數變邱民耗於資用類多咨怨久之始定長編臣伏見六月八日敕以狂賊傷害宰臣擒捕未獲陛下悲傷震悼形於寢食特降詔書明立條格云有能捉獲賊者賜錢萬貫仍加超授今下手賊等四分之內已得其三其餘兩人蓋不足計根尋蹤迹知自承宗再降明詔絶其朝請又與王士則士平等官八日之制無不行者獨有賞錢尚未賜給羣情疑惑未測聖心聞初載錢置市之日市中觀者日數萬人巡繞瞻視咨嗟歎息既去復來以至日暮百姓小人重財輕義不能深達事體但見不給其賞便以為朝廷愛惜此錢不守言信自近傳逺無繇辨明且出賞所以求賊今賊已誅斬若無人捉獲國家何因得此賊而正刑也承宗何故而賜誅絶也士則士平何故與美官也三事既因獲賊獲賊必有其人不給賞錢實亦難曉假如聖心獨有所見審知不合加賞其如天下百姓及後代久逺之人哉論捕賊行賞表一件平叔欲令府縣糶鹽每月更加京兆尹料錢百千司録及兩縣令每月各加五十千其餘觀察及諸州刺史縣令録事參軍多至每月五十千少至五千三千者臣今計此用錢已多其餘官典及巡察手力所繇等糧課仍不在此處通計所給每歲不下十萬貫未見其利所費已廣平叔又云停鹽司諸色所繇糧課約每歲合減得十萬貫錢今臣計其新法亦用十萬不啻減得十萬却用十萬所亡所得一無贏餘也平叔又請以糶鹽多少為刺史縣令殿最多者遷轉不拘常例如闕課利依條科責者刺史縣令職在分憂今惟以鹽利多少為之升黜不復考其治行非唐虞三代考績黜陟幽明之義也論變鹽法狀一件平叔請定鹽價每斤三十文又每二百里每斤價加收二文以充腳價量地遠近險易加至六文腳價不足官與出名為每斤三十文其實已三十六文也今鹽價京師每斤四十諸州則不登此變法之後秪較數文於百姓未有厚利也腳價用五文者官與出二文用十文者官與出四文是鹽一斤官糶得錢名為三十其實斤多得二十八少得二十六文折長補短每斤收錢不過二十六七百姓折長補短每斤用錢三十四則是公私之間每斤當失七八分也下不及百姓上不歸官家積數至多不可遽算以此言之不為有益平叔又請令所在及農隙時併召車牛般鹽所納都倉不得令有闕絶者州縣和雇車牛百姓必無情願事須差配然付腳錢百姓將車載鹽所繇先皆無撿齊集之後始得載鹽及至院監請受又須待其輪次不用門户皆被停留輸納之時人事又别凡事和雇無不皆然百姓寧為私家載物取錢五文不為官家載物取十文錢也不和雇則無可載鹽和雇則害及百姓此又不可也同上一件平叔稱停減鹽務所繇收其糧課一歲尚得十萬貫文今又稱既有巡院請量間劇留官吏於倉場勾當要害守捉少置人數優恤糧料嚴加把捉如有漏失私糶等並準條處分者平叔所管鹽務所繇人數有幾量留之外收其糧課一歲尚得十萬貫此又不近理也比來要害守捉人數至多尚有漏失私糶之弊今又減置人數謂能私鹽斷絶此又於理不可也一件平叔云變法之後歲計必有所餘日用還恐不足謂一年已來且未責以課利後必數倍較多者此又不可方今國用常言不足若一歲頓闕課利為害已深雖云明年較多豈可懸保此又非公私蓄積尚少之時可行者也一件平叔又云浮寄姦猾者轉富土著守業者日貧若官自糶鹽不問貴賤貧富士農工商道士僧尼并兼遊惰因其所食盡輸官錢並諸道軍諸使家口親族遞相影占不曾輸稅若官自糶鹽此輩無一人遺漏者臣以此數色人等官未自糶鹽之時從來糴鹽而食不待官自糶然後食鹽也若官不自糶鹽此色人等不糴鹽而食官自糶鹽即糴而食之則信如平叔所言矣若官自糶與不自糶皆常糴鹽而食則今官自糶亦無利也所謂知其一而不知其二見其近而不見其遠也國家𣙜鹽糶與商人商人納𣙜糶與百姓則是天下百姓無貧富貴賤皆已輸錢於官矣不必與國家交手付錢然後為輸錢於官也一件平叔云初定兩稅時絹一匹直錢三千今絹一匹直錢八百百姓貧虛或先取粟麥價及至收穫悉以還債又充官稅顆粒不殘若官中糶鹽一家五口所食鹽價不過十錢隨日而輸不勞驅遣則必無舉債逃亡之患者臣以為百姓困弊不皆為鹽價貴也今官自糶鹽與依舊令商人糶其價貴賤所較無多通計一家五日所食之鹽平叔所計一日以十錢為率一月當用錢三百是則三日食鹽一斤一月率當十斤新法實價與舊每斤不較三四錢以下通計五口之家以平叔所約之法計之賤於舊價日較一錢月較三十不滿五口之家所較更少然則改用新法百姓亦未免窮困流散也初定稅時匹絹三千今只八百假如特變鹽法絹價亦未肯貴五口之家因變鹽法日得一錢之利豈能便免作債收穫之時不被徵索輸官稅後有贏餘也以臣所見百姓困弊日久不以事擾之自然漸裕不在變鹽法也今絹一匹八百百姓尚多寒無衣者若使匹直三千則無衣者必更衆多况絹之貴賤皆不緣鹽法以此言之鹽法未要變也一件平叔云每州糶鹽不少長吏或有不親公事所繇浮詞云當界無人糴鹽臣即請差清強巡官簡責所在實户據口團保給一年鹽使其四季輸納鹽價口多糶少及鹽價遲違請停觀察使見任改散慢官其刺史以下貶與上佐其餘官貶逺處者平叔本請官自糶鹽以寬百姓令其蘇息免更流亡今令責實户口團保給鹽令其隨季輸納鹽價所謂擾而困之非前意也百姓貧家食鹽至少或有淡食動經旬月若據口給鹽依時徵價辦與不辦並須納錢遲違及違條件觀察使上下各加罪譴茍官吏畏罪必用威刑臣恐因此所在不安百姓轉致流散此又不可之大者也一件平叔請限商人鹽納官後不得輒于諸軍諸使覔職掌把錢捉店看守莊磑以求影庇請令所在官吏嚴加防察如有違犯應有資財並令納官仍牒送府縣充所繇者臣以為鹽商納𣙜為官糶鹽子父相承坐受厚利比之百姓實則較優今既奪其業又禁不得求覔職事及為人把錢捉店看守莊磑不知何罪一朝窮蹙之也若必行此則富商大賈必生怨恨或收市重寶逃入反側之地以資冦盜此又不可不慮也俱同上錢通卷二十六
