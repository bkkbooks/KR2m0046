body:
  text: 錢通卷十五明胡我琨撰七之操泉之波也世胥淆之淆之無特操也心如水不可波介如石不可淆也吾守吾素風之不為靡也景運清泰上下同風匹夫猶能自好勵世者寧得不以身之清白雋世道之淡穆耶故操曰七主術貞觀中治書侍御史權萬紀上言宣饒二州諸山大有銀坑採之極是利益每嵗可得錢百萬貫上謂曰朕貴為天子是事無所少乏唯嘉言善事有益於百姓者且國家賸得數百萬錢何如得一有才行人不見卿推賢進善之事又不能按舉不法震肅權豪唯只言稅鬻銀坑以利多為美昔堯抵璧於山投珠於淵繇是崇名美號見稱千載後漢桓靈二帝好利賤士為近代庸暗之主卿遂欲將我比桓靈耶是日放令還第唐書敬宗自為諸王深知兩朝之弊及即位勵精求治去奢從儉詔宫女非有職事者出三千餘人放五百鷹犬省教坊總監冗食千二百餘員近嵗别貯錢榖悉歸之有司宣索組繡雕鏤之物悉罷之穆宗之世每月視朝不過一二上始復舊制每竒日視朝對宰相羣臣延訪政事久之方罷待制官舊雖設之未嘗召對至是屢蒙延問中外翕然相賀以為太平可冀通鑑尋命兼關南兵馬都監李漢超在關南有訟其强娶已女為妾及貸民錢不償者帝召謂曰汝女欲適何人對曰農家耳又問漢超未至關南時契丹何如對曰嵗苦侵㬥曰今復爾耶對曰無也帝曰漢超朕之貴臣汝女為之妾不猶愈為農婦乎且使漢超不在關南汝家尚能保其所有貨財耶責其人而遣之密使諭漢超曰亟還其女并所貸朕姑貰汝勿復為也不足於用何不告朕耶漢超感泣繇是益修政理吏民愛之㑹編德宗時李正已畏上威名表獻錢三十萬緡德宗欲受之恐見欺却之則無辭崔祐甫請遣使慰勞淄青將士因以正已所獻錢賜之使將士人人戴上恩又諸道聞之知朝廷不重貨財德宗悅從之正已大慚天下以為太平之治庶幾可望焉皇明經濟録亷名梁何遠為武昌太守武昌俗皆汲江水盛夏遠患水溫每以錢買人井寒水不取錢者則連水還之南史建武中太守鄧晨欲修復河功聞楊曉水脉召與議之楊曰昔成帝用方進之言尋而自夢上天天帝怒曰何故敗我濯龍淵是後民失其利多致饑困明府今興立廢業將有徵於此誠願以死效力晨大悅因署楊為都水掾使典其事楊因高下形勢起塘四百餘里數年乃立後陂成人譛楊言取錢晨繫楊於獄户自開械自解晨釋之出時日暮陂上有火光引前清德之感也謝承書謝朏字敬冲永明中為義興太守在郡不省雜事悉付綱紀曰吾不能作主者吏但能作太守耳後為吳興太守弟瀹時為吏部尚書朏至郡致瀹數斛酒還書曰可力飲此勿豫人事朏居郡每不理常務聚飲衆頗譏之亦不屑也子􅀈為東陽內史及還五官送錢一萬止留一百答曰數多劉寵更以為愧南史孫叔敖病甚臨卒將無棺椁令其子曰優孟曾許千金貸吾孟楚之樂長與相君相善雖言千金實不負也卒後數年莊王置酒以為樂優孟乃言孫君相楚之功即慷慨商歌曰貪吏不可為而可為亷吏可為而不可為貪吏而不可為者當時有汙名而可為者子孫有以家成亷吏而可為者當時有清名不可為者其後躬租而負薪貪吏常苦富亷吏常苦貧獨不見楚相孫叔敖亷潔不受錢涕泣數行王心感動覺悟問孟孟具列對即求其子封於潘國潘即固始也漢延熹中立碑吳祐政從仁簡民不忍欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何故欺之促歸伏罪性慙懼自首具談父言祐曰掾以親故受汚穢之名所謂觀過知仁矣使歸謝其父還以衣遺之㑹編鄭棨為廬州刺史移檄黃巢請無犯州境嵗滿去贏錢千緡藏州庫後他盜至終不敢犯鄭使君錢五車韻瑞嘗有一名公初任縣尉有舉人投書索錢戲為一詩答之曰五貫九百五十俸省錢請作足錢用妻兒尚未厭糟糠僮僕豈免遭饑凍贖典贖解不曽休喫酒喫肉何曾夢為報江南癡秀才更來謁索覔甚甕熙寧中例增選人俸錢不復有五貫九百俸者此實養亷隅之本也張忠定公為崇陽令一吏自庫中出鬢傍有一錢詰之乃庫中錢也公命杖之吏勃然曰一錢何足杖我耶爾能杖我不能斬我也公援筆判之一日一錢千日一千繩鋸木斷水滴石穿自仗劍下階斬其首申臺府自劾崇陽人至今傳之彚苑詳注孔覬後為司徒左長史弟道存代覬為後軍長史江夏內史時東土大旱都邑米貴一斗將百錢道存慮覬甚乏遣使載五百斛米餉之覬呼使謂之曰我在彼三載去官之日不辨有路糧至彼未幾那能便得此米即可載還彼吏曰自古以來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去南史鄭譯拜爵國公高熲戲曰筆乾答曰出為方嶽杖策言歸不得一文何以潤筆隋書安陵清者項仲山每飲馬渭水投三錢郝亷亦然趙岐三輔决録陽城為諫議大夫以布衾枕質錢人爭售之續韻府劉寵漢安帝時㑹稽守被徵入山隂有五叟龎睂皓首人賫百錢送寵曰自明府來狗不夜吠人不識吏寵為選一大錢受之而去劉寵傳亷吏傳作劉統交址太守張恢坐贓千金徵還伏法以資物簿入大司農詔頒賜羣臣鍾離意得珠璣悉以委地而不拜賜帝怪而問故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也此贓穢之物誠不敢拜帝嗟嘆曰清乎尚書之言乃以庫錢三十萬賜之薛宣為馮翊池陽㑹舉亷吏獄掾王立未及召立妻獨受囚家錢六千立不知慙恐自殺潁川黃子亷每飲馬輒投錢風俗通舊蜀嘉王召孝亷仲庭預令教授諸子庭預雖通墳典常厄饑寒至門下亦未甚禮時方凝寒王以舊火爐送學院庭預方獨坐太息以筯撥灰俄灰中得一雙金火筯遽求謁見王陳其本末王曰吾家失此物已十年吾子得之還以相示真有古人之風贈錢十萬衣數襲米麥三十石禮待甚厚薦授榮州録事參軍玉溪編事李師古跋扈憚杜黃裳為相未敢失禮乃命一幹吏寄錢數千繩并氊車子一乘亦近千緡使者未敢遽送乃於宅門伺候纍日有緑輿自宅出從婢二人皆青衣襤褸問何人曰相公夫人使者遽歸以白師古師古乃折其謀終身不敢失節幽間鼓吹向文簡公敏中判大理寺時沒入祖吉贓錢分賜法吏公引鍾離意委珠事獨不受在官一無所須以亷清聞自警編户部侍郎牛僧孺素為穆宗所厚初韓𢎞之子右驍衛將軍公武為其父謀以財結中外及公武卒穆宗取𢎞財簿自閲視凡中外主權多納𢎞貨獨朱句細字曰某年月日送户部牛侍郎錢千萬不納穆宗大喜以示左右曰果然吾不謬知人以僧孺為中書侍郎同平章事賂遺總類孝子查道為人輕財重義初就試貧不能上道親舊斂錢三萬遺之道出滑州過父友吕翁家翁喪無錢葬母兄將鬻女以辦喪事道傾槖悉與之且為嫁其女是嵗罷試時人以比郭代公又有同僚死女為人婢道贖之以嫁士族在官雖俸入豐厚旁給宗族孤寡為畢嫁娶者十餘家以是常匱乏所至務寬恕胥吏有過未嘗笞罰民有訟逋負者或出已錢償之嘗出案部路旁有佳棗從者摘以獻道即計直挂錢於木有文集箋表行於世亘史外紀張無垢在越土作幕官不請供給錢在館中進書不肯轉官人皆以為好名之過無垢曰既請月俸又受供給偶然進書又便受賞於我心實有不安此亦本分事何名之好經濟編中子秉秉字叔節少傳父業兼明京氏易博通書傳常隱居教授年四十餘乃應司空辟拜侍御史頻出為豫荆徐兖四州刺史遷任城相自為刺史二千石計日受俸餘祿不入私門故吏齎錢百萬遺之閉門不受左編貞介顧協字正禮少清介有志操為舍人同官者皆潤屋協在省十六載器服飲食不改於常有門生始來事協知其亷潔不敢厚餉止送錢三千協發怒杖二十因此事者絶於饋遺南史郭林宗家貧初欲逰學無資就姊夫貸五千錢乃遠至成臯從師授業併日而食衣不蔽形常以蓋幅自障出入入則護前出則掩後有道别傳柳元景為三公時在朝勳貴多事産業惟元景獨無所營南岸有數十畝菜園守園人賣得錢二萬送還宅元景怒曰我立此菜園以供家中啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人宋書太原郝子亷一分一介不取諸人曾過姊家食密留五十錢置席下而去風俗通周迪妻某氏迪善賈往來廣陵會畢師鐸亂人相略賣以食迪饑將絶妻曰今欲歸不兩全君親在不可并死願見賣以濟君行迪不忍妻固與詣肆售得數千錢以奉迪至城門守者誰何疑其紿與迪至肆問狀見妻首已在於枅矣迪裹餘體歸葬之廣記甄彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受回謂曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣而聞之及踐祚以西昌侯藻為益州刺史乃以彬為府録事參軍帶郫縣令將行同列五人帝誡以亷慎至彬獨曰卿昔有還金之美故不復以此言相屬繇此名德益彰南史幽州從事溫璉燕人也以儒學著稱與馮道幼相善經兵亂有賣漆燈椸於市者璉以為鐵也遂數錢買之纍日家人用燃膏燭因拂拭乃知銀也大小觀之靡不欣喜惟璉憫然曰非義之物安可寶之遂訪其賣主而還之主亦不受璉固還之乃拜受而去别賣四五萬將其半謝之璉終不納遂施僧寺用飾佛像冀祝璉之壽也時共推其有仁人之行劉氏耳目記曹璨彬之子也為節度使其母一日閲宅庫見積錢數千緡召璨指而示曰先侍中履歷中外未嘗有此積聚可知汝不及父遠矣國老談苑吏部侍郎張文寶泛海使杭州船壞風飄至天長吳主厚禮之資以從者儀服錢幣數萬文寶獨受其食餘皆辭之曰唐朝與吳久不通問今既非君臣又非賔主若受此物何辭以謝吳主嘉之竟逹命於杭州而還㑹編有户部官進錢入宫者趙鼎召至相府切責之翌日問帝曰其人獻錢耶帝曰朕求之也鼎曰其人不當獻陛下不當求遂黜獻錢人於遠郡宋史汪應辰剛方正直敢言不避在朝多革弊政人皆側目上皇方甃石池以水銀浮金鳬魚於上帝過之上皇指示曰水銀正乏此買之汪尚書家帝怒曰汪應辰力言朕建房廊與民爭利乃自販水銀耶時賜發運使史正志緡錢二百萬為均輸和糴之用應辰三上疏論之遂出知平江府然水銀實非買應辰之家也宋史左神策軍吏李昱貸長安富人錢不償許孟容收捕賊繫昱期使償曰期滿不足當死中尉訴於上上遣中使宣㫖送本軍孟容曰臣不奉詔當死然臣為陛下尹京畿非抑制豪强何以肅清輦下錢未償李昱不可得上嘉其剛直而許之京城震粟唐畢相諴家本寒微其渭陽為太湖縣伍伯伍伯即今號雜職行杖者相國耻之俾罷此役為除一官纍遣致意竟不承命特除選人楊載宰此邑參辭特於私第延坐與語期為落此猥籍津送入京楊令到任具逹召㫖伍伯曰某下賤豈有外甥為宰相耶楊令堅勉之乃曰某每嵗公稅享六十緡事例錢茍無敗闕終身優渥不審相公欲為致何官職楊令具以聞相國歎賞亦然其說竟不奪其志也北夢瑣言曹修古明道初為御史上書乞莊獻太后還朝責守興化軍暴疾終於官家貧死之日無衣以殮郡之僚屬若吏民之賢者莫不號慕歎息相與出錢帛數十萬􅉠其家曹女始笄泣語其母曰先人忠節名聞天下不幸以直言謫死且君子不喪於家安可受以凂我先人之全德哉哭不已謝而遣之吏民固乞卒不受一錢其純孝高尚如此曹建安人四御史之一也澠水燕談録杜祁公居官清介每請俸必過初五家人嘗前期誤請者公怒即以付有司劾治尹師魯公所知也余在潁州士人家嘗見師魯得罪後謝公書親引此事云以某自視雖若無愧以公觀之則安得為無罪師魯蓋坐擅貸官錢為部吏償債當時有惡之者遂論以贓云石林燕語杜祁公罷相居南京無宅假驛舍居之數年訖公薨卒不遷亦不營生事止食其俸而已然閭里吉凶慶吊與親識之道南京者相與燕勞問遺之禮未嘗廢公薨夫人相里氏以絶俸不能自給始盡出其篋中所有易房服錢二千公本遺腹子其母後改適河陽人公為前母子不容因逃河陽依其母慵書於濟源富人相里氏一見竒之遂妻以女云石林燕語趙勤乃劉賜娣之子也幼有志操時賜國租適到指錢示勤曰拜乞汝三十萬勤曰拜而得錢非義所取終不肯拜東觀漢記王充論衡曰楊子雲作法言蜀富貴人齎錢十萬願載於書子雲不聽曰夫富無仁義猶圈中之鹿欄中之羊也安得妄載右丞呼遜有罪詔下中書省雜治呼遜對簿歷指宰執曰汝曹皆曽使我家錢物何得問我雄飛曰我常受汝家錢物否曰惟公獨不雄飛曰若爾則我當問汝詰之遂伏辜元史列傳溫公獨樂園園子吕直遊園者與茶湯錢十千以納公公怒不受直曰只端明不愛錢後創一井亭乃園子所創也五車韻瑞邴原常行而得遺錢拾以係樹枝此錢久不見取而繫錢者頗多問其故答者謂之神樹原惡其因已而成淫祠乃辨之於是里人遂斂其錢以為社供公沙穆常養猪有病使人賣之於市囑之曰如售當告買者言病賤取其值不可欺人賣者到市即售亦不言病其值過價穆怪之問其故齎半值以還買者買者辭不受穆棄錢而去後漢書宋淳熙時南康建昌旱民告於軍司户獨甘泉鄉人李氏不肯陳詞曰投詞當以實我家田不旱衆人惡曰今一鄉稱旱而君獨否他人必以官司為妄於是惡少欲戕李氏李不得已亦隨衆自列得以分數蠲租為錢六萬乃邀道士用所免建壇謝過不以無名之財自潤也轉因録監察御史李畬母清素貞潔畬請祿米送至宅母遣量之賸三石問其故令史曰御史例不槩又問腳錢幾又曰御史例不還腳車錢母怒令送所賸米及腳錢以責畬畬乃追倉官科罪諸御史皆有慙色朝野僉載傅公堯俞在徐前守侵用公使錢公寖為償之未足而公罷後守反以文移公當償千緡公竭資且假貸償之久之鈎考得實公蓋未嘗侵用也公卒不辨其容物不校如此自警編甲時禁行惡錢有二人在市以惡錢易者上令斬之趙綽曰當杖上曰不關卿事綽曰陛下不以臣愚置立法司欲妄殺人豈得不關上曰撼大木不動者當退對曰臣冀感天心何止動木上乃止山堂肆考唐蘇頲字廷碩開元中為益州長史時皇甫恂使蜀檄取庫錢買錦半臂頲不肯豫因上言遣使銜命先取不急豈國家意耶同上齊何𦙍仕至中書令後棄官隱於若耶山雲門寺𦙍二兄求㸃並棲遁世號何氏三高梁武帝特詔不起敇給白衣尚書祿又敇山隂月給庫錢五萬皆不受乃敇何子朗等六人受學𦙍以若耶逼隘不容學徒遂遷秦望起學舍即林成園因巖為堵紹興府志勝陸贄調鄭尉張鎰有重名贄往見語三日竒之請為忘年交既行餉錢百萬曰請為母夫人一日費贄不納止受茶一串歐陽大小夏侯氏學皆出於寬寬授歐陽生子世世相傳至曾孫地餘以太子中庶子授太子後為博士論石渠元帝即位地餘侍中貴幸至少府戒其子曰我死官屬即送汝財物慎勿受汝九卿儒者子孫以亷潔著可以自成及地餘死少府官屬共送數百萬其子不受天子聞而嘉之賜錢百萬左編素風辛居士名宣仲截竹為罌以酌酒曰吾性甚愛竹及酒欲令二物並耳宋巴陵王休若謁之呼兒取豹皮下五文錢買瓜南雍州記嚴君平卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣裁日閲數人得百錢足自養則閉肆下簾而授老子博覽亡不通依老子嚴周之指著書十餘萬言漢書戴碩子延壽善書好學山隂有陳載者家富有錢三千萬鄉人云戴碩兒敵陳載三千萬錢彚苑詳注禇彥回元徽中授中書監侍中時淮北屬魏江南無鰒魚或有間關得至者一枚直數千錢有獻彥回鰒魚三十枚彥回時雖貴而貧薄過甚門生有獻計賣之云可得千萬錢彥回變色曰我謂此是食物非曰財貨且不知堪賣錢聊爾受之雖復儉乏寧可賣餉取錢也悉與親遊噉之少日便盡南齊書王夷甫雅尚𤣥遠常嫉其婦貪濁口未嘗言錢字婦欲試之令婢以錢繞牀不得行夷甫晨起見錢閡行呼婢曰舉郤阿堵物世說新語毛義鄭均皆以行義稱於鄉里南陽張奉慕名往候之坐定而府檄適至以義守南陽令義奉檄而入喜動顔色奉心賤之辭去後義母死徵辟皆不至奉乃歎曰賢者固不可測往日之喜乃為親屈也均兄為縣吏頗受禮遺均諫不聽乃脫身為傭餘得錢帛歸以與兄曰物盡可復得為吏坐贓終身捐棄兄感其言遂為亷潔均仕為尚書免歸帝下詔褒寵義均賜米各千斛常以八月長吏問起居加賜斗酒㑹編邴原年十一喪父貧鄰有書舍過之必泣其師曰何泣原曰孤者易傷貧者易感夫學者必有父兄羡其不孤而得學師感之曰欲學何書原曰無錢資師曰茍有志不求資遂從學青蔚軒日抄梁謝舉兄子僑素貴嘗一朝無食其子啓以班史質錢答曰寧餓死豈可以此充食乎阮宣百錢掛杖頭至酒店便獨酣暢家無擔石晏如也阮宣傳阮孚持一錢皂囊遊㑹稽客問囊中何物曰但有一錢看囊恐其羞澀董奉字君翼侯官人也後還豫章廬山下居不種田日為人治病亦不取錢重病愈者使栽杏五株輕者一株如此數年計得十萬餘株鬱然成林乃使山中百禽羣獸遊戲其下卒不生草常如藝治也神仙傳杜祁公曰我致政後必買小駟直八九千錢者著粗麻衫跨而入市看盤鈴傀儡宋周茂叔家廬山蓮華峯下􅫉再鎮蜀將奏用之未及而卒熙寧六年也年五十七每奉已甚約俸祿悉以周宗族奉賔友家或無百錢之儲李初平卒子幼護其喪歸葬之又往來經紀其家始終不懈士大夫皆指君曰是能葬舉主者及分司而歸妻子饘粥或不給曠然不為意也王安石為江東提㸃刑獄時已號為通儒茂叔遇之與語連日夜安石退而精思至忘寢食時安石年四十茂叔年四十四矣左編漢賈逵帝令逵自選公羊嚴顔諸生高才者二十人教以左氏與簡紙經傳各十通逵母常有疾帝欲加賜以校書例多特以錢二十萬使頴陽侯馬防與之謂防曰賈逵母病此子無人事於外屢空則從孤竹之子於首陽山矣同上錢通卷十五
