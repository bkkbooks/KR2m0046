body:
  text: 錢通卷三明胡我琨撰一之原貨一而命司焉者泉為多泉居三幣之下冶氏執齊改煎金錫知者創焉巧者劑之視其物而絘其産然後貫利聖人之有作也揭而式其原則是以克鑄故原曰一稽始自太昊以來則有錢矣太昊氏髙陽氏謂之金有熊氏髙辛氏謂之貨陶唐氏謂之泉商人齊人謂之布齊人莒人謂之刀文獻通考神農列􅀈於國以聚貨帛日中為市以交有無虞夏商之幣金為三品或黃或白或赤或錢或布或刀或龜貝史記黃帝時采香山之金鑄刀此刀之始也範金為貨制金刀立五幣以制國用貨幣之制始也原始管子曰禹五年水民之無􅕷賣子者禹以歷山之金鑄幣贖之此錢幣之始也管子曰湯七年旱民之無􅕷賣子者湯以莊山之金鑄幣贖之周景王鑄大錢文曰寶貨錢有文其製始此原始秦始皇行半兩錢古人錢字作泉自是始稱錢而後之八銖四銖皆原於此前漢食貨志曰太公為周立九府圜法錢圜函方輕重以銖漢文帝時除盜鑄錢令使得自鑄後世弛錢禁始此原始南北朝宋西羌未平東海王上錢二千萬助國諸王獻助始於此梁始鑄鐵錢以鐵為幣始見於此隋賦民錢造佛圖經像此又增一賦也始見於此唐髙祖初行開通元寶錢後世錢文用寶字始此𤣥宗以王璵為祠祭使用楮為錢以祭後世用紙錢代幣始此唐代宗稅青苖錢給百官俸青苖之名始見於此德宗兩稅外取一錢者以枉法論行兩稅法始此初行稅間架除陌錢法五季楚鑄鉛鐵錢以鉛為錢始見於此唐初聽民鑄田器計畝稅錢稅田器始此徴諸郡丁口鹽錢後世徵戶口食鹽鈔始此周世宗發引之日金銀錢寶皆寓以形而楮錢大如盞口其印文黃曰泉臺上寶白曰冥遊亞寶據此則金銀楮錠亦始於五代也宋徽宗科免夫錢初收經制錢先是經制錢為東南七郡之害髙宗初置見錢關子始收諸路月樁錢又一稅也稱元寶自唐髙祖始稱重寶自唐肅宗始稱通寶自宋人誤讀開通錢文始改元更鑄自宋太宗始俱同上丘濬曰臣按鑄錢以年號為文始於劉宋孝建宋自開寶每更一號必鑄一錢左編釋義錢之為幣以銅為之體圓孔方背面俱似皆有周郭周流四方之象也事類合璧以珠玉為上幣以黃金為中幣以刀布為下幣管子夾漈鄭氏曰謂之泉者言其形謂之金者言其質謂之刀者言其器謂之貨謂之布者言其用古文錢字作泉者言其形如泉文一變而為刀器再變而為圜法自圜法流通於世民實便之故泉與刀為廢後人不曉其謂也觀古錢其形即篆泉文也後人代以錢字故泉之文借為泉水之泉其實泉之篆文下體不從水也文獻通考錢有字謂之面錢漫曰幕又曰幕皮師古曰呼錢背為幕皮者謂其平而無文也鋊銅屑也摩錢漫面以取其屑更以鑄錢也僞錢私鑄之錢緡􅀈穿錢索也采山銅以為錢煮海水以為鹽伍被傳泉府上士四人中士八人下士十六人周景王二十一年將鑄大錢以振救人於是乎有母權子而行母重也重大倍故為母子輕也輕小半故為子國語武帝時鑄官赤仄錢漢書音義曰俗所謂紫紺錢也武帝又造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品前漢食貨志張宴曰按今所見契刀錯刀形質如大錢而肉好輪厚異於此大錢形如大刀環矣契刀身形員長不二寸也其文左曰契右曰刀無五百字也錯刀則刻之作字也以黃金填其文上曰一下曰刀二刀泉甚不與志相應也似札單差錯文字磨滅故耳張宴論如淳曰莢錢如榆莢也惠帝紀云視作斥上者將軍四十金鄭氏曰四十金四十斤金也晉灼曰近上二千石賜錢二萬此言四十金實金也下凡言黃金真金也不言黃金錢也食貨志黃金一斤直萬錢也後漢何休注公羊百金之魚亦謂一金萬錢緗素雜記引一金萬錢以證晉王導所市練布之價則是一金萬錢不但秦漢為然自三代至晉莫不皆然何千百年間金價一律如此今日之價視古又何倍蓰耶野客叢書貨寶於金利於刀如淳曰名錢為刀以其利於民也莽造錯刀蓋身形如刀以黃金錯其文曰一刀直五千錯塗也食貨志開元錢之文歐陽詢制詞其字含八分及𨽻體其詞先上後下次左後右讀之自上及左回環讀之其義亦通俗謂之開通元寶錢食貨志泉府則以錢易貨常平則以錢易粟其本意皆以利民非謀利也王莽時主鑄錢官曰鐘官漢官志撲滿者以竹為竅為蓄錢具有入竅而無出竅滿則撲之俗語謂錢一貫有畸曰千一千二米一石有畸曰石一石二長一丈有畸曰丈一丈二之類亦有所本按考工記殳長尋有四尺注曰八尺曰尋殳長丈二容齊隨筆錢以文言南史武林王曅華林園射賜錢五萬文王昭禹曰古者寶龜而貨貝所以交易者惟貝而已至太公立九府圜法始用錢代貝或曰錢或曰布布取宣布之義泉取流行之義其實則一而已臣按後世之錢其形質外圓內方始此但未有文耳九府即周禮所載九官是也九官皆掌財幣之官而所掌者黃金布帛錢幣三者黃金以斤名布帛以匹計錢幣以銖重故凡貨物之出入其輕重以圜法均而通之如黃金一斤該錢若干帛一匹該錢若干之類是以國家有所用度也一切皆財貨寶之以金利之以刀流行之以泉施布之以布收聚之以帛所謂金即方寸重一斤者所謂刀即管子所謂刀為下幣者所謂泉即圜法也所為布帛即長四丈為匹者大學衍義補按宋朝交子至是更名㑹不特此也又謂之錢引又謂之關子又謂之關㑹其實一而已矣考夫唐之飛錢合契特以通商賈之厚齎貿易者蓋執劵以取錢而非以劵為錢也宋自真宗以後蜀始有交子髙宗以後東南始有㑹子而始以紙為錢矣同上金者金銀銅錫之總名按五行地四生金是也財貨源流赤金丹陽銅也漢食貨志注今江湖間俗語謂錢之薄惡者曰慳錢按賈誼疏云今法錢不立農民失其耒耜冶鎔炊炭姦錢日多俗音誤以姦為慳爾鶴林玉露錢泉也其藏曰泉其行曰布取名流行無不遍也周禮注今之錢數百錢謂之陌借陌字用之其實只是百字如什與伍耳唐自皇甫鎛為墊錢法至昭宗末乃定八十為陌漢隱帝時三司使王章每出官錢又減三文以七十七為陌輸官仍用八十筆談太公立太府玉府內府外府泉府天府職內職金職幣皆掌財帛之官故云九府圜即錢也謂均而通也大錢文曰寶貨肉好皆有周郭肉錢形也好錢孔也漢書錢銚也古田器從金戔聲詩曰庤乃錢鎛許氏說文前代錢文未有草書者宋淳化中以宸翰為之始有草書者書成上以示近臣侯鯖録緡錢二十而一算李斐曰緡絲也以貫錢一貫千錢出算二十也陌即百字唐以八十錢為陌宋以百錢為陌筆麈唐莊宗置酒錢庫令其子繼岌為張承業起舞指錢積曰和哥乞錢盍以錢一積與之錢積二字始此筆塵榖梁傳曰乘馬曰賵衣帛曰禭貝玉曰含錢財曰賻導引曰倉收米榖者也庫收錢帛者也辨疑云大曰倉小曰庫藏錢榖之所也始於陶唐兵軍所藏曰庫金帛所藏曰帑始於湯武課者稅物之錢鈔也程者物有貴賤課有多寡如地里之有程限也綺錢苔錢也法錢依法所製之錢也乾封元年封嶽之後改造新錢文曰乾封泉寶初開元錢俗謂之開通元寶錢及鑄新錢乃同流俗乾字直上封字在左尋寤錢文之誤却用舊錢舊唐書食貨志資採荆州厥貢金三品禹貢古者金有三品赤金為下食貨志黃帝問於伯髙曰吾欲陶天下以為一家有道乎伯髙曰請刈其莞而樹之吾謹逃其爪牙則天下可陶而為一家夫上有丹砂者下有黃金上有慈石下有銅金上有陵石下有鉛錫赤銅上有赭下有鐵此山之見榮者也茍見其榮君謹封而祭之距封十里而為一壇是則使乘者下行者趨若犯令者罪死不赦然後析取之以為劒鎧矛㦸管子天下銅坑五十嵗采銅二十六萬六千斤唐史山上有葱下有緑山上有薤下有金山上有薑下有銅錫山有寶玉木旁枝皆下垂酉陽雜俎小次山其上多白玉其下多赤銅盂山其隂夕夕鐵其陽多銅咸山其上有玉其下多銅陽山其上多玉其下多金涹山其上多赤銅其隂多鐵橿谷之山其中多赤銅鼓鐙之山多赤銅昆吾之山其山多赤銅此山出名銅色赤如火蠱尾之山多礪石赤銅杻陽之山其陽多赤金其隂多白金松果之山濩水出焉北流注于渭其中多銅符禺之山其陽多銅其陰多鐵㻬琈之山其隂多銅英山其隂多鐵其陽多赤金竹山其隂多鐵瑜次之山其隂多赤銅二經之首曰鈐山其上多銅泰冒之山其陽多金其隂多鐵龍首之山其陽多黃金其隂多鐵西皇之山其陽多金其隂多鐵烏山其隂多鐵求如之山其上多銅號山其隂多鐵潘侯之山其隂多鐵渾夕之山無草木多銅玉縣雍之山其上多玉其下多銅諸餘之山其上多銅玉鉤吾之山其上多玉其下多銅京山其陽有赤銅軒轅之山其上多銅少山其上有金玉其下有銅柘山其陽有金玉其隂有鐵維龍之山其上有碧玉其陽有金其隂有鐵白馬之山其陽多玉其隂多鐵多赤銅乾山無草木其陽有金玉其隂有鐵柄山其上多玉其下多銅密山其陽多玉其隂多鐵槖山其陽多金其隂多鐵夸父之山其陽多玉其隂多鐵少室之山其上多玉其下多鐵役山之上多白金多鐵荆山其隂多鐵其陽多赤金岐山其陽多赤金銅山其上多金銀鐵玉山其上多金玉其下多碧鐵仁舉之山其陽多赤金岐山其上多白金其下多鐵玉山其陽多銅其隂多赤金騩山其陽多美玉赤金其隂多鐵葛山其上多赤金虎尾之山其陽多赤金其隂多鐵雅山其下多赤金丙山多黃金銅鐵無木洞庭之山其上多黃金其下多銀鐵陽帝之山多美銅榮余之山其下多銅其下多銀俱山海經緑銅之苖也亦出右江有銅處生石中質如石者名石緑又有一種脆爛如碎土者名泥緑品最下價亦賤桂海虞衡志真宗咸平四年舊制犯銅禁七斤以上並奏裁處死詔自今滿五十斤以上取裁餘第減之天禧三年詔犯銅鍮石並免極刑宋史髙麗地産銅周世宗時遣尚書水部員外郎韓彥卿以帛數千匹市銅于髙麗以鑄錢王氏彚苑孔帖髙麗貢銅五萬斤鹽鐵使李巽以郴州平陽銅坑二百八十餘復置桂陽監以兩爐日鑄錢二十萬天下嵗鑄錢十三萬五千緡命商賈蓄錢者皆出以市貨天下有銀之山必有銅惟錢無益於人五嶺以北採銀一兩者流他州官吏論罪唐史河北諸州舊少錢貨猶以他物交易錢略不入於市二年冬尚書崔亮奏𢎞農郡銅青谷有銅礦計一斗得銅五兩四銖葦池谷礦一斗得銅五兩鸞帳山礦一斗得銅四兩河內郡王屋山礦一斗得銅八兩南有青州苑燭山齊州商山並是往昔銅官舊迹見在六朝史天下名山五千三百七十出銅之山四百六十七出鐵之山三千六百九十山海經魏採銅鑄錢崔亮請於王屋等山採銅鑄錢從之是後民多私鑄錢稍薄小用之益輕㑹編西方日官之外有山長十餘里廣二三里髙百餘丈皆大黃之金不雜土石上有金人髙五丈餘皆純金名曰金犀入山下一丈有銀又入一丈有錫又入一丈有鉛又入一丈有丹陽銅其銅似金可鍛以作錯塗之器也神異經益州行事劉悛上言䝉山下有嚴道銅山舊鑄錢處可以經略武帝從之遣使入蜀鑄錢頃之以功費多而止經濟類編韓泗上言今商州紅崖治産銅而洛源監久廢請鑿山取銅即治舊監置十爐鑄之得錢十萬二千緡孔氏帖宋張齊賢初除轉運使太宗謂曰江南多出銅即為朕密經營之齊賢乃訪江南承旨丁釗歷指饒信處州山谷産銅鉛錫之所又求前代鑄法惟饒州永平監周唐開元錢料堅實可久于是定取為法嵗鑄三十萬貫凡用銅八十五萬斤鉛三十六萬斤錫十六萬斤齊賢詣闕面陳其事帝許之越絶書若耶之溪涸而出銅戰國策涸若耶溪以取銅是也丘濬云宋朝金銀銅鐵鉛錫之冶總二百七十一皆置吏主之大率山澤之利有限或暴發輒竭或採取歲久所得不償所費而嵗課不足有司必責主者取盈臣按宋朝坑冶所在如此之多而元朝之坑冶亦比今日加十數倍何也蓋天地生物有與地土俱生者金銀銅鐵之類是也昔者聖王定為取民之賦有米粟之征而無有所謂金銀銅鐵之征者豈不以山澤之利與土地俱生取之有窮而生之者不繼乎坑冶之利在前代則多在後代則少循歷至于今日猶其少焉無足怪者我朝坑冶之利比前代不及什之一二間或有之隨取隨竭曩者固已于浙之溫處閩之福建開場置官令內臣以守之差憲臣以督之然所得不償所費如宋人所云者今則多行革罷而均其課於民賦之中矣雖然今日不徒不得其利而往往又罹其害蓋以山澤之利官取之則不足民取之則有餘今處州等山場雖閉而其間猶不能無滲漏之微利遺焉此不逞之徒猶囊槖其間以競利起亂也為今之計宜于坑場遺利之處嚴守捕法可築塞者築塞之可柵塹者柵塹之俾其不至聚衆爭奪以貽一方生靈之害可也皇明經濟録地鏡圖云青草莖赤秀下有鉛永昌郡中亦有金焉纎靡大類黍粟在水涯沙中民採得日重五銖之金一色巵黃土生金土色黃漢土德也故金化出金有三品黃比見者黃為瑞也王充論衡姑墨川水注之導姑墨西北赤沙山東南流徑姑墨國西治南至於闐馬行十五日土出銅鐵及雄黃水經丹陽山東北徑冶東俗謂之丹陽城城之左右猶有遺銅矣若水又徑㑹無縣縣有駿馬河水出縣東髙山山有天馬徑厥跡存焉馬日行千里民家馬牧之山下或産駿駒言是天馬子河中有貝子胎銅以羊祠之則可取也同上銅井山在縣西七十里上有銅井一名銅官山一統志謂銅井去縣西北五十里廣十餘丈深不可測舊于此采銅有魚出其中其色如金滁州府勝志銅坑山鄧尉山西南一名銅井晉宋間鑿坑取沙土煎之皆成銅故名上有巖洞其懸溜滙而為池清冽可飲名曰銅泉蘇州府志勝岑水一名銅水可浸鐵為銅其水極腥惡石色皆赭然不生魚鱉禾稼之屬即曲江膽礬水同源異流也廣東名勝志明光山在騰越州西北一百二十里上有銀礦銅礦永昌府志勝陽碧山在陽山縣西南十里髙出衆山日光先照故名兩峰上聳狀如丫髻亦名丫髻山又南七十里産銅者曰銅沙山東三十里産黑鉛者曰寶源山廣東名勝志梁水郡置在盤江南管二縣曰梁水縣有振山出銅曰賁古縣有采山出銀鐵銅鉛又興古有律髙縣縣西為石空山東南盤町山俱出錫故滇略云錫則臨安者佳最上者為芭蕉葉扣之聲如銅鐵其白如銀作器殊良臨安府志勝鉛山在鉛山縣西北七里又名桂陽山又名楊梅山舊經云山出鉛先置信州之時鑄錢百姓開採得鉛什而稅一建中元年封禁貞元年置永平監其山亦出銅及青碌又有寶山連桂陽出銅又銅寶山在縣西南七里一名七寶山下有竹葉猊平坑石竅中膽泉湧出浸鐵成銅天久晴有礬可拾建隆三年置銅場今廢其銅以土垢淋水浸鐵為之廣信府志勝鎖山門浸銅之所在縣鵝湖鄉去治七十里許有溝漕七十七處興于宋紹聖四年更創于淳熙八年縣尉馬子巖有銘至淳祐後漸廢其地之水有三膽水礬水黃礬水各積水為池每池隨地形髙下深淺用木板閘之以茅席鋪底取生鐵擊碎入溝排砌引水流通浸染候其色變鍛之則為銅餘水不可再用信州鉛山膽水自山下注勢若瀑布用以浸銅鑄冶是賴隨天旱潦而有涸溢大抵盛於春夏微於秋冬古傳一人至水濱遺匙鑰翌旦得之已成銅矣近年水流斷續浸銅頗費工力凡古坑有水處曰膽水無水處曰膽土膽水浸銅工省利多膽土煎銅工費利薄水有盡土無窮今上林三官提封九路簡踏無遺膽水膽土官亦兼收其利按浸銅之說自昔無之始因饒州布衣張甲獻言可用膽水浸鐵為銅紹聖元年始令本州差廂軍興浸其利漸興紹興二年朝議以坑冶所得不償所費悉罷監官以縣令領其事安陽縣西北有銅山山多産銅鉛山縣地出銅鉛青碌置場以收其利舊在寶山僞唐升元二年遷置鵝湖山同上劄龍山在路南州東八十里山下有小石可煉為銅澄江志錢通卷三
