body:
  text: 錢通卷十八明胡我琨撰蠱戾韓延夀代蕭望之為左馮翊望之聞延夀在東郡時放散官錢千餘萬使御史案之延夀即部吏案校望之在馮翊時廪犧官錢放散百餘萬望之自奏職在總領天下聞事不敢不問而為延夀所拘持上繇是不直延夀各令窮竟所考望之卒無事實而望之遣御史按東郡者得其試騎士日車服侍衛奢僭逾制等數事延夀竟坐狡猾不道棄市吏民數千人送至渭城持車轂爭奏酒炙延夀使掾吏分謝送者百姓莫不流涕通鑑皇甫嵩之討張角也過鄴見趙忠舍宅踰制奏沒入之又張讓私求錢不與二人奏嵩無功費多徴還收印綬以司空張溫為車騎將軍討北宫伯玉拜董卓為破虜將軍統于溫崔慧景之逼建康也寶卷拜蔣子文神為鍾山王及衍至又尊為靈帝使巫禱祝悉以軍事委王珍國時城中實甲猶七萬人寶卷晝眠夜起逰戲一如平常及長圍立屢戰不勝猶惜金錢不肯賞賜雕鏤雜物倍費于常衆情怨怠皆思早亡莫敢先發金吾將軍伊愼以錢三萬緡賂中尉第五從直求河中從直奏之上貶愼官坐死者三人王遂本錢穀吏性狷急專以嚴酷為治盛夏役士卒營府舍督責峻急將卒憤怨役卒王辨與其徒四人執遂斬之初蜀亡其府庫之積悉輸汴京後任事者就起功利于常賦外更置博買務禁商賈不得私市布泉蜀地狹民稠耕稼不足以給繇是小民貧困兼并者益糴賤販貴以規利青神民王小波因聚衆為亂且曰吾疾貧富不均今為汝均之貧者爭附遂攻青神掠彭山殺縣令齊元振剖其腹實之以錢惡其誅求無厭也賊黨繇是愈熾旁邑響應曹利用復坐私貸官錢再貶崇信節度副使宦者多惡利用必欲致之死以快志內侍楊懷敏送之至襄陽驛以語侵之利用遂投繯而死利用性悍梗少通力裁僥幸而其親舊或有因緣以進者故及于禍然居位忠藎有守終始死非其罪聞者寃之俱同上蕭太后責李處溫曰誤秦晉國王者皆汝父子并數其前惡罪數十處溫無以對乃賜死臠其子奭而磔之籍其家得錢七萬緡金玉寶器稱是皆為宰相數月間所取也遼史蘇師旦者平江書史為韓托胄腹心以奸計歸誠于托胄托胄愈益昵之嘗以窘乏求金詣托胄托胄初不知其受諸將之賂動以億萬時時捐資助之及江上敗軍詞連師旦受賂尺牘具存托胄大怒竄師旦海上及托胄敗取斬于臨安籍其家得金箔金三萬九千二百五十片金錢六千辮馬蹄金二萬五千七百二十兩瓜子金五斗生金羅漢五百尊各長二尺五寸金酒器六千七百三十兩叉釧金二百四十三片金束帶一十二條他物稱是以一隅之地幸臣黷貨如此托胄所積應且數倍國安得不亡哉補石言奚陟字殷卿遷刑部侍郎裴延齡惡京兆尹李充有能政專意陷害之誣奏充結陸贄數厚賂遺金帛充既貶官又奏充比者妄破用京兆府錢穀至多請令比部勾覆以比部郎中崔元翰陷充惡贄也詔許之元翰曲附延齡劾治府吏到者雖無過犯皆笞决以立威時論喧然陟乃躬自閲視府案且得其實具獄上充既免元翰既不遂其志因此憤恚而卒舊唐書畢諴宣宗恩顧特異許以為相令狐綯所忌連徙之鎮皆綯緩其入相之謀也諴思有以結綯在北門得絶色非人世所有者盛飾珠翠專使獻綯綯一見心為之動謂其子曰尤物必害人畢太原于吾無分今以是餌吾將傾家族也一見立反之使人不敢將回驛候諴意諴又瀝血書輸啓事于綯綯終不納乃命吏貨之東頭醫李𤣥伯上所狎昵者以錢七十萬致于家乃舍上堂坐之𤣥伯執賤役以事之踰月盡得其歡心焉乃進于上上見大惑之寵冠六宫𤣥伯燒伏火丹進以市恩上瘡疾作𤣥伯之罪也懿宗即位與山人王樂道士虞紫芝俱棄市通鑑昭帝之喪大司農僦民車延年詐增僦直盜取錢三千萬為怨家所告御史大夫田廣明謂杜延年曰春秋之義以功覆過當廢昌邑王時非田子賔之言大事今縣官自出三千萬自乞之何哉願以愚言白大將軍延年言之光曰誠然實勇士也當發大議時震動朝廷因自撫心曰使我至今病悸謝田大夫曉大司農通往就獄得公議之廣明使人語延年延年曰幸寬我耳何面目入牢獄遂自刎死㑹編張同休昌期昌儀皆坐贓下獄命左右臺其鞫之敇以易之昌宗作威作福亦命同鞫御史大夫李永嘉中丞楊彥範奏同休兄弟贓共四千餘緡昌宗法應免官昌宗訴有功無罪太后問宰相昌宗有功乎楊再思曰昌宗合神丹聖躬服之有驗此莫大之功也太后悅赦之左補闕戴令言作兩足狐賦以譏再思出為長社令同上括富商錢時兩河用兵月費百餘萬緡府庫不支數月太常博士韋都賔陳京建議請括富商錢出萬緡者借其餘以供軍上從之判度支杜佑大索長安中商賈所有貨意其不實輒加搒捶人不勝苦有縊死者長安囂然如被寇盜計所得才八十餘萬緡又括僦匱質錢凡蓄積錢帛粟麥者皆借四分之一封其匱窖百姓為之罷市相率遮宰相馬自訴以千萬數盧把始慰諭之勢不可遏疾驅得免計并借商所得才二百萬緡人已竭矣㑹編陸長源性刻急恃才傲物軍中惡之晉卒長源知留後揚言曰將士弛慢日久當以法齊之耳衆皆懼或勸之發財以勞軍長源曰我豈效河北賊以錢買健兒求節鉞耶軍中怨怒作亂殺長源監軍俱文珍以宋州刺史劉逸凖久為宣武大將得衆心召之逸凖引兵徑入汴州衆乃定遂以為節度使舒蘄守臣皆以鑄錢增羡遷官淮民為之大擾劉希光受羽林大將軍孫鑄錢二萬緡為求方鎮事覺賜死事連知內侍省事吐突承璀出為監軍李師道數上表請赦吳元濟上不從師道使大將將二千人趣夀春聲言助官軍實以援元濟也師道素養刺客姦人數十人說師道曰用兵所急莫先糧儲今河隂院積江淮租賦請潛往焚之因劫東都焚宫闕亦救蔡一竒也師道從之遣攻河隂轉運院燒錢帛三十餘萬緡匹穀二萬餘斛人情恇懼多請罷兵上不許劉仁恭驕侈貪暴以大安山四面懸絶築館其上極壯麗實以美女與方士煉藥其中悉斂境內錢瘞山顛令民間用堇泥為錢有愛妾羅氏其子守光通焉仁恭杖守光斥之至是梁遣李思安擊之直抵城下仁恭在大安城幾不守守光自外引兵入登城拒守却之遂自稱節度使令部將李小喜攻大安虜仁恭以歸囚于别室守光弟光竒奔河東俱同上鍾謨數奉使入周世宗及唐主皆厚待之恃此驕橫與都虞候張巒善數與屏人夜語唐鎬譖之曰謨與巒氣類不同而過相親狎恐其異謀又言大錢民多盜鑄犯法者多及𢎞冀卒唐主欲立從嘉謨與從善厚言于唐主曰從嘉德輕志懦又酷信釋氏非人主才從善果敢凝重宜為嗣唐主繇是怒徙從善為吳王居東宫謨請令張巒以所部兵巡徼都城唐主乃下詔暴謨罪流饒州貶巒旦州副使未幾皆殺之廢永通錢通鑑蔡京怨劉逵㑹蘇州盜鑄錢獄起京欲陷逵婦兄章綖兄弟遣開封尹李夀鞫之株連者千餘人强抑使承死者甚衆京猶以為緩遣畸服往代畸服至蘇即决釋無佐證者七百人歎曰為天子耳目司而可傅㑹權要殺人以茍富貴乎遂閲實平反以是京大怒遂貶畸服而綖竟竄海島宋史梁師成晚年益通賄謝士人入錢數百萬以獻頌上書為名令赴廷試唱第之日侍于帝前囁嚅升降之其小吏儲宏亦與科甲而執役如故師成貌若不能言然隂鷙遇間即發王黼嘗為鄆王楷隂畫奪宗之計師成力保護太子得不動搖及上皇東幸嬖臣多從以避罪師成自以舊恩留京師太學生陳東既疏其罪惡布衣張炳亦以為言遂貶令開封吏護送至貶所行次八角鎮縊殺之以暴死聞同上郭崇韜徴犒軍錢數萬緡于王宗弼宗弼靳之士卒怨怒夜縱火喧譟崇韜欲誅宗弼以自明白繼岌收宗弼等數其不忠之罪族誅之蜀人爭食宗弼之肉王承休等至繼岌亦斬之㑹編契丹縱兵大掠遣使括借士民錢帛同上王柟至汴請依靖康故事世為伯侄之國增嵗幣為三十萬犒軍錢三百萬貫蘇師旦等俟和議定後當函首以獻完顔匡具以柟言奏于金主璟璟命匡移書索韓托胄首以贖淮南地改犒軍錢為銀三百萬兩㑹錢象祖移書金帥府喻以誅韓托胄事柟未之知也宋史吕升卿為京東察訪逰泰山題名于真宗御制封禪碑之隂刋刻搨本傳于四方後二年升卿判國子監㑹蔡承禧為御史言其題名事以為大不恭遂罷升卿判監既而鄧綰又言升卿兄弟頃居喪潤州嘗令華亭知縣張若濟置買土田若濟遂因此貸部民朱庠衛公佐吳延亮盧及遠押司録事王利用等錢四千餘貫强買民田既而若濟坐贓事發惠卿已在中書百計營救及言惠卿縱親情鄭膺干撓政事如此等事凡十餘端猥不可具載朝廷起獄于秀州既而惠卿罷參知政事以本官知亳州升卿和州監酒溫卿勒停張若濟除名編管緣此黨人降黜者紛紛矣東軒筆録佞幸傳長公主賜鄧通吏輒隨沒入之竟不得名一錢寄死人家唐元和初江淮人宋衎娶妻楊氏甚賢衎安居不議他業時有運米過三門者請衎同去通管簿書月給錢八千衎謂妻曰今數月不得八千茍一月而致極為利也妻曰三門舟路頗險惡身或傾危利亦何益衎不納遂去果遇暴風羣船盡沒惟衎入水捫得粟藁一束漸漂近岸扶藁以出餘數十人皆不救轉因録李夷簡元和末在蜀蜀市人趙高好鬭嘗入獄滿背鏤毗沙門天王吏欲杖背見之輒止轉為坊市害左右言于李李大怒擒就㕔前索新棒叱杖家打天王盡則已數三十餘不死經旬日袒而歷門乞修理破功德錢酉陽雜爼劉忠肅公摯在南京幕府㑹司農寺行新令盡斥賣天下祠廟依坊場河渡法收淨利南都閼伯廟嵗為錢四十六貫微子廟十二貫公歎曰一至于此往見留守張公方平曰獨不能為朝廷言之耶自警編唐趙履溫為司農卿諂事安樂公主客謂張文成曰趙司農何如人曰為公主奪百姓田園造定昆池言定天子昆明池也用庫錢百萬億斜褰紫衫為公主背挽金犢車險詖皆此類誅逆韋之際上御承天門令斬之刀劍亂下與男同戮人割一臠骨肉俱盡朝野僉載紹聖二年朝補之坐修摘星樓不核實支省錢謫通判應天府揚州府志勝中常侍張讓私求錢五千萬皇甫嵩不與二人繇此為憾奏嵩連戰無功所費者多其秋徴還收左車騎將軍印綬左編高柔字文惠官廷尉有護軍營士竇禮近出不還營以為亡表言逐捕沒其妻盈及男女為官奴婢盈連至州府稱寃自訟莫有省者乃辭詣廷尉柔問曰汝夫不與人有怨讐乎對曰夫良善與人無讐又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文求不得時子文適坐小事係獄柔乃見子文門所坐言次曰汝頗曾舉人錢否子文曰自以單貧不敢舉人錢物也柔察子文色動遂曰汝昔舉竇禮錢何不言耶子文怪知事露應對不次柔曰汝已殺禮便宜早服子文于是叩頭具首殺禮本末埋葬處所柔便遣吏卒承子文辭往掘禮即得其尸詔書復盈母子為平民班下域中以禮為戒漢田延年為大司農坐益都內錢三千萬自殺山堂肆考後魏高謙之為河隂令有盜以囊盛瓦礫指為錢物詐市人馬逃去謙之僞枷一囚立于馬市中有二人在旁欣然曰無復憂矣遂執問悉獲其黨同上五代賈郁補仙逰令性峭直不容人吏文過及受代一吏酣酒郁怒曰當再典此縣必懲之吏揚言公若再來猶鐵船渡海後郁果再典舊邑時醉吏盜庫錢數萬下獄具狀郁批榜尾曰竊銅鏹以潤家非因鼓鑄造鐵船而渡海不假爐槌山堂肆考成都畫師姓許善傳神一日有人敝衣憔悴求傳神許笑之其人解衣囊出黃道服鹿皮冠白玉簮頂冠易服危坐以手摩面則童顔矣引其鬚應手而黑乃一美丈夫也許驚曰不知神仙降臨道人曰君傳吾神置肆中有求售止取千錢後有識者云此唐神仙朱桃椎也求者輻輳許貪畫值每像輒取二千夢道人曰汝福有限安得過取掌其左頰既寤頭遂偏括異録元至正庚寅年間參議賈魯以當承平時無所埀名欲立事功于世首勸托克托開河北水田又勸造至正交鈔及決河南又勸追求夏禹故道開使北流身專其任瀕河起集丁夫二十六萬餘人朝廷所降食錢官吏不能盡支河夫多怨堯山堂外紀文帝之後六年胸奴入邊乃以亞夫為將軍至景帝之時亞夫丞相後以疾免其子為亞夫買工官尚方甲盾五百被可以為葬者取庸苦之不與錢庸知其盜買官器怨而上告其子景帝下吏責問因不食五日嘔血而死王充論衡報償尹軌字公度常見一人本冠族子弟仕郡遇公事簿書不了當備官錢百萬賣田宅車牛不售而停見收擊公度謂所遊富人曰子可以百萬錢借我我欲以救人後三十日當還富人嘉敬之即以百萬錢與公度以與遇事者曰卿能得一百二十斤錫否遇事者即具之公度于䥶中銷錫復以其腰間管中藥一方寸投沸錫中攪之皆成金賣與人得錢百萬以還富人近光熙元年間公度到南陽太和山中神仙傳曹武字士威為雍州刺史致見錢七千萬性儉嗇無所餉遺在襄陽獨饋梁武謂曰卿必大貴我當不及見今以弱子相託每密送錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬及帝即位忘其惠天監二年帝忽夢如田塍下行兩邊水深無底夢中甚懼忽見武來負武帝得過曰卿今為天下主乃爾忘我顧託之言耶我兒饑寒無衣者所換十七萬可還其市宅帝覺即使主書送錢還之使用市宅子世澄世宗並䝉抽擢三二年間迭為大郡南史郯縣陳務妻少與二子寡居好飲茶茗宅中先有古塜每日作茗飲先輒祀之二子欲掘去之母苦禁而止及夜母夢一人曰吾止此二百餘年卿二子恆欲見毁賴相保護又饗吾佳茗雖泉壤朽骨豈忘翳桑之報遂覺明日晨興乃于庭內獲錢十萬似久埋者而貫皆新提還告其兒兒並有慙色異苑王冀公性隂險而權譎巧于中人時同列雖已為公所中終莫知公之中之翰林學士李宗諤有才名王文正公欲引為參政先以告公公許之既而隂以白上曰李宗諤缺王某錢二千緡今引用之在索錢也蓋參政朝謝日賞給可得三千緡而宗諤貧俸廪不足以給婚聘舊常有借于文正故公言之因以中文正也及文正以宗諤薦則上果作色而不從矣其巧于中人類多如此秉政日久四方餽遺不可勝紀金帛錢鏹圖書竒玩十倍于舊一日之間盡為天火所焚無一遺者又無子平生所有一旦舉而歸諸他人如此則隂險權譎是有益于身乎樂善録嚴泰江行逢漁舟問之云有龜五十頭泰用錢十千贖放之行數十步漁舟乃覆其夕乃有五十人詣泰門告其父母曰賢郎附錢五十千可領之緡皆沾濕父母怪之及泰歸乃說贖龜之異間窗括異志陳宏泰家富于財有人假貸錢一萬宏泰徴之甚急其人曰請無慮吾先養蝦蟇萬餘頭鬻之足以奉償泰聞之惻然已其償仍别與錢十千令悉放之江中經月餘泰因夜歸馬驚不進前視之乃一金蝦蟇也同上朱承逸居霅之城東門為本州孔目官樂善好施嘗五鼓趨郡過駱駝橋聞橋下哭聲甚哀使僕視之有男子携妻及小兒在焉扣所以云負勢家錢三百千計息已數倍督索無以償將併命于此朱惻然遣僕護其歸且自往其家正見債家悍僕羣坐于門朱因以好言諭之曰汝主以三百千故將使四人死于水于汝安乎幸吾見之耳汝亟歸告若主彼今既無所償逼之何益吾當為代還本錢可以元劵來債家聞之慚懼聽命即如數取付之其人感泣願終身為奴婢不聽復以二百千資給之而去是嵗生孫名服熙寧中金榜第二人仕至中書舍人次孫肱亦登第著名節即著南陽活人書者服子或即著萍州竒談者遂為吾鄉名族焉天之報善昭昭也如此癸辛雜識外集竇禹鈞范陽人為左諫議大夫致仕諸子登第義風家法為一時標表生五子長曰儀次曰儼曰侃曰稱曰僖儀禮部尚書儼禮部侍郎皆為翰林學士侃左補闕稱左諫議大夫參知政事僖起居郎初禹鈞家豐年三十無子夜夢亡祖亡父聚謂之曰汝早修行緣汝無子又夀不永禹鈞唯諾禹鈞為人素長者先有家童盜用房錢二百千慮事覺有女年十二三自寫劵繫女臂云永賣此女與本宅償所負錢自是遠遁禹鈞見而憐之即焚劵以其女囑妻曰善撫養之既筓以二百千擇良配得所歸後僕聞之乃還感泣訴以前罪禹鈞不問繇是父子圖禹鈞像晨興祝夀嘗因元夕往延慶寺于後殿階側得遺銀二百兩金三十兩持歸明日侵晨詣寺候失物者須臾一人果涕泣而至禹鈞問之對曰父罪犯至大辟遍懇親知貸得金銀將贖父罪昨暮以一親置酒酒昏失去今父罪不復能贖矣公驗其實遂同歸以舊物還之加以憫惻復有贈賂同宗外姻有喪不能自舉公為出錢葬之繇公而葬者凡二十七喪孤遺女及貧不能嫁公為出錢而嫁之繇公而嫁凡二十八人故舊相知雖與公有一日之雅遇其窮困必擇其子弟可委以財者隨多寡貸以金帛俾之販鬻繇公活族者數十家四方賢士賴公舉者不可勝數公每量嵗之所入除伏臘供給外皆以濟人之急其後復夢亡祖亡父告之曰汝三十年實無子夀且促嘗告汝今汝數年以來名掛天曹隂府以汝有隂德特延算三紀賜五子各顯榮仍以福夀而終厚德録安帝好微行于郊坰或露宿起帷宫皆用錦罽文繡至永初二年國用不足令吏民入錢者得為官有琅琊王溥即王吉之後吉先為昌邑中尉奕世衰凌及安帝時家貧不得仕乃挾竹簡插筆于洛陽市傭書美于形貌又多文辭來僦其書者丈夫贈其衣冠婦人遺其珠玉一日之中衣寶盈車而歸積粟于廪九族宗親莫不仰其衣食洛陽稱為善筆而得富積善降福明神報焉拾遺記初蘇秦之燕貸百錢為資及貴以百金償之遍報諸所嘗見德者其一人獨未得報乃前自言秦曰我非忘子子之與我至燕再三欲去我易水之上方是時困故望子深是以後子子亦今得之矣史記何澄以醫術著名孫已之久病不愈其妻于氏引澄入室曰良人久病典賣殆盡願以身酬澄正色曰奚為出此語但安心勿憂當為療治茍以此相汚不惟澄永為小人爾亦不得為賢婦縱兔人責天譴可逃乎于大沮而退澄一日假寐恍見一神告曰汝醫藥有功且不于艱急中亂人婦女奉上帝敇汝一資官職五萬貫錢未幾治東宫疾一劑遂安賜錢宛如其數春氣録郭巨隆慮人也一云河內溫人兄弟三早喪父禮畢二弟求分以錢二千萬二弟各取千萬巨獨與母居客舍夫婦傭賃以給公養居有頃妻産男巨念與兒妨事親一也老人得食喜分兒孫減饌二也乃于野鑿地欲埋兒得石益下有黃金一釡中有丹書曰孝子郭巨黃金一釡以用賜汝于是名振天下搜神記曹泳秦檜門客也監黃巖酒稅秩滿到部注闕上省檜押勑見泳姓名物色召見之熟視曰公檜恩家也泳恍然不知所答則又曰忘之耶泳曰昏忘實不省於何處遭遇太師檜入室有頃取小冊示泳使觀之泳不敢觀首尾他事中有一行曰某年月日某人錢五千曹泳秀才絹二匹蓋檜微時逰索富家得五千求益不可泳時為館客探囊中得二絹曰此吾束修之餘也今舉以遺子既别不相聞雖知檜震天下不謂其即秦秀才也泳曰不意太師乃能記憶微賤若此檜曰公真長者命其子孫出拜之俾以上書易文資驟用之至户部侍郎知臨安府十可編董永父終貧不遂葬以身質錢一萬既葬就役逢一女子求與永為妻云能織絹永詣主人主人令織一旬三百匹債足女辭之曰我天之織女也帝見君孝使我共償耳因遂不見孝子傳許元惠卿樂平士人也其父夢有烏衣客來語曰吾昨貸君錢三百今以奉還未及問為何人及何時所貸而覺明日思之殊不能曉平常畜十餘鴨是日歸於數外見一黑色者小童以為他人家物約去之鴨盤旋憩于旁墮一卵乃去自是歷一月每日皆然凡誕三十卵遂去不至竟不知為誰氏者計其直恰三百錢矣夷堅志永徽中涿州人路伯達負同縣人錢一千後與主佛家誓曰若我未還公願死為公家牛逾年死錢主家時牛産一赤犢子額上白毛為路伯達三字浙省廣濟庫嵗差杭城殷實户若干名充役庫子以司出納比一家中侵用官錢太多無可為償府判王某素號殘忍乃拘其妻妾子女于官又無可為計小舟載之求食于西湖以資納官鬼妾鬼馬不肖輩羣趨焉後王之子孫有為娼者天之報施抑何捷也輟耕録昔徽州李氏名善瑜適葉元贊長子侍舅姑極孝舅姑病祈告天地願以身代適三官巡察空中聞之奏聞玉皇奉㫖加舅姑夀一紀仍賜錢八十萬注名祿籍二子賜品官後一嵗一旦門未啓忽見堂上有錢堆積計數收之果得八十萬轉因録老吏有鄉人訴事于郡而囑吏以三十千後果得理吏以錢還之云此事乃官自判我實不曾致力不敢欺心受此錢後其子登科人謂不欺之報宋張八公處州龍泉里民也家富好施鄉人德之號張八佛産分二子每嵗禾榖率銅錢六十文一把其嵗歉鄉價八十其子意欲薄有所增張公坐于門看糴者出問之價曰略增些公以錢還之自後其子價不敢增至曾𤣥孫皆登第唐信州貴溪縣乳口鎮有童安玗者鄉里富人也初甚貧窘與同里人郭珙相善珙嘗假借錢六七萬以助經販安玗後遂豐富及珙徴所借錢安玗拒諱之珙焚香告天曰童安玗背惠忘義借錢不還倘神理難誣願安玗死後作牛以償安玗亦紿言某實負珙錢願死作一白牛以償珙債未逾月安玗死珙家㹀牛生一白牯犢左脅有黑毛作字曰童安玗歷歷然遠邇聞之觀者雲集唐建安縣令韋有柔家奴執轡年二十餘病死有柔以其勤頗念之忽夢奴云我不幸而死尚缺郎君四十五千地下所繇令更還作畜生以償債我求作馬兼為異色今已定也其明年馬生一白駒而黑目駿逸異常馬後數嵗馬可直百餘千有柔深嘆其夢不驗頃之裴寬為採訪以有柔為判官寬見白馬求市之問其價直有柔但求三十千寬因受之有柔云此奴尚缺十五千當應更來後數日寬謂有柔曰馬是好馬前者付錢深恨太賤乃復以十五千還有柔其事遂驗宋樂平縣杭橋市染工程氏夢老媪來曰負君家錢若干除償還外猶缺若干幸餘一屋可以充數今别君去矣再拜而辭既寤聞一牝牛死于空屋中剝貨得錢如夢告之數宋長樂鄉人有婢名春一日有粥未喫置于籠前為猪竊食春以火杖打之猪竄于山至夜不歸大家不知夜夢舊識在山巖間訴曰我缺汝錢五百作猪以償饑食春粥治我太甚願汝作主大家明早訪巖石間得猪而歸問春果爾乃命家人輩善飼之越二日猪死賣錢止得五百與所缺之錢適合宋時晉州平陽人常瑶父為里胥蚤死母携之再嫁富民康德休為人落魄亡賴德休與錢三千緡使為區肆繇是生理日給而瑶事繼父略不知恩經年德休死視如路人盡竊其資甫三十嵗壯無疾忽作牛鳴一聲而斃是夕康氏牛産一犢一蹄出背上朱書常瑶二字于脅間宋吕保相文德延一士為館賔罷齊歸借馬于吕吕與之一騾騾至士家不食作常人語僕聞其言曰我缺吕相公錢初不缺你錢僕以告士士至夜親往聽之果然士聞以衣襟䝉眼可與鬼神接語遂䝉眼而問之曰爾何人答曰我棗陽軍黃油曾缺吕相公油錢初不缺你錢士往告吕吕恍然記二十嵗時有黃油缺油錢二十千後忘索焉騾歸食如故宋建陽人張一貸熊四郎錢兩千子復倍之經年不肯償熊督索倦矣好與言曰無復較息但求本錢可乎張愧謝稍以與之竟負原數八百熊亦不復取三年而張卒卒之四年熊夢張以入百錢來償置地上皆小錢留與坐啜茶乃去覺而與妻說方竟一僕扣門曰牛生犢甚大急欲酒作福熊喜甚僅再旬犢不疾輒死鄰屠就買熊需兩千屠笑曰是何所直剝而盡貸不及此數但有鬻牛之名當先以酒及杯羮啖里正又以餉四鄰乃取其贏今惟有八百錢幸見付不則已耳解腰間囊擲于地正夢中所償處儼然小錢也熊乃悟前事亟與之俱同上唐巙州推官楊旬積纍隂隲其子將入試夢一神曰汝積隂德將汝子名改作楊椿納卷吾當助汝子果得第次年赴省試椿夢一神曰今年題乃行王道而王及試果然亦得第及殿試再夢神曰汝名在第五甲吾换作第一卷後唱名果魁天下及巙使君詢旬隂德旬乃出三囊示之第一囊有三十九文當三錢第二囊有四千餘文折二錢第三囊有萬數小錢乃旬詳讞罪囚有從死罪正為流罪者即投一折二錢有從杖罪而决放者即投一小錢又每效周箎行太上感應篇十種利益故獲斯報代醉篇陳益借吳宗嗣錢二百千捱不肯還宗嗣責之曰爾負我者當作驢以還我逾年獨坐㕔事恍見陳益負錢來還急呼詰之則已潛入廄舍矣俄頃馬生一駒因詢陳益之家則是日益卒同丄白元通缺東市楊筠錢五貫四百文未償而筠死遂晦其事死後乃生筠家為驢一日筠子乘之入市忽作人語曰我乃白元通也只缺汝父錢五貫四百遂至如是今南市賣麵家亦缺我錢正如其數可速賣我與彼得錢償汝債便了筠子如其言賣之未三日而驢死因果録昔真州一巨商每嵗販粥至杭時有挾姑布子之術曰鬼眼者設肆省前言皆竒中故門常如市商方坐下忽指之曰公大富人也惜乎中秋前後三日內數不可逃商懼即戒程時八月之初舟次揚子江見江濵一婦仰天大號商問焉答曰妾之夫作小經紀止有本錢五十緡每買鵝鴨過江貨賣歸則計本于妾然後持贏息易柴米餘資盡付酒家率以為常今妾偶遺失所留本錢非惟飲食之計無所措亦必被箠死寧自沉商聞之嘆曰我今厄于命設令鑄金可代我無虞矣彼乃自天其生哀哉亟贈錢一百緡婦感謝去商至家具以鬼眼之言告父母且與親戚故舊叙永訣閉户待盡父母親故宛轉寬解終弗自悟踰期無他故復之杭舟阻風偶泊向時贈錢處登岸散適此婦襁負嬰孩遇諸路迎拜且告曰自䝉恩府特拔數日後乃産母子二人沒齒感再生之賜者豈敢忘哉商至杭便過鬼眼所驚顧曰公中秋胡不死乃詳觀形色而笑曰公隂德所致必曾救一老隂少陽之命矣商異其術捐錢若干以報之輟耕録平江府劉吉以殺鵝鴨為生設肆于市橋置鑊燒湯人欲烹者特詣吉烹之凡烹一鵝得十錢每日常烹數百所得甚多人皆勸之改業勿以殺生作罪劉不聽一日其子年七嵗在旁逰戲忽若人提入湯鑊中股爛而死問羊集史記漢高祖為布衣時蕭何數以吏事護高祖高祖為亭長常左右之高祖以吏繇咸陽吏皆送奉錢三何獨以五後益封何二千户以帝嘗繇咸陽時何送我獨贏奉錢二也唐荆南有富人崔導者家貧乏偶種橘約千餘株每嵗大獲其利忽一日有一株化為一丈夫長丈餘求見崔導導初怪之不敢出丈夫苦求之導遂出見丈夫曰我前生負君錢百萬未償而死我家人復自欺君乃上訴于天是以令我合門為橘計傭于君僅能滿耳瀟湘録有軍吏方某家忽有鬼降自言姓杜廣陵富家子居通泗橋之西側前生缺君錢十萬今地府使我為神償君此債因為人占禍福多中稽神録唐相崔鉉鎮南暇日與客方奕吏報女巫與故魏博節度使田布偕至顯驗與他巫異泊逆旅亭請改舍于都侯之廨鉉異之謂之曰君以義烈死奈何區區為愚婦人所役乎神曰布嘗負此嫗八千萬錢今方忍耻償之鉉與二客及監軍使幕下共償其錢神乃辭去太平廣記南昌亭即韓信亭也信微時從南昌亭長寄食亭長妻苦之乃晨炊蓐食餐時不為具食竟絶之及為楚王召亭長賜百錢曰公小人為德不竟淮安府志勝陳天福茶陵人嵗凶發廪平糶貧不能糴則與米無米則與飯又無飯則與錢鄉里甚德之一日有一道人以銅錢一百二十為糴一斗天福施米一斗還其錢道人出門遂題四句于壁云遠近皆稱陳長者典錢糴米來施捨他時桂子與蘭孫平步玉堂與金馬陳後富又起賑濟倉濟人生三子長季忍次季雲三季芳季芳名蘭孫登第官至太常丞生生四諦邯鄲張翁家甚貧未有子置一空罈積錢十年而罈滿有鄰人生三子犯徒擬賣其妻翁懼妻去而子不能全活也遂謀諸夫人舉所積錢代完贖銀不足夫人復拔一叉輳之是夕夢上帝抱一佳兒送之遂生𢎞軒先生子孫至今貴盛同上宋當塗外科醫者徐樓臺纍世能治癰癤傳至孫大郎者嘗獲鄉貢于祖業尤精紹興八年溧水縣蠟山富人江舜明背疽發扣問求醫徐云可治與其家立約候病愈入謝錢三百千凡攻療旬日飲食悉如舊精神殊不減惟卧起略假人力瘡忽甚痛且癢徐曰法當潰膿膿出即愈是夜徐以針刺其瘡撚紙長五寸許㸃藥插竅中江隨呼痛連聲漸髙徐曰當别以銀二十五兩贈我便出紙膿潰痛當立定江之子源大怒堅不肯與時紙撚入已踰一更及拔去血液交涌如泉呼聲漸低徐方詫為痛定家人視之蓋已斃矣膿出猶不已不經年徐病熱疾哀呌不絶聲但云舜明莫打我我固不是爾兒子亦不是如是數日而死轉因録宋淳熙元年平江販者賈腯以貨麞為業常豢飼數十頭每夕宰其一逮旦持出于市吳地少此物率一斤值錢一千人皆爭買移時而盡凡二十餘年贏得頗多一夕大醉認十嵗兒為麞束縛于案妻奔往爭救賈示以刀不敢前但拊膺寃哭賈支解剖剝其兒與麞不異四鄰雖聞之畏或相纍唯謹閉門明旦賈如常日唤兒整擔妻曰夜來屠割死了做一堆血肉何呼為驚而往視始痛恨自擲然已無及矣浙西有牙僧之子登科人賀之答曰老夫自小為牙以至今日未嘗欺暪官司一文稅錢所以獲此報將來兒子受得官中俸錢亦無愧也宋䖍州䖍化縣常遣吏李基督租近村以一僕乞錢于逋者不滿意縳諸桑上灌以汁甫得千錢即雷電四起震此僕于普安寺前其錢正在腰間遂入于肉皮䝉其上宋寶積行者居台州仙居縣寶積寺雖小剎而從來規矩整齊紹興中僧圓悟主寺事園人陳甲常種蔬菜來鬻直堂行者慶修竊其一畦陳妻王氏知之而不克與競但仰空詛云我所失菜直一千二百錢教你做畜生還我已而慶修病傷寒因自汗失音困乏欲絶人問所苦不能言惟墮淚而已寮衆以粥飲强灌之奄奄幾一嵗忽矍然而起語人曰向來實不合取陳家菜遭彼設誓憶昨病瘖時見黃山公人來云王大伯呌汝即以黑衣加我體大伯者王氏兄也遂被驅入其舍後先有七八人在彼矣約月餘復獨挈我至陳園顧視自身乃成一豬窘急思歸而為縶縳且以糟食餵飼我數月後肌膚充腯持貨于張屠正得錢千二百屠施刀猛刺喉下痛不可忍大呌一聲歘如夢覺自是疾瘳昔邵武村寺老僧鄧和尚同里有一商販鬻于湖南至嶽下與鄧遇焉問何事而來曰到此逾月矣今日方獲少休袒而視之背血肉破壞商曰師何以嬰是罰曰吾平生受人經錢至多不盡為看經罹譴于隂府君幸為語吾徒弟取匱中經簿一一招他僧償之吾藏錢四十八貫在卧榻高處閣板上足以供費也商歸家旋詣彼寺鄧元不死但抱疾已久疽發于背入視與所見同商因告以經債和尚猶訴無錢商曰師所積四十八貫錢在卧榻閣板上將安用鄧愕然遂細詢曲折益震懼即日盡出錢命僧畢誦懺謝疽遂愈五代時華陽縣吏郝溥因追缺稅户街判司勾禮禮遣婢赴縣囑溥勿留禁且寬租期溥不從禁其婢租足而放之禮繇是恨溥明年縣司分擘百姓張瓊家業郝溥取錢二萬瓊訴之街判司追勘勾禮大笑曰溥來也莫望生令司吏汝勳搆成其罪殺之不數月汝勳見溥來索命遂暴卒勾禮一旦晨興忽見溥升堂羅拽毆擊因患背瘡而卒宋潤州一監征與務胥盜官錢皆藏之胥家約曰官滿分以與我胥僞諾之既代去卒不與一錢監征不敢索悒悒渡楊子江竟死于維揚胥得全賄遂富告歸治田宅是年妻孕如見監征褰帷而入即誕子甚慧長喜讀書胥使之就學二十嵗登第胥大喜盡鬻其産挈家隨其子至京師其子調官南下其資漸已匱乏至中途子病罄所餘召醫及維揚而死未死之夕胥夢監征出舟登岸去自是胥無所歸悒悒旅寓貧窘無聊而死宋陳邦光守金陵將杖朱衣吏當直伍伯者素貪暴不仁從求錢百千吏才許其半伍伯怒噀手嘻笑曰我不打人多時也將甘心焉摩手牆間適有破磁片正對手心刺之血流交肘登時痛瘇不可忍數日而死宋元州霍千里貪賄無厭挾妖術以濟欲旁有僧舍凡僧所得必平分乃可否則受禍紹興中一客僧于村舍誦經得錢七百而未及分霍恨欲害之及夜僧禮佛未寢忽霹靂一聲有數壯夫負棺來既而若失墜狀遂悄然及明衆僧視之皆紙為之喜云彼不勝必自禍試訪之霍已斃矣宋京師有覃興衛州石密同財作客商一日覃請石曰河北冀貝二州有錢三百貫請石同往收索之石臨行市店肉喫食因置藥毐覃先行路中聞覃已死因獨取錢往衛州作一解庫忽見覃來石謂其未死與之相揖覃曰我未食石遂邀覃于市店將食覃于懷中取一紙裹發之五味也覃遂置一匕于石盤中覃曰君毒我我返毒君食已店家保謂石曰君獨食而相揖讓何也石方悟覃已死石數日吐血而卒俱同上錢通卷十八
